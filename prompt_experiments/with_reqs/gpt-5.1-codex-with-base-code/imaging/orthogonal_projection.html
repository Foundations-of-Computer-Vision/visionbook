<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Orthographic Projection Explorer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
            background: white;
        }

        #container {
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            width: 320px;
            max-width: calc(100% - 3rem);
            background: rgba(255, 255, 255, 0.9);
            border-radius: 18px;
            padding: 1.2rem 1.4rem 1.4rem;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(6px);
        }

        #ui h2 {
            margin: 0 0 0.35rem;
            font-size: 1.25rem;
            letter-spacing: 0.01em;
        }

        #ui p {
            margin: 0 0 0.8rem;
            color: #444;
            font-size: 0.9rem;
            line-height: 1.3;
        }

        .control-group {
            margin-bottom: 1rem;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        input[type=range] {
            width: 100%;
        }

        small {
            display: block;
            color: #555;
            margin-top: 0.25rem;
            font-size: 0.78rem;
        }

        .control-row {
            margin-bottom: 0.8rem;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 999px;
            padding: 0.5rem 0.9rem;
            font-size: 0.85rem;
            font-weight: 600;
            background: #111;
            color: white;
            transition: background 0.2s ease;
        }

        button.secondary {
            background: #e0e0e0;
            color: #222;
        }

        button.ghost {
            background: transparent;
            color: #0b6e4f;
            border: 1px solid #0b6e4f;
        }

        button:hover {
            background: #333;
        }

        button.secondary:hover {
            background: #c5c5c5;
        }

        button.ghost:hover {
            background: rgba(11, 110, 79, 0.08);
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-bottom: 0.9rem;
        }

        #narration {
            font-size: 0.86rem;
            line-height: 1.35;
            color: #2a2a2a;
            background: #f4f4f4;
            border-radius: 12px;
            padding: 0.7rem 0.85rem;
            min-height: 60px;
        }

        @media (max-width: 720px) {
            #ui {
                left: 50%;
                transform: translateX(-50%);
                width: calc(100% - 2rem);
            }

            .button-row {
                flex-direction: column;
            }

            button {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div id="container"></div>
    <div id="ui">
        <h2>Orthographic Projection</h2>
        <p>Slide the block, toggle the construction lines, and step through the guided story to see how the 3D shape
            forms its 2D image.</p>
        <div class="control-group">
            <label for="depthSlider">Object depth <span id="depthValue">2.20</span></label>
            <input id="depthSlider" type="range" min="0.8" max="3.0" step="0.01" value="2.2" />
            <small>Moves the prism along textbook Z while keeping the orthographic image constant.</small>
        </div>
        <div class="control-row">
            <input type="checkbox" id="rayToggle" checked />
            <label for="rayToggle" style="margin: 0; font-weight: 500;">Show projection rays</label>
        </div>
        <div class="button-row">
            <button id="stepButton">Guided step ▶</button>
            <button id="sweepButton" class="ghost">Start auto sweep</button>
            <button id="resetButton" class="secondary">Reset to textbook view</button>
        </div>
        <div id="narration">Step 1/4 · Axes anchor the 3D scene before projecting.</div>
    </div>
    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.160.0';
        import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        const container = document.getElementById('container');
        const depthSlider = document.getElementById('depthSlider');
        const depthValue = document.getElementById('depthValue');
        const rayToggle = document.getElementById('rayToggle');
        const stepButton = document.getElementById('stepButton');
        const sweepButton = document.getElementById('sweepButton');
        const resetButton = document.getElementById('resetButton');
        const narration = document.getElementById('narration');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const aspect = container.clientWidth / container.clientHeight;
        const d = 4;
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, -20, 40);
        const defaultCameraPosition = new THREE.Vector3(6, 4.5, 6);
        const defaultTarget = new THREE.Vector3(1.2, 1.1, 0);
        camera.position.copy(defaultCameraPosition);
        camera.lookAt(defaultTarget);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.copy(defaultTarget);
        controls.saveState();

        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        const keyLight = new THREE.DirectionalLight(0xffffff, 0.65);
        keyLight.position.set(5, 8, 4);
        scene.add(ambient, keyLight);

        // Projection plane from the textbook diagram as a translucent sheet standing at x = 0.
        const planeMaterial = new THREE.MeshPhongMaterial({ color: 0xdfe4ea, transparent: true, opacity: 0.32, side: THREE.DoubleSide });
        const projectionPlane = new THREE.Mesh(new THREE.PlaneGeometry(4, 3.5), planeMaterial);
        projectionPlane.rotation.y = Math.PI / 2;
        projectionPlane.position.x = 0;
        scene.add(projectionPlane);

        // Thin projected image on the plane mirrors the colored rectangles in the figure.
        const projectedGroup = new THREE.Group();
        scene.add(projectedGroup);

        const projectedMaterials = {
            cyan: new THREE.MeshBasicMaterial({ color: 0x4ec8e3, transparent: true, opacity: 0.75 }),
            green: new THREE.MeshBasicMaterial({ color: 0x7ed321, transparent: true, opacity: 0.75 }),
            orange: new THREE.MeshBasicMaterial({ color: 0xff6f3c, transparent: true, opacity: 0.55 })
        };

        function createProjectedStep(size, position, color) {
            const geom = new THREE.BoxGeometry(0.04, size.y, size.z);
            const mesh = new THREE.Mesh(geom, projectedMaterials[color]);
            mesh.position.copy(position);
            projectedGroup.add(mesh);
            return mesh;
        }

        const lowerSize = { x: 1.35, y: 0.6, z: 1.4 };
        const upperSize = { x: 0.95, y: 0.6, z: 0.75 };

        const projectedLower = createProjectedStep(lowerSize, new THREE.Vector3(0.02, lowerSize.y / 2, 0), 'cyan');
        const projectedUpper = createProjectedStep(upperSize, new THREE.Vector3(0.02, lowerSize.y + upperSize.y / 2, 0.32), 'green');

        // Stair-step solid recreated with two box primitives, matching the face colors of the 2D drawing.
        const blockGroup = new THREE.Group();
        scene.add(blockGroup);

        const blockMaterialPool = [];
        function faceMaterials() {
            const mats = [
                new THREE.MeshStandardMaterial({ color: 0xff7246, roughness: 0.55 }),
                new THREE.MeshStandardMaterial({ color: 0x4dd0e1, roughness: 0.4 }),
                new THREE.MeshStandardMaterial({ color: 0x7ed321, roughness: 0.4 }),
                new THREE.MeshStandardMaterial({ color: 0x795548, roughness: 0.75 }),
                new THREE.MeshStandardMaterial({ color: 0xff7246, roughness: 0.55 }),
                new THREE.MeshStandardMaterial({ color: 0xff7246, roughness: 0.55 })
            ];
            blockMaterialPool.push(...mats);
            return mats;
        }

        function createStep(size, position) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(size.x, size.y, size.z), faceMaterials());
            mesh.position.copy(position);
            return mesh;
        }

        const lowerBlock = createStep(lowerSize, new THREE.Vector3(lowerSize.x / 2, lowerSize.y / 2, 0));
        const upperBlock = createStep(upperSize, new THREE.Vector3(upperSize.x / 2, lowerSize.y + upperSize.y / 2, 0.32));
        blockGroup.add(lowerBlock, upperBlock);

        projectedGroup.position.x = 0.02;
        projectedGroup.position.y = 0;

        const initialDepth = 2.2;
        blockGroup.position.set(initialDepth, 0, 0);

        // Parallel dashed segments show how each 3D point reaches the plane.
        const rayMaterial = new THREE.LineDashedMaterial({ color: 0x222222, dashSize: 0.18, gapSize: 0.09, linewidth: 1, transparent: true, opacity: 0.9 });
        const projectionLineGeometry = new THREE.BufferGeometry();
        const projectionLines = new THREE.LineSegments(projectionLineGeometry, rayMaterial);
        projectionLines.computeLineDistances();
        scene.add(projectionLines);

        const referencePoints = [
            new THREE.Vector3(0, lowerSize.y, lowerSize.z / 2),
            new THREE.Vector3(0, lowerSize.y, -lowerSize.z / 2),
            new THREE.Vector3(0, lowerSize.y / 2, 0),
            new THREE.Vector3(0, lowerSize.y + upperSize.y, upperBlock.position.z + upperSize.z / 2),
            new THREE.Vector3(0, lowerSize.y + upperSize.y, upperBlock.position.z - upperSize.z / 2)
        ];

        function updateProjectionLines() {
            blockGroup.updateMatrixWorld(true);
            const array = new Float32Array(referencePoints.length * 6);
            referencePoints.forEach((pt, i) => {
                const worldStart = pt.clone();
                blockGroup.localToWorld(worldStart);
                const worldEnd = worldStart.clone();
                worldEnd.x = projectionPlane.position.x;
                array.set(worldStart.toArray(), i * 6);
                array.set(worldEnd.toArray(), i * 6 + 3);
            });
            projectionLineGeometry.setAttribute('position', new THREE.BufferAttribute(array, 3));
            projectionLineGeometry.computeBoundingSphere();
            projectionLines.computeLineDistances();
        }

        updateProjectionLines();

        // Axes and labels connect the interactive model to the textbook notation.
        function createTextSprite(text, color = '#111', scale = 0.5) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = color;
            ctx.font = '64px "Space Grotesk", Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(scale, scale * 0.5, scale);
            return sprite;
        }

        function createArrow(dir, origin, color, length) {
            const arrow = new THREE.ArrowHelper(dir.clone().normalize(), origin, length, color, 0.15 * length, 0.08 * length);
            return arrow;
        }

        const axisZ = createArrow(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 0), 0x222222, 3.2);
        const axisY = createArrow(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 0), 0x222222, 2.6);
        const axisX = createArrow(new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, 0), 0x222222, 2.6);
        scene.add(axisX, axisY, axisZ);

        const labelZ = createTextSprite('Z', '#111', 0.7);
        labelZ.position.set(3.4, 0.15, 0);
        const labelY = createTextSprite('Y', '#111', 0.7);
        labelY.position.set(0.1, 2.9, 0);
        const labelX = createTextSprite('X', '#111', 0.7);
        labelX.position.set(0, 0.1, 2.9);
        scene.add(labelX, labelY, labelZ);

        const planeLabel = createTextSprite('Projection plane', '#333', 0.9);
        planeLabel.position.set(0.05, 1.9, -0.1);
        scene.add(planeLabel);

        const planeXAxis = createArrow(new THREE.Vector3(0, 0, 1), new THREE.Vector3(0.01, 0.15, 0), 0x2e7d32, 0.9);
        const planeYAxis = createArrow(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0.01, 0.15, 0), 0x222222, 0.9);
        const planeXLabel = createTextSprite('x', '#2e7d32', 0.5);
        planeXLabel.position.set(0.02, 0.15, 1.1);
        const planeYLabel = createTextSprite('y', '#111', 0.5);
        planeYLabel.position.set(0.02, 1.15, 0.05);
        scene.add(planeXAxis, planeYAxis, planeXLabel, planeYLabel);

        function setDepth(value) {
            blockGroup.position.x = value;
            updateProjectionLines();
            depthValue.textContent = value.toFixed(2);
        }

        // Depth slider moves the block along textbook Z to show that the projected footprint is unchanged.
        depthSlider.addEventListener('input', () => {
            stopSweep();
            const value = parseFloat(depthSlider.value);
            setDepth(value);
        });

        // Checkbox toggles the construction rays so learners can focus on either the solid or its image.
        rayToggle.addEventListener('change', () => {
            projectionLines.visible = rayToggle.checked;
        });

        let sweepActive = false;
        let sweepStart = 0;
        function stopSweep() {
            if (!sweepActive) return;
            sweepActive = false;
            sweepButton.textContent = 'Start auto sweep';
            sweepButton.classList.add('ghost');
        }

        sweepButton.addEventListener('click', () => {
            sweepActive = !sweepActive;
            if (sweepActive) {
                sweepStart = performance.now();
                sweepButton.textContent = 'Stop auto sweep';
                sweepButton.classList.remove('ghost');
            } else {
                stopSweep();
            }
        });

        function highlightAxes(active) {
            const color = active ? 0x0b0b0b : 0x555555;
            [axisX, axisY, axisZ].forEach(arrow => arrow.setColor(color));
        }

        function highlightBlock(active) {
            blockMaterialPool.forEach(mat => {
                mat.emissive = mat.emissive || new THREE.Color();
                mat.emissive.setHex(active ? 0x355908 : 0x000000);
                mat.emissiveIntensity = active ? 0.6 : 0;
            });
        }

        function highlightRays(active) {
            rayMaterial.color.setHex(active ? 0x000000 : 0x444444);
            rayMaterial.dashSize = active ? 0.28 : 0.18;
            rayMaterial.needsUpdate = true;
        }

        function highlightPlane(active) {
            planeMaterial.color.setHex(active ? 0xb0bec5 : 0xdfe4ea);
            planeMaterial.opacity = active ? 0.45 : 0.32;
            planeMaterial.needsUpdate = true;
            projectedMaterials.cyan.opacity = active ? 0.95 : 0.75;
            projectedMaterials.green.opacity = active ? 0.95 : 0.75;
            projectedMaterials.orange.opacity = active ? 0.7 : 0.55;
        }

        function resetHighlights() {
            highlightAxes(false);
            highlightBlock(false);
            highlightRays(false);
            highlightPlane(false);
        }

        // Guided sequence explains the projection pipeline step by step.
        const steps = [
            { text: 'Step 1/4 · Axes anchor the 3D scene before projecting.', action: () => highlightAxes(true) },
            { text: 'Step 2/4 · The stepped prism sits at some depth along Z.', action: () => highlightBlock(true) },
            { text: 'Step 3/4 · Parallel rays carry every point straight to the plane.', action: () => highlightRays(true) },
            { text: 'Step 4/4 · The projection plane records the flattened shape.', action: () => highlightPlane(true) }
        ];

        let currentStep = 0;
        function runStep(index) {
            resetHighlights();
            const step = steps[index];
            narration.textContent = step.text;
            step.action();
        }

        stepButton.addEventListener('click', () => {
            currentStep = (currentStep + 1) % steps.length;
            runStep(currentStep);
        });

        resetButton.addEventListener('click', () => {
            setDepth(initialDepth);
            depthSlider.value = initialDepth;
            rayToggle.checked = true;
            projectionLines.visible = true;
            currentStep = 0;
            runStep(currentStep);
            stopSweep();
            controls.reset();
        });

        runStep(currentStep);

        function animate(time) {
            requestAnimationFrame(animate);
            if (sweepActive) {
                const t = (time - sweepStart) * 0.0006;
                const value = 1.9 + Math.sin(t) * 0.8;
                depthSlider.value = value.toFixed(2);
                setDepth(value);
            }
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            const aspect = w / h;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });
    </script>
</body>

</html>
