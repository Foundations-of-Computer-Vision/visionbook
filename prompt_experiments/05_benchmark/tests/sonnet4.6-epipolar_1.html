<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Figure</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    #c {
      width: 100%;
      height: 100%;
      display: block;
    }

    .lbl {
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      font-family: sans-serif;
      font-size: 13px;
      color: #111;
    }

    #ui {
      position: absolute;
      left: 6px;
      bottom: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-family: sans-serif;
      font-size: 11px;
      max-width: 190px;
      max-height: 34%;
      background: transparent;
      border: 0;
      box-shadow: none;
      opacity: 0.88;
      transform: none;
      transition: opacity 0.16s ease;
      z-index: 10;
    }

    #ui:hover,
    #ui:focus-within {
      opacity: 1;
    }

    #ui button {
      padding: 4px 10px;
      cursor: pointer;
      border: 1px solid #aaa;
      background: #f5f5f5;
      border-radius: 4px;
    }

    #ui button:hover {
      background: #e0e0e0;
    }

    #ui button.active {
      background: #c8e6ff;
      border-color: #5aabf0;
    }

    #ui label {
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-shadow: 0 1px 2px #fff;
    }

    #ui input[type=range] {
      width: 86px;
    }

    #figTooltip {
      position: fixed;
      left: 0;
      top: 0;
      display: none;
      max-width: 210px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.58);
      color: #fff;
      font: 11px/1.35 sans-serif;
      pointer-events: none;
      white-space: normal;
      z-index: 20;
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="figTooltip"></div>
  <div id="ui">
    <button id="btnReset" style="display:none">Reset View</button>
    <!-- @FIGURE_UI_BEGIN -->
    <div style="color:#555;font-size:10px;line-height:1.4;padding:4px 7px;background:rgba(255,255,255,0.88);border:1px solid #ddd;border-radius:4px;">
      A point <b>p₁</b> in Camera&nbsp;1 constrains its correspondence <b>p₂</b> to a line (the epipolar line) in Camera&nbsp;2.
    </div>
    <!-- @FIGURE_UI_END -->
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>

  <div id="err-overlay" style="display:none;position:fixed;inset:0;background:#fff;z-index:999;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       font-family:sans-serif;font-size:13px;color:#555;gap:10px;">
    <span id="err-msg">⚠ Figure failed to load</span>
    <button onclick="location.reload()" style="padding:5px 14px;border:1px solid #aaa;
        border-radius:5px;background:#f5f5f5;cursor:pointer;font-size:12px;">↻ Reload</button>
  </div>

  <script>
    let _rendered = false;
    const _errOverlay = document.getElementById('err-overlay');
    window.__markRendered = () => { _rendered = true; _errOverlay.style.display = 'none'; };
    window.addEventListener('error', (e) => {
      if (!_rendered) {
        document.getElementById('err-msg').textContent = '⚠ ' + (e.message || 'Figure failed to load');
        _errOverlay.style.display = 'flex';
      }
    });
    setTimeout(() => {
      if (!_rendered) { _errOverlay.style.display = 'flex'; }
    }, 12000);
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const d = 3;
    let aspect = canvas.clientWidth / canvas.clientHeight;
    let camera = new THREE.OrthographicCamera(
      -d * aspect, d * aspect, d, -d, 0.1, 100
    );
    camera.position.set(4, 4, 4);
    camera.lookAt(0, 0, 0);
    camera.updateProjectionMatrix();

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const HOME_POS = new THREE.Vector3();
    const HOME_TARGET = new THREE.Vector3(0, 0, 0);
    let HOME_ZOOM = 0.75;

    document.getElementById('btnReset').addEventListener('click', () => {
      camera.position.copy(HOME_POS);
      controls.target.copy(HOME_TARGET);
      camera.zoom = HOME_ZOOM;
      camera.updateProjectionMatrix();
      controls.update();
    });

    const FRAME_HALF_HEIGHT = d;
    const FRAME_MARGIN = 0.08;
    const MIN_ZOOM = 0.2;
    const MAX_ZOOM = 5;

    function computeSceneBounds() {
      const box = new THREE.Box3().setFromObject(scene);
      if (box.isEmpty()) {
        box.setFromCenterAndSize(new THREE.Vector3(0, 0, 0), new THREE.Vector3(2 * d, 2 * d, 2 * d));
      }
      const center = new THREE.Vector3();
      box.getCenter(center);
      const size = new THREE.Vector3();
      box.getSize(size);
      return { box, center, size };
    }

    function setCameraView({
      projection = 'orthographic',
      azimuthDeg = 45,
      elevationDeg = 35,
      rollDeg = 0,
      zoom = null,
      target = null,
      heightFraction = 0.5,
      distanceScale = 1.2
    } = {}) {
      const { center, size } = computeSceneBounds();
      const viewTarget = Array.isArray(target)
        ? new THREE.Vector3(target[0] || 0, target[1] || 0, target[2] || 0)
        : center;

      const contentHeight = Math.max(size.y, 1e-6);
      const desiredViewHeight = contentHeight / Math.max(heightFraction, 0.01);
      let resolvedZoom = Number.isFinite(zoom) ? zoom : (2 * FRAME_HALF_HEIGHT) / desiredViewHeight;
      resolvedZoom = Math.min(Math.max(resolvedZoom, MIN_ZOOM), MAX_ZOOM);
      camera.zoom = resolvedZoom;

      const radius = Math.max(size.length() * distanceScale, FRAME_HALF_HEIGHT * 2);
      const azimuth = THREE.MathUtils.degToRad(azimuthDeg);
      const elevation = THREE.MathUtils.degToRad(elevationDeg);
      const cosElev = Math.cos(elevation);
      const x = viewTarget.x + radius * Math.cos(azimuth) * cosElev;
      const y = viewTarget.y + radius * Math.sin(elevation);
      const z = viewTarget.z + radius * Math.sin(azimuth) * cosElev;
      camera.position.set(x, y, z);

      controls.target.copy(viewTarget);
      camera.up.set(0, 1, 0);
      if (Number.isFinite(rollDeg) && rollDeg !== 0) {
        const viewDir = new THREE.Vector3().subVectors(viewTarget, camera.position).normalize();
        camera.up.applyAxisAngle(viewDir, THREE.MathUtils.degToRad(rollDeg));
      }
      camera.updateProjectionMatrix();
      controls.update();

      HOME_POS.copy(camera.position);
      HOME_TARGET.copy(controls.target);
      HOME_ZOOM = camera.zoom;

      window.__figureCameraView = {
        projection, azimuthDeg, elevationDeg, rollDeg,
        zoom: camera.zoom,
        target: [controls.target.x, controls.target.y, controls.target.z],
      };
    }

    function setStandardView({ azimuth = Math.PI / 4, polar = Math.PI / 4, heightFraction = 0.5 } = {}) {
      const azimuthDeg = THREE.MathUtils.radToDeg(azimuth);
      const elevationDeg = 90 - THREE.MathUtils.radToDeg(polar);
      setCameraView({ azimuthDeg, elevationDeg, heightFraction });
    }

    setStandardView();

    const _labels = [];
    const _v = new THREE.Vector3();

    function addLabel(text, position, options = {}) {
      const div = document.createElement('div');
      div.className = 'lbl';
      div.innerHTML = text;
      if (options.color) div.style.color = options.color;
      if (options.fontSize) div.style.fontSize = options.fontSize;
      if (options.bold) div.style.fontWeight = 'bold';
      if (options.background) {
        div.style.background = options.background;
        div.style.padding = '1px 4px';
        div.style.borderRadius = '3px';
      }
      document.body.appendChild(div);
      const entry = { div, pos: position.clone(), offset: options.offset || [0, 0] };
      _labels.push(entry);
      return entry;
    }

    const _referenceDistance = 8;

    function _syncLabels() {
      for (const { div, pos, offset } of _labels) {
        _v.copy(pos).project(camera);
        if (_v.z > 1 || _v.z < -1 || _v.x < -1 || _v.x > 1 || _v.y < -1 || _v.y > 1) {
          div.style.display = 'none';
          continue;
        }
        div.style.display = '';
        const ox = offset && offset[0] ? offset[0] : 0;
        const oy = offset && offset[1] ? offset[1] : 0;
        const x = (_v.x * 0.5 + 0.5) * canvas.clientWidth + ox;
        const y = (-_v.y * 0.5 + 0.5) * canvas.clientHeight + oy;
        let scale;
        const distance = Math.max(camera.position.distanceTo(pos), 1e-4);
        scale = (_referenceDistance / distance) * (camera.zoom || 1);
        scale = Math.max(0.5, Math.min(scale, 6));
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }
    }

    const _tooltip = document.getElementById('figTooltip');
    const _raycaster = new THREE.Raycaster();
    const _pointer = new THREE.Vector2();
    const _interactiveObjects = [];
    let _hoveredInteractive = null;

    function showPopup(title, body) {
      window.parent.postMessage({ type: 'alex-popup', title, body }, '*');
    }

    function hidePopup() {
      window.parent.postMessage({ type: 'alex-popup', title: null }, '*');
    }

    function showTooltip(text, event) {
      if (!_tooltip || !text) return;
      _tooltip.textContent = text;
      _tooltip.style.display = 'block';
      moveTooltip(event);
    }

    function moveTooltip(event) {
      if (!_tooltip || _tooltip.style.display === 'none') return;
      const pad = 12;
      const x = Math.min(event.clientX + pad, window.innerWidth - _tooltip.offsetWidth - pad);
      const y = Math.max(pad, event.clientY - _tooltip.offsetHeight - pad);
      _tooltip.style.left = x + 'px';
      _tooltip.style.top = y + 'px';
    }

    function hideTooltip() {
      if (_tooltip) _tooltip.style.display = 'none';
    }

    function _setPointerFromEvent(event) {
      const rect = canvas.getBoundingClientRect();
      _pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      _pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function _firstInteractiveHit(event) {
      if (!_interactiveObjects.length) return null;
      _setPointerFromEvent(event);
      _raycaster.setFromCamera(_pointer, camera);
      const hits = _raycaster.intersectObjects(_interactiveObjects.map(entry => entry.object), true);
      for (const hit of hits) {
        let obj = hit.object;
        while (obj) {
          const entry = _interactiveObjects.find(item => item.object === obj);
          if (entry) return { ...entry, hit };
          obj = obj.parent;
        }
      }
      return null;
    }

    function registerInteractive(object, info = {}) {
      if (!object) return object;
      object.userData = object.userData || {};
      object.userData.interactive = true;
      _interactiveObjects.push({ object, info });
      return object;
    }

    canvas.addEventListener('pointermove', (event) => {
      moveTooltip(event);
      const entry = _firstInteractiveHit(event);
      if (entry) {
        _hoveredInteractive = entry;
        canvas.style.cursor = 'pointer';
        showTooltip(entry.info.tooltip || entry.info.title || 'Click to explain', event);
      } else {
        _hoveredInteractive = null;
        canvas.style.cursor = controls.enabled ? 'grab' : 'default';
        hideTooltip();
      }
    });

    canvas.addEventListener('pointerleave', () => {
      _hoveredInteractive = null;
      canvas.style.cursor = 'default';
      hideTooltip();
    });

    canvas.addEventListener('click', (event) => {
      const entry = _firstInteractiveHit(event) || _hoveredInteractive;
      if (!entry) {
        hidePopup();
        return;
      }
      const title = entry.info.title || entry.info.tooltip || 'Figure element';
      const body = entry.info.body || entry.info.description || 'This part is interactive.';
      showPopup(title, body);
      if (typeof entry.info.onClick === 'function') entry.info.onClick(entry.hit, entry.object);
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        hidePopup();
        hideTooltip();
      }
    });

    let _firstFrame = true;
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      _syncLabels();
      if (_firstFrame) { _firstFrame = false; window.__markRendered?.(); }
    }
    animate();

    new ResizeObserver(() => {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      aspect = w / h;
      camera.left = -d * aspect;
      camera.right = d * aspect;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    }).observe(canvas);

    // @FIGURE_CODE_BEGIN

    const BLK = 0x111111;
    const GRN = 0x22cc22;
    const BLU = 0x3366ee;
    const RED = 0xdd2222;

    // Draw a line segment between two Vector3 points
    function seg(a, b, col) {
      const g = new THREE.BufferGeometry().setFromPoints([a, b]);
      const l = new THREE.Line(g, new THREE.LineBasicMaterial({ color: col }));
      scene.add(l);
      return l;
    }

    // Draw an arrow from → to
    function arw(from, to, col, hl, hw) {
      hl = hl !== undefined ? hl : 0.12;
      hw = hw !== undefined ? hw : 0.07;
      const dir = new THREE.Vector3().subVectors(to, from).normalize();
      const a = new THREE.ArrowHelper(dir, from.clone(), from.distanceTo(to), col, hl, hw);
      scene.add(a);
      return a;
    }

    // Draw a solid sphere
    function ball(pos, r, col) {
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(r, 16, 8),
        new THREE.MeshBasicMaterial({ color: col })
      );
      m.position.copy(pos);
      scene.add(m);
      return m;
    }

    // Convert plane-local (u, v) coords to world Vector3
    // cx,cy,cz: plane center in world; ry: Y-axis rotation of the plane
    function ptW(cx, cy, cz, ry, u, v) {
      return new THREE.Vector3(
        cx + u * Math.cos(ry),
        cy + v,
        cz - u * Math.sin(ry)
      );
    }

    // Image plane dimensions
    const PW = 2.2, PH = 1.65;
    const HW = PW / 2, HH = PH / 2;

    // Camera 1 image plane: left side, rotated +0.25 rad around Y
    const [P1x, P1y, P1z, P1r] = [-2.4, 0.35, 0.0, 0.25];
    const p1 = (u, v) => ptW(P1x, P1y, P1z, P1r, u, v);

    // Camera 2 image plane: right side, rotated -0.25 rad around Y
    const [P2x, P2y, P2z, P2r] = [2.4, 0.35, 0.0, -0.25];
    const p2 = (u, v) => ptW(P2x, P2y, P2z, P2r, u, v);

    // --- Draw image planes (white fill + black border) ---
    function buildPlane(cx, cy, cz, ry, pfn) {
      const pm = new THREE.Mesh(
        new THREE.PlaneGeometry(PW, PH),
        new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })
      );
      pm.position.set(cx, cy, cz);
      pm.rotation.y = ry;
      scene.add(pm);

      const border = [pfn(-HW, -HH), pfn(HW, -HH), pfn(HW, HH), pfn(-HW, HH), pfn(-HW, -HH)];
      scene.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(border),
        new THREE.LineBasicMaterial({ color: BLK })
      ));

      registerInteractive(pm, {
        tooltip: cx < 0 ? 'Camera 1 image plane' : 'Camera 2 image plane',
        title: cx < 0 ? 'Camera 1 Image Plane' : 'Camera 2 Image Plane',
        body: cx < 0
          ? 'The image captured by Camera 1. Point p₁ is the projection of the 3D scene point onto this plane.'
          : 'The image captured by Camera 2. The epipolar line (blue) shows where the correspondence p₂ must lie, given p₁ in Camera 1.',
      });

      return pm;
    }

    buildPlane(P1x, P1y, P1z, P1r, p1);
    buildPlane(P2x, P2y, P2z, P2r, p2);

    // --- Camera bodies (black spheres) ---
    const cam1 = new THREE.Vector3(-3.85, -1.35, 0.55);
    const cam2 = new THREE.Vector3(3.85, -1.35, 0.55);

    registerInteractive(ball(cam1, 0.17, BLK), {
      tooltip: 'Camera 1',
      title: 'Camera 1',
      body: 'The first camera. Its pose is the reference frame. The green coordinate axes on its image plane show the image coordinate system.',
    });
    registerInteractive(ball(cam2, 0.17, BLK), {
      tooltip: 'Camera 2',
      title: 'Camera 2',
      body: 'The second camera, related to Camera 1 by rotation R and translation T. A point seen in Camera 1 projects to a line (epipolar line) in this camera.',
    });

    // --- Frustum lines: camera center → image plane corners ---
    [[-HW, -HH], [HW, -HH], [HW, HH], [-HW, HH]].forEach(([u, v]) => {
      seg(cam1, p1(u, v), BLK);
      seg(cam2, p2(u, v), BLK);
    });

    // --- Green coordinate axes on Camera 1's image plane ---
    const axO = p1(0, 0);
    arw(axO, p1( 0.76, 0.0), GRN, 0.13, 0.07);  // +u (right)
    arw(axO, p1(-0.76, 0.0), GRN, 0.13, 0.07);  // -u (left)
    arw(axO, p1( 0.0,  0.66), GRN, 0.13, 0.07); // +v (up)

    // --- p₁: the observed point in Camera 1's image ---
    const p1pos = p1(0.30, 0.20);
    registerInteractive(ball(p1pos, 0.10, RED), {
      tooltip: 'p₁ — observed image point in Camera 1',
      title: 'p₁: Image Point in Camera 1',
      body: 'This is the 2D projection of a 3D scene point onto Camera 1\'s image plane. Given p₁, we want to find the matching point p₂ in Camera 2.',
    });
    addLabel('p<sub>1</sub>', p1pos, { bold: true, fontSize: '14px', offset: [13, -5] });

    // --- Epipolar line on Camera 2's image plane (blue) ---
    // The epipolar line is the projection of the ray through p₁ (from Camera 1) onto Camera 2's image.
    // Shown as two arrows from center in opposite diagonal directions.
    const eO = p2(0, 0);
    arw(eO, p2( 0.84, 0.52), BLU, 0.14, 0.08);  // NE direction
    arw(eO, p2(-0.84, -0.52), BLU, 0.14, 0.08); // SW direction
    // Second epipolar-related arrow pair (showing the search constraint)
    arw(eO, p2(-0.20, 0.70), BLU, 0.13, 0.07);  // N direction
    arw(eO, p2(-0.72, 0.12), BLU, 0.13, 0.07);  // W direction

    // --- p₂? candidate points on Camera 2's image (along / near epipolar line) ---
    const cands = [
      { u: -0.50, v:  0.40, ox: -18, oy: -9 },
      { u:  0.52, v:  0.44, ox:  15, oy: -9 },
      { u: -0.10, v: -0.28, ox: -18, oy:  9 },
      { u:  0.60, v: -0.04, ox:  15, oy:  2 },
    ];
    cands.forEach(({ u, v, ox, oy }) => {
      const pos = p2(u, v);
      registerInteractive(ball(pos, 0.095, RED), {
        tooltip: 'p₂? — candidate correspondence in Camera 2',
        title: 'p₂? — Candidate Correspondence',
        body: 'Without additional constraints, p₂ could be any of these points. The epipolar constraint (blue line) restricts candidates to a 1D line, dramatically reducing the search space.',
      });
      addLabel('p<sub>2</sub>?', pos, { bold: true, fontSize: '13px', offset: [ox, oy] });
    });

    // --- Camera labels ---
    addLabel('Camera 1', new THREE.Vector3(cam1.x, cam1.y - 0.28, cam1.z),
      { fontSize: '13px', offset: [0, 16] });
    addLabel('Camera 2', new THREE.Vector3(cam2.x, cam2.y - 0.28, cam2.z),
      { fontSize: '13px', offset: [0, 16] });

    // --- R, T arrow at bottom (Camera 1 → Camera 2 transformation) ---
    const rtFrom = new THREE.Vector3(-3.3, -2.45, 0.55);
    const rtTo   = new THREE.Vector3( 3.3, -2.45, 0.55);
    arw(rtFrom, rtTo, GRN, 0.22, 0.14);
    addLabel('<b>R, T</b>', new THREE.Vector3(0, -2.45, 0.55),
      { color: '#22cc22', fontSize: '15px', offset: [0, 18] });

    // --- Set initial camera view to match the original figure ---
    // Viewing from slight elevation and slight azimuth to show both planes' faces
    setCameraView({
      azimuthDeg: 20,
      elevationDeg: 22,
      heightFraction: 0.70,
      distanceScale: 1.6,
    });

    document.getElementById('btnReset').style.display = '';

    // @FIGURE_CODE_END

  </script>
</body>

</html>
