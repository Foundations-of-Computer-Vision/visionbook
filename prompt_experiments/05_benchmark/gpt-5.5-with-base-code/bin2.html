<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Binomial Filter</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }

    #c {
      width: 100%;
      height: 100%;
      display: block;
    }

    .lbl {
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      font-family: "Times New Roman", Times, serif;
      font-size: 14px;
      color: #111;
      text-shadow: 0 1px 2px #fff, 0 -1px 2px #fff, 1px 0 2px #fff, -1px 0 2px #fff;
    }

    #ui {
      position: absolute;
      left: 6px;
      bottom: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-family: sans-serif;
      font-size: 11px;
      max-width: 190px;
      max-height: 34%;
      background: transparent;
      border: 0;
      box-shadow: none;
      opacity: 0.88;
      transform: none;
      transition: opacity 0.16s ease;
      z-index: 10;
    }

    #ui:hover,
    #ui:focus-within {
      opacity: 1;
    }

    #ui button {
      padding: 4px 8px;
      cursor: pointer;
      border: 1px solid #aaa;
      background: #f5f5f5;
      border-radius: 4px;
      font: 11px/1 sans-serif;
    }

    #ui button:hover {
      background: #e0e0e0;
    }

    #ui button.active {
      background: #dbeeff;
      border-color: #4f9ee8;
    }

    #figTooltip {
      position: fixed;
      left: 0;
      top: 0;
      display: none;
      max-width: 235px;
      padding: 5px 8px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font: 11px/1.35 sans-serif;
      pointer-events: none;
      white-space: normal;
      z-index: 20;
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="figTooltip"></div>
  <div id="ui">
    <button id="btnNormalize" title="Toggle the textbook division by the DC gain 16">/16</button>
    <button id="btnOuter" title="Show how [1 2 1]^T [1 2 1] makes this surface">outer</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>

  <div id="err-overlay" style="display:none;position:fixed;inset:0;background:#fff;z-index:999;
       flex-direction:column;align-items:center;justify-content:center;
       font-family:sans-serif;font-size:13px;color:#555;gap:10px;">
    <span id="err-msg">Figure failed to load</span>
    <button onclick="location.reload()" style="padding:5px 14px;border:1px solid #aaa;
        border-radius:5px;background:#f5f5f5;cursor:pointer;font-size:12px;">Reload</button>
  </div>

  <script>
    let _rendered = false;
    const _errOverlay = document.getElementById('err-overlay');
    window.__markRendered = () => { _rendered = true; _errOverlay.style.display = 'none'; };
    window.addEventListener('error', (e) => {
      if (!_rendered) {
        document.getElementById('err-msg').textContent = e.message || 'Figure failed to load';
        _errOverlay.style.display = 'flex';
      }
    });
    setTimeout(() => {
      if (!_rendered) { _errOverlay.style.display = 'flex'; }
    }, 12000);
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const d = 3;
    let aspect = Math.max(canvas.clientWidth, 1) / Math.max(canvas.clientHeight, 1);
    const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 100);
    camera.position.set(4, 4, 4);
    camera.lookAt(0, 0, 0);
    camera.updateProjectionMatrix();

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enablePan = true;

    const HOME_POS = new THREE.Vector3();
    const HOME_TARGET = new THREE.Vector3(0, 0, 0);
    let HOME_ZOOM = 0.75;

    const FRAME_HALF_HEIGHT = d;
    const MIN_ZOOM = 0.2;
    const MAX_ZOOM = 8;

    function computeSceneBounds() {
      const box = new THREE.Box3().setFromObject(scene);
      if (box.isEmpty()) {
        box.setFromCenterAndSize(new THREE.Vector3(0, 0, 0), new THREE.Vector3(2 * d, 2 * d, 2 * d));
      }
      const center = new THREE.Vector3();
      box.getCenter(center);
      const size = new THREE.Vector3();
      box.getSize(size);
      return { box, center, size };
    }

    function setCameraView({
      projection = 'orthographic',
      azimuthDeg = 45,
      elevationDeg = 35,
      rollDeg = 0,
      zoom = null,
      target = null,
      heightFraction = 0.5,
      distanceScale = 1.2
    } = {}) {
      const { center, size } = computeSceneBounds();
      const viewTarget = Array.isArray(target)
        ? new THREE.Vector3(target[0] || 0, target[1] || 0, target[2] || 0)
        : center;

      const contentHeight = Math.max(size.y, 1e-6);
      const desiredViewHeight = contentHeight / Math.max(heightFraction, 0.01);
      let resolvedZoom = Number.isFinite(zoom) ? zoom : (2 * FRAME_HALF_HEIGHT) / desiredViewHeight;
      resolvedZoom = Math.min(Math.max(resolvedZoom, MIN_ZOOM), MAX_ZOOM);
      camera.zoom = resolvedZoom;

      const radius = Math.max(size.length() * distanceScale, FRAME_HALF_HEIGHT * 2);
      const azimuth = THREE.MathUtils.degToRad(azimuthDeg);
      const elevation = THREE.MathUtils.degToRad(elevationDeg);
      const cosElev = Math.cos(elevation);
      const x = viewTarget.x + radius * Math.cos(azimuth) * cosElev;
      const y = viewTarget.y + radius * Math.sin(elevation);
      const z = viewTarget.z + radius * Math.sin(azimuth) * cosElev;
      camera.position.set(x, y, z);

      controls.target.copy(viewTarget);
      camera.up.set(0, 1, 0);
      if (Number.isFinite(rollDeg) && rollDeg !== 0) {
        const viewDir = new THREE.Vector3().subVectors(viewTarget, camera.position).normalize();
        camera.up.applyAxisAngle(viewDir, THREE.MathUtils.degToRad(rollDeg));
      }
      camera.updateProjectionMatrix();
      controls.update();

      HOME_POS.copy(camera.position);
      HOME_TARGET.copy(controls.target);
      HOME_ZOOM = camera.zoom;

      window.__figureCameraView = {
        projection,
        azimuthDeg,
        elevationDeg,
        rollDeg,
        zoom: camera.zoom,
        target: [controls.target.x, controls.target.y, controls.target.z]
      };
    }

    function setStandardView({ azimuth = Math.PI / 4, polar = Math.PI / 4, heightFraction = 0.5 } = {}) {
      const azimuthDeg = THREE.MathUtils.radToDeg(azimuth);
      const elevationDeg = 90 - THREE.MathUtils.radToDeg(polar);
      setCameraView({ azimuthDeg, elevationDeg, heightFraction });
    }

    const _labels = [];
    const _v = new THREE.Vector3();

    function addLabel(text, position, options = {}) {
      const div = document.createElement('div');
      div.className = 'lbl';
      div.innerHTML = text;
      if (options.color) div.style.color = options.color;
      if (options.fontSize) div.style.fontSize = options.fontSize;
      if (options.bold) div.style.fontWeight = 'bold';
      if (options.fontFamily) div.style.fontFamily = options.fontFamily;
      if (options.background) {
        div.style.background = options.background;
        div.style.padding = '1px 4px';
        div.style.borderRadius = '3px';
      }
      if (options.writingMode) div.style.writingMode = options.writingMode;
      if (options.rotate) div.style.rotate = options.rotate;
      document.body.appendChild(div);
      const entry = { div, pos: position.clone(), offset: options.offset || [0, 0], visible: options.visible !== false };
      _labels.push(entry);
      return entry;
    }

    const _referenceDistance = 8;

    function _syncLabels() {
      for (const { div, pos, offset, visible } of _labels) {
        if (!visible) {
          div.style.display = 'none';
          continue;
        }
        _v.copy(pos).project(camera);
        if (_v.z > 1 || _v.z < -1 || _v.x < -1 || _v.x > 1 || _v.y < -1 || _v.y > 1) {
          div.style.display = 'none';
          continue;
        }
        div.style.display = '';

        const ox = offset && offset[0] ? offset[0] : 0;
        const oy = offset && offset[1] ? offset[1] : 0;
        const x = (_v.x * 0.5 + 0.5) * canvas.clientWidth + ox;
        const y = (-_v.y * 0.5 + 0.5) * canvas.clientHeight + oy;

        const distance = Math.max(camera.position.distanceTo(pos), 1e-4);
        let scale = (_referenceDistance / distance) * (camera.zoom || 1);
        scale = Math.max(0.55, Math.min(scale, 5));

        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }
    }

    const _tooltip = document.getElementById('figTooltip');
    const _raycaster = new THREE.Raycaster();
    const _pointer = new THREE.Vector2();
    const _interactiveObjects = [];
    let _hoveredInteractive = null;

    function showTooltip(text, event) {
      if (!_tooltip || !text) return;
      _tooltip.textContent = text;
      _tooltip.style.display = 'block';
      moveTooltip(event);
    }

    function moveTooltip(event) {
      if (!_tooltip || _tooltip.style.display === 'none') return;
      const pad = 12;
      const x = Math.min(event.clientX + pad, window.innerWidth - _tooltip.offsetWidth - pad);
      const y = Math.max(pad, event.clientY - _tooltip.offsetHeight - pad);
      _tooltip.style.left = x + 'px';
      _tooltip.style.top = y + 'px';
    }

    function hideTooltip() {
      if (_tooltip) _tooltip.style.display = 'none';
    }

    function _setPointerFromEvent(event) {
      const rect = canvas.getBoundingClientRect();
      _pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      _pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function _firstInteractiveHit(event) {
      if (!_interactiveObjects.length) return null;
      _setPointerFromEvent(event);
      _raycaster.setFromCamera(_pointer, camera);
      const hits = _raycaster.intersectObjects(_interactiveObjects.map(entry => entry.object), true);
      for (const hit of hits) {
        let obj = hit.object;
        while (obj) {
          const entry = _interactiveObjects.find(item => item.object === obj);
          if (entry) return { ...entry, hit };
          obj = obj.parent;
        }
      }
      return null;
    }

    function registerInteractive(object, info = {}) {
      if (!object) return object;
      object.userData = object.userData || {};
      object.userData.interactive = true;
      _interactiveObjects.push({ object, info });
      return object;
    }

    canvas.addEventListener('pointermove', (event) => {
      moveTooltip(event);
      const entry = _firstInteractiveHit(event);
      if (entry) {
        _hoveredInteractive = entry;
        canvas.style.cursor = 'pointer';
        showTooltip(entry.info.tooltip || entry.info.title || 'Click to explain', event);
        if (entry.info.onHover) entry.info.onHover(true);
      } else {
        if (_hoveredInteractive?.info?.onHover) _hoveredInteractive.info.onHover(false);
        _hoveredInteractive = null;
        canvas.style.cursor = controls.enabled ? 'grab' : 'default';
        hideTooltip();
      }
    });

    canvas.addEventListener('pointerleave', () => {
      if (_hoveredInteractive?.info?.onHover) _hoveredInteractive.info.onHover(false);
      _hoveredInteractive = null;
      canvas.style.cursor = 'default';
      hideTooltip();
    });

    canvas.addEventListener('click', (event) => {
      const entry = _firstInteractiveHit(event) || _hoveredInteractive;
      if (!entry) return;
      if (typeof entry.info.onClick === 'function') entry.info.onClick(entry.hit, entry.object);
    });

    scene.add(new THREE.HemisphereLight(0xffffff, 0xffffff, 1.8));
    const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
    keyLight.position.set(3, 6, 4);
    scene.add(keyLight);

    const root = new THREE.Group();
    scene.add(root);

    const yScale = 0.62;
    const maxCoeff = 4;
    const blue = 0x0000ff;
    const gridColor = 0xc7c7c7;
    const axisColor = 0x111111;
    const mutedBlue = 0x6682ff;
    const highlightBlue = 0x002cff;

    const stemMaterial = new THREE.MeshBasicMaterial({ color: blue });
    const sphereMaterial = new THREE.MeshPhongMaterial({ color: blue, shininess: 45 });
    const fadedStemMaterial = new THREE.MeshBasicMaterial({ color: mutedBlue, transparent: true, opacity: 0.62 });
    const highlightMaterial = new THREE.MeshPhongMaterial({ color: highlightBlue, shininess: 80 });
    const lineMaterial = new THREE.LineBasicMaterial({ color: gridColor, transparent: true, opacity: 0.95 });
    const axisMaterial = new THREE.LineBasicMaterial({ color: axisColor });
    const factorMaterial = new THREE.MeshBasicMaterial({ color: 0x3d3d3d, transparent: true, opacity: 0 });

    function addLine(points, material = lineMaterial, parent = root) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(geometry, material);
      parent.add(line);
      return line;
    }

    function addCylinderBetween(start, end, radius, material, parent = root) {
      const direction = new THREE.Vector3().subVectors(end, start);
      const length = direction.length();
      const geometry = new THREE.CylinderGeometry(radius, radius, length, 18);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(start).add(end).multiplyScalar(0.5);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.normalize());
      parent.add(mesh);
      return mesh;
    }

    const plotGroup = new THREE.Group();
    root.add(plotGroup);

    // The textbook figure is a 3D stem plot of the 3 x 3 filter samples b_{2,2}[n,m].
    // Horizontal coordinates are n and m; height is the binomial weight.
    const samples = [
      { n: -1, m: -1, c: 1 }, { n: 0, m: -1, c: 2 }, { n: 1, m: -1, c: 1 },
      { n: -1, m: 0, c: 2 }, { n: 0, m: 0, c: 4 }, { n: 1, m: 0, c: 2 },
      { n: -1, m: 1, c: 1 }, { n: 0, m: 1, c: 2 }, { n: 1, m: 1, c: 1 }
    ];

    // Light gray floor and back reference box reproduce the MATLAB-style axes in the source image.
    for (let t = -1; t <= 1; t += 1) {
      addLine([new THREE.Vector3(-1.35, 0, t), new THREE.Vector3(1.35, 0, t)], lineMaterial, plotGroup);
      addLine([new THREE.Vector3(t, 0, -1.35), new THREE.Vector3(t, 0, 1.35)], lineMaterial, plotGroup);
    }
    addLine([new THREE.Vector3(-1.35, 0, -1.35), new THREE.Vector3(1.35, 0, -1.35)], lineMaterial, plotGroup);
    addLine([new THREE.Vector3(1.35, 0, -1.35), new THREE.Vector3(1.35, 0, 1.35)], lineMaterial, plotGroup);
    addLine([new THREE.Vector3(1.35, 0, 1.35), new THREE.Vector3(-1.35, 0, 1.35)], lineMaterial, plotGroup);
    addLine([new THREE.Vector3(-1.35, 0, 1.35), new THREE.Vector3(-1.35, 0, -1.35)], lineMaterial, plotGroup);
    addLine([new THREE.Vector3(-1.35, 0, -1.35), new THREE.Vector3(-1.35, maxCoeff * yScale, -1.35)], lineMaterial, plotGroup);
    addLine([new THREE.Vector3(-1.35, 0, 1.35), new THREE.Vector3(-1.35, maxCoeff * yScale, 1.35)], lineMaterial, plotGroup);
    addLine([new THREE.Vector3(1.35, 0, 1.35), new THREE.Vector3(1.35, maxCoeff * yScale, 1.35)], lineMaterial, plotGroup);
    addLine([new THREE.Vector3(-1.35, maxCoeff * yScale, 1.35), new THREE.Vector3(1.35, maxCoeff * yScale, 1.35)], lineMaterial, plotGroup);
    addLine([new THREE.Vector3(-1.35, maxCoeff * yScale, -1.35), new THREE.Vector3(-1.35, maxCoeff * yScale, 1.35)], lineMaterial, plotGroup);

    addLine([new THREE.Vector3(-1.35, 0, -1.35), new THREE.Vector3(-1.35, maxCoeff * yScale, -1.35)], axisMaterial, plotGroup);
    addLine([new THREE.Vector3(-1.35, 0, -1.35), new THREE.Vector3(1.55, 0, -1.35)], axisMaterial, plotGroup);
    addLine([new THREE.Vector3(-1.35, 0, -1.35), new THREE.Vector3(-1.35, 0, 1.55)], axisMaterial, plotGroup);

    const tickMaterial = new THREE.LineBasicMaterial({ color: 0x333333 });
    for (const val of [0, 1, 2, 4]) {
      const y = val * yScale;
      addLine([new THREE.Vector3(-1.35, y, -1.35), new THREE.Vector3(-1.22, y, -1.35)], tickMaterial, plotGroup);
      addLabel(String(val), new THREE.Vector3(-1.31, y, -1.25), {
        fontSize: '14px',
        offset: [-22, val === 0 ? 4 : 0]
      });
    }

    for (const n of [-1, 0, 1]) {
      addLine([new THREE.Vector3(n, 0, -1.35), new THREE.Vector3(n, 0.05, -1.35)], tickMaterial, plotGroup);
      addLabel(String(n), new THREE.Vector3(n, -0.01, -1.47), {
        fontSize: '14px',
        offset: [0, 14]
      });
    }

    for (const m of [1, 0, -1]) {
      addLine([new THREE.Vector3(-1.35, 0, m), new THREE.Vector3(-1.35, 0.05, m)], tickMaterial, plotGroup);
      addLabel(String(m), new THREE.Vector3(-1.48, -0.01, m), {
        fontSize: '14px',
        offset: [-10, 6]
      });
    }

    addLabel('<i>b</i><sub>2,2</sub>[<i>n</i>, <i>m</i>]', new THREE.Vector3(-1.35, 2.34, -1.18), {
      fontSize: '15px',
      bold: true,
      offset: [-42, -6],
      rotate: '-90deg'
    });
    addLabel('<i>m</i>', new THREE.Vector3(-1.55, -0.06, 1.67), {
      fontSize: '18px',
      bold: true,
      offset: [-9, 16]
    });
    addLabel('<i>n</i>', new THREE.Vector3(1.72, -0.05, -1.45), {
      fontSize: '18px',
      bold: true,
      offset: [12, 12]
    });

    const stemEntries = [];
    const sphereGeometry = new THREE.SphereGeometry(0.105, 28, 18);
    const hitGeometry = new THREE.SphereGeometry(0.18, 24, 14);

    for (const sample of samples) {
      const top = new THREE.Vector3(sample.n, sample.c * yScale, sample.m);
      const base = new THREE.Vector3(sample.n, 0, sample.m);
      const stem = addCylinderBetween(base, top, 0.013, stemMaterial, plotGroup);
      const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial.clone());
      sphere.position.copy(top);
      plotGroup.add(sphere);

      const hit = new THREE.Mesh(hitGeometry, new THREE.MeshBasicMaterial({ visible: false }));
      hit.position.copy(top);
      plotGroup.add(hit);

      const entry = { sample, stem, sphere, hit, top, base, originalHeight: sample.c * yScale };
      stemEntries.push(entry);

      registerInteractive(hit, {
        tooltip: `b[${sample.n}, ${sample.m}] = ${sample.c}`,
        onHover: (isHover) => {
          sphere.material.color.set(isHover ? 0xff7a00 : blue);
          sphere.scale.setScalar(isHover ? 1.42 : 1);
          stem.material = isHover ? highlightMaterial : (isNormalized ? fadedStemMaterial : stemMaterial);
        },
        onClick: () => {
          const product = [1, 2, 1][sample.n + 1] * [1, 2, 1][sample.m + 1];
          const shown = isNormalized ? (sample.c / 16).toFixed(4) : sample.c;
          _tooltip.textContent = `Sample at n=${sample.n}, m=${sample.m}: ${product} ${isNormalized ? '/ 16 = ' + shown : '= ' + shown}.`;
          _tooltip.style.display = 'block';
        }
      });
    }

    // Thin translucent bars encode the separable outer-product factors [1 2 1] along n and m.
    const outerGroup = new THREE.Group();
    outerGroup.visible = false;
    plotGroup.add(outerGroup);

    function addFactorBar(position, scale, rotationY) {
      const geometry = new THREE.BoxGeometry(0.12, scale.y, 0.12);
      const mesh = new THREE.Mesh(geometry, factorMaterial.clone());
      mesh.position.copy(position);
      mesh.rotation.y = rotationY;
      outerGroup.add(mesh);
      return mesh;
    }

    const factorBars = [];
    for (const n of [-1, 0, 1]) {
      const weight = [1, 2, 1][n + 1];
      factorBars.push(addFactorBar(new THREE.Vector3(n, weight * yScale * 0.5, -1.66), { y: weight * yScale }, 0));
    }
    for (const m of [-1, 0, 1]) {
      const weight = [1, 2, 1][m + 1];
      factorBars.push(addFactorBar(new THREE.Vector3(-1.66, weight * yScale * 0.5, m), { y: weight * yScale }, 0));
    }

    const outerLabels = [
      addLabel('[1&nbsp;2&nbsp;1]', new THREE.Vector3(0, 1.45, -1.73), { fontSize: '12px', color: '#333', offset: [0, -4], background: 'rgba(255,255,255,0.72)', visible: false }),
      addLabel('[1&nbsp;2&nbsp;1]<sup>T</sup>', new THREE.Vector3(-1.76, 1.45, 0), { fontSize: '12px', color: '#333', offset: [-8, -2], background: 'rgba(255,255,255,0.72)', visible: false })
    ];

    let isNormalized = false;
    let outerVisible = false;

    function rebuildStems() {
      for (const entry of stemEntries) {
        const height = entry.sample.c * yScale * (isNormalized ? 1 / 16 : 1);
        entry.sphere.position.y = height;
        entry.hit.position.y = height;
        entry.top.set(entry.sample.n, height, entry.sample.m);
        plotGroup.remove(entry.stem);
        entry.stem.geometry.dispose();
        entry.stem = addCylinderBetween(entry.base, entry.top, 0.013, isNormalized ? fadedStemMaterial : stemMaterial, plotGroup);
        entry.originalHeight = height;
      }
    }

    document.getElementById('btnNormalize').addEventListener('click', () => {
      isNormalized = !isNormalized;
      document.getElementById('btnNormalize').classList.toggle('active', isNormalized);
      rebuildStems();
      for (const entry of stemEntries) {
        entry.sphere.material.color.set(isNormalized ? 0x345dff : blue);
        entry.sphere.scale.setScalar(isNormalized ? 0.78 : 1);
      }
      setTimeout(() => {
        for (const entry of stemEntries) entry.sphere.scale.setScalar(1);
      }, 320);
    });

    document.getElementById('btnOuter').addEventListener('click', () => {
      outerVisible = !outerVisible;
      document.getElementById('btnOuter').classList.toggle('active', outerVisible);
      outerGroup.visible = outerVisible;
      outerLabels.forEach(label => { label.visible = outerVisible; });
      for (const bar of factorBars) bar.material.opacity = outerVisible ? 0.28 : 0;
      for (const entry of stemEntries) {
        const isCenterLine = entry.sample.n === 0 || entry.sample.m === 0;
        entry.sphere.material.color.set(outerVisible && isCenterLine ? 0xff7a00 : (isNormalized ? 0x345dff : blue));
      }
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') hideTooltip();
      if (event.key.toLowerCase() === 'r') {
        camera.position.copy(HOME_POS);
        controls.target.copy(HOME_TARGET);
        camera.zoom = HOME_ZOOM;
        camera.updateProjectionMatrix();
        controls.update();
      }
    });

    setCameraView({
      projection: 'orthographic',
      azimuthDeg: -52,
      elevationDeg: 19,
      rollDeg: 0,
      zoom: 1.28,
      target: [-0.08, 1.12, -0.02],
      heightFraction: 0.74,
      distanceScale: 1.4
    });

    let _firstFrame = true;
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      _syncLabels();
      if (_firstFrame) { _firstFrame = false; window.__markRendered?.(); }
    }
    animate();

    new ResizeObserver(() => {
      const w = Math.max(canvas.clientWidth, 1);
      const h = Math.max(canvas.clientHeight, 1);
      aspect = w / h;
      camera.left = -d * aspect;
      camera.right = d * aspect;
      camera.top = d;
      camera.bottom = -d;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    }).observe(canvas);
  </script>
</body>

</html>
