<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yaw, Pitch, Roll</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }

        #c {
            width: 100%;
            height: 100%;
            display: block;
        }

        .lbl {
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            font-family: "Times New Roman", Times, serif;
            font-size: 13px;
            color: #111;
            line-height: 0.95;
            text-shadow: 0 1px 2px #fff, 0 -1px 2px #fff, 1px 0 2px #fff, -1px 0 2px #fff;
        }

        #ui {
            position: absolute;
            left: 6px;
            bottom: 6px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 11px;
            max-width: 190px;
            max-height: 34%;
            background: transparent;
            border: 0;
            box-shadow: none;
            opacity: 0.88;
            transform: none;
            transition: opacity 0.16s ease;
            z-index: 10;
        }

        #ui:hover,
        #ui:focus-within {
            opacity: 1;
        }

        #ui button {
            padding: 4px 10px;
            cursor: pointer;
            border: 1px solid #aaa;
            background: rgba(245, 245, 245, 0.86);
            border-radius: 4px;
            min-width: 52px;
        }

        #ui button:hover {
            background: #e0e0e0;
        }

        #ui button.active {
            background: #c8e6ff;
            border-color: #5aabf0;
        }

        #ui label {
            display: flex;
            flex-direction: column;
            gap: 2px;
            text-shadow: 0 1px 2px #fff;
            color: #222;
            width: 90px;
        }

        #ui input[type=range] {
            width: 86px;
        }

        #figTooltip {
            position: fixed;
            left: 0;
            top: 0;
            display: none;
            max-width: 220px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.62);
            color: #fff;
            font: 11px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            pointer-events: none;
            white-space: normal;
            z-index: 20;
        }

        #figPopup {
            position: fixed;
            right: 10px;
            top: 10px;
            display: none;
            max-width: 245px;
            padding: 7px 9px;
            border: 1px solid rgba(0, 0, 0, 0.16);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.10);
            color: #222;
            font: 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            z-index: 30;
        }

        #figPopup strong {
            display: block;
            margin-bottom: 3px;
            font-size: 12px;
        }

        #err-overlay {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #fff;
            color: #555;
            font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            z-index: 999;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="figTooltip"></div>
    <div id="figPopup"></div>
    <div id="ui">
        <button id="btnReset" style="display:none">Reset View</button>
        <button id="btnAxis" title="Choose which Euler angle the slider changes">Yaw</button>
        <label title="Change the selected Euler angle"><span>&theta;</span><input id="angleSlider" type="range"
                min="-55" max="55" value="0" /></label>
    </div>

    <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>

    <div id="err-overlay">
        <span id="err-msg">Figure failed to load</span>
        <button onclick="location.reload()"
            style="padding:5px 14px;border:1px solid #aaa;border-radius:5px;background:#f5f5f5;cursor:pointer;font-size:12px;">Reload</button>
    </div>

    <script>
        let _rendered = false;
        const _errOverlay = document.getElementById('err-overlay');
        window.__markRendered = () => { _rendered = true; _errOverlay.style.display = 'none'; };
        window.addEventListener('error', (e) => {
            if (!_rendered) {
                document.getElementById('err-msg').textContent = e.message || 'Figure failed to load';
                _errOverlay.style.display = 'flex';
            }
        });
        setTimeout(() => {
            if (!_rendered) _errOverlay.style.display = 'flex';
        }, 12000);
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const d = 3;
        let aspect = canvas.clientWidth / Math.max(canvas.clientHeight, 1);
        let camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 100);
        camera.position.set(4, 4, 4);
        camera.lookAt(0, 0, 0);
        camera.updateProjectionMatrix();

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const HOME_POS = new THREE.Vector3();
        const HOME_TARGET = new THREE.Vector3(0, 0, 0);
        let HOME_ZOOM = 0.75;

        document.getElementById('btnReset').addEventListener('click', () => {
            camera.position.copy(HOME_POS);
            controls.target.copy(HOME_TARGET);
            camera.zoom = HOME_ZOOM;
            camera.updateProjectionMatrix();
            controls.update();
        });

        const FRAME_HALF_HEIGHT = d;
        const MIN_ZOOM = 0.2;
        const MAX_ZOOM = 5;

        function computeSceneBounds() {
            const box = new THREE.Box3().setFromObject(scene);
            if (box.isEmpty()) {
                box.setFromCenterAndSize(new THREE.Vector3(0, 0, 0), new THREE.Vector3(2 * d, 2 * d, 2 * d));
            }
            const center = new THREE.Vector3();
            box.getCenter(center);
            const size = new THREE.Vector3();
            box.getSize(size);
            return { box, center, size };
        }

        function setCameraView({
            projection = 'orthographic',
            azimuthDeg = 45,
            elevationDeg = 35,
            rollDeg = 0,
            zoom = null,
            target = null,
            heightFraction = 0.5,
            distanceScale = 1.2
        } = {}) {
            const { center, size } = computeSceneBounds();
            const viewTarget = Array.isArray(target)
                ? new THREE.Vector3(target[0] || 0, target[1] || 0, target[2] || 0)
                : center;

            const contentHeight = Math.max(size.y, 1e-6);
            const desiredViewHeight = contentHeight / Math.max(heightFraction, 0.01);
            let resolvedZoom = Number.isFinite(zoom) ? zoom : (2 * FRAME_HALF_HEIGHT) / desiredViewHeight;
            resolvedZoom = Math.min(Math.max(resolvedZoom, MIN_ZOOM), MAX_ZOOM);
            camera.zoom = resolvedZoom;

            const radius = Math.max(size.length() * distanceScale, FRAME_HALF_HEIGHT * 2);
            const azimuth = THREE.MathUtils.degToRad(azimuthDeg);
            const elevation = THREE.MathUtils.degToRad(elevationDeg);
            const cosElev = Math.cos(elevation);
            camera.position.set(
                viewTarget.x + radius * Math.cos(azimuth) * cosElev,
                viewTarget.y + radius * Math.sin(elevation),
                viewTarget.z + radius * Math.sin(azimuth) * cosElev
            );

            controls.target.copy(viewTarget);
            camera.up.set(0, 1, 0);
            if (Number.isFinite(rollDeg) && rollDeg !== 0) {
                const viewDir = new THREE.Vector3().subVectors(viewTarget, camera.position).normalize();
                camera.up.applyAxisAngle(viewDir, THREE.MathUtils.degToRad(rollDeg));
            }
            camera.updateProjectionMatrix();
            controls.update();

            HOME_POS.copy(camera.position);
            HOME_TARGET.copy(controls.target);
            HOME_ZOOM = camera.zoom;

            window.__figureCameraView = {
                projection,
                azimuthDeg,
                elevationDeg,
                rollDeg,
                zoom: camera.zoom,
                target: [controls.target.x, controls.target.y, controls.target.z]
            };
        }

        function setStandardView({ azimuth = Math.PI / 4, polar = Math.PI / 4, heightFraction = 0.5 } = {}) {
            const azimuthDeg = THREE.MathUtils.radToDeg(azimuth);
            const elevationDeg = 90 - THREE.MathUtils.radToDeg(polar);
            setCameraView({ azimuthDeg, elevationDeg, heightFraction });
        }

        setStandardView();

        const _labels = [];
        const _v = new THREE.Vector3();

        function addLabel(text, position, options = {}) {
            const div = document.createElement('div');
            div.className = 'lbl';
            div.innerHTML = text;
            if (options.color) div.style.color = options.color;
            if (options.fontSize) div.style.fontSize = options.fontSize;
            if (options.bold) div.style.fontWeight = 'bold';
            if (options.background) {
                div.style.background = options.background;
                div.style.padding = '1px 4px';
                div.style.borderRadius = '3px';
            }
            document.body.appendChild(div);
            const entry = { div, pos: position.clone(), offset: options.offset || [0, 0] };
            _labels.push(entry);
            return entry;
        }

        const _referenceDistance = 8;

        function _syncLabels() {
            for (const { div, pos, offset } of _labels) {
                _v.copy(pos).project(camera);
                if (_v.z > 1 || _v.z < -1 || _v.x < -1 || _v.x > 1 || _v.y < -1 || _v.y > 1) {
                    div.style.display = 'none';
                    continue;
                }
                div.style.display = '';
                const ox = offset && offset[0] ? offset[0] : 0;
                const oy = offset && offset[1] ? offset[1] : 0;
                const x = (_v.x * 0.5 + 0.5) * canvas.clientWidth + ox;
                const y = (-_v.y * 0.5 + 0.5) * canvas.clientHeight + oy;
                const distance = Math.max(camera.position.distanceTo(pos), 1e-4);
                let scale = (_referenceDistance / distance) * (camera.zoom || 1);
                scale = Math.max(0.5, Math.min(scale, 6));
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                div.style.transform = `translate(-50%, -50%) scale(${scale})`;
            }
        }

        const _tooltip = document.getElementById('figTooltip');
        const _popup = document.getElementById('figPopup');
        const _raycaster = new THREE.Raycaster();
        _raycaster.params.Line.threshold = 0.075;
        const _pointer = new THREE.Vector2();
        const _interactiveObjects = [];
        let _hoveredInteractive = null;
        let _selectedInteractive = null;

        function showPopup(title, body) {
            window.parent.postMessage({ type: 'alex-popup', title, body }, '*');
            if (!_popup) return;
            _popup.innerHTML = `<strong>${title}</strong>${body}`;
            _popup.style.display = 'block';
        }

        function hidePopup() {
            window.parent.postMessage({ type: 'alex-popup', title: null }, '*');
            if (_popup) _popup.style.display = 'none';
            clearSelectedInteractive();
        }

        function showTooltip(text, event) {
            if (!_tooltip || !text) return;
            _tooltip.textContent = text;
            _tooltip.style.display = 'block';
            moveTooltip(event);
        }

        function moveTooltip(event) {
            if (!_tooltip || _tooltip.style.display === 'none') return;
            const pad = 12;
            const x = Math.min(event.clientX + pad, window.innerWidth - _tooltip.offsetWidth - pad);
            const y = Math.max(pad, event.clientY - _tooltip.offsetHeight - pad);
            _tooltip.style.left = x + 'px';
            _tooltip.style.top = y + 'px';
        }

        function hideTooltip() {
            if (_tooltip) _tooltip.style.display = 'none';
        }

        function _setPointerFromEvent(event) {
            const rect = canvas.getBoundingClientRect();
            _pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            _pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function _firstInteractiveHit(event) {
            if (!_interactiveObjects.length) return null;
            _setPointerFromEvent(event);
            _raycaster.setFromCamera(_pointer, camera);
            const hits = _raycaster.intersectObjects(_interactiveObjects.map(entry => entry.object), true);
            for (const hit of hits) {
                let obj = hit.object;
                while (obj) {
                    const entry = _interactiveObjects.find(item => item.object === obj);
                    if (entry) return { ...entry, hit };
                    obj = obj.parent;
                }
            }
            return null;
        }

        function rememberOriginalColors(object) {
            object.traverse((child) => {
                if (child.material && child.material.color && !child.userData.baseColor) {
                    child.userData.baseColor = child.material.color.clone();
                    child.userData.baseOpacity = child.material.opacity;
                }
            });
        }

        function setObjectTint(object, color, opacity = null) {
            object.traverse((child) => {
                if (!child.material || !child.material.color) return;
                child.material.color.set(color);
                if (opacity !== null && child.material.transparent) child.material.opacity = opacity;
            });
        }

        function restoreObjectTint(object) {
            object.traverse((child) => {
                if (!child.material || !child.material.color || !child.userData.baseColor) return;
                child.material.color.copy(child.userData.baseColor);
                if (child.userData.baseOpacity !== undefined) child.material.opacity = child.userData.baseOpacity;
            });
        }

        function clearSelectedInteractive() {
            if (_selectedInteractive && _selectedInteractive.object) restoreObjectTint(_selectedInteractive.object);
            _selectedInteractive = null;
        }

        function registerInteractive(object, info = {}) {
            if (!object) return object;
            object.userData = object.userData || {};
            object.userData.interactive = true;
            rememberOriginalColors(object);
            _interactiveObjects.push({ object, info });
            return object;
        }

        canvas.addEventListener('pointermove', (event) => {
            moveTooltip(event);
            const entry = _firstInteractiveHit(event);
            if (entry) {
                _hoveredInteractive = entry;
                canvas.style.cursor = 'pointer';
                showTooltip(entry.info.tooltip || entry.info.title || 'Click to explain', event);
            } else {
                _hoveredInteractive = null;
                canvas.style.cursor = controls.enabled ? 'grab' : 'default';
                hideTooltip();
            }
        });

        canvas.addEventListener('pointerleave', () => {
            _hoveredInteractive = null;
            canvas.style.cursor = 'default';
            hideTooltip();
        });

        canvas.addEventListener('click', (event) => {
            const entry = _firstInteractiveHit(event) || _hoveredInteractive;
            if (!entry) {
                hidePopup();
                return;
            }
            clearSelectedInteractive();
            _selectedInteractive = entry;
            setObjectTint(entry.object, entry.info.highlight || 0x00cc00, entry.info.highlightOpacity ?? null);
            const title = entry.info.title || entry.info.tooltip || 'Figure element';
            const body = entry.info.body || entry.info.description || 'This part is interactive.';
            showPopup(title, body);
            if (typeof entry.info.onClick === 'function') entry.info.onClick(entry.hit, entry.object);
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                hidePopup();
                hideTooltip();
            }
        });

        const black = 0x14171a;
        const red = 0xff1717;
        const green = 0x25e000;
        const cyan = 0x66dff2;
        const guideBlue = 0x9fb8bd;
        const gray = 0xb9b9b9;

        const matBlack = new THREE.MeshBasicMaterial({ color: black });
        const matRed = new THREE.MeshBasicMaterial({ color: red });
        const matGreen = new THREE.MeshBasicMaterial({ color: green });
        const matCyan = new THREE.MeshBasicMaterial({ color: cyan });
        const matGuide = new THREE.MeshBasicMaterial({ color: guideBlue, transparent: true, opacity: 0.95 });

        function cylinderBetween(start, end, radius, material) {
            const direction = new THREE.Vector3().subVectors(end, start);
            const length = direction.length();
            const geometry = new THREE.CylinderGeometry(radius, radius, length, 18);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(start).add(end).multiplyScalar(0.5);
            mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
            return mesh;
        }

        function coneAt(tip, direction, radius, length, material) {
            const geometry = new THREE.ConeGeometry(radius, length, 28);
            const mesh = new THREE.Mesh(geometry, material);
            const dir = direction.clone().normalize();
            mesh.position.copy(tip).addScaledVector(dir, -length * 0.5);
            mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            return mesh;
        }

        function makeArrow(startArray, endArray, material, options = {}) {
            const start = new THREE.Vector3(...startArray);
            const end = new THREE.Vector3(...endArray);
            const dir = new THREE.Vector3().subVectors(end, start).normalize();
            const headLength = options.headLength ?? 0.26;
            const headRadius = options.headRadius ?? 0.105;
            const shaftRadius = options.shaftRadius ?? 0.022;
            const shaftEnd = end.clone().addScaledVector(dir, -headLength * 0.82);
            const group = new THREE.Group();
            group.add(cylinderBetween(start, shaftEnd, shaftRadius, material));
            group.add(coneAt(end, dir, headRadius, headLength, material));
            scene.add(group);
            return group;
        }

        function makeLine(points, material) {
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            if (material.isLineDashedMaterial) line.computeLineDistances();
            return line;
        }

        function makeTubeLine(points, radius, material) {
            const group = new THREE.Group();
            for (let i = 0; i < points.length - 1; i++) {
                group.add(cylinderBetween(points[i], points[i + 1], radius, material));
            }
            scene.add(group);
            return group;
        }

        function basisForAxis(axis) {
            if (axis === 'yaw') return { axisVector: new THREE.Vector3(0, 1, 0), u: new THREE.Vector3(1, 0, 0), v: new THREE.Vector3(0, 0, 1) };
            if (axis === 'pitch') return { axisVector: new THREE.Vector3(1, 0, 0), u: new THREE.Vector3(0, 1, 0), v: new THREE.Vector3(0, 0, 1) };
            return { axisVector: new THREE.Vector3(0, 0, 1), u: new THREE.Vector3(1, 0, 0), v: new THREE.Vector3(0, 1, 0) };
        }

        function makeArc(axisName, centerArray, radius, startDeg, sweepDeg, color = red, options = {}) {
            const { axisVector, u, v } = basisForAxis(axisName);
            const center = new THREE.Vector3(...centerArray);
            const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: options.opacity ?? 1 });
            const coneMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: options.opacity ?? 1 });
            const group = new THREE.Group();
            const points = [];
            const segments = 54;
            for (let i = 0; i <= segments; i++) {
                const t = THREE.MathUtils.degToRad(startDeg + sweepDeg * (i / segments));
                points.push(center.clone().addScaledVector(u, Math.cos(t) * radius).addScaledVector(v, Math.sin(t) * radius));
            }
            const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), material);
            group.add(line);
            const end = points[points.length - 1];
            const prev = points[points.length - 3];
            const tangent = new THREE.Vector3().subVectors(end, prev).normalize();
            if (sweepDeg < 0) tangent.multiplyScalar(-1);
            group.add(coneAt(end, tangent, options.headRadius ?? 0.085, options.headLength ?? 0.19, coneMat));
            group.userData.axisName = axisName;
            group.userData.center = center.clone();
            group.userData.radius = radius;
            group.userData.startDeg = startDeg;
            group.userData.sweepDeg = sweepDeg;
            group.userData.axisVector = axisVector.clone();
            scene.add(group);
            return group;
        }

        // The black triad is the camera coordinate system from the source drawing.
        const yAxis = makeArrow([0, 0, 0], [0, 3.55, 0], matBlack, { shaftRadius: 0.025, headLength: 0.28, headRadius: 0.11 });
        const xAxis = makeArrow([0, 0, 0], [2.55, 0, 0], matBlack, { shaftRadius: 0.025, headLength: 0.28, headRadius: 0.11 });
        const zAxis = makeArrow([0, 0, 0], [0, 0, 5.35], matBlack, { shaftRadius: 0.025, headLength: 0.30, headRadius: 0.12 });
        const originDot = new THREE.Mesh(new THREE.SphereGeometry(0.14, 32, 18), matBlack);
        scene.add(originDot);

        registerInteractive(yAxis, {
            title: 'Y axis: yaw',
            tooltip: 'Yaw rotates around the vertical Y axis.',
            body: 'In this convention, theta_Y measures rotation about the camera vertical axis.',
            highlight: 0xff1717,
            onClick: () => selectAxis('yaw', true)
        });
        registerInteractive(xAxis, {
            title: 'X axis: pitch',
            tooltip: 'Pitch rotates around the X axis.',
            body: 'Pitch tilts the camera coordinate frame by rotating around X.',
            highlight: 0xff1717,
            onClick: () => selectAxis('pitch', true)
        });
        registerInteractive(zAxis, {
            title: 'Z axis: roll',
            tooltip: 'Roll rotates around the optical Z axis.',
            body: 'Roll spins image coordinates around the forward viewing direction.',
            highlight: 0xff1717,
            onClick: () => selectAxis('roll', true)
        });

        // The translucent parallelogram is the image plane z = constant, spanned by camera X and Y.
        const zPlane = 2.28;
        const xMin = -0.9;
        const xMax = 1.05;
        const yMin = -1.55;
        const yMax = 1.58;
        const planeGeometry = new THREE.BufferGeometry();
        const planeVerts = new Float32Array([
            xMin, yMin, zPlane,
            xMax, yMin, zPlane,
            xMax, yMax, zPlane,
            xMin, yMin, zPlane,
            xMax, yMax, zPlane,
            xMin, yMax, zPlane
        ]);
        planeGeometry.setAttribute('position', new THREE.BufferAttribute(planeVerts, 3));
        planeGeometry.computeVertexNormals();
        const imagePlane = new THREE.Mesh(planeGeometry, new THREE.MeshBasicMaterial({ color: 0xe7eeee, transparent: true, opacity: 0.72, side: THREE.DoubleSide, depthWrite: false }));
        scene.add(imagePlane);
        const planeCorners = [
            new THREE.Vector3(xMin, yMin, zPlane),
            new THREE.Vector3(xMax, yMin, zPlane),
            new THREE.Vector3(xMax, yMax, zPlane),
            new THREE.Vector3(xMin, yMax, zPlane),
            new THREE.Vector3(xMin, yMin, zPlane)
        ];
        const planeOutline = makeTubeLine(planeCorners, 0.018, matBlack);
        registerInteractive(imagePlane, {
            title: 'Image plane',
            tooltip: 'The plane where the 3D point projects to p.',
            body: 'The plane is perpendicular to Z and contains the image coordinates x prime and y prime.',
            highlight: 0xcfeeed,
            highlightOpacity: 0.92
        });
        registerInteractive(planeOutline, {
            title: 'Plane boundary',
            tooltip: 'The boundary shows the image plane orientation.',
            body: 'Its vertical edges follow Y; its slanted edges follow X under the matched camera view.',
            highlight: 0x25e000
        });

        // Green image-plane coordinates: x prime runs along camera X, y prime runs along camera Y.
        const xPrime = makeArrow([-0.72, 0, zPlane], [0.84, 0, zPlane], matGreen, { shaftRadius: 0.014, headLength: 0.20, headRadius: 0.075 });
        const yPrime = makeArrow([0, -1.10, zPlane], [0, 1.18, zPlane], matGreen, { shaftRadius: 0.014, headLength: 0.20, headRadius: 0.075 });
        registerInteractive(xPrime, {
            title: 'x prime image direction',
            tooltip: 'x prime is the image-plane direction inherited from X.',
            body: 'On the image plane, x prime is parallel to the camera X axis.',
            highlight: 0x00bb00
        });
        registerInteractive(yPrime, {
            title: 'y prime image direction',
            tooltip: 'y prime is the vertical image coordinate.',
            body: 'On the image plane, y prime is parallel to the camera Y axis.',
            highlight: 0x00bb00
        });

        // The dashed ray and two cyan points reproduce P projecting to p on the image plane.
        const p = new THREE.Vector3(0.42, 0.68, zPlane);
        const P = p.clone().multiplyScalar(1.92);
        P.z = zPlane * 1.92;
        const ray = makeLine([new THREE.Vector3(0, 0, 0), P], new THREE.LineDashedMaterial({ color: gray, dashSize: 0.15, gapSize: 0.12, transparent: true, opacity: 0.95 }));
        registerInteractive(ray, {
            title: 'Projection ray',
            tooltip: 'The dashed ray connects the camera center, p, and P.',
            body: 'Projection keeps P and p collinear with the origin; p is where the ray intersects the image plane.',
            highlight: 0xff1717
        });

        const pGroup = new THREE.Group();
        pGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.105, 30, 16), matBlack));
        pGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.068, 30, 16), matCyan));
        pGroup.position.copy(p);
        scene.add(pGroup);
        registerInteractive(pGroup, {
            title: 'Projected point p',
            tooltip: 'p is the image-plane projection of P.',
            body: 'The 3D point P is seen at p because the ray from the origin through P intersects the image plane here.',
            highlight: 0x25e000
        });

        const PGroup = new THREE.Group();
        PGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.115, 30, 16), matBlack));
        PGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.075, 30, 16), matCyan));
        PGroup.position.copy(P);
        scene.add(PGroup);
        registerInteractive(PGroup, {
            title: '3D point P',
            tooltip: 'P is the point before projection.',
            body: 'Euler rotations act on 3D points like P before they are projected into image coordinates.',
            highlight: 0xff1717
        });

        const PFoot = new THREE.Vector3(P.x, 0.42, P.z);
        const zFoot = new THREE.Vector3(0, 0, P.z * 0.80);
        const guide = makeTubeLine([P, PFoot, zFoot], 0.014, matGuide);
        registerInteractive(guide, {
            title: 'Depth guide',
            tooltip: 'This guide shows that P lies beyond the image plane.',
            body: 'The pale construction line makes the depth offset from p to P visible in the 3D view.',
            highlight: 0x66dff2
        });

        // Red circular arrows are the three Euler rotations used in the equation context.
        const yawArc = makeArc('yaw', [0, 3.00, 0], 0.52, 25, 260, red, { headRadius: 0.085, headLength: 0.18 });
        const pitchArc = makeArc('pitch', [1.45, 0.96, 0], 0.52, 205, -255, red, { headRadius: 0.085, headLength: 0.18 });
        const rollArc = makeArc('roll', [0, 0, 3.95], 0.45, 35, 250, red, { headRadius: 0.083, headLength: 0.18 });

        registerInteractive(yawArc, {
            title: 'Yaw angle theta_Y',
            tooltip: 'Yaw is rotation about Y.',
            body: 'Clicking selects yaw for the theta slider, rotating a ghost copy of P around Y.',
            highlight: 0xff1717,
            onClick: () => selectAxis('yaw', true)
        });
        registerInteractive(pitchArc, {
            title: 'Pitch angle theta_X',
            tooltip: 'Pitch is rotation about X.',
            body: 'Clicking selects pitch for the theta slider, rotating a ghost copy of P around X.',
            highlight: 0xff1717,
            onClick: () => selectAxis('pitch', true)
        });
        registerInteractive(rollArc, {
            title: 'Roll angle theta_Z',
            tooltip: 'Roll is rotation about Z.',
            body: 'Clicking selects roll for the theta slider, rotating a ghost copy of P around Z.',
            highlight: 0xff1717,
            onClick: () => selectAxis('roll', true)
        });

        const rotationGhost = new THREE.Group();
        const ghostLineMaterial = new THREE.LineDashedMaterial({ color: 0xff1717, dashSize: 0.08, gapSize: 0.06, transparent: true, opacity: 0.78 });
        const ghostLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([P, P]), ghostLineMaterial);
        const ghostSphere = new THREE.Mesh(new THREE.SphereGeometry(0.075, 30, 16), new THREE.MeshBasicMaterial({ color: 0xff1717, transparent: true, opacity: 0.82 }));
        rotationGhost.add(ghostLine, ghostSphere);
        rotationGhost.visible = false;
        scene.add(rotationGhost);

        const axisOrder = ['yaw', 'pitch', 'roll'];
        const axisButtonText = { yaw: 'Yaw', pitch: 'Pitch', roll: 'Roll' };
        const axisAngles = { yaw: 0, pitch: 0, roll: 0 };
        const axisVectors = {
            yaw: new THREE.Vector3(0, 1, 0),
            pitch: new THREE.Vector3(1, 0, 0),
            roll: new THREE.Vector3(0, 0, 1)
        };
        const axisArc = { yaw: yawArc, pitch: pitchArc, roll: rollArc };
        let selectedAxis = 'yaw';
        let controlTouched = false;

        function updateAxisHighlights() {
            for (const axis of axisOrder) {
                const opacity = axis === selectedAxis ? 1 : 0.72;
                axisArc[axis].traverse((child) => {
                    if (child.material) {
                        child.material.opacity = opacity;
                        child.material.transparent = true;
                        if (child.material.color) child.material.color.set(axis === selectedAxis ? 0xff1717 : 0xff4545);
                    }
                });
            }
        }

        function updateGhost() {
            const theta = THREE.MathUtils.degToRad(axisAngles[selectedAxis]);
            const rotated = P.clone().applyAxisAngle(axisVectors[selectedAxis], theta);
            ghostSphere.position.copy(rotated);
            ghostLine.geometry.dispose();
            ghostLine.geometry = new THREE.BufferGeometry().setFromPoints([P, rotated]);
            ghostLine.computeLineDistances();
            rotationGhost.visible = controlTouched && Math.abs(axisAngles[selectedAxis]) > 0.1;
        }

        function selectAxis(axis, reveal = false) {
            selectedAxis = axis;
            document.getElementById('btnAxis').textContent = axisButtonText[axis];
            document.getElementById('angleSlider').value = axisAngles[axis];
            controlTouched = controlTouched || reveal;
            updateAxisHighlights();
            updateGhost();
        }

        document.getElementById('btnAxis').addEventListener('click', () => {
            const next = axisOrder[(axisOrder.indexOf(selectedAxis) + 1) % axisOrder.length];
            selectAxis(next, true);
        });

        document.getElementById('angleSlider').addEventListener('input', (event) => {
            axisAngles[selectedAxis] = Number(event.target.value);
            controlTouched = true;
            updateGhost();
        });

        updateAxisHighlights();

        addLabel('Y', new THREE.Vector3(0, 3.74, 0), { fontSize: '42px', offset: [0, -16] });
        addLabel('X', new THREE.Vector3(2.62, 0, 0), { fontSize: '42px', offset: [18, 4] });
        addLabel('Z', new THREE.Vector3(0, 0, 5.48), { fontSize: '42px', offset: [24, 6] });
        addLabel('Yaw', new THREE.Vector3(-0.62, 2.68, 0.26), { fontSize: '39px', offset: [-30, -4] });
        addLabel('&theta;<sub>Y</sub>', new THREE.Vector3(-0.22, 2.08, 0.04), { fontSize: '36px', offset: [-10, 18] });
        addLabel('Pitch', new THREE.Vector3(1.12, 1.55, 0.04), { fontSize: '39px', offset: [0, -24] });
        addLabel('&theta;<sub>X</sub>', new THREE.Vector3(0.66, 1.00, 0.04), { fontSize: '36px', offset: [-32, 18] });
        addLabel('&theta;<sub>Z</sub>', new THREE.Vector3(0.05, 0.55, 3.72), { fontSize: '36px', offset: [-36, -8] });
        addLabel('Roll', new THREE.Vector3(0, -0.50, 3.83), { fontSize: '39px', offset: [-8, 32] });
        addLabel('(0,0,0)', new THREE.Vector3(0, -0.28, 0), { fontSize: '32px', offset: [-48, 28] });
        addLabel('<b>P</b>', P.clone().add(new THREE.Vector3(0.03, 0.35, 0.0)), { fontSize: '45px', offset: [4, -22] });
        addLabel('<b>p</b>', p.clone().add(new THREE.Vector3(0.05, 0.25, 0.0)), { fontSize: '42px', offset: [4, -10] });
        addLabel('<i>x&prime;</i>', new THREE.Vector3(0.82, 0.03, zPlane), { fontSize: '35px', offset: [18, 18] });
        addLabel('<i>y&prime;</i>', new THREE.Vector3(-0.23, 0.64, zPlane), { fontSize: '35px', offset: [-12, 8] });

        // Match the original textbook crop: Y is vertical, Z spans the width, and X/plane edges are foreshortened.
        setCameraView({
            projection: 'orthographic',
            azimuthDeg: 160,
            elevationDeg: 30,
            rollDeg: 0,
            zoom: 0.86,
            target: [0.38, 1.02, 2.20],
            heightFraction: 0.62
        });

        let _firstFrame = true;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            _syncLabels();
            if (_firstFrame) { _firstFrame = false; window.__markRendered?.(); }
        }
        animate();

        new ResizeObserver(() => {
            const w = canvas.clientWidth;
            const h = canvas.clientHeight;
            aspect = w / Math.max(h, 1);
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h, false);
        }).observe(canvas);
    </script>
</body>

</html>
