<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>ViT Mapping Plot</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }

        #c {
            width: 100%;
            height: 100%;
            display: block;
        }

        .lbl {
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            font-family: sans-serif;
            font-size: 13px;
            color: #111;
        }

        #ui {
            position: absolute;
            left: 8px;
            top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: sans-serif;
            font-size: 11px;
            background: rgba(255, 255, 255, 0.72);
            border: 0;
            box-shadow: none;
            opacity: 0.72;
            transition: opacity 0.16s ease;
            z-index: 10;
        }

        #ui:hover,
        #ui:focus-within {
            opacity: 1;
        }

        #ui button {
            padding: 3px 8px;
            cursor: pointer;
            border: 1px solid #aaa;
            background: #f7f7f7;
            border-radius: 4px;
            font: 11px/1.2 sans-serif;
        }

        #ui button:hover {
            background: #e8e8e8;
        }

        #ui button.active {
            background: #d8efff;
            border-color: #4c9fe0;
        }

        #ui label {
            display: flex;
            align-items: center;
            gap: 3px;
            text-shadow: 0 1px 2px #fff;
        }

        #ui input[type=range] {
            width: 62px;
        }

        #figTooltip {
            position: fixed;
            left: 0;
            top: 0;
            display: none;
            max-width: 218px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.62);
            color: #fff;
            font: 11px/1.35 sans-serif;
            pointer-events: none;
            white-space: normal;
            z-index: 20;
        }

        #err-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-size: 13px;
            color: #555;
            gap: 10px;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="figTooltip"></div>
    <div id="ui">
        <button id="btnReset" style="display:none">Reset View</button>
        <button id="btnTrace" title="Highlight one semantic class through the ViT blocks">Trace</button>
        <label title="Compress or separate the class clusters across depth">Sep <input id="sepSlider" type="range"
                min="35" max="125" value="100" /></label>
    </div>

    <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>

    <div id="err-overlay">
        <span id="err-msg">Figure failed to load</span>
        <button onclick="location.reload()"
            style="padding:5px 14px;border:1px solid #aaa;border-radius:5px;background:#f5f5f5;cursor:pointer;font-size:12px;">Reload</button>
    </div>

    <script>
        let _rendered = false;
        const _errOverlay = document.getElementById('err-overlay');
        window.__markRendered = () => { _rendered = true; _errOverlay.style.display = 'none'; };
        window.addEventListener('error', (event) => {
            if (!_rendered) {
                document.getElementById('err-msg').textContent = event.message || 'Figure failed to load';
                _errOverlay.style.display = 'flex';
            }
        });
        setTimeout(() => {
            if (!_rendered) _errOverlay.style.display = 'flex';
        }, 12000);
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const d = 3;
        function measuredCanvasSize() {
            const w = canvas.clientWidth || window.innerWidth || 1;
            const h = canvas.clientHeight || window.innerHeight || 1;
            return { w, h };
        }

        let { w: initialW, h: initialH } = measuredCanvasSize();
        let aspect = initialW / Math.max(initialH, 1);
        let camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 100);
        camera.position.set(4, 4, 4);
        camera.lookAt(0, 0, 0);
        camera.updateProjectionMatrix();

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        function syncViewportSize(updateRenderer = true) {
            const { w, h } = measuredCanvasSize();
            aspect = w / Math.max(h, 1);
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            if (updateRenderer && (canvas.width !== Math.round(w * renderer.getPixelRatio()) || canvas.height !== Math.round(h * renderer.getPixelRatio()))) {
                renderer.setSize(w, h, false);
            }
        }

        syncViewportSize();

        const HOME_POS = new THREE.Vector3();
        const HOME_TARGET = new THREE.Vector3(0, 0, 0);
        let HOME_ZOOM = 0.75;

        document.getElementById('btnReset').addEventListener('click', () => {
            camera.position.copy(HOME_POS);
            controls.target.copy(HOME_TARGET);
            camera.zoom = HOME_ZOOM;
            camera.updateProjectionMatrix();
            controls.update();
        });

        const FRAME_HALF_HEIGHT = d;
        const MIN_ZOOM = 0.2;
        const MAX_ZOOM = 5;

        function computeSceneBounds() {
            const box = new THREE.Box3().setFromObject(scene);
            if (box.isEmpty()) {
                box.setFromCenterAndSize(new THREE.Vector3(0, 0, 0), new THREE.Vector3(2 * d, 2 * d, 2 * d));
            }
            const center = new THREE.Vector3();
            box.getCenter(center);
            const size = new THREE.Vector3();
            box.getSize(size);
            return { box, center, size };
        }

        function setCameraView({
            projection = 'orthographic',
            azimuthDeg = 45,
            elevationDeg = 35,
            rollDeg = 0,
            zoom = null,
            target = null,
            heightFraction = 0.5,
            distanceScale = 1.2
        } = {}) {
            const { center, size } = computeSceneBounds();
            const viewTarget = Array.isArray(target)
                ? new THREE.Vector3(target[0] || 0, target[1] || 0, target[2] || 0)
                : center;

            const contentHeight = Math.max(size.y, 1e-6);
            const desiredViewHeight = contentHeight / Math.max(heightFraction, 0.01);
            let resolvedZoom = Number.isFinite(zoom) ? zoom : (2 * FRAME_HALF_HEIGHT) / desiredViewHeight;
            resolvedZoom = Math.min(Math.max(resolvedZoom, MIN_ZOOM), MAX_ZOOM);
            camera.zoom = resolvedZoom;

            const radius = Math.max(size.length() * distanceScale, FRAME_HALF_HEIGHT * 2);
            const azimuth = THREE.MathUtils.degToRad(azimuthDeg);
            const elevation = THREE.MathUtils.degToRad(elevationDeg);
            const cosElev = Math.cos(elevation);
            const x = viewTarget.x + radius * Math.cos(azimuth) * cosElev;
            const y = viewTarget.y + radius * Math.sin(elevation);
            const z = viewTarget.z + radius * Math.sin(azimuth) * cosElev;
            camera.position.set(x, y, z);

            controls.target.copy(viewTarget);
            camera.up.set(0, 1, 0);
            if (Number.isFinite(rollDeg) && rollDeg !== 0) {
                const viewDir = new THREE.Vector3().subVectors(viewTarget, camera.position).normalize();
                camera.up.applyAxisAngle(viewDir, THREE.MathUtils.degToRad(rollDeg));
            }
            camera.updateProjectionMatrix();
            controls.update();

            HOME_POS.copy(camera.position);
            HOME_TARGET.copy(controls.target);
            HOME_ZOOM = camera.zoom;

            window.__figureCameraView = {
                projection,
                azimuthDeg,
                elevationDeg,
                rollDeg,
                zoom: camera.zoom,
                target: [controls.target.x, controls.target.y, controls.target.z]
            };
        }

        function setStandardView({ azimuth = Math.PI / 4, polar = Math.PI / 4, heightFraction = 0.5 } = {}) {
            const azimuthDeg = THREE.MathUtils.radToDeg(azimuth);
            const elevationDeg = 90 - THREE.MathUtils.radToDeg(polar);
            setCameraView({ azimuthDeg, elevationDeg, heightFraction });
        }

        setStandardView();

        const _labels = [];
        const _v = new THREE.Vector3();

        function addLabel(text, position, options = {}) {
            const div = document.createElement('div');
            div.className = 'lbl';
            div.innerHTML = text;
            if (options.color) div.style.color = options.color;
            if (options.fontSize) div.style.fontSize = options.fontSize;
            if (options.fontFamily) div.style.fontFamily = options.fontFamily;
            if (options.bold) div.style.fontWeight = 'bold';
            if (options.letterSpacing) div.style.letterSpacing = options.letterSpacing;
            if (options.lineHeight) div.style.lineHeight = options.lineHeight;
            if (options.background) div.style.background = options.background;
            if (options.padding) div.style.padding = options.padding;
            if (options.border) div.style.border = options.border;
            if (options.borderRadius) div.style.borderRadius = options.borderRadius;
            if (options.boxShadow) div.style.boxShadow = options.boxShadow;
            document.body.appendChild(div);
            const entry = { div, pos: position.clone(), offset: options.offset || [0, 0], fixedScale: options.fixedScale || null };
            _labels.push(entry);
            return entry;
        }

        const _referenceDistance = 8;

        function _syncLabels() {
            syncViewportSize(true);
            camera.updateMatrixWorld();
            for (const { div, pos, offset, fixedScale } of _labels) {
                _v.copy(pos).project(camera);
                if (_v.z > 1 || _v.z < -1 || _v.x < -1 || _v.x > 1 || _v.y < -1 || _v.y > 1) {
                    div.style.display = 'none';
                    continue;
                }
                div.style.display = '';

                const ox = offset && offset[0] ? offset[0] : 0;
                const oy = offset && offset[1] ? offset[1] : 0;
                const x = (_v.x * 0.5 + 0.5) * canvas.clientWidth + ox;
                const y = (-_v.y * 0.5 + 0.5) * canvas.clientHeight + oy;

                let scale = fixedScale;
                if (!scale) {
                    const distance = Math.max(camera.position.distanceTo(pos), 1e-4);
                    scale = (_referenceDistance / distance) * (camera.zoom || 1);
                    scale = Math.max(0.5, Math.min(scale, 6));
                }

                div.style.left = x + 'px';
                div.style.top = y + 'px';
                div.style.transform = `translate(-50%, -50%) scale(${scale})`;
            }
        }

        window.__figureSyncLabels = _syncLabels;

        const _tooltip = document.getElementById('figTooltip');
        const _raycaster = new THREE.Raycaster();
        const _pointer = new THREE.Vector2();
        const _interactiveObjects = [];
        let _hoveredInteractive = null;

        function showPopup(title, body) {
            window.parent.postMessage({ type: 'alex-popup', title, body }, '*');
            if (!window.parent || window.parent === window) showTooltip(`${title}: ${body}`, { clientX: window.innerWidth / 2, clientY: 24 });
        }

        function hidePopup() {
            window.parent.postMessage({ type: 'alex-popup', title: null }, '*');
        }

        function showTooltip(text, event) {
            if (!_tooltip || !text) return;
            _tooltip.textContent = text;
            _tooltip.style.display = 'block';
            moveTooltip(event);
        }

        function moveTooltip(event) {
            if (!_tooltip || _tooltip.style.display === 'none') return;
            const pad = 12;
            const x = Math.min(event.clientX + pad, window.innerWidth - _tooltip.offsetWidth - pad);
            const y = Math.max(pad, event.clientY - _tooltip.offsetHeight - pad);
            _tooltip.style.left = x + 'px';
            _tooltip.style.top = y + 'px';
        }

        function hideTooltip() {
            if (_tooltip) _tooltip.style.display = 'none';
        }

        function _setPointerFromEvent(event) {
            const rect = canvas.getBoundingClientRect();
            _pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            _pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function _firstInteractiveHit(event) {
            if (!_interactiveObjects.length) return null;
            _setPointerFromEvent(event);
            _raycaster.setFromCamera(_pointer, camera);
            const hits = _raycaster.intersectObjects(_interactiveObjects.map(entry => entry.object), true);
            for (const hit of hits) {
                let obj = hit.object;
                while (obj) {
                    const entry = _interactiveObjects.find(item => item.object === obj);
                    if (entry) return { ...entry, hit };
                    obj = obj.parent;
                }
            }
            return null;
        }

        function registerInteractive(object, info = {}) {
            if (!object) return object;
            object.userData = object.userData || {};
            object.userData.interactive = true;
            _interactiveObjects.push({ object, info });
            return object;
        }

        canvas.addEventListener('pointermove', (event) => {
            moveTooltip(event);
            const entry = _firstInteractiveHit(event);
            if (entry) {
                _hoveredInteractive = entry;
                canvas.style.cursor = 'pointer';
                showTooltip(entry.info.tooltip || entry.info.title || 'Click to explain', event);
            } else {
                _hoveredInteractive = null;
                canvas.style.cursor = controls.enabled ? 'grab' : 'default';
                hideTooltip();
            }
        });

        canvas.addEventListener('pointerleave', () => {
            _hoveredInteractive = null;
            canvas.style.cursor = 'default';
            hideTooltip();
        });

        canvas.addEventListener('click', (event) => {
            const entry = _firstInteractiveHit(event) || _hoveredInteractive;
            if (!entry) {
                hidePopup();
                return;
            }
            const title = entry.info.title || entry.info.tooltip || 'Figure element';
            const body = entry.info.body || entry.info.description || 'This part is interactive.';
            showPopup(title, body);
            if (typeof entry.info.onClick === 'function') entry.info.onClick(entry.hit, entry.object);
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                hidePopup();
                hideTooltip();
                setSelectedClass(null);
            }
        });

        const plotGroup = new THREE.Group();
        plotGroup.position.set(0.58, 0, 0);
        scene.add(plotGroup);

        const labelGroup = new THREE.Group();
        scene.add(labelGroup);

        const layerYs = [-2.62, -1.32, -0.02, 1.28, 2.58];
        const layerNames = ['early t-SNE map', 'after 3 ViT blocks', 'after 6 ViT blocks', 'after 9 ViT blocks', 'late semantic map'];
        const planeSize = 1.72;
        const classColors = [
            0x00bcd4, 0x1f9be0, 0x19b36b, 0xc7c739, 0xff9a1f, 0xf04a3a,
            0xed4fb4, 0xa46bd6, 0x00a68a, 0x8bc34a, 0x9e6b55, 0x7f7f7f
        ];
        const classNames = [
            'aqua', 'blue', 'green', 'yellow', 'orange', 'red',
            'pink', 'violet', 'teal', 'lime', 'brown', 'gray'
        ];

        const planeFillMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.28, side: THREE.DoubleSide, depthWrite: false });
        const planeEdgeMaterial = new THREE.LineBasicMaterial({ color: 0x222222, transparent: true, opacity: 0.82 });
        const planeGuideMaterial = new THREE.LineBasicMaterial({ color: 0xbdbdbd, transparent: true, opacity: 0.42 });
        const arrowMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });

        function makeLine(points, material, parent = plotGroup) {
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, material);
            parent.add(line);
            return line;
        }

        function makePlane(y, index) {
            const fillGeometry = new THREE.PlaneGeometry(planeSize * 2, planeSize * 2);
            const fill = new THREE.Mesh(fillGeometry, planeFillMaterial.clone());
            fill.rotation.x = -Math.PI / 2;
            fill.position.y = y;
            plotGroup.add(fill);
            registerInteractive(fill, {
                title: `Layer ${index + 1}`,
                tooltip: layerNames[index],
                body: 'A horizontal sheet stands for a 2D t-SNE projection of high-dimensional image embeddings at this depth. The same datapoints reappear on every sheet.',
                onClick: () => setSelectedClass(null)
            });

            const s = planeSize;
            const corners = [
                new THREE.Vector3(-s, y, -s), new THREE.Vector3(s, y, -s),
                new THREE.Vector3(s, y, s), new THREE.Vector3(-s, y, s), new THREE.Vector3(-s, y, -s)
            ];
            makeLine(corners, planeEdgeMaterial);

            // The source figure's gray diagonals are drawn here as the local t-SNE coordinate sheet.
            makeLine([new THREE.Vector3(-s, y + 0.002, -s), new THREE.Vector3(s, y + 0.002, s)], planeGuideMaterial);
            makeLine([new THREE.Vector3(-s, y + 0.002, s), new THREE.Vector3(s, y + 0.002, -s)], planeGuideMaterial);
            makeLine([new THREE.Vector3(-s * 0.58, y + 0.002, 0), new THREE.Vector3(s * 0.58, y + 0.002, 0)], planeGuideMaterial);
            makeLine([new THREE.Vector3(0, y + 0.002, -s * 0.58), new THREE.Vector3(0, y + 0.002, s * 0.58)], planeGuideMaterial);
        }

        layerYs.forEach((y, index) => makePlane(y, index));

        function cylinderBetweenY(x, y0, y1, z, radius) {
            const height = Math.max(Math.abs(y1 - y0), 0.001);
            const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, height, 12), arrowMaterial);
            cylinder.position.set(x, (y0 + y1) / 2, z);
            labelGroup.add(cylinder);
            return cylinder;
        }

        function makeUpArrow(y0, y1) {
            const x = -2.08;
            const z = 0.08;
            const labelY = (y0 + y1) / 2;
            cylinderBetweenY(x, y0 + 0.12, labelY - 0.22, z, 0.018);
            cylinderBetweenY(x, labelY + 0.22, y1 - 0.24, z, 0.018);
            const cone = new THREE.Mesh(new THREE.ConeGeometry(0.095, 0.24, 24), arrowMaterial);
            cone.position.set(x, y1 - 0.15, z);
            labelGroup.add(cone);
        }

        for (let i = 0; i < layerYs.length - 1; i++) {
            makeUpArrow(layerYs[i], layerYs[i + 1]);
            addLabel('ViT block x3', new THREE.Vector3(-2.08, (layerYs[i] + layerYs[i + 1]) / 2, 0.08), {
                fontFamily: 'ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace',
                fontSize: '28px',
                background: '#fff',
                color: '#000',
                padding: '4px 18px',
                border: '3px solid #111',
                borderRadius: '15px',
                lineHeight: '1',
                fixedScale: 1
            });
        }

        function mulberry32(seed) {
            return function () {
                let t = seed += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        function gaussian(rand) {
            const u = Math.max(rand(), 1e-8);
            const v = Math.max(rand(), 1e-8);
            return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
        }

        function rotate2(x, z, angle) {
            const c = Math.cos(angle);
            const s = Math.sin(angle);
            return { x: c * x - s * z, z: s * x + c * z };
        }

        const rand = mulberry32(20260623);
        const classCount = classColors.length;
        const pointsPerClass = 11;
        const layerAlpha = [0.08, 0.28, 0.48, 0.72, 1.0];
        const layerTwist = [-0.42, 0.24, -0.12, 0.18, 0.04];
        const layerScale = [
            [0.68, 1.0], [0.78, 0.82], [0.54, 1.05], [0.84, 0.78], [1.08, 0.88]
        ];
        const dataset = [];
        const pointMeshes = [];
        const lineEntries = [];
        const pointMaterials = [];
        const lineMaterials = [];
        let selectedClass = null;
        let separationAmount = 1;

        for (let c = 0; c < classCount; c++) {
            const hueAngle = (c / classCount) * Math.PI * 2 - Math.PI * 0.08;
            const finalCenter = {
                x: Math.cos(hueAngle) * (0.82 + 0.08 * Math.sin(c * 1.7)),
                z: Math.sin(hueAngle) * (0.72 + 0.06 * Math.cos(c * 1.1))
            };
            const earlyCenter = {
                x: gaussian(rand) * 0.12 + Math.cos(hueAngle * 1.7) * 0.11,
                z: gaussian(rand) * 0.12 + Math.sin(hueAngle * 1.3) * 0.08
            };
            for (let j = 0; j < pointsPerClass; j++) {
                dataset.push({
                    classIndex: c,
                    pointIndex: j,
                    initial: {
                        x: earlyCenter.x + gaussian(rand) * 0.25,
                        z: earlyCenter.z + gaussian(rand) * 0.23
                    },
                    final: {
                        x: finalCenter.x + gaussian(rand) * 0.10,
                        z: finalCenter.z + gaussian(rand) * 0.08
                    },
                    jitter: layerYs.map((_, k) => ({
                        x: gaussian(rand) * (0.075 - k * 0.008),
                        z: gaussian(rand) * (0.075 - k * 0.008)
                    }))
                });
            }
        }

        function layerPosition(sample, layerIndex) {
            const classPhase = sample.classIndex * 0.61 + sample.pointIndex * 0.19;
            const alpha = Math.min(1.18, layerAlpha[layerIndex] * separationAmount);
            const noiseWeight = Math.max(0.28, 1 - alpha * 0.58);
            let x = sample.initial.x * (1 - alpha) + sample.final.x * alpha;
            let z = sample.initial.z * (1 - alpha) + sample.final.z * alpha;
            x += sample.jitter[layerIndex].x * noiseWeight;
            z += sample.jitter[layerIndex].z * noiseWeight;

            // The intermediate ViT sheets are deliberately pinched and twisted to show remapping, not literal vertical lifting.
            const warped = rotate2(x, z, layerTwist[layerIndex] + Math.sin(classPhase) * 0.035 * layerIndex);
            const sx = layerScale[layerIndex][0];
            const sz = layerScale[layerIndex][1];
            return new THREE.Vector3(warped.x * sx, layerYs[layerIndex] + 0.035, warped.z * sz);
        }

        for (let c = 0; c < classCount; c++) {
            const pointMaterial = new THREE.MeshBasicMaterial({ color: classColors[c], transparent: true, opacity: 0.78, depthWrite: false });
            const lineMaterial = new THREE.LineDashedMaterial({ color: classColors[c], transparent: true, opacity: 0.34, dashSize: 0.055, gapSize: 0.045, depthWrite: false });
            pointMaterials.push(pointMaterial);
            lineMaterials.push(lineMaterial);
        }

        const pointGeometry = new THREE.SphereGeometry(0.045, 14, 10);

        for (const sample of dataset) {
            const positions = layerYs.map((_, layerIndex) => layerPosition(sample, layerIndex));
            const meshesForSample = [];
            for (let layerIndex = 0; layerIndex < layerYs.length; layerIndex++) {
                const mesh = new THREE.Mesh(pointGeometry, pointMaterials[sample.classIndex]);
                mesh.position.copy(positions[layerIndex]);
                plotGroup.add(mesh);
                meshesForSample.push(mesh);
                pointMeshes.push({ mesh, sample, layerIndex });
                registerInteractive(mesh, {
                    title: `${classNames[sample.classIndex]} class`,
                    tooltip: `Click to trace the ${classNames[sample.classIndex]} class`,
                    body: 'The same image embedding is projected by t-SNE at each sampled depth. As the ViT blocks accumulate, points of the same semantic class move toward a cleaner cluster.',
                    onClick: () => setSelectedClass(sample.classIndex)
                });
            }
            for (let layerIndex = 0; layerIndex < layerYs.length - 1; layerIndex++) {
                const line = new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints([positions[layerIndex], positions[layerIndex + 1]]),
                    lineMaterials[sample.classIndex]
                );
                line.computeLineDistances();
                plotGroup.add(line);
                lineEntries.push({ line, sample, layerIndex });
            }
        }

        function updateEmbeddingGeometry() {
            for (const entry of pointMeshes) {
                entry.mesh.position.copy(layerPosition(entry.sample, entry.layerIndex));
            }
            for (const entry of lineEntries) {
                const p0 = layerPosition(entry.sample, entry.layerIndex);
                const p1 = layerPosition(entry.sample, entry.layerIndex + 1);
                entry.line.geometry.dispose();
                entry.line.geometry = new THREE.BufferGeometry().setFromPoints([p0, p1]);
                entry.line.computeLineDistances();
            }
        }

        function setSelectedClass(classIndex) {
            selectedClass = classIndex;
            const tracing = selectedClass !== null;
            document.getElementById('btnTrace').classList.toggle('active', tracing);
            for (let c = 0; c < classCount; c++) {
                const active = !tracing || c === selectedClass;
                pointMaterials[c].opacity = active ? 0.84 : 0.17;
                lineMaterials[c].opacity = active ? 0.72 : 0.08;
            }
            for (const entry of pointMeshes) {
                const active = !tracing || entry.sample.classIndex === selectedClass;
                entry.mesh.scale.setScalar(active ? 1.32 : 0.72);
            }
        }

        document.getElementById('btnTrace').addEventListener('click', () => {
            if (selectedClass === null) {
                setSelectedClass(5);
                showPopup('Trace one semantic class', 'The red class is emphasized through all sampled ViT depths. Its dotted paths show how individual images are remapped toward a separated semantic cluster.');
            } else {
                setSelectedClass(null);
                hidePopup();
            }
        });

        document.getElementById('sepSlider').addEventListener('input', (event) => {
            separationAmount = Number(event.target.value) / 100;
            updateEmbeddingGeometry();
            showTooltip('Changing separation compresses or disentangles the t-SNE clusters across depth.', { clientX: 12, clientY: 44 });
        });

        addLabel('t-SNE of high-dimensional embeddings', new THREE.Vector3(0.63, 2.96, -0.18), {
            fontSize: '12px',
            color: '#777',
            background: 'rgba(255,255,255,0.68)',
            padding: '2px 5px',
            borderRadius: '3px',
            fixedScale: 1
        });

        // Match the textbook crop: a tall stack of diamond sheets with block labels in the left margin.
        setCameraView({
            projection: 'orthographic',
            azimuthDeg: 42,
            elevationDeg: 18,
            rollDeg: 0,
            zoom: 0.88,
            target: [-0.45, -0.02, 0.02],
            heightFraction: 0.68,
            distanceScale: 1.25
        });
        _syncLabels();

        let _firstFrame = true;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            _syncLabels();
            if (_firstFrame) { _firstFrame = false; window.__markRendered?.(); }
        }
        animate();

        new ResizeObserver(() => {
            syncViewportSize(true);
            _syncLabels();
        }).observe(canvas);
    </script>
</body>

</html>
