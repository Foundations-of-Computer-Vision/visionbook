<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>No Picture on a Wall / Pinhole Camera</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }

        #c {
            width: 100%;
            height: 100%;
            display: block;
        }

        .lbl {
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            font-family: sans-serif;
            font-size: 13px;
            color: #111;
        }

        #ui {
            position: absolute;
            left: 6px;
            bottom: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-family: sans-serif;
            font-size: 11px;
            max-width: 190px;
            max-height: 34%;
            background: transparent;
            border: 0;
            box-shadow: none;
            opacity: 0.88;
            transform: none;
            transition: opacity 0.16s ease;
            z-index: 10;
        }

        #ui:hover,
        #ui:focus-within {
            opacity: 1;
        }

        #ui button {
            padding: 4px 9px;
            cursor: pointer;
            border: 1px solid #aaa;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 11px;
            line-height: 1.1;
        }

        #ui button:hover {
            background: #e0e0e0;
        }

        #ui button.active {
            background: #c8e6ff;
            border-color: #5aabf0;
        }

        #ui label {
            display: flex;
            flex-direction: column;
            gap: 2px;
            text-shadow: 0 1px 2px #fff;
        }

        #ui input[type=range] {
            width: 86px;
        }

        #figTooltip {
            position: fixed;
            left: 0;
            top: 0;
            display: none;
            max-width: 230px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.62);
            color: #fff;
            font: 11px/1.35 sans-serif;
            pointer-events: none;
            white-space: normal;
            z-index: 20;
        }

        #infoPopup {
            position: fixed;
            right: 12px;
            top: 12px;
            display: none;
            max-width: 260px;
            padding: 9px 11px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.94);
            color: #111;
            font: 12px/1.35 sans-serif;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
            z-index: 30;
        }

        #infoPopup b {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
        }

        #err-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-size: 13px;
            color: #555;
            gap: 10px;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="figTooltip"></div>
    <div id="infoPopup"></div>
    <div id="ui">
        <button id="btnReset" style="display:none">Reset View</button>
        <button id="btnMap" type="button" title="Highlight matching object points and projected image points">Ray
            map</button>
        <label title="A larger hole admits more ray bundles and makes the wall image blurrier">
            Hole
            <input id="holeSize" type="range" min="0" max="1" value="0.18" step="0.01" />
        </label>
    </div>

    <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>

    <div id="err-overlay">
        <span id="err-msg">Figure failed to load</span>
        <button onclick="location.reload()"
            style="padding:5px 14px;border:1px solid #aaa;border-radius:5px;background:#f5f5f5;cursor:pointer;font-size:12px;">Reload</button>
    </div>

    <script>
        let _rendered = false;
        const _errOverlay = document.getElementById('err-overlay');
        window.__markRendered = () => { _rendered = true; _errOverlay.style.display = 'none'; };
        window.addEventListener('error', (e) => {
            if (!_rendered) {
                document.getElementById('err-msg').textContent = e.message || 'Figure failed to load';
                _errOverlay.style.display = 'flex';
            }
        });
        setTimeout(() => {
            if (!_rendered) { _errOverlay.style.display = 'flex'; }
        }, 12000);
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const d = 3;
        let aspect = canvas.clientWidth / canvas.clientHeight;
        let camera = new THREE.OrthographicCamera(
            -d * aspect, d * aspect, d, -d, 0.1, 100
        );
        camera.position.set(4, 4, 4);
        camera.lookAt(0, 0, 0);
        camera.updateProjectionMatrix();

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const HOME_POS = new THREE.Vector3();
        const HOME_TARGET = new THREE.Vector3(0, 0, 0);
        let HOME_ZOOM = 0.75;

        document.getElementById('btnReset').addEventListener('click', () => {
            camera.position.copy(HOME_POS);
            controls.target.copy(HOME_TARGET);
            camera.zoom = HOME_ZOOM;
            camera.updateProjectionMatrix();
            controls.update();
        });

        const FRAME_HALF_HEIGHT = d;
        const MIN_ZOOM = 0.2;
        const MAX_ZOOM = 5;

        function computeSceneBounds() {
            const box = new THREE.Box3().setFromObject(scene);
            if (box.isEmpty()) {
                box.setFromCenterAndSize(new THREE.Vector3(0, 0, 0), new THREE.Vector3(2 * d, 2 * d, 2 * d));
            }
            const center = new THREE.Vector3();
            box.getCenter(center);
            const size = new THREE.Vector3();
            box.getSize(size);
            return { box, center, size };
        }

        function setCameraView({
            projection = 'orthographic',
            azimuthDeg = 45,
            elevationDeg = 35,
            rollDeg = 0,
            zoom = null,
            target = null,
            heightFraction = 0.5,
            distanceScale = 1.2
        } = {}) {
            const { center, size } = computeSceneBounds();
            const viewTarget = Array.isArray(target)
                ? new THREE.Vector3(target[0] || 0, target[1] || 0, target[2] || 0)
                : center;

            const contentHeight = Math.max(size.y, 1e-6);
            const desiredViewHeight = contentHeight / Math.max(heightFraction, 0.01);
            let resolvedZoom = Number.isFinite(zoom) ? zoom : (2 * FRAME_HALF_HEIGHT) / desiredViewHeight;
            resolvedZoom = Math.min(Math.max(resolvedZoom, MIN_ZOOM), MAX_ZOOM);
            camera.zoom = resolvedZoom;

            const radius = Math.max(size.length() * distanceScale, FRAME_HALF_HEIGHT * 2);
            const azimuth = THREE.MathUtils.degToRad(azimuthDeg);
            const elevation = THREE.MathUtils.degToRad(elevationDeg);
            const cosElev = Math.cos(elevation);
            const x = viewTarget.x + radius * Math.cos(azimuth) * cosElev;
            const y = viewTarget.y + radius * Math.sin(elevation);
            const z = viewTarget.z + radius * Math.sin(azimuth) * cosElev;
            camera.position.set(x, y, z);

            controls.target.copy(viewTarget);
            camera.up.set(0, 1, 0);
            if (Number.isFinite(rollDeg) && rollDeg !== 0) {
                const viewDir = new THREE.Vector3().subVectors(viewTarget, camera.position).normalize();
                camera.up.applyAxisAngle(viewDir, THREE.MathUtils.degToRad(rollDeg));
            }
            camera.updateProjectionMatrix();
            controls.update();

            HOME_POS.copy(camera.position);
            HOME_TARGET.copy(controls.target);
            HOME_ZOOM = camera.zoom;

            window.__figureCameraView = {
                projection,
                azimuthDeg,
                elevationDeg,
                rollDeg,
                zoom: camera.zoom,
                target: [controls.target.x, controls.target.y, controls.target.z],
            };
        }

        function setStandardView({ azimuth = Math.PI / 4, polar = Math.PI / 4, heightFraction = 0.5 } = {}) {
            const azimuthDeg = THREE.MathUtils.radToDeg(azimuth);
            const elevationDeg = 90 - THREE.MathUtils.radToDeg(polar);
            setCameraView({ azimuthDeg, elevationDeg, heightFraction });
        }

        setStandardView();

        const _labels = [];
        const _v = new THREE.Vector3();

        function addLabel(text, position, options = {}) {
            const div = document.createElement('div');
            div.className = 'lbl';
            div.innerHTML = text;
            if (options.color) div.style.color = options.color;
            if (options.fontSize) div.style.fontSize = options.fontSize;
            if (options.bold) div.style.fontWeight = 'bold';
            if (options.background) {
                div.style.background = options.background;
                div.style.padding = '1px 4px';
                div.style.borderRadius = '3px';
            }
            document.body.appendChild(div);
            const entry = { div, pos: position.clone(), offset: options.offset || [0, 0] };
            _labels.push(entry);
            return entry;
        }

        const _referenceDistance = 8;

        function _syncLabels() {
            for (const { div, pos, offset } of _labels) {
                _v.copy(pos).project(camera);

                if (_v.z > 1 || _v.z < -1 || _v.x < -1 || _v.x > 1 || _v.y < -1 || _v.y > 1) {
                    div.style.display = 'none';
                    continue;
                }
                div.style.display = '';

                const ox = offset && offset[0] ? offset[0] : 0;
                const oy = offset && offset[1] ? offset[1] : 0;
                const x = (_v.x * 0.5 + 0.5) * canvas.clientWidth + ox;
                const y = (-_v.y * 0.5 + 0.5) * canvas.clientHeight + oy;

                const distance = Math.max(camera.position.distanceTo(pos), 1e-4);
                let scale = (_referenceDistance / distance) * (camera.zoom || 1);
                scale = Math.max(0.5, Math.min(scale, 6));

                div.style.left = x + 'px';
                div.style.top = y + 'px';
                div.style.transform = `translate(-50%, -50%) scale(${scale})`;
            }
        }

        const _tooltip = document.getElementById('figTooltip');
        const _infoPopup = document.getElementById('infoPopup');
        const _raycaster = new THREE.Raycaster();
        _raycaster.params.Line.threshold = 0.04;
        const _pointer = new THREE.Vector2();
        const _interactiveObjects = [];
        let _hoveredInteractive = null;

        function showPopup(title, body) {
            window.parent.postMessage({ type: 'alex-popup', title, body }, '*');
            if (_infoPopup) {
                _infoPopup.innerHTML = `<b>${title}</b><span>${body}</span>`;
                _infoPopup.style.display = 'block';
            }
        }

        function hidePopup() {
            window.parent.postMessage({ type: 'alex-popup', title: null }, '*');
            if (_infoPopup) _infoPopup.style.display = 'none';
        }

        function showTooltip(text, event) {
            if (!_tooltip || !text) return;
            _tooltip.textContent = text;
            _tooltip.style.display = 'block';
            moveTooltip(event);
        }

        function moveTooltip(event) {
            if (!_tooltip || _tooltip.style.display === 'none') return;
            const pad = 12;
            const x = Math.min(event.clientX + pad, window.innerWidth - _tooltip.offsetWidth - pad);
            const y = Math.max(pad, event.clientY - _tooltip.offsetHeight - pad);
            _tooltip.style.left = x + 'px';
            _tooltip.style.top = y + 'px';
        }

        function hideTooltip() {
            if (_tooltip) _tooltip.style.display = 'none';
        }

        function _setPointerFromEvent(event) {
            const rect = canvas.getBoundingClientRect();
            _pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            _pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function _firstInteractiveHit(event) {
            if (!_interactiveObjects.length) return null;
            _setPointerFromEvent(event);
            _raycaster.setFromCamera(_pointer, camera);
            const hits = _raycaster.intersectObjects(_interactiveObjects.map(entry => entry.object), true);
            for (const hit of hits) {
                let obj = hit.object;
                while (obj) {
                    const entry = _interactiveObjects.find(item => item.object === obj);
                    if (entry) return { ...entry, hit };
                    obj = obj.parent;
                }
            }
            return null;
        }

        function registerInteractive(object, info = {}) {
            if (!object) return object;
            object.userData = object.userData || {};
            object.userData.interactive = true;
            _interactiveObjects.push({ object, info });
            return object;
        }

        canvas.addEventListener('pointermove', (event) => {
            moveTooltip(event);
            const entry = _firstInteractiveHit(event);
            if (entry) {
                _hoveredInteractive = entry;
                canvas.style.cursor = 'pointer';
                showTooltip(entry.info.tooltip || entry.info.title || 'Click to explain', event);
            } else {
                _hoveredInteractive = null;
                canvas.style.cursor = controls.enabled ? 'grab' : 'default';
                hideTooltip();
            }
        });

        canvas.addEventListener('pointerleave', () => {
            _hoveredInteractive = null;
            canvas.style.cursor = 'default';
            hideTooltip();
        });

        canvas.addEventListener('click', (event) => {
            const entry = _firstInteractiveHit(event) || _hoveredInteractive;
            if (!entry) {
                hidePopup();
                return;
            }
            const title = entry.info.title || entry.info.tooltip || 'Figure element';
            const body = entry.info.body || entry.info.description || 'This part is interactive.';
            showPopup(title, body);
            if (typeof entry.info.onClick === 'function') entry.info.onClick(entry.hit, entry.object);
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                hidePopup();
                hideTooltip();
            }
        });

        const materials = {
            wallFill: new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.08, depthWrite: false }),
            black: new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide }),
            wallLine: new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.95 }),
            green: new THREE.MeshBasicMaterial({ color: 0x12c900 }),
            paleGreen: new THREE.MeshBasicMaterial({ color: 0x9eeb8e, transparent: true, opacity: 0.9, side: THREE.DoubleSide, depthWrite: false }),
            brown: new THREE.MeshBasicMaterial({ color: 0x855124, side: THREE.DoubleSide }),
            paleBrown: new THREE.MeshBasicMaterial({ color: 0xc9b39f, transparent: true, opacity: 0.86, side: THREE.DoubleSide, depthWrite: false }),
            white: new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide }),
            highlight: new THREE.MeshBasicMaterial({ color: 0xffd44d, transparent: true, opacity: 0.9, side: THREE.DoubleSide })
        };

        const rayMats = {
            green: new THREE.MeshBasicMaterial({ color: 0x14c900, transparent: true, opacity: 1.0, depthWrite: false }),
            brown: new THREE.MeshBasicMaterial({ color: 0x7d4a21, transparent: true, opacity: 0.92, depthWrite: false }),
            dimGreen: new THREE.MeshBasicMaterial({ color: 0x14c900, transparent: true, opacity: 0.3, depthWrite: false }),
            dimBrown: new THREE.MeshBasicMaterial({ color: 0x7d4a21, transparent: true, opacity: 0.3, depthWrite: false })
        };

        scene.add(new THREE.AmbientLight(0xffffff, 1));

        function v(x, y, z = 0) {
            return new THREE.Vector3(x, y, z);
        }

        function makeWallPlane(x, centerY, centerZ, height, depth, name) {
            const group = new THREE.Group();
            group.name = name;
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(depth, height), materials.wallFill);
            plane.rotation.y = -Math.PI / 2;
            plane.position.set(x, centerY, centerZ);
            group.add(plane);

            const corners = [
                v(x, centerY - height / 2, centerZ - depth / 2),
                v(x, centerY + height / 2, centerZ - depth / 2),
                v(x, centerY + height / 2, centerZ + depth / 2),
                v(x, centerY - height / 2, centerZ + depth / 2),
                v(x, centerY - height / 2, centerZ - depth / 2)
            ];
            const outline = new THREE.Line(new THREE.BufferGeometry().setFromPoints(corners), materials.wallLine);
            group.add(outline);
            return group;
        }

        function makeBoardWithHole(x, height, depth, radius) {
            const group = new THREE.Group();
            group.name = 'black pinhole screen';
            const parts = [
                { z: 0, y: radius + (height - 2 * radius) / 4, w: depth, h: (height - 2 * radius) / 2 },
                { z: 0, y: -radius - (height - 2 * radius) / 4, w: depth, h: (height - 2 * radius) / 2 },
                { z: -(radius + (depth - 2 * radius) / 4), y: 0, w: (depth - 2 * radius) / 2, h: 2 * radius },
                { z: radius + (depth - 2 * radius) / 4, y: 0, w: (depth - 2 * radius) / 2, h: 2 * radius }
            ];
            for (const part of parts) {
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(part.w, part.h), materials.black);
                mesh.rotation.y = -Math.PI / 2;
                mesh.position.set(x, part.y, part.z);
                group.add(mesh);
            }

            const hole = new THREE.Mesh(new THREE.CircleGeometry(1, 48), materials.white);
            hole.name = 'pinhole aperture';
            hole.rotation.y = -Math.PI / 2;
            hole.position.set(x - 0.006, 0, 0);
            group.add(hole);
            group.userData.hole = hole;

            const ring = new THREE.Mesh(new THREE.TorusGeometry(1, 0.012, 8, 48), materials.white);
            ring.name = 'pinhole rim';
            ring.rotation.y = -Math.PI / 2;
            ring.position.set(x - 0.012, 0, 0);
            group.add(ring);
            group.userData.ring = ring;
            return group;
        }

        function cylinderBetween(start, end, radius, material) {
            const direction = new THREE.Vector3().subVectors(end, start);
            const length = direction.length();
            const geometry = new THREE.CylinderGeometry(radius, radius, length, 8, 1, true);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(start).add(end).multiplyScalar(0.5);
            mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.normalize());
            return mesh;
        }

        function coneAt(point, direction, radius, height, material) {
            const cone = new THREE.Mesh(new THREE.ConeGeometry(radius, height, 18), material);
            const dir = direction.clone().normalize();
            cone.position.copy(point).addScaledVector(dir, -height * 0.5);
            cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            return cone;
        }

        function makeRay(start, end, material, head = true, radius = 0.014) {
            const group = new THREE.Group();
            const dir = new THREE.Vector3().subVectors(end, start).normalize();
            const headLength = head ? 0.13 : 0;
            const shaftEnd = head ? end.clone().addScaledVector(dir, -headLength) : end.clone();
            group.add(cylinderBetween(start, shaftEnd, radius, material));
            if (head) group.add(coneAt(end, dir, radius * 4.1, headLength, material));
            return group;
        }

        function makeShapeMesh(points, material, zOffset = 0) {
            const shape = new THREE.Shape();
            shape.moveTo(points[0][0], points[0][1]);
            for (let i = 1; i < points.length; i++) shape.lineTo(points[i][0], points[i][1]);
            shape.closePath();
            const mesh = new THREE.Mesh(new THREE.ShapeGeometry(shape), material);
            mesh.position.z = zOffset;
            return mesh;
        }

        function makeWallShape(x, zCenter, yCenter, points, material, zBias = 0.012) {
            const mesh = makeShapeMesh(points, material, 0);
            mesh.rotation.y = -Math.PI / 2;
            mesh.position.set(x - zBias, yCenter, zCenter);
            return mesh;
        }

        function makeTree(offsetX, scale = 1, faded = false) {
            const group = new THREE.Group();
            group.name = faded ? 'projected tree image' : 'tree';
            group.position.x = offsetX;

            // The real tree is built from simple solids, not an image: a stylized trunk and a cluster of leafy ellipsoids.
            const trunkPts = [
                [-0.22, -1.12], [-0.04, -0.52], [-0.08, 0.24], [-0.26, 0.56], [-0.05, 0.45],
                [0.08, 0.12], [0.2, 0.48], [0.42, 0.72], [0.36, 0.38], [0.16, 0.08],
                [0.08, -0.56], [0.28, -1.1], [0.1, -1.08], [0.03, -0.93], [-0.18, -0.94]
            ];
            const trunk = makeShapeMesh(trunkPts.map(([x, y]) => [x * scale, y * scale]), faded ? materials.paleBrown : materials.brown, 0);
            trunk.position.set(0, 0, 0);
            group.add(trunk);

            const leafMat = faded ? materials.paleGreen : materials.green;
            const blobs = [
                [-0.18, 0.72, 0, 0.55, 0.36, 0.09], [0.25, 0.84, 0.02, 0.62, 0.38, 0.1],
                [0.68, 0.78, -0.02, 0.48, 0.34, 0.08], [-0.35, 0.42, 0.03, 0.42, 0.34, 0.08],
                [0.1, 0.38, -0.04, 0.72, 0.34, 0.09], [0.56, 0.4, 0.04, 0.52, 0.29, 0.08],
                [0.18, 1.08, -0.01, 0.5, 0.25, 0.07]
            ];
            for (const [x, y, z, sx, sy, sz] of blobs) {
                const leaf = new THREE.Mesh(new THREE.SphereGeometry(1, 28, 16), leafMat);
                leaf.position.set(x * scale, y * scale, z * scale);
                leaf.scale.set(sx * scale, sy * scale, sz * scale);
                group.add(leaf);
            }
            return group;
        }

        function makeProjectedCanopyOnWall(x, zCenter, yCenter, scale, material, zBias = 0.018) {
            const group = new THREE.Group();
            const blobs = [
                [-0.34, 0.04, 0.38, 0.23], [-0.03, 0.08, 0.48, 0.27], [0.36, 0.04, 0.42, 0.25],
                [-0.5, -0.19, 0.36, 0.25], [-0.12, -0.25, 0.5, 0.25], [0.28, -0.22, 0.48, 0.25]
            ];
            for (const [z, y, rz, ry] of blobs) {
                const blob = new THREE.Mesh(new THREE.CircleGeometry(1, 36), material);
                blob.rotation.y = -Math.PI / 2;
                blob.position.set(x - zBias, yCenter + y * scale, zCenter + z * scale);
                blob.scale.set(rz * scale, ry * scale, 1);
                group.add(blob);
            }
            return group;
        }

        function makeMarker(position, color, radius = 0.055) {
            const marker = new THREE.Mesh(
                new THREE.SphereGeometry(radius, 18, 12),
                new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.0 })
            );
            marker.position.copy(position);
            return marker;
        }

        const panelA = -2.45;
        const panelB = 2.05;
        const wallX = -1.72;
        const wallHeight = 2.85;
        const wallDepth = 1.42;
        const treeX = 0.93;
        const pinholeX = -0.28;
        const pinhole = v(panelB + pinholeX, 0, 0);
        const rayGroups = [];
        const mapMarkers = new THREE.Group();
        mapMarkers.visible = false;
        scene.add(mapMarkers);

        const wallA = makeWallPlane(panelA + wallX, 0.03, 0, wallHeight, wallDepth, 'open wall');
        const wallB = makeWallPlane(panelB + wallX, 0.03, 0, wallHeight, wallDepth, 'projection wall');
        scene.add(wallA, wallB);

        const treeA = makeTree(panelA + treeX, 1.05, false);
        const treeB = makeTree(panelB + treeX, 1.05, false);
        scene.add(treeA, treeB);

        const boardB = makeBoardWithHole(panelB + pinholeX, 2.8, 1.22, 0.08);
        scene.add(boardB);

        const projectedImage = new THREE.Group();
        projectedImage.name = 'inverted wall image';
        const projWallX = panelB + wallX;
        const projTrunkPts = [
            [-0.18, -0.56], [-0.04, -0.2], [-0.08, 0.34], [-0.26, 0.67], [-0.05, 0.55],
            [0.1, 0.22], [0.22, 0.62], [0.4, 0.78], [0.3, 0.42], [0.08, 0.12],
            [0.05, -0.22], [0.16, -0.56], [0.02, -0.5]
        ];
        projectedImage.add(makeWallShape(projWallX, -0.2, 0.57, projTrunkPts.map(([z, y]) => [z * 0.78, y * 0.78]), materials.paleBrown));
        projectedImage.add(makeProjectedCanopyOnWall(projWallX, -0.28, -0.52, 0.9, materials.paleGreen));
        scene.add(projectedImage);

        const holeGlow = new THREE.Mesh(new THREE.SphereGeometry(0.055, 24, 16), materials.white);
        holeGlow.position.copy(pinhole);
        scene.add(holeGlow);

        const openWallTargets = [
            v(panelA + wallX - 0.012, 0.26, -0.38),
            v(panelA + wallX - 0.012, -0.76, -0.28)
        ];
        const objectSamplesA = [
            { pos: v(panelA + treeX - 0.2, 0.88, 0.04), kind: 'green' },
            { pos: v(panelA + treeX + 0.52, 0.55, -0.02), kind: 'green' },
            { pos: v(panelA + treeX + 0.02, -0.72, 0.02), kind: 'brown' },
            { pos: v(panelA + treeX + 0.48, -0.48, -0.03), kind: 'brown' }
        ];

        for (const target of openWallTargets) {
            for (const sample of objectSamplesA) {
                const mat = sample.kind === 'green' ? rayMats.green : rayMats.brown;
                const ray = makeRay(sample.pos, target, mat, true, 0.012);
                rayGroups.push(ray);
                scene.add(ray);
            }
            const spot = makeMarker(target, 0xffd44d, 0.08);
            mapMarkers.add(spot);
        }

        const objectSamplesB = [
            { pos: v(panelB + treeX - 0.26, 0.92, 0.04), color: 0x14c900, kind: 'green' },
            { pos: v(panelB + treeX + 0.52, 0.56, -0.02), color: 0x14c900, kind: 'green' },
            { pos: v(panelB + treeX - 0.02, -0.68, 0.03), color: 0x7d4a21, kind: 'brown' },
            { pos: v(panelB + treeX + 0.46, -0.45, -0.03), color: 0x7d4a21, kind: 'brown' }
        ];

        function projectToWallThroughPinhole(point, xWall) {
            const t = (xWall - pinhole.x) / (point.x - pinhole.x);
            return v(xWall - 0.012, pinhole.y + t * (point.y - pinhole.y), pinhole.z + t * (point.z - pinhole.z));
        }

        for (const sample of objectSamplesB) {
            const mat = sample.kind === 'green' ? rayMats.green : rayMats.brown;
            const wallPoint = projectToWallThroughPinhole(sample.pos, projWallX);
            const incoming = makeRay(sample.pos, pinhole, mat, false, 0.012);
            const projected = makeRay(pinhole, wallPoint, mat, true, 0.012);
            rayGroups.push(incoming, projected);
            scene.add(incoming, projected);

            const objectMarker = makeMarker(sample.pos, sample.color, 0.06);
            const imageMarker = makeMarker(wallPoint, sample.color, 0.07);
            mapMarkers.add(objectMarker, imageMarker);
        }

        const mixedSpot = new THREE.Group();
        for (const target of openWallTargets) mixedSpot.add(makeMarker(target, 0xffd44d, 0.12));
        scene.add(mixedSpot);

        addLabel('<span style="font-family:serif;font-size:32px;">Wall</span>', v(panelA + wallX - 0.05, 1.19, -0.72), { fontSize: '19px' });
        addLabel('<span style="font-family:serif;font-size:32px;">Wall</span>', v(panelB + wallX - 0.05, 1.19, -0.72), { fontSize: '19px' });
        addLabel('<span style="font-family:serif;font-size:30px;">Pinhole</span>', v(panelB + pinholeX + 0.46, 1.46, -0.2), { fontSize: '19px' });
        addLabel('<span style="font-family:serif;font-size:30px;">(a)</span>', v(panelA - 0.05, -1.62, 0), { fontSize: '18px' });
        addLabel('<span style="font-family:serif;font-size:30px;">(b)</span>', v(panelB + 0.28, -1.62, 0), { fontSize: '18px' });

        // Clickable objects teach the mapping: without a pinhole, many directions hit one wall point; with it, each wall point selects one direction.
        registerInteractive(wallA, {
            title: 'Open wall',
            tooltip: 'Many directions mix here',
            body: 'Each point on the exposed wall receives light from many points on the tree, so the colors add together instead of forming a picture.'
        });

        registerInteractive(boardB, {
            title: 'Pinhole',
            tooltip: 'The hole admits one narrow bundle per wall point',
            body: 'The black screen blocks most rays. A small aperture lets only straight-line rays through, making positions on the wall correspond to directions in the scene.'
        });

        registerInteractive(projectedImage, {
            title: 'Inverted image on the wall',
            tooltip: 'The projected image is upside down',
            body: 'Rays from high leaves pass through the hole and land low on the wall; rays from the lower trunk land higher. This inversion is the pinhole image.'
        });

        registerInteractive(treeB, {
            title: 'Object in the world',
            tooltip: 'Click to trace object-to-image correspondences',
            body: 'The highlighted ray map pairs sample points on the tree with their projected points on the wall.',
            onClick: () => toggleRayMap(true)
        });

        const apertureState = {
            value: 0.18,
            blurCopies: [],
            mapOn: false
        };

        function rebuildBlurCopies(amount) {
            for (const copy of apertureState.blurCopies) projectedImage.remove(copy);
            apertureState.blurCopies.length = 0;
            if (amount <= 0.22) return;
            const opacity = Math.min(0.18, (amount - 0.22) * 0.28);
            const offsets = [
                [0.09, 0.05], [-0.08, 0.04], [0.05, -0.08], [-0.06, -0.06]
            ];
            for (const [dz, dy] of offsets) {
                const blurMatGreen = materials.paleGreen.clone();
                blurMatGreen.opacity = opacity;
                const blurMatBrown = materials.paleBrown.clone();
                blurMatBrown.opacity = opacity;
                const copy = new THREE.Group();
                copy.add(makeWallShape(projWallX, -0.2 + dz, 0.57 + dy, projTrunkPts.map(([z, y]) => [z * 0.78, y * 0.78]), blurMatBrown, 0.016));
                copy.add(makeProjectedCanopyOnWall(projWallX, -0.28 + dz, -0.52 + dy, 0.9, blurMatGreen, 0.016));
                apertureState.blurCopies.push(copy);
                projectedImage.add(copy);
            }
        }

        function updateAperture(value) {
            apertureState.value = value;
            const radius = 0.047 + value * 0.105;
            boardB.userData.hole.scale.set(radius, radius, 1);
            boardB.userData.ring.scale.set(radius, radius, radius);
            holeGlow.scale.setScalar(0.8 + value * 1.4);
            const sharpOpacity = THREE.MathUtils.lerp(0.95, 0.62, value);
            materials.paleGreen.opacity = sharpOpacity;
            materials.paleBrown.opacity = THREE.MathUtils.lerp(0.88, 0.6, value);
            rayMats.green.opacity = THREE.MathUtils.lerp(0.88, 1.0, value);
            rayMats.brown.opacity = THREE.MathUtils.lerp(0.82, 0.96, value);
            rebuildBlurCopies(value);
        }

        function setMarkerOpacity(opacity) {
            mapMarkers.traverse((obj) => {
                if (obj.isMesh && obj.material) obj.material.opacity = opacity;
            });
        }

        function toggleRayMap(forceOn = null) {
            apertureState.mapOn = forceOn === null ? !apertureState.mapOn : forceOn;
            mapMarkers.visible = apertureState.mapOn;
            setMarkerOpacity(apertureState.mapOn ? 0.95 : 0.0);
            document.getElementById('btnMap').classList.toggle('active', apertureState.mapOn);
            for (const ray of rayGroups) {
                ray.traverse((obj) => {
                    if (!obj.material) return;
                    const widthScale = apertureState.mapOn ? 1.45 : 1;
                    obj.scale.set(widthScale, 1, widthScale);
                });
            }
            if (apertureState.mapOn) {
                showPopup('Ray map', 'Bright markers pair points on the object with their wall projections. In panel (a), many object points collapse onto the same wall locations.');
            }
        }

        document.getElementById('btnMap').addEventListener('click', () => toggleRayMap());
        document.getElementById('holeSize').addEventListener('input', (event) => updateAperture(Number(event.target.value)));
        updateAperture(apertureState.value);

        setCameraView({
            projection: 'orthographic',
            azimuthDeg: 83,
            elevationDeg: 5,
            rollDeg: 0,
            zoom: 1.26,
            target: [-0.15, -0.02, 0.02],
            heightFraction: 0.62
        });

        let _firstFrame = true;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            _syncLabels();
            if (_firstFrame) { _firstFrame = false; window.__markRendered?.(); }
        }
        animate();

        new ResizeObserver(() => {
            const w = canvas.clientWidth, h = canvas.clientHeight;
            aspect = w / h;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h, false);
        }).observe(canvas);
    </script>
</body>

</html>
