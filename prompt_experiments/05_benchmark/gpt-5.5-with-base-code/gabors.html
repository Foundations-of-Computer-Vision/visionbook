<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Gabor Functions</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }

        #c {
            width: 100%;
            height: 100%;
            display: block;
        }

        .lbl {
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            font-family: "Times New Roman", Times, serif;
            font-size: 13px;
            color: #111;
        }

        #ui {
            position: absolute;
            left: 8px;
            top: 8px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            font-family: sans-serif;
            font-size: 11px;
            max-width: 170px;
            background: transparent;
            border: 0;
            box-shadow: none;
            opacity: 0.75;
            transition: opacity 0.16s ease;
            z-index: 10;
        }

        #ui:hover,
        #ui:focus-within {
            opacity: 1;
        }

        #ui button {
            padding: 4px 10px;
            cursor: pointer;
            border: 1px solid #aaa;
            background: #f5f5f5;
            border-radius: 4px;
        }

        #ui button:hover {
            background: #e0e0e0;
        }

        #ui button.active {
            background: #c8e6ff;
            border-color: #5aabf0;
        }

        #ui label {
            display: flex;
            flex-direction: column;
            gap: 2px;
            color: #111;
            text-shadow: 0 1px 2px #fff;
        }

        #ui input[type=range] {
            width: 96px;
        }

        #ui .ctrlText {
            display: block;
            white-space: nowrap;
            line-height: 1.1;
        }

        #figTooltip {
            position: fixed;
            left: 0;
            top: 0;
            display: none;
            max-width: 220px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.58);
            color: #fff;
            font: 11px/1.35 sans-serif;
            pointer-events: none;
            white-space: normal;
            z-index: 20;
        }

        #infoBubble {
            position: fixed;
            right: 10px;
            top: 10px;
            display: none;
            max-width: 245px;
            padding: 8px 10px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(0, 0, 0, 0.18);
            box-shadow: 0 2px 9px rgba(0, 0, 0, 0.14);
            font: 12px/1.35 sans-serif;
            color: #222;
            z-index: 18;
        }

        #infoBubble strong {
            display: block;
            margin-bottom: 3px;
            font-size: 12px;
        }

        #err-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-size: 13px;
            color: #555;
            gap: 10px;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="figTooltip"></div>
    <div id="infoBubble"></div>
    <div id="ui">
        <button id="btnReset" style="display:none">Reset View</button>
        <label><span class="ctrlText">u<sub>0</sub></span>
            <input id="freqSlider" type="range" min="0" max="1.8" step="0.01" value="1">
        </label>
    </div>

    <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>

    <div id="err-overlay">
        <span id="err-msg">Figure failed to load</span>
        <button onclick="location.reload()"
            style="padding:5px 14px;border:1px solid #aaa;border-radius:5px;background:#f5f5f5;cursor:pointer;font-size:12px;">Reload</button>
    </div>

    <script>
        let _rendered = false;
        const _errOverlay = document.getElementById('err-overlay');
        window.__markRendered = () => { _rendered = true; _errOverlay.style.display = 'none'; };
        window.addEventListener('error', (event) => {
            if (!_rendered) {
                document.getElementById('err-msg').textContent = event.message || 'Figure failed to load';
                _errOverlay.style.display = 'flex';
            }
        });
        setTimeout(() => {
            if (!_rendered) { _errOverlay.style.display = 'flex'; }
        }, 12000);
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const d = 3;
        let aspect = canvas.clientWidth / canvas.clientHeight;
        let camera = new THREE.OrthographicCamera(
            -d * aspect, d * aspect, d, -d, 0.1, 100
        );
        camera.position.set(4, 4, 4);
        camera.lookAt(0, 0, 0);
        camera.updateProjectionMatrix();

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const HOME_POS = new THREE.Vector3();
        const HOME_TARGET = new THREE.Vector3(0, 0, 0);
        let HOME_ZOOM = 0.75;

        document.getElementById('btnReset').addEventListener('click', () => {
            camera.position.copy(HOME_POS);
            controls.target.copy(HOME_TARGET);
            camera.zoom = HOME_ZOOM;
            camera.updateProjectionMatrix();
            controls.update();
        });

        const FRAME_HALF_HEIGHT = d;
        const MIN_ZOOM = 0.2;
        const MAX_ZOOM = 5;

        function computeSceneBounds() {
            const box = new THREE.Box3().setFromObject(scene);
            if (box.isEmpty()) {
                box.setFromCenterAndSize(new THREE.Vector3(0, 0, 0), new THREE.Vector3(2 * d, 2 * d, 2 * d));
            }
            const center = new THREE.Vector3();
            box.getCenter(center);
            const size = new THREE.Vector3();
            box.getSize(size);
            return { box, center, size };
        }

        function setCameraView({
            projection = 'orthographic',
            azimuthDeg = 45,
            elevationDeg = 35,
            rollDeg = 0,
            zoom = null,
            target = null,
            heightFraction = 0.5,
            distanceScale = 1.2
        } = {}) {
            const { center, size } = computeSceneBounds();
            const viewTarget = Array.isArray(target)
                ? new THREE.Vector3(target[0] || 0, target[1] || 0, target[2] || 0)
                : center;

            const contentHeight = Math.max(size.y, 1e-6);
            const desiredViewHeight = contentHeight / Math.max(heightFraction, 0.01);
            let resolvedZoom = Number.isFinite(zoom) ? zoom : (2 * FRAME_HALF_HEIGHT) / desiredViewHeight;
            resolvedZoom = Math.min(Math.max(resolvedZoom, MIN_ZOOM), MAX_ZOOM);
            camera.zoom = resolvedZoom;

            const radius = Math.max(size.length() * distanceScale, FRAME_HALF_HEIGHT * 2);
            const azimuth = THREE.MathUtils.degToRad(azimuthDeg);
            const elevation = THREE.MathUtils.degToRad(elevationDeg);
            const cosElev = Math.cos(elevation);
            const x = viewTarget.x + radius * Math.cos(azimuth) * cosElev;
            const y = viewTarget.y + radius * Math.sin(elevation);
            const z = viewTarget.z + radius * Math.sin(azimuth) * cosElev;
            camera.position.set(x, y, z);

            controls.target.copy(viewTarget);
            camera.up.set(0, 1, 0);
            if (Number.isFinite(rollDeg) && rollDeg !== 0) {
                const viewDir = new THREE.Vector3().subVectors(viewTarget, camera.position).normalize();
                camera.up.applyAxisAngle(viewDir, THREE.MathUtils.degToRad(rollDeg));
            }
            camera.updateProjectionMatrix();
            controls.update();

            HOME_POS.copy(camera.position);
            HOME_TARGET.copy(controls.target);
            HOME_ZOOM = camera.zoom;

            window.__figureCameraView = {
                projection,
                azimuthDeg,
                elevationDeg,
                rollDeg,
                zoom: camera.zoom,
                target: [controls.target.x, controls.target.y, controls.target.z],
            };
        }

        function setStandardView({ azimuth = Math.PI / 4, polar = Math.PI / 4, heightFraction = 0.5 } = {}) {
            const azimuthDeg = THREE.MathUtils.radToDeg(azimuth);
            const elevationDeg = 90 - THREE.MathUtils.radToDeg(polar);
            setCameraView({ azimuthDeg, elevationDeg, heightFraction });
        }

        setStandardView();

        const _labels = [];
        const _v = new THREE.Vector3();

        function addLabel(text, position, options = {}) {
            const div = document.createElement('div');
            div.className = 'lbl';
            div.innerHTML = text;
            if (options.color) div.style.color = options.color;
            if (options.fontSize) div.style.fontSize = options.fontSize;
            if (options.bold) div.style.fontWeight = 'bold';
            if (options.background) {
                div.style.background = options.background;
                div.style.padding = '1px 4px';
                div.style.borderRadius = '3px';
            }
            document.body.appendChild(div);
            const entry = { div, pos: position.clone(), offset: options.offset || [0, 0] };
            _labels.push(entry);
            return entry;
        }

        const _referenceDistance = 8;

        function _syncLabels() {
            for (const { div, pos, offset } of _labels) {
                _v.copy(pos).project(camera);

                if (_v.z > 1 || _v.z < -1 || _v.x < -1 || _v.x > 1 || _v.y < -1 || _v.y > 1) {
                    div.style.display = 'none';
                    continue;
                }
                div.style.display = '';

                const ox = offset && offset[0] ? offset[0] : 0;
                const oy = offset && offset[1] ? offset[1] : 0;
                const x = (_v.x * 0.5 + 0.5) * canvas.clientWidth + ox;
                const y = (-_v.y * 0.5 + 0.5) * canvas.clientHeight + oy;

                const distance = Math.max(camera.position.distanceTo(pos), 1e-4);
                let scale = (_referenceDistance / distance) * (camera.zoom || 1);
                scale = Math.max(0.5, Math.min(scale, 6));

                div.style.left = x + 'px';
                div.style.top = y + 'px';
                div.style.transform = `translate(-50%, -50%) scale(${scale})`;
            }
        }

        const _tooltip = document.getElementById('figTooltip');
        const _popup = document.getElementById('infoBubble');
        const _raycaster = new THREE.Raycaster();
        const _pointer = new THREE.Vector2();
        const _interactiveObjects = [];
        let _hoveredInteractive = null;

        function showPopup(title, body) {
            window.parent.postMessage({ type: 'alex-popup', title, body }, '*');
            if (_popup) {
                _popup.innerHTML = `<strong>${title}</strong><span>${body}</span>`;
                _popup.style.display = 'block';
            }
        }

        function hidePopup() {
            window.parent.postMessage({ type: 'alex-popup', title: null }, '*');
            if (_popup) _popup.style.display = 'none';
        }

        function showTooltip(text, event) {
            if (!_tooltip || !text) return;
            _tooltip.textContent = text;
            _tooltip.style.display = 'block';
            moveTooltip(event);
        }

        function moveTooltip(event) {
            if (!_tooltip || _tooltip.style.display === 'none') return;
            const pad = 12;
            const x = Math.min(event.clientX + pad, window.innerWidth - _tooltip.offsetWidth - pad);
            const y = Math.max(pad, event.clientY - _tooltip.offsetHeight - pad);
            _tooltip.style.left = x + 'px';
            _tooltip.style.top = y + 'px';
        }

        function hideTooltip() {
            if (_tooltip) _tooltip.style.display = 'none';
        }

        function _setPointerFromEvent(event) {
            const rect = canvas.getBoundingClientRect();
            _pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            _pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function _firstInteractiveHit(event) {
            if (!_interactiveObjects.length) return null;
            _setPointerFromEvent(event);
            _raycaster.setFromCamera(_pointer, camera);
            const hits = _raycaster.intersectObjects(_interactiveObjects.map(entry => entry.object), true);
            for (const hit of hits) {
                let obj = hit.object;
                while (obj) {
                    const entry = _interactiveObjects.find(item => item.object === obj);
                    if (entry) return { ...entry, hit };
                    obj = obj.parent;
                }
            }
            return null;
        }

        function registerInteractive(object, info = {}) {
            if (!object) return object;
            object.userData = object.userData || {};
            object.userData.interactive = true;
            _interactiveObjects.push({ object, info });
            return object;
        }

        canvas.addEventListener('pointermove', (event) => {
            moveTooltip(event);
            const entry = _firstInteractiveHit(event);
            if (entry) {
                _hoveredInteractive = entry;
                canvas.style.cursor = 'pointer';
                showTooltip(entry.info.tooltip || entry.info.title || 'Click to explain', event);
            } else {
                _hoveredInteractive = null;
                canvas.style.cursor = controls.enabled ? 'grab' : 'default';
                hideTooltip();
            }
        });

        canvas.addEventListener('pointerleave', () => {
            _hoveredInteractive = null;
            canvas.style.cursor = 'default';
            hideTooltip();
        });

        canvas.addEventListener('click', (event) => {
            const entry = _firstInteractiveHit(event) || _hoveredInteractive;
            if (!entry) {
                hidePopup();
                return;
            }
            const title = entry.info.title || entry.info.tooltip || 'Figure element';
            const body = entry.info.body || entry.info.description || 'This part is interactive.';
            showPopup(title, body);
            if (typeof entry.info.onClick === 'function') entry.info.onClick(entry.hit, entry.object);
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                hidePopup();
                hideTooltip();
            }
        });

        const panels = [];
        const panelState = { frequencyScale: 1, selected: null };

        function gaussianEnvelope(x, z, sigma) {
            return Math.exp(-(x * x + z * z) / (2 * sigma * sigma));
        }

        function surfaceValue(kind, x, z, frequencyScale) {
            const sigma = 0.56;
            const envelope = gaussianEnvelope(x, z, sigma);
            if (kind === 'gaussian') return envelope;
            const phase = kind === 'cosine' ? 0 : -Math.PI / 2;
            const carrier = Math.cos((2 * Math.PI * frequencyScale * x) + phase);
            return envelope * carrier;
        }

        function lerpHex(a, b, t) {
            return new THREE.Color(a).lerp(new THREE.Color(b), THREE.MathUtils.clamp(t, 0, 1));
        }

        function colorFor(kind, value) {
            if (kind === 'gaussian') {
                if (value < 0.33) return lerpHex(0x0010e8, 0x2255ff, value / 0.33);
                if (value < 0.67) return lerpHex(0x2255ff, 0xffff00, (value - 0.33) / 0.34);
                return lerpHex(0xffff00, 0xe32000, (value - 0.67) / 0.33);
            }
            if (value < 0) return lerpHex(0x0015d8, 0xffff00, (value + 1) * 0.62);
            if (value < 0.62) return lerpHex(0xffff00, 0xff9700, value / 0.62);
            return lerpHex(0xff9700, 0xe21b00, (value - 0.62) / 0.38);
        }

        function createSurfacePanel({ kind, xOffset, heightScale, title, body }) {
            const res = 46;
            const span = 2.55;
            const half = span / 2;
            const positions = [];
            const colors = [];
            const indices = [];

            for (let row = 0; row <= res; row++) {
                const z = -half + (row / res) * span;
                for (let col = 0; col <= res; col++) {
                    const x = -half + (col / res) * span;
                    const value = surfaceValue(kind, x, z, panelState.frequencyScale);
                    const y = value * heightScale;
                    positions.push(x, y, z);
                    const color = colorFor(kind, kind === 'gaussian' ? value : value);
                    colors.push(color.r, color.g, color.b);
                }
            }

            for (let row = 0; row < res; row++) {
                for (let col = 0; col < res; col++) {
                    const a = row * (res + 1) + col;
                    const b = a + 1;
                    const c = a + (res + 1);
                    const d2 = c + 1;
                    indices.push(a, c, b, b, c, d2);
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setIndex(indices);
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.computeVertexNormals();

            const material = new THREE.MeshBasicMaterial({
                vertexColors: true,
                side: THREE.DoubleSide,
            });
            const mesh = new THREE.Mesh(geometry, material);

            const gridGeometry = new THREE.BufferGeometry();
            const gridPositions = buildGridPositions(kind, res, span, heightScale);
            gridGeometry.setAttribute('position', new THREE.Float32BufferAttribute(gridPositions, 3));
            const grid = new THREE.LineSegments(
                gridGeometry,
                new THREE.LineBasicMaterial({ color: 0x1b1b1b, transparent: true, opacity: 0.23 })
            );

            const outline = new THREE.LineSegments(
                new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute([
                    -half, 0.006, -half, half, 0.006, -half,
                    half, 0.006, -half, half, 0.006, half,
                    half, 0.006, half, -half, 0.006, half,
                    -half, 0.006, half, -half, 0.006, -half
                ], 3)),
                new THREE.LineBasicMaterial({ color: 0x9c8400, transparent: true, opacity: 0.32 })
            );

            const group = new THREE.Group();
            group.position.x = xOffset;
            group.add(mesh, grid, outline);
            scene.add(group);

            const panel = { kind, group, mesh, grid, outline, res, span, heightScale, title, body };
            panels.push(panel);

            registerInteractive(group, {
                title,
                tooltip: title,
                body,
                onClick: () => selectPanel(panel)
            });

            return panel;
        }

        function buildGridPositions(kind, res, span, heightScale) {
            const half = span / 2;
            const pts = [];
            const stride = 2;

            function pushPoint(x, z) {
                const value = surfaceValue(kind, x, z, panelState.frequencyScale);
                const y = value * heightScale;
                const lift = value < 0 ? -0.008 : 0.008;
                pts.push(x, y + lift, z);
            }

            for (let row = 0; row <= res; row += stride) {
                const z = -half + (row / res) * span;
                for (let col = 0; col < res; col++) {
                    const x0 = -half + (col / res) * span;
                    const x1 = -half + ((col + 1) / res) * span;
                    pushPoint(x0, z);
                    pushPoint(x1, z);
                }
            }

            for (let col = 0; col <= res; col += stride) {
                const x = -half + (col / res) * span;
                for (let row = 0; row < res; row++) {
                    const z0 = -half + (row / res) * span;
                    const z1 = -half + ((row + 1) / res) * span;
                    pushPoint(x, z0);
                    pushPoint(x, z1);
                }
            }

            return pts;
        }

        function updateSurfacePanel(panel) {
            const { kind, mesh, grid, res, span, heightScale } = panel;
            const half = span / 2;
            const positionAttr = mesh.geometry.getAttribute('position');
            const colorAttr = mesh.geometry.getAttribute('color');

            let idx = 0;
            for (let row = 0; row <= res; row++) {
                const z = -half + (row / res) * span;
                for (let col = 0; col <= res; col++) {
                    const x = -half + (col / res) * span;
                    const value = surfaceValue(kind, x, z, panelState.frequencyScale);
                    const y = value * heightScale;
                    positionAttr.setXYZ(idx, x, y, z);
                    const color = colorFor(kind, value);
                    colorAttr.setXYZ(idx, color.r, color.g, color.b);
                    idx++;
                }
            }

            positionAttr.needsUpdate = true;
            colorAttr.needsUpdate = true;
            mesh.geometry.computeVertexNormals();

            const gridPositions = buildGridPositions(kind, res, span, heightScale);
            grid.geometry.setAttribute('position', new THREE.Float32BufferAttribute(gridPositions, 3));
            grid.geometry.attributes.position.needsUpdate = true;
        }

        function selectPanel(panel) {
            panelState.selected = panel;
            for (const candidate of panels) {
                const selected = candidate === panel;
                candidate.grid.material.color.set(selected ? 0x0a4cff : 0x1b1b1b);
                candidate.grid.material.opacity = selected ? 0.45 : 0.23;
                candidate.outline.material.color.set(selected ? 0x0a4cff : 0x9c8400);
                candidate.outline.material.opacity = selected ? 0.65 : 0.32;
            }
        }

        // The three textbook panels are mapped to side-by-side 3D height fields.
        // (a) is only the localizing Gaussian. (b) and (c) multiply that envelope by
        // cosine and sine carriers to show the real and imaginary Gabor components.
        createSurfacePanel({
            kind: 'gaussian',
            xOffset: -3.8,
            heightScale: 1.55,
            title: 'Gaussian window',
            body: 'The positive mound is exp(-(x^2 + y^2)/(2 sigma^2)). With zero carrier frequency it is the localized window alone.'
        });

        createSurfacePanel({
            kind: 'cosine',
            xOffset: 0,
            heightScale: 1.78,
            title: 'Cosine-phase Gabor',
            body: 'The Gaussian envelope gates a cosine wave. The central red ridge is positive because cos(0) = 1.'
        });

        createSurfacePanel({
            kind: 'sine',
            xOffset: 3.8,
            heightScale: 1.78,
            title: 'Sine-phase Gabor',
            body: 'The same envelope gates the quadrature sine phase. The center crosses zero, splitting the positive and negative lobes.'
        });

        addLabel('(a)', new THREE.Vector3(-4.98, -0.82, 1.62), { fontSize: '34px', bold: true, offset: [-18, 42] });
        addLabel('(b)', new THREE.Vector3(-1.03, -0.82, 1.62), { fontSize: '34px', bold: true, offset: [-18, 42] });
        addLabel('(c)', new THREE.Vector3(2.86, -0.82, 1.62), { fontSize: '34px', bold: true, offset: [-18, 42] });

        const freqSlider = document.getElementById('freqSlider');
        freqSlider.addEventListener('input', () => {
            panelState.frequencyScale = Number(freqSlider.value);
            for (const panel of panels) updateSurfacePanel(panel);
            if (panelState.selected) selectPanel(panelState.selected);
        });

        // The compact u0 slider teaches the central-frequency parameter: increasing
        // u0 squeezes more sinusoidal cycles under the same Gaussian window.
        freqSlider.addEventListener('change', () => {
            showPopup('Central frequency u0', 'Changing u0 alters the carrier frequency while the Gaussian localization stays fixed.');
        });

        setCameraView({
            projection: 'orthographic',
            azimuthDeg: 90,
            elevationDeg: 21,
            rollDeg: 0,
            zoom: 0.78,
            target: [0, 0.32, 0.02],
            heightFraction: 0.62
        });

        let _firstFrame = true;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            _syncLabels();
            if (_firstFrame) { _firstFrame = false; window.__markRendered?.(); }
        }
        animate();

        new ResizeObserver(() => {
            const w = canvas.clientWidth, h = canvas.clientHeight;
            if (!w || !h) return;
            aspect = w / h;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h, false);
        }).observe(canvas);
    </script>
</body>

</html>
