<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neural Net Training Visualization</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }

        #c {
            width: 100%;
            height: 100%;
            display: block;
        }

        .lbl {
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            color: #111;
        }

        .layerBox {
            display: inline-block;
            min-width: 58px;
            padding: 2px 6px;
            border: 1.5px solid #111;
            border-radius: 5px;
            background: #fff;
            font-family: "Courier New", monospace;
            font-size: 13px;
            line-height: 1.15;
            text-align: center;
            box-sizing: border-box;
        }

        .axisLabel {
            font-size: 22px;
            letter-spacing: 0;
        }

        .goalLabel {
            padding: 1px 4px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.92);
            font-size: 12px;
            font-family: Arial, Helvetica, sans-serif;
        }

        #ui {
            position: absolute;
            right: 8px;
            bottom: 8px;
            display: flex;
            gap: 4px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 11px;
            background: transparent;
            border: 0;
            box-shadow: none;
            opacity: 0.88;
            transition: opacity 0.16s ease;
            z-index: 10;
        }

        #ui:hover,
        #ui:focus-within {
            opacity: 1;
        }

        #ui button {
            padding: 4px 8px;
            cursor: pointer;
            border: 1px solid #aaa;
            background: rgba(245, 245, 245, 0.88);
            border-radius: 4px;
            font-size: 11px;
            line-height: 1;
        }

        #ui button:hover {
            background: #e8e8e8;
        }

        #ui button.active {
            background: #d9ecff;
            border-color: #5aabf0;
        }

        #figTooltip {
            position: fixed;
            left: 0;
            top: 0;
            display: none;
            max-width: 230px;
            padding: 5px 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.62);
            color: #fff;
            font: 11px/1.35 Arial, Helvetica, sans-serif;
            pointer-events: none;
            white-space: normal;
            z-index: 20;
        }

        #err-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            color: #555;
            gap: 10px;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="figTooltip"></div>
    <div id="ui">
        <button id="btnPaths" class="active" title="Toggle dotted datapoint trajectories">paths</button>
        <button id="btnGoal" title="Reveal one-hot target codes">goal</button>
    </div>

    <div id="err-overlay">
        <span id="err-msg">Figure failed to load</span>
        <button onclick="location.reload()"
            style="padding:5px 14px;border:1px solid #aaa;border-radius:5px;background:#f5f5f5;cursor:pointer;font-size:12px;">Reload</button>
    </div>

    <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>

    <script>
        let _rendered = false;
        const _errOverlay = document.getElementById('err-overlay');
        window.__markRendered = () => { _rendered = true; _errOverlay.style.display = 'none'; };
        window.addEventListener('error', (e) => {
            if (!_rendered) {
                document.getElementById('err-msg').textContent = e.message || 'Figure failed to load';
                _errOverlay.style.display = 'flex';
            }
        });
        setTimeout(() => {
            if (!_rendered) _errOverlay.style.display = 'flex';
        }, 12000);
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const d = 3;
        let aspect = Math.max(canvas.clientWidth, 1) / Math.max(canvas.clientHeight, 1);
        let camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 0.1, 100);
        camera.position.set(4, 4, 4);
        camera.lookAt(0, 0, 0);
        camera.updateProjectionMatrix();

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const HOME_POS = new THREE.Vector3();
        const HOME_TARGET = new THREE.Vector3(0, 0, 0);
        let HOME_ZOOM = 0.75;

        const FRAME_HALF_HEIGHT = d;
        const MIN_ZOOM = 0.2;
        const MAX_ZOOM = 5;

        function computeSceneBounds() {
            const box = new THREE.Box3().setFromObject(scene);
            if (box.isEmpty()) {
                box.setFromCenterAndSize(new THREE.Vector3(0, 0, 0), new THREE.Vector3(2 * d, 2 * d, 2 * d));
            }
            const center = new THREE.Vector3();
            box.getCenter(center);
            const size = new THREE.Vector3();
            box.getSize(size);
            return { box, center, size };
        }

        function setCameraView({
            projection = 'orthographic',
            azimuthDeg = 45,
            elevationDeg = 35,
            rollDeg = 0,
            zoom = null,
            target = null,
            heightFraction = 0.5,
            distanceScale = 1.2
        } = {}) {
            const { center, size } = computeSceneBounds();
            const viewTarget = Array.isArray(target)
                ? new THREE.Vector3(target[0] || 0, target[1] || 0, target[2] || 0)
                : center;

            const contentHeight = Math.max(size.y, 1e-6);
            const desiredViewHeight = contentHeight / Math.max(heightFraction, 0.01);
            let resolvedZoom = Number.isFinite(zoom) ? zoom : (2 * FRAME_HALF_HEIGHT) / desiredViewHeight;
            resolvedZoom = Math.min(Math.max(resolvedZoom, MIN_ZOOM), MAX_ZOOM);
            camera.zoom = resolvedZoom;

            const radius = Math.max(size.length() * distanceScale, FRAME_HALF_HEIGHT * 2);
            const azimuth = THREE.MathUtils.degToRad(azimuthDeg);
            const elevation = THREE.MathUtils.degToRad(elevationDeg);
            const cosElev = Math.cos(elevation);
            const x = viewTarget.x + radius * Math.cos(azimuth) * cosElev;
            const y = viewTarget.y + radius * Math.sin(elevation);
            const z = viewTarget.z + radius * Math.sin(azimuth) * cosElev;
            camera.position.set(x, y, z);

            controls.target.copy(viewTarget);
            camera.up.set(0, 1, 0);
            if (Number.isFinite(rollDeg) && rollDeg !== 0) {
                const viewDir = new THREE.Vector3().subVectors(viewTarget, camera.position).normalize();
                camera.up.applyAxisAngle(viewDir, THREE.MathUtils.degToRad(rollDeg));
            }
            camera.updateProjectionMatrix();
            controls.update();

            HOME_POS.copy(camera.position);
            HOME_TARGET.copy(controls.target);
            HOME_ZOOM = camera.zoom;

            window.__figureCameraView = {
                projection,
                azimuthDeg,
                elevationDeg,
                rollDeg,
                zoom: camera.zoom,
                target: [controls.target.x, controls.target.y, controls.target.z]
            };
        }

        function setStandardView({ azimuth = Math.PI / 4, polar = Math.PI / 4, heightFraction = 0.5 } = {}) {
            const azimuthDeg = THREE.MathUtils.radToDeg(azimuth);
            const elevationDeg = 90 - THREE.MathUtils.radToDeg(polar);
            setCameraView({ azimuthDeg, elevationDeg, heightFraction });
        }
        setStandardView();

        const _labels = [];
        const _v = new THREE.Vector3();
        const _referenceDistance = 8;

        function addLabel(text, position, options = {}) {
            const div = document.createElement('div');
            div.className = 'lbl';
            div.innerHTML = text;
            if (options.color) div.style.color = options.color;
            if (options.fontSize) div.style.fontSize = options.fontSize;
            if (options.bold) div.style.fontWeight = 'bold';
            if (options.background) {
                div.style.background = options.background;
                div.style.padding = '1px 4px';
                div.style.borderRadius = '3px';
            }
            if (options.visible === false) div.style.display = 'none';
            document.body.appendChild(div);
            const entry = {
                div,
                pos: position.clone(),
                offset: options.offset || [0, 0],
                fixedSize: !!options.fixedSize,
                visible: options.visible !== false
            };
            _labels.push(entry);
            return entry;
        }

        function _syncLabels() {
            for (const entry of _labels) {
                const { div, pos, offset } = entry;
                if (!entry.visible) {
                    div.style.display = 'none';
                    continue;
                }
                _v.copy(pos).project(camera);
                if (_v.z > 1 || _v.z < -1 || _v.x < -1 || _v.x > 1 || _v.y < -1 || _v.y > 1) {
                    div.style.display = 'none';
                    continue;
                }
                div.style.display = '';

                const ox = offset && offset[0] ? offset[0] : 0;
                const oy = offset && offset[1] ? offset[1] : 0;
                const x = (_v.x * 0.5 + 0.5) * canvas.clientWidth + ox;
                const y = (-_v.y * 0.5 + 0.5) * canvas.clientHeight + oy;

                let scale = 1;
                if (!entry.fixedSize) {
                    const distance = Math.max(camera.position.distanceTo(pos), 1e-4);
                    scale = (_referenceDistance / distance) * (camera.zoom || 1);
                    scale = Math.max(0.5, Math.min(scale, 6));
                }
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                div.style.transform = `translate(-50%, -50%) scale(${scale})`;
            }
        }

        const _tooltip = document.getElementById('figTooltip');
        const _raycaster = new THREE.Raycaster();
        _raycaster.params.Points.threshold = 0.08;
        const _pointer = new THREE.Vector2();
        const _interactiveObjects = [];
        let _hoveredInteractive = null;

        function showPopup(title, body) {
            window.parent.postMessage({ type: 'alex-popup', title, body }, '*');
        }

        function hidePopup() {
            window.parent.postMessage({ type: 'alex-popup', title: null }, '*');
        }

        function showTooltip(text, event) {
            if (!_tooltip || !text) return;
            _tooltip.textContent = text;
            _tooltip.style.display = 'block';
            moveTooltip(event);
        }

        function moveTooltip(event) {
            if (!_tooltip || _tooltip.style.display === 'none') return;
            const pad = 12;
            const x = Math.min(event.clientX + pad, window.innerWidth - _tooltip.offsetWidth - pad);
            const y = Math.max(pad, event.clientY - _tooltip.offsetHeight - pad);
            _tooltip.style.left = x + 'px';
            _tooltip.style.top = y + 'px';
        }

        function hideTooltip() {
            if (_tooltip) _tooltip.style.display = 'none';
        }

        function _setPointerFromEvent(event) {
            const rect = canvas.getBoundingClientRect();
            _pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            _pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function _firstInteractiveHit(event) {
            if (!_interactiveObjects.length) return null;
            _setPointerFromEvent(event);
            _raycaster.setFromCamera(_pointer, camera);
            const hits = _raycaster.intersectObjects(_interactiveObjects.map(entry => entry.object), true);
            for (const hit of hits) {
                let obj = hit.object;
                while (obj) {
                    const entry = _interactiveObjects.find(item => item.object === obj);
                    if (entry) return { ...entry, hit };
                    obj = obj.parent;
                }
            }
            return null;
        }

        function registerInteractive(object, info = {}) {
            if (!object) return object;
            object.userData = object.userData || {};
            object.userData.interactive = true;
            _interactiveObjects.push({ object, info });
            return object;
        }

        canvas.addEventListener('pointermove', (event) => {
            moveTooltip(event);
            const entry = _firstInteractiveHit(event);
            if (entry) {
                _hoveredInteractive = entry;
                canvas.style.cursor = 'pointer';
                showTooltip(entry.info.tooltip || entry.info.title || 'Click to inspect', event);
            } else {
                _hoveredInteractive = null;
                canvas.style.cursor = controls.enabled ? 'grab' : 'default';
                hideTooltip();
            }
        });

        canvas.addEventListener('pointerleave', () => {
            _hoveredInteractive = null;
            canvas.style.cursor = 'default';
            hideTooltip();
        });

        canvas.addEventListener('click', (event) => {
            const entry = _firstInteractiveHit(event) || _hoveredInteractive;
            if (!entry) {
                hidePopup();
                return;
            }
            const title = entry.info.title || entry.info.tooltip || 'Figure element';
            const body = entry.info.body || entry.info.description || 'This element is interactive.';
            showPopup(title, body);
            if (typeof entry.info.onClick === 'function') entry.info.onClick(entry.hit, entry.object);
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                hidePopup();
                hideTooltip();
                clearHighlights();
            }
        });

        const layerNames = ['linear', 'relu', 'linear', 'relu', 'linear', 'relu', 'linear', 'softmax'];
        const layerYs = [-3.05, -2.18, -1.30, -0.42, 0.46, 1.34, 2.22, 3.10];
        const columnXs = [-3.35, -0.35, 2.65];
        const stageNames = ['early checkpoint', 'middle checkpoint', 'late checkpoint'];
        const planeSize = 1.18;

        const red = new THREE.Color('#df516a');
        const blue = new THREE.Color('#2d63d8');
        const gray = new THREE.Color('#b8b8b8');
        const darkGray = new THREE.Color('#575757');

        const planeRecords = [];
        const dataLines = [];
        const mappingLines = [];
        const pointRecords = [];
        const goalObjects = [];
        const goalLabels = [];
        let pathsVisible = true;
        let selectedPointKey = null;
        let selectedStage = null;

        function lineMaterial(color, opacity = 1, dashed = false) {
            const base = { color, transparent: true, opacity, depthWrite: false };
            if (dashed) {
                return new THREE.LineDashedMaterial({ ...base, dashSize: 0.05, gapSize: 0.055 });
            }
            return new THREE.LineBasicMaterial(base);
        }

        function makeLine(points, material) {
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, material);
            if (material.isLineDashedMaterial) line.computeLineDistances();
            return line;
        }

        function makeArrow(from, to, color = '#111', shaftRadius = 0.006, headRadius = 0.035, headLength = 0.13) {
            const dir = new THREE.Vector3().subVectors(to, from);
            const len = dir.length();
            const group = new THREE.Group();
            const shaftLen = Math.max(len - headLength, 0.001);
            const mid = new THREE.Vector3().copy(from).addScaledVector(dir, 0.5 * shaftLen / len);
            const shaft = new THREE.Mesh(
                new THREE.CylinderGeometry(shaftRadius, shaftRadius, shaftLen, 8),
                new THREE.MeshBasicMaterial({ color })
            );
            shaft.position.copy(mid);
            shaft.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
            group.add(shaft);

            const head = new THREE.Mesh(
                new THREE.ConeGeometry(headRadius, headLength, 16),
                new THREE.MeshBasicMaterial({ color })
            );
            head.position.copy(to).addScaledVector(dir.clone().normalize(), -headLength * 0.5);
            head.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
            group.add(head);
            scene.add(group);
            return group;
        }

        function localToWorld(stageIndex, layerIndex, local, lift = 0) {
            return new THREE.Vector3(columnXs[stageIndex] + local.x, layerYs[layerIndex] + lift, local.z);
        }

        function rotate2(x, z, angle) {
            const c = Math.cos(angle);
            const s = Math.sin(angle);
            return { x: c * x - s * z, z: s * x + c * z };
        }

        function smooth01(x) {
            const t = Math.max(0, Math.min(1, x));
            return t * t * (3 - 2 * t);
        }

        function transformGridLocal(base, layerIndex, stageIndex) {
            const stage = stageIndex / 2;
            let x = base.x;
            let z = base.z;
            for (let k = 0; k <= layerIndex; k++) {
                const angle = (0.18 + 0.16 * stage) * (k + 1) * (k % 2 ? -1 : 1);
                const r = rotate2(x, z, angle);
                x = r.x * (0.96 + 0.13 * Math.sin(k + stageIndex));
                z = r.z * (0.90 + 0.22 * Math.cos(0.7 * k + stageIndex));
                if (layerNames[k] === 'relu') {
                    x = Math.max(x, -0.28 + 0.09 * stage);
                    z = Math.max(z, -0.30 + 0.08 * stage);
                }
            }
            const pull = Math.pow(layerIndex / (layerNames.length - 1), 1.25) * 0.12 * stage;
            x = THREE.MathUtils.lerp(x, x > 0 ? 0.46 : -0.22, pull);
            z = THREE.MathUtils.lerp(z, z > 0 ? 0.43 : -0.22, pull);
            return { x: Math.max(-0.54, Math.min(0.54, x)), z: Math.max(-0.54, Math.min(0.54, z)) };
        }

        function transformPointLocal(base, className, layerIndex, stageIndex) {
            const stage = stageIndex / 2;
            const layerT = layerIndex / (layerNames.length - 1);
            const classSign = className === 'red' ? 1 : -1;
            let x = base.x;
            let z = base.z;

            for (let k = 0; k <= layerIndex; k++) {
                const angle = (0.25 + 0.12 * stage) * (k + 1) * (k % 2 ? -1 : 1);
                const r = rotate2(x, z, angle);
                x = r.x * (1.05 + 0.12 * Math.sin(k + 0.6 * stageIndex));
                z = r.z * (0.78 + 0.14 * Math.cos(k + stageIndex));
                if (layerNames[k] === 'relu') {
                    x = Math.max(x, -0.07 + 0.035 * Math.sin(k));
                    z = Math.max(z, -0.08 + 0.025 * Math.cos(k));
                }
            }

            const redTarget = { x: -0.18, z: 0.46 };
            const blueTarget = { x: 0.43, z: -0.12 };
            const target = className === 'red' ? redTarget : blueTarget;
            const separation = smooth01(Math.pow(layerT, 1.18) * (0.18 + 0.92 * stage));
            const squeeze = 1 - 0.58 * separation;
            x = THREE.MathUtils.lerp(x * squeeze, target.x, separation);
            z = THREE.MathUtils.lerp(z * squeeze, target.z, separation);

            const wiggle = (1 - separation) * 0.045;
            x += classSign * wiggle * Math.sin(3.1 * layerT + base.seed);
            z += classSign * wiggle * Math.cos(2.5 * layerT + base.seed * 0.7);
            return { x: Math.max(-0.52, Math.min(0.52, x)), z: Math.max(-0.52, Math.min(0.52, z)) };
        }

        function makeBasePoints(className) {
            const points = [];
            const offset = className === 'red' ? 0 : Math.PI * 0.82;
            for (let i = 0; i < 18; i++) {
                const a = i * 0.78 + offset;
                const ring = 0.25 + 0.075 * Math.sin(i * 1.7 + offset);
                points.push({
                    x: ring * Math.cos(a) + (className === 'red' ? -0.035 : 0.035) + 0.018 * Math.sin(i * 2.3),
                    z: 0.58 * ring * Math.sin(a) + (className === 'red' ? 0.018 : -0.018) + 0.016 * Math.cos(i * 1.9),
                    seed: i + (className === 'red' ? 0.3 : 1.7),
                    index: i
                });
            }
            return points;
        }

        const redBase = makeBasePoints('red');
        const blueBase = makeBasePoints('blue');

        function addPlane(stageIndex, layerIndex) {
            const x = columnXs[stageIndex];
            const y = layerYs[layerIndex];
            const group = new THREE.Group();
            group.position.set(x, y, 0);

            const planeMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.045,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(planeSize, planeSize), planeMaterial);
            plane.rotation.x = -Math.PI / 2;
            group.add(plane);

            const half = planeSize / 2;
            const edgeMat = lineMaterial('#c7c7c7', 0.82);
            const edge = makeLine([
                new THREE.Vector3(-half, 0, -half),
                new THREE.Vector3(half, 0, -half),
                new THREE.Vector3(half, 0, half),
                new THREE.Vector3(-half, 0, half),
                new THREE.Vector3(-half, 0, -half)
            ], edgeMat);
            group.add(edge);

            const gridMat = lineMaterial('#ededed', 0.52);
            for (const t of [-0.25, 0, 0.25]) {
                group.add(makeLine([new THREE.Vector3(-half, 0, t), new THREE.Vector3(half, 0, t)], gridMat.clone()));
                group.add(makeLine([new THREE.Vector3(t, 0, -half), new THREE.Vector3(t, 0, half)], gridMat.clone()));
            }

            scene.add(group);
            const record = { group, plane, edge, stageIndex, layerIndex, baseOpacity: 0.045 };
            planeRecords.push(record);
            registerInteractive(plane, {
                title: `${stageNames[stageIndex]}: ${layerNames[layerIndex]}`,
                tooltip: `Click: inspect the ${layerNames[layerIndex]} representation at this training checkpoint.`,
                body: 'Each horizontal square is the same 2D activation space after one network operation.',
                onClick: () => focusLayer(stageIndex, layerIndex)
            });
            return record;
        }

        function addDensityBlob(stageIndex, layerIndex, className, centerLocal, amount) {
            const color = className === 'red' ? red : blue;
            const world = localToWorld(stageIndex, layerIndex, centerLocal, 0.012);
            const outer = new THREE.Mesh(
                new THREE.CircleGeometry(1, 48),
                new THREE.MeshBasicMaterial({
                    color,
                    transparent: true,
                    opacity: 0.10 + 0.08 * amount,
                    side: THREE.DoubleSide,
                    depthWrite: false
                })
            );
            outer.rotation.x = -Math.PI / 2;
            outer.position.copy(world);
            outer.scale.set(0.19 - 0.05 * amount, 0.115 - 0.03 * amount, 1);
            scene.add(outer);

            const inner = outer.clone();
            inner.material = outer.material.clone();
            inner.material.opacity = 0.16 + 0.10 * amount;
            inner.scale.multiplyScalar(0.48);
            inner.position.y += 0.004;
            scene.add(inner);
        }

        function addPoint(stageIndex, layerIndex, className, basePoint, local) {
            const color = className === 'red' ? red : blue;
            const pointKey = `${className}-${basePoint.index}`;
            const sphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.026, 12, 8),
                new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.82, depthWrite: false })
            );
            sphere.position.copy(localToWorld(stageIndex, layerIndex, local, 0.035));
            scene.add(sphere);
            pointRecords.push({ sphere, stageIndex, layerIndex, className, pointKey, baseScale: 1 });
            registerInteractive(sphere, {
                title: className === 'red' ? 'red class datapoint' : 'blue class datapoint',
                tooltip: 'Click: highlight this datapoint as it moves upward through the layers.',
                body: 'The dotted path follows one example through affine maps, ReLUs, and the final softmax-like separation.',
                onClick: () => focusPoint(stageIndex, pointKey)
            });
        }

        function addMappingLines(stageIndex) {
            const samples = [];
            for (const a of [-0.54, -0.27, 0, 0.27, 0.54]) {
                samples.push({ x: a, z: -0.54 }, { x: a, z: 0.54 }, { x: -0.54, z: a }, { x: 0.54, z: a });
            }
            for (let layerIndex = 0; layerIndex < layerYs.length - 1; layerIndex++) {
                for (let i = 0; i < samples.length; i += 2) {
                    const a = transformGridLocal(samples[i], layerIndex, stageIndex);
                    const b = transformGridLocal(samples[i], layerIndex + 1, stageIndex);
                    const line = makeLine([
                        localToWorld(stageIndex, layerIndex, a, 0.008),
                        localToWorld(stageIndex, layerIndex + 1, b, 0.008)
                    ], lineMaterial('#bfbfbf', 0.28, true));
                    line.userData = { stageIndex, fromLayer: layerIndex, toLayer: layerIndex + 1, kind: 'mapping' };
                    scene.add(line);
                    mappingLines.push(line);
                }
            }
        }

        function addDataForStage(stageIndex) {
            const all = [
                { className: 'red', points: redBase },
                { className: 'blue', points: blueBase }
            ];
            const centersByLayer = new Map();

            for (const { className, points } of all) {
                for (const basePoint of points) {
                    const localPositions = layerYs.map((_, layerIndex) => transformPointLocal(basePoint, className, layerIndex, stageIndex));
                    for (let layerIndex = 0; layerIndex < localPositions.length; layerIndex++) {
                        addPoint(stageIndex, layerIndex, className, basePoint, localPositions[layerIndex]);
                    }
                    for (let layerIndex = 0; layerIndex < localPositions.length - 1; layerIndex++) {
                        const line = makeLine([
                            localToWorld(stageIndex, layerIndex, localPositions[layerIndex], 0.025),
                            localToWorld(stageIndex, layerIndex + 1, localPositions[layerIndex + 1], 0.025)
                        ], lineMaterial('#606060', 0.26, true));
                        line.userData = {
                            kind: 'data',
                            stageIndex,
                            pointKey: `${className}-${basePoint.index}`,
                            className,
                            focused: false
                        };
                        scene.add(line);
                        dataLines.push(line);
                    }
                }
            }

            for (let layerIndex = 0; layerIndex < layerYs.length; layerIndex++) {
                for (const className of ['red', 'blue']) {
                    const base = className === 'red' ? redBase : blueBase;
                    let sx = 0;
                    let sz = 0;
                    for (const p of base) {
                        const q = transformPointLocal(p, className, layerIndex, stageIndex);
                        sx += q.x;
                        sz += q.z;
                    }
                    const center = { x: sx / base.length, z: sz / base.length };
                    const tightness = smooth01((stageIndex / 2) * (layerIndex / (layerYs.length - 1)));
                    centersByLayer.set(`${className}-${layerIndex}`, center);
                    addDensityBlob(stageIndex, layerIndex, className, center, tightness);
                }
            }
        }

        function addGoalMarkers() {
            const stageIndex = 2;
            const layerIndex = layerYs.length - 1;
            const targets = [
                { className: 'red', label: '(0, 1)', local: { x: -0.18, z: 0.46 }, color: red },
                { className: 'blue', label: '(1, 0)', local: { x: 0.43, z: -0.12 }, color: blue }
            ];
            for (const target of targets) {
                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(0.115, 0.006, 8, 48),
                    new THREE.MeshBasicMaterial({ color: target.color, transparent: true, opacity: 0.92, depthWrite: false })
                );
                ring.rotation.x = Math.PI / 2;
                ring.position.copy(localToWorld(stageIndex, layerIndex, target.local, 0.06));
                ring.visible = false;
                scene.add(ring);
                goalObjects.push(ring);

                const label = addLabel(`<span class="goalLabel">${target.label}</span>`, localToWorld(stageIndex, layerIndex, target.local, 0.26), {
                    fixedSize: true,
                    visible: false,
                    offset: [target.className === 'red' ? -18 : 20, -12]
                });
                goalLabels.push(label);
            }
        }

        function buildFigure() {
            // The left operation ladder is a 3D counterpart of the textbook's flat layer labels and upward arrows.
            const labelX = -5.85;
            const arrowX = -5.85;
            const arrowZ = 0.62;
            for (let i = 0; i < layerNames.length; i++) {
                addLabel(`<span class="layerBox">${layerNames[i]}</span>`, new THREE.Vector3(labelX, layerYs[i], arrowZ), {
                    fixedSize: true
                });
                if (i < layerNames.length - 1) {
                    makeArrow(
                        new THREE.Vector3(arrowX, layerYs[i] + 0.18, arrowZ - 0.02),
                        new THREE.Vector3(arrowX, layerYs[i + 1] - 0.18, arrowZ - 0.02),
                        '#111',
                        0.006,
                        0.035,
                        0.12
                    );
                }
            }
            makeArrow(
                new THREE.Vector3(arrowX, layerYs[layerYs.length - 1] + 0.16, arrowZ - 0.02),
                new THREE.Vector3(arrowX, layerYs[layerYs.length - 1] + 0.58, arrowZ - 0.02),
                '#111',
                0.006,
                0.035,
                0.12
            );

            // Three vertical stacks show checkpoints over training; each plane is the 2D activation space after a layer.
            for (let stageIndex = 0; stageIndex < columnXs.length; stageIndex++) {
                for (let layerIndex = 0; layerIndex < layerYs.length; layerIndex++) {
                    addPlane(stageIndex, layerIndex);
                }
                addMappingLines(stageIndex);
                addDataForStage(stageIndex);
            }

            // The bottom annotation mirrors the original training-iteration arrow.
            addLabel('<span class="axisLabel">Training iteration</span>', new THREE.Vector3(-1.00, -3.86, 0.70), {
                fixedSize: true,
                offset: [0, 16]
            });
            makeArrow(
                new THREE.Vector3(-0.05, -3.88, 0.64),
                new THREE.Vector3(3.78, -3.88, 0.64),
                '#111',
                0.006,
                0.035,
                0.13
            );

            addGoalMarkers();
        }

        function clearHighlights() {
            selectedPointKey = null;
            selectedStage = null;
            for (const record of planeRecords) {
                record.plane.material.opacity = record.baseOpacity;
                record.edge.material.color.set('#c7c7c7');
                record.edge.material.opacity = 0.82;
            }
            for (const line of dataLines) {
                line.userData.focused = false;
                line.visible = pathsVisible;
                line.material.color.set('#606060');
                line.material.opacity = 0.26;
            }
            for (const line of mappingLines) {
                line.material.color.set('#bfbfbf');
                line.material.opacity = 0.28;
            }
            for (const record of pointRecords) {
                record.sphere.scale.setScalar(record.baseScale);
                record.sphere.material.opacity = 0.82;
            }
        }

        function focusLayer(stageIndex, layerIndex) {
            selectedPointKey = null;
            selectedStage = stageIndex;
            for (const record of planeRecords) {
                const selected = record.stageIndex === stageIndex && record.layerIndex === layerIndex;
                record.plane.material.opacity = selected ? 0.18 : record.baseOpacity;
                record.edge.material.color.set(selected ? '#111111' : '#c7c7c7');
                record.edge.material.opacity = selected ? 1 : 0.82;
            }
            for (const line of mappingLines) {
                const related = line.userData.stageIndex === stageIndex &&
                    (line.userData.fromLayer === layerIndex || line.userData.toLayer === layerIndex);
                line.material.color.set(related ? '#333333' : '#bfbfbf');
                line.material.opacity = related ? 0.58 : 0.18;
            }
            for (const line of dataLines) {
                const related = line.userData.stageIndex === stageIndex;
                line.userData.focused = false;
                line.visible = pathsVisible;
                line.material.color.set(related ? '#4d4d4d' : '#999999');
                line.material.opacity = related ? 0.30 : 0.12;
            }
            for (const record of pointRecords) {
                const selected = record.stageIndex === stageIndex && record.layerIndex === layerIndex;
                record.sphere.scale.setScalar(selected ? 1.65 : 1);
                record.sphere.material.opacity = selected || record.stageIndex === stageIndex ? 0.90 : 0.42;
            }
        }

        function focusPoint(stageIndex, pointKey) {
            selectedPointKey = pointKey;
            selectedStage = stageIndex;
            for (const record of planeRecords) {
                record.plane.material.opacity = record.stageIndex === stageIndex ? 0.07 : record.baseOpacity;
                record.edge.material.color.set('#c7c7c7');
                record.edge.material.opacity = record.stageIndex === stageIndex ? 0.95 : 0.55;
            }
            for (const line of mappingLines) {
                line.material.color.set('#c8c8c8');
                line.material.opacity = line.userData.stageIndex === stageIndex ? 0.20 : 0.10;
            }
            for (const line of dataLines) {
                const focused = line.userData.stageIndex === stageIndex && line.userData.pointKey === pointKey;
                line.userData.focused = focused;
                line.visible = pathsVisible || focused;
                line.material.color.set(focused ? '#111111' : '#9a9a9a');
                line.material.opacity = focused ? 0.88 : 0.10;
            }
            for (const record of pointRecords) {
                const focused = record.stageIndex === stageIndex && record.pointKey === pointKey;
                record.sphere.scale.setScalar(focused ? 2.15 : 0.92);
                record.sphere.material.opacity = focused ? 1 : (record.stageIndex === stageIndex ? 0.55 : 0.28);
            }
        }

        document.getElementById('btnPaths').addEventListener('click', (event) => {
            pathsVisible = !pathsVisible;
            event.currentTarget.classList.toggle('active', pathsVisible);
            for (const line of dataLines) line.visible = pathsVisible || line.userData.focused;
        });

        document.getElementById('btnGoal').addEventListener('click', (event) => {
            const active = !event.currentTarget.classList.contains('active');
            event.currentTarget.classList.toggle('active', active);
            for (const obj of goalObjects) obj.visible = active;
            for (const label of goalLabels) label.visible = active;
            if (active) focusLayer(2, layerYs.length - 1);
        });

        buildFigure();

        setCameraView({
            projection: 'orthographic',
            azimuthDeg: 42,
            elevationDeg: 15,
            rollDeg: 0,
            zoom: 0.66,
            target: [-1.05, -0.08, 0.22],
            heightFraction: 0.72,
            distanceScale: 1.3
        });

        function resizeRenderer() {
            const w = Math.max(canvas.clientWidth, 1);
            const h = Math.max(canvas.clientHeight, 1);
            aspect = w / h;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h, false);
        }

        let _firstFrame = true;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            _syncLabels();
            if (_firstFrame) {
                _firstFrame = false;
                window.__markRendered?.();
            }
        }

        new ResizeObserver(resizeRenderer).observe(canvas);
        resizeRenderer();
        animate();
    </script>
</body>

</html>
