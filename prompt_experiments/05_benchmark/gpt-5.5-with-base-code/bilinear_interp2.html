<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Bilinear Interpolation</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }

        #c {
            width: 100%;
            height: 100%;
            display: block;
        }

        .lbl {
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            font-family: "Times New Roman", Georgia, serif;
            font-style: italic;
            font-size: 18px;
            color: #111;
            text-shadow: 0 1px 3px #fff, 1px 0 3px #fff, -1px 0 3px #fff;
        }

        .lbl sub {
            font-size: 68%;
            line-height: 0;
        }

        #ui {
            position: absolute;
            left: 6px;
            top: 6px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            font-family: sans-serif;
            font-size: 11px;
            max-width: 150px;
            background: transparent;
            border: 0;
            box-shadow: none;
            opacity: 0.9;
            transform: none;
            transition: opacity 0.16s ease;
            z-index: 10;
        }

        #ui:hover,
        #ui:focus-within {
            opacity: 1;
        }

        #ui button {
            padding: 4px 10px;
            cursor: pointer;
            border: 1px solid #aaa;
            background: #f5f5f5;
            border-radius: 4px;
        }

        #ui label {
            display: flex;
            align-items: center;
            gap: 5px;
            width: 118px;
            padding: 1px 4px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.64);
            text-shadow: 0 1px 2px #fff;
        }

        #ui input[type=range] {
            width: 86px;
        }

        #figTooltip {
            position: fixed;
            left: 0;
            top: 0;
            display: none;
            max-width: 230px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.62);
            color: #fff;
            font: 11px/1.35 sans-serif;
            pointer-events: none;
            white-space: normal;
            z-index: 20;
        }

        #figNote {
            position: fixed;
            right: 8px;
            top: 8px;
            display: none;
            max-width: 250px;
            padding: 7px 9px;
            border: 1px solid rgba(0, 0, 0, 0.18);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.92);
            color: #111;
            font: 12px/1.35 sans-serif;
            z-index: 18;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        #figNote strong {
            display: block;
            margin-bottom: 3px;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="figTooltip"></div>
    <div id="figNote"></div>
    <div id="ui">
        <button id="btnReset" style="display:none">Reset View</button>
        <label title="Move the fractional horizontal coordinate">a <input id="aSlider" type="range" min="0.12"
                max="0.88" step="0.01" value="0.62"></label>
        <label title="Move the fractional vertical coordinate">b <input id="bSlider" type="range" min="0.12" max="0.88"
                step="0.01" value="0.52"></label>
    </div>

    <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>

    <div id="err-overlay" style="display:none;position:fixed;inset:0;background:#fff;z-index:999;
       flex-direction:column;align-items:center;justify-content:center;
       font-family:sans-serif;font-size:13px;color:#555;gap:10px;">
        <span id="err-msg">Figure failed to load</span>
        <button onclick="location.reload()" style="padding:5px 14px;border:1px solid #aaa;
        border-radius:5px;background:#f5f5f5;cursor:pointer;font-size:12px;">Reload</button>
    </div>

    <script>
        let _rendered = false;
        const _errOverlay = document.getElementById('err-overlay');
        window.__markRendered = () => { _rendered = true; _errOverlay.style.display = 'none'; };
        window.addEventListener('error', (e) => {
            if (!_rendered) {
                document.getElementById('err-msg').textContent = e.message || 'Figure failed to load';
                _errOverlay.style.display = 'flex';
            }
        });
        setTimeout(() => {
            if (!_rendered) { _errOverlay.style.display = 'flex'; }
        }, 12000);
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const d = 3;
        let aspect = canvas.clientWidth / canvas.clientHeight;
        let camera = new THREE.OrthographicCamera(
            -d * aspect, d * aspect, d, -d, 0.1, 100
        );
        camera.position.set(4, 4, 4);
        camera.lookAt(0, 0, 0);
        camera.updateProjectionMatrix();

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const HOME_POS = new THREE.Vector3();
        const HOME_TARGET = new THREE.Vector3(0, 0, 0);
        let HOME_ZOOM = 0.75;

        document.getElementById('btnReset').addEventListener('click', () => {
            camera.position.copy(HOME_POS);
            controls.target.copy(HOME_TARGET);
            camera.zoom = HOME_ZOOM;
            camera.updateProjectionMatrix();
            controls.update();
        });

        const FRAME_HALF_HEIGHT = d;
        const MIN_ZOOM = 0.2;
        const MAX_ZOOM = 5;

        function computeSceneBounds() {
            const box = new THREE.Box3().setFromObject(scene);
            if (box.isEmpty()) {
                box.setFromCenterAndSize(new THREE.Vector3(0, 0, 0), new THREE.Vector3(2 * d, 2 * d, 2 * d));
            }
            const center = new THREE.Vector3();
            box.getCenter(center);
            const size = new THREE.Vector3();
            box.getSize(size);
            return { box, center, size };
        }

        function setCameraView({
            projection = 'orthographic',
            azimuthDeg = 45,
            elevationDeg = 35,
            rollDeg = 0,
            zoom = null,
            target = null,
            heightFraction = 0.5,
            distanceScale = 1.2
        } = {}) {
            const { center, size } = computeSceneBounds();
            const viewTarget = Array.isArray(target)
                ? new THREE.Vector3(target[0] || 0, target[1] || 0, target[2] || 0)
                : center;

            const contentHeight = Math.max(size.y, 1e-6);
            const desiredViewHeight = contentHeight / Math.max(heightFraction, 0.01);
            let resolvedZoom = Number.isFinite(zoom) ? zoom : (2 * FRAME_HALF_HEIGHT) / desiredViewHeight;
            resolvedZoom = Math.min(Math.max(resolvedZoom, MIN_ZOOM), MAX_ZOOM);
            camera.zoom = resolvedZoom;

            const radius = Math.max(size.length() * distanceScale, FRAME_HALF_HEIGHT * 2);
            const azimuth = THREE.MathUtils.degToRad(azimuthDeg);
            const elevation = THREE.MathUtils.degToRad(elevationDeg);
            const cosElev = Math.cos(elevation);
            const x = viewTarget.x + radius * Math.cos(azimuth) * cosElev;
            const y = viewTarget.y + radius * Math.sin(elevation);
            const z = viewTarget.z + radius * Math.sin(azimuth) * cosElev;
            camera.position.set(x, y, z);

            controls.target.copy(viewTarget);
            camera.up.set(0, 1, 0);
            if (Number.isFinite(rollDeg) && rollDeg !== 0) {
                const viewDir = new THREE.Vector3().subVectors(viewTarget, camera.position).normalize();
                camera.up.applyAxisAngle(viewDir, THREE.MathUtils.degToRad(rollDeg));
            }
            camera.updateProjectionMatrix();
            controls.update();

            HOME_POS.copy(camera.position);
            HOME_TARGET.copy(controls.target);
            HOME_ZOOM = camera.zoom;

            window.__figureCameraView = {
                projection,
                azimuthDeg,
                elevationDeg,
                rollDeg,
                zoom: camera.zoom,
                target: [controls.target.x, controls.target.y, controls.target.z],
            };
        }

        function setStandardView({ azimuth = Math.PI / 4, polar = Math.PI / 4, heightFraction = 0.5 } = {}) {
            const azimuthDeg = THREE.MathUtils.radToDeg(azimuth);
            const elevationDeg = 90 - THREE.MathUtils.radToDeg(polar);
            setCameraView({ azimuthDeg, elevationDeg, heightFraction });
        }

        const _labels = [];
        const _v = new THREE.Vector3();

        function addLabel(text, position, options = {}) {
            const div = document.createElement('div');
            div.className = 'lbl';
            div.innerHTML = text;
            if (options.color) div.style.color = options.color;
            if (options.fontSize) div.style.fontSize = options.fontSize;
            if (options.bold) div.style.fontWeight = 'bold';
            if (options.background) {
                div.style.background = options.background;
                div.style.padding = '1px 4px';
                div.style.borderRadius = '3px';
            }
            document.body.appendChild(div);
            const entry = { div, pos: position.clone(), offset: options.offset || [0, 0] };
            _labels.push(entry);
            return entry;
        }

        const _referenceDistance = 8;

        function _syncLabels() {
            for (const { div, pos, offset } of _labels) {
                _v.copy(pos).project(camera);
                if (_v.z > 1 || _v.z < -1 || _v.x < -1 || _v.x > 1 || _v.y < -1 || _v.y > 1) {
                    div.style.display = 'none';
                    continue;
                }
                div.style.display = '';

                const ox = offset && offset[0] ? offset[0] : 0;
                const oy = offset && offset[1] ? offset[1] : 0;
                const x = (_v.x * 0.5 + 0.5) * canvas.clientWidth + ox;
                const y = (-_v.y * 0.5 + 0.5) * canvas.clientHeight + oy;

                const distance = Math.max(camera.position.distanceTo(pos), 1e-4);
                let scale = (_referenceDistance / distance) * (camera.zoom || 1);
                scale = Math.max(0.5, Math.min(scale, 6));

                div.style.left = x + 'px';
                div.style.top = y + 'px';
                div.style.transform = `translate(-50%, -50%) scale(${scale})`;
            }
        }

        const _tooltip = document.getElementById('figTooltip');
        const _note = document.getElementById('figNote');
        const _raycaster = new THREE.Raycaster();
        const _pointer = new THREE.Vector2();
        const _interactiveObjects = [];
        let _hoveredInteractive = null;

        function showPopup(title, body) {
            if (_note) {
                _note.innerHTML = `<strong>${title}</strong>${body}`;
                _note.style.display = 'block';
            }
            window.parent.postMessage({ type: 'alex-popup', title, body }, '*');
        }

        function hidePopup() {
            if (_note) _note.style.display = 'none';
            window.parent.postMessage({ type: 'alex-popup', title: null }, '*');
        }

        function showTooltip(text, event) {
            if (!_tooltip || !text) return;
            _tooltip.textContent = text;
            _tooltip.style.display = 'block';
            moveTooltip(event);
        }

        function moveTooltip(event) {
            if (!_tooltip || _tooltip.style.display === 'none') return;
            const pad = 12;
            const x = Math.min(event.clientX + pad, window.innerWidth - _tooltip.offsetWidth - pad);
            const y = Math.max(pad, event.clientY - _tooltip.offsetHeight - pad);
            _tooltip.style.left = x + 'px';
            _tooltip.style.top = y + 'px';
        }

        function hideTooltip() {
            if (_tooltip) _tooltip.style.display = 'none';
        }

        function _setPointerFromEvent(event) {
            const rect = canvas.getBoundingClientRect();
            _pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            _pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function _firstInteractiveHit(event) {
            if (!_interactiveObjects.length) return null;
            _setPointerFromEvent(event);
            _raycaster.setFromCamera(_pointer, camera);
            const hits = _raycaster.intersectObjects(_interactiveObjects.map(entry => entry.object), true);
            for (const hit of hits) {
                let obj = hit.object;
                while (obj) {
                    const entry = _interactiveObjects.find(item => item.object === obj);
                    if (entry) return { ...entry, hit };
                    obj = obj.parent;
                }
            }
            return null;
        }

        function registerInteractive(object, info = {}) {
            if (!object) return object;
            object.userData = object.userData || {};
            object.userData.interactive = true;
            _interactiveObjects.push({ object, info });
            return object;
        }

        canvas.addEventListener('pointermove', (event) => {
            moveTooltip(event);
            const entry = _firstInteractiveHit(event);
            if (entry) {
                _hoveredInteractive = entry;
                canvas.style.cursor = 'pointer';
                showTooltip(entry.info.tooltip || entry.info.title || 'Click to explain', event);
            } else {
                _hoveredInteractive = null;
                canvas.style.cursor = controls.enabled ? 'grab' : 'default';
                hideTooltip();
            }
        });

        canvas.addEventListener('pointerleave', () => {
            _hoveredInteractive = null;
            canvas.style.cursor = 'default';
            hideTooltip();
        });

        canvas.addEventListener('click', (event) => {
            const entry = _firstInteractiveHit(event) || _hoveredInteractive;
            if (!entry) {
                hidePopup();
                return;
            }
            const title = entry.info.title || entry.info.tooltip || 'Figure element';
            const body = entry.info.body || entry.info.description || 'This part is interactive.';
            showPopup(title, body);
            if (typeof entry.info.onClick === 'function') entry.info.onClick(entry.hit, entry.object);
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                hidePopup();
                hideTooltip();
            }
        });

        const black = 0x000000;
        const red = 0xff1010;
        const green = 0x00ee00;
        const guideGray = 0x666666;
        const cylinderBasis = new THREE.Vector3(0, 1, 0);
        const sharedCylinder = new THREE.CylinderGeometry(1, 1, 1, 18, 1, false);
        const sharedDisk = new THREE.CylinderGeometry(1, 1, 1, 48, 1, false);

        function v(x, y, z = 0) {
            return new THREE.Vector3(x, y, z);
        }

        function makeMaterial(color, options = {}) {
            return new THREE.MeshBasicMaterial({ color, ...options });
        }

        function setCylinderEnds(mesh, start, end) {
            const direction = new THREE.Vector3().subVectors(end, start);
            const length = direction.length();
            if (length < 1e-6) {
                mesh.visible = false;
                return;
            }
            mesh.visible = true;
            mesh.position.copy(start).add(end).multiplyScalar(0.5);
            mesh.quaternion.setFromUnitVectors(cylinderBasis, direction.normalize());
            mesh.scale.y = length;
        }

        function makeCylinderLine(parent, start, end, radius, color, options = {}) {
            const mesh = new THREE.Mesh(sharedCylinder, makeMaterial(color, options));
            mesh.scale.set(radius, 1, radius);
            parent.add(mesh);
            setCylinderEnds(mesh, start, end);
            return mesh;
        }

        function makeDashedLine(parent, start, end, color = black, dashSize = 0.12, gapSize = 0.08) {
            const geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
            const material = new THREE.LineDashedMaterial({ color, dashSize, gapSize, linewidth: 2 });
            const line = new THREE.Line(geometry, material);
            line.computeLineDistances();
            parent.add(line);
            return line;
        }

        function updateDashedLine(line, start, end) {
            line.geometry.dispose();
            line.geometry = new THREE.BufferGeometry().setFromPoints([start, end]);
            line.computeLineDistances();
        }

        function makeDisk(parent, position, color, rx = 0.12, rz = 0.055, height = 0.035) {
            const mesh = new THREE.Mesh(sharedDisk, makeMaterial(color));
            mesh.position.copy(position);
            mesh.scale.set(rx, height, rz);
            parent.add(mesh);
            return mesh;
        }

        function makeRedMarker(parent, position, rx = 0.13, rz = 0.06) {
            const group = new THREE.Group();
            group.position.copy(position);
            parent.add(group);
            makeDisk(group, v(0, -0.003, 0), black, rx * 1.12, rz * 1.22, 0.018);
            makeDisk(group, v(0, 0.014, 0), red, rx, rz, 0.022);
            return group;
        }

        function label(text, position, options = {}) {
            return addLabel(text, position, {
                fontSize: options.fontSize || '24px',
                bold: options.bold || false,
                offset: options.offset || [0, 0],
                color: options.color || '#111',
                background: options.background
            });
        }

        function caption(text, position, offset = [0, 0]) {
            const entry = addLabel(text, position, { fontSize: '24px', bold: true, offset });
            entry.div.style.fontStyle = 'normal';
            return entry;
        }

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        // Panel (a): the original 1D construction, drawn as a flat 3D object.
        // Moving a slides the red sample and updates l_out(a) on the green line.
        const left = new THREE.Group();
        scene.add(left);
        const leftN = v(-4.95, 0, 0);
        const leftN1 = v(-2.35, 0, 0);
        const leftTopN = v(leftN.x, 1.35, 0);
        const leftTopN1 = v(leftN1.x, 1.68, 0);

        makeCylinderLine(left, leftN, leftN1, 0.012, black);
        makeCylinderLine(left, leftN, leftTopN, 0.012, black);
        makeCylinderLine(left, leftN1, leftTopN1, 0.012, black);
        makeCylinderLine(left, leftTopN, leftTopN1, 0.022, green);
        makeDisk(left, leftN, black, 0.14, 0.06);
        makeDisk(left, leftN1, black, 0.14, 0.06);
        makeDisk(left, leftTopN, black, 0.075, 0.04);
        makeDisk(left, leftTopN1, black, 0.075, 0.04);

        const leftDashedA = makeDashedLine(left, v(-3.35, 0, 0), v(-3.35, 1, 0), black, 0.11, 0.07);
        const leftBaseA = makeRedMarker(left, v(-3.35, 0, 0), 0.15, 0.07);
        const leftOutA = makeRedMarker(left, v(-3.35, 1.55, 0), 0.085, 0.042);
        registerInteractive(leftOutA, {
            title: 'Linear interpolation',
            tooltip: 'l_out(a) lies between the two input samples.',
            body: 'The red point is a weighted average of l_in[n] and l_in[n+1]. The slider a changes those weights.'
        });

        label('&ell;<sub>in</sub>[n]', v(leftTopN.x - 0.18, leftTopN.y + 0.12, 0), { offset: [-8, -3] });
        label('&ell;<sub>in</sub>[n+1]', v(leftTopN1.x + 0.02, leftTopN1.y + 0.16, 0), { offset: [12, -2] });
        label('n', v(leftN.x, -0.18, 0), { offset: [0, 8] });
        label('n+1', v(leftN1.x, -0.18, 0), { offset: [6, 8] });
        const leftLabelA = label('a', v(-3.35, -0.18, 0), { offset: [0, 8] });
        const leftLabelOutA = label('&ell;<sub>out</sub>(a)', v(-3.35, 1.72, 0), { offset: [-18, -8] });
        caption('(a) Linear interpolation', v(-3.65, -0.55, 0), [0, 26]);

        // Panel (b): four input samples form a bilinear height patch over one image cell.
        // Green cross-sections show the two 1D interpolations used to get l_out(a,b).
        const right = new THREE.Group();
        scene.add(right);
        const x0 = -0.85;
        const x1 = 2.85;
        const z0 = 0;
        const z1 = 1.35;
        const baseY = 0;
        const h00 = 1.48;
        const h10 = 1.78;
        const h01 = 3.26;
        const h11 = 2.52;

        function bilinearHeight(u, w) {
            const low = lerp(h00, h10, u);
            const high = lerp(h01, h11, u);
            return lerp(low, high, w);
        }

        function patchPoint(u, w) {
            return v(lerp(x0, x1, u), bilinearHeight(u, w), lerp(z0, z1, w));
        }

        function basePoint(u, w) {
            return v(lerp(x0, x1, u), baseY, lerp(z0, z1, w));
        }

        function makePatchGeometry(segments = 18) {
            const positions = [];
            const indices = [];
            for (let j = 0; j <= segments; j++) {
                const w = j / segments;
                for (let i = 0; i <= segments; i++) {
                    const u = i / segments;
                    const p = patchPoint(u, w);
                    positions.push(p.x, p.y, p.z);
                }
            }
            for (let j = 0; j < segments; j++) {
                for (let i = 0; i < segments; i++) {
                    const a = j * (segments + 1) + i;
                    const b = a + 1;
                    const c = a + segments + 1;
                    const d2 = c + 1;
                    indices.push(a, c, b, b, c, d2);
                }
            }
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setIndex(indices);
            geometry.computeVertexNormals();
            return geometry;
        }

        const patch = new THREE.Mesh(
            makePatchGeometry(),
            makeMaterial(0x90f58a, { transparent: true, opacity: 0.43, side: THREE.DoubleSide, depthWrite: false })
        );
        right.add(patch);
        registerInteractive(patch, {
            title: 'Bilinear surface',
            tooltip: 'Every point on this green patch is a bilinear blend of four samples.',
            body: 'First interpolate along n at m and m+1; then interpolate between those two intermediate values along m.'
        });

        const p00 = patchPoint(0, 0);
        const p10 = patchPoint(1, 0);
        const p01 = patchPoint(0, 1);
        const p11 = patchPoint(1, 1);

        makeCylinderLine(right, basePoint(0, 0), basePoint(1, 0), 0.013, black);
        makeCylinderLine(right, basePoint(1, 0), basePoint(1, 1), 0.013, black);
        makeCylinderLine(right, basePoint(0, 1), basePoint(1, 1), 0.013, black);
        makeCylinderLine(right, basePoint(0, 0), basePoint(0, 1), 0.013, black);

        makeCylinderLine(right, basePoint(0, 0), p00, 0.012, black);
        makeCylinderLine(right, basePoint(1, 0), p10, 0.012, black);
        makeCylinderLine(right, basePoint(0, 1), p01, 0.012, black);
        makeCylinderLine(right, basePoint(1, 1), p11, 0.012, black);

        makeCylinderLine(right, p00, p10, 0.025, green);
        makeCylinderLine(right, p01, p11, 0.025, green);
        makeCylinderLine(right, p00, p01, 0.025, green);
        makeCylinderLine(right, p10, p11, 0.025, green);

        for (const p of [basePoint(0, 0), basePoint(1, 0), basePoint(0, 1), basePoint(1, 1)]) {
            makeDisk(right, p, black, 0.16, 0.065);
        }
        for (const p of [p00, p10, p01, p11]) {
            makeDisk(right, p, black, 0.085, 0.042);
        }

        const dynamic = {
            lineNB: makeCylinderLine(right, patchPoint(0, 0.52), patchPoint(1, 0.52), 0.023, green),
            lineA: makeCylinderLine(right, patchPoint(0.62, 0), patchPoint(0.62, 1), 0.023, green),
            redVertical: makeCylinderLine(right, basePoint(0.62, 0.52), patchPoint(0.62, 0.52), 0.011, red),
            guideNB: makeDashedLine(right, basePoint(0, 0.52), patchPoint(0, 0.52), black, 0.12, 0.075),
            guideABX: makeDashedLine(right, basePoint(0, 0.52), basePoint(0.62, 0.52), black, 0.12, 0.075),
            guideABZ: makeDashedLine(right, basePoint(0.62, 0), basePoint(0.62, 0.52), black, 0.12, 0.075),
            guideAM: makeDashedLine(right, basePoint(0.62, 0), patchPoint(0.62, 0), black, 0.12, 0.075),
            guideAM1: makeDashedLine(right, basePoint(0.62, 1), patchPoint(0.62, 1), guideGray, 0.12, 0.075),
            redBase: makeRedMarker(right, basePoint(0.62, 0.52), 0.15, 0.07),
            redOut: makeRedMarker(right, patchPoint(0.62, 0.52), 0.105, 0.048),
            redAM1: makeRedMarker(right, patchPoint(0.62, 1), 0.09, 0.04)
        };

        registerInteractive(dynamic.redOut, {
            title: 'Output sample l_out(a,b)',
            tooltip: 'This is the bilinear value at the fractional coordinate (a,b).',
            body: 'The red vertical line lifts the image-plane location (a,b) to the interpolated output value on the green surface.'
        });
        registerInteractive(dynamic.lineA, {
            title: 'Second interpolation',
            tooltip: 'This green segment interpolates between the two intermediate values.',
            body: 'After finding values at a on the front and back sample rows, bilinear interpolation blends between them using b.'
        });
        registerInteractive(dynamic.lineNB, {
            title: 'Row interpolation',
            tooltip: 'This green segment shows the row at the current b.',
            body: 'For a fixed b, moving horizontally along this line changes the weight between the n and n+1 samples.'
        });

        label('&ell;<sub>in</sub>[n,m]', p00.clone().add(v(-0.10, 0.04, 0)), { offset: [-42, -4] });
        label('&ell;<sub>in</sub>[n+1,m]', p10.clone().add(v(0.05, 0.02, 0)), { offset: [52, 1] });
        label('&ell;<sub>in</sub>[n,m+1]', p01.clone().add(v(0, 0.12, 0)), { offset: [-22, -16] });
        label('&ell;<sub>in</sub>[n+1,m+1]', p11.clone().add(v(0.08, 0.13, 0)), { offset: [72, -10] });
        label('n,m', basePoint(0, 0).clone().add(v(-0.07, -0.18, 0)), { offset: [-16, 10] });
        label('n+1,m', basePoint(1, 0).clone().add(v(0.04, -0.16, 0)), { offset: [28, 10] });
        label('n,m+1', basePoint(0, 1).clone().add(v(0.02, -0.12, 0)), { offset: [22, 15] });
        label('n+1,m+1', basePoint(1, 1).clone().add(v(0.05, -0.12, 0)), { offset: [45, 15] });

        const labelNB = label('&ell;<sub>out</sub>(n,b)', patchPoint(0, 0.52).clone().add(v(0, 0.08, 0)), { offset: [-72, -13] });
        const labelAM1 = label('&ell;<sub>out</sub>(a,m+1)', patchPoint(0.62, 1).clone().add(v(0, 0.08, 0)), { offset: [54, -20] });
        const labelAB = label('&ell;<sub>out</sub>(a,b)', patchPoint(0.62, 0.52).clone().add(v(0, 0.10, 0)), { offset: [-45, -22] });
        const labelBaseAB = label('(a,b)', basePoint(0.62, 0.52).clone().add(v(0, -0.12, 0)), { offset: [36, 20] });
        caption('(b) Bilinear interpolation', v(0.98, -0.55, 0.6), [0, 28]);

        function updateInterpolation() {
            const u = parseFloat(document.getElementById('aSlider').value);
            const w = parseFloat(document.getElementById('bSlider').value);

            const leftX = lerp(leftN.x, leftN1.x, u);
            const leftY = lerp(leftTopN.y, leftTopN1.y, u);
            const leftBase = v(leftX, 0, 0);
            const leftTop = v(leftX, leftY, 0);
            updateDashedLine(leftDashedA, leftBase, leftTop);
            leftBaseA.position.copy(leftBase);
            leftOutA.position.copy(leftTop);
            leftLabelA.pos.copy(leftBase.clone().add(v(0, -0.18, 0)));
            leftLabelOutA.pos.copy(leftTop.clone().add(v(0, 0.16, 0)));

            const pNB = patchPoint(0, w);
            const p1B = patchPoint(1, w);
            const pAM = patchPoint(u, 0);
            const pAM1 = patchPoint(u, 1);
            const pAB = patchPoint(u, w);
            const bAB = basePoint(u, w);
            const bNB = basePoint(0, w);
            const bAM = basePoint(u, 0);
            const bAM1 = basePoint(u, 1);

            setCylinderEnds(dynamic.lineNB, pNB, p1B);
            setCylinderEnds(dynamic.lineA, pAM, pAM1);
            setCylinderEnds(dynamic.redVertical, bAB, pAB);
            updateDashedLine(dynamic.guideNB, bNB, pNB);
            updateDashedLine(dynamic.guideABX, bNB, bAB);
            updateDashedLine(dynamic.guideABZ, bAM, bAB);
            updateDashedLine(dynamic.guideAM, bAM, pAM);
            updateDashedLine(dynamic.guideAM1, bAM1, pAM1);
            dynamic.redBase.position.copy(bAB);
            dynamic.redOut.position.copy(pAB);
            dynamic.redAM1.position.copy(pAM1);

            labelNB.pos.copy(pNB.clone().add(v(0, 0.08, 0)));
            labelAM1.pos.copy(pAM1.clone().add(v(0, 0.08, 0)));
            labelAB.pos.copy(pAB.clone().add(v(0, 0.10, 0)));
            labelBaseAB.pos.copy(bAB.clone().add(v(0, -0.12, 0)));
        }

        document.getElementById('aSlider').addEventListener('input', updateInterpolation);
        document.getElementById('bSlider').addEventListener('input', updateInterpolation);
        updateInterpolation();

        setCameraView({
            projection: 'orthographic',
            azimuthDeg: 74,
            elevationDeg: 11,
            rollDeg: 0,
            zoom: 1.16,
            target: [-0.78, 1.20, 0.42],
            heightFraction: 0.72,
            distanceScale: 1.15
        });

        let _firstFrame = true;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            _syncLabels();
            if (_firstFrame) { _firstFrame = false; window.__markRendered?.(); }
        }

        new ResizeObserver(() => {
            const w = canvas.clientWidth || window.innerWidth;
            const h = canvas.clientHeight || window.innerHeight;
            aspect = w / h;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h, false);
        }).observe(canvas);

        animate();
    </script>
</body>

</html>
