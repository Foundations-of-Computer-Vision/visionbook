<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Accidental Wall vs Pinhole Camera</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: #e8f0ff;
            color: #0f172a;
        }

        #ui {
            position: absolute;
            top: 1rem;
            left: 1rem;
            width: 360px;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 0.75rem;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.2);
            z-index: 5;
        }

        #ui h1 {
            margin: 0 0 0.5rem 0;
            font-size: 1.2rem;
        }

        #ui p {
            margin: 0 0 0.75rem 0;
            font-size: 0.9rem;
            min-height: 2.5rem;
        }

        .control-row {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        button {
            flex: 1 1 150px;
            border: none;
            border-radius: 0.5rem;
            padding: 0.45rem 0.6rem;
            background: #2563eb;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1e40af;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
        }

        #apertureValue {
            font-variant-numeric: tabular-nums;
        }

        canvas {
            display: block;
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
</head>

<body>
    <div id="ui">
        <h1>Accidental Wall vs Pinhole Camera</h1>
        <p id="message">Without an aperture, rays from many directions smear together on the wall.</p>
        <div class="control-row">
            <button id="toggleBarrier">Hide Barrier</button>
            <button id="toggleDiffuse">Hide Mixed Rays</button>
            <button id="toggleFocused">Hide Pinhole Rays</button>
        </div>
        <div>
            <label>Aperture radius: <span id="apertureValue">0.35</span></label>
            <input id="aperture" type="range" min="0.2" max="1" step="0.05" value="0.35" />
        </div>
        <div class="control-row" style="margin-top:0.5rem;">
            <button id="demoStep">Guided Demo Step</button>
            <button id="resetView">Reset to textbook view</button>
        </div>
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xeef4ff);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(10, 6, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(1, 2, 0);
        controls.enableDamping = true;

        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(-4, 8, 5);
        scene.add(sun);

        const groundMat = new THREE.MeshStandardMaterial({ color: 0xdfe7ff, roughness: 0.9, metalness: 0 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        scene.add(ground);

        function createLabel(text, position) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(15,23,42,0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 48px "Segoe UI"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            sprite.position.copy(position);
            sprite.scale.set(2.2, 1.1, 1);
            return sprite;
        }

        function createTree(position) {
            // Cylinders and spheres approximate the textbook tree silhouette in 3D.
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.4, 2.2, 12),
                new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
            );
            trunk.position.set(position.x, position.y + 1.1, position.z);

            const canopyMaterial = new THREE.MeshStandardMaterial({ color: 0x2dd16c, roughness: 0.6 });
            const canopy = new THREE.Group();
            const spheres = [
                new THREE.SphereGeometry(1.3, 24, 16),
                new THREE.SphereGeometry(1.1, 24, 16),
                new THREE.SphereGeometry(1.0, 24, 16)
            ];
            const offsets = [new THREE.Vector3(0, 2.3, 0), new THREE.Vector3(-0.8, 2, 0.5), new THREE.Vector3(0.9, 1.9, -0.4)];
            spheres.forEach((geo, idx) => {
                const blob = new THREE.Mesh(geo, canopyMaterial);
                blob.position.copy(position.clone().add(offsets[idx]));
                canopy.add(blob);
            });

            const tree = new THREE.Group();
            tree.add(trunk, canopy);
            return tree;
        }

        const tree = createTree(new THREE.Vector3(-4, 0, 0));
        scene.add(tree);
        scene.add(createLabel('Tree (scene)', new THREE.Vector3(-4, 4.2, 0)));

        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });
        const wall = new THREE.Mesh(new THREE.PlaneGeometry(7, 6), wallMaterial);
        wall.position.set(4, 3, 0);
        wall.rotation.y = -Math.PI / 2;
        scene.add(wall);
        scene.add(createLabel('Wall', new THREE.Vector3(4.4, 5.3, 0)));

        const wallHighlight = new THREE.Mesh(
            new THREE.PlaneGeometry(1.6, 1.6),
            new THREE.MeshBasicMaterial({ color: 0xfff3c4, transparent: true, opacity: 0.6 })
        );
        wallHighlight.position.set(3.95, 3, 0);
        wallHighlight.rotation.y = -Math.PI / 2;
        scene.add(wallHighlight);

        const barrierGroup = new THREE.Group();
        const barrier = new THREE.Mesh(
            new THREE.PlaneGeometry(5, 5),
            new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.8, metalness: 0 })
        );
        barrier.position.set(0, 2.5, 0);
        barrier.rotation.y = -Math.PI / 2;
        barrierGroup.add(barrier);

        const holeGeometry = new THREE.CylinderGeometry(0.25, 0.25, 0.25, 32);
        holeGeometry.rotateZ(Math.PI / 2);
        const holeMaterial = new THREE.MeshStandardMaterial({ color: 0xfbbf24, emissive: 0xf59e0b, emissiveIntensity: 0.4 });
        const hole = new THREE.Mesh(holeGeometry, holeMaterial);
        hole.position.set(0.02, 1.5, 0);
        barrierGroup.add(hole);

        scene.add(barrierGroup);
        scene.add(createLabel('Pinhole barrier', new THREE.Vector3(0.2, 5, 0)));

        const diffuseGroup = new THREE.Group();
        scene.add(diffuseGroup);

        const diffuseWallPoint = new THREE.Vector3(3.95, 2.3, 0);
        const diffuseOrigins = [
            new THREE.Vector3(-4, 0.8, -1.2),
            new THREE.Vector3(-4, 1.8, 0.4),
            new THREE.Vector3(-4, 2.6, 1.2)
        ];
        const diffuseColors = [0x00c853, 0xaa00ff, 0xff7043];

        diffuseOrigins.forEach((origin, idx) => {
            // These lines show how rays from different parts of the tree hit the same wall spot without a pinhole.
            const geom = new THREE.BufferGeometry().setFromPoints([origin, diffuseWallPoint]);
            const mat = new THREE.LineBasicMaterial({ color: diffuseColors[idx], linewidth: 2 });
            const line = new THREE.Line(geom, mat);
            diffuseGroup.add(line);
        });

        const diffuseSpot = new THREE.Mesh(
            new THREE.SphereGeometry(0.12, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0x1e3a8a })
        );
        diffuseSpot.position.copy(diffuseWallPoint);
        scene.add(diffuseSpot);

        const focusedGroup = new THREE.Group();
        scene.add(focusedGroup);

        const treeSamples = [
            new THREE.Vector3(-4, 0.9, -1.0),
            new THREE.Vector3(-4, 1.8, 0.1),
            new THREE.Vector3(-4, 2.7, 1.0)
        ];
        const uniqueTargets = [
            new THREE.Vector3(3.95, 0.9, -1.0),
            new THREE.Vector3(3.95, 1.8, 0.1),
            new THREE.Vector3(3.95, 2.7, 1.0)
        ];
        const holeCenter = new THREE.Vector3(0.02, 1.5, 0);
        const holeOffsets = [
            new THREE.Vector2(-0.7, -0.5),
            new THREE.Vector2(0, 0),
            new THREE.Vector2(0.7, 0.5)
        ];
        const blurTarget = new THREE.Vector3(3.95, 2.2, 0);
        const focusedLines = [];

        const minRadius = 0.2;
        const maxRadius = 1;
        let currentRadius = 0.35;

        treeSamples.forEach((origin, idx) => {
            // Each polyline contains the tree point, the pinhole, and the matching wall point.
            const geom = new THREE.BufferGeometry();
            const mat = new THREE.LineBasicMaterial({ color: 0x22d3ee, linewidth: 2 });
            const line = new THREE.Line(geom, mat);
            line.userData = {
                treePoint: origin.clone(),
                uniqueTarget: uniqueTargets[idx].clone(),
                blurTarget: blurTarget.clone(),
                holeOffset: holeOffsets[idx].clone()
            };
            focusedGroup.add(line);
            focusedLines.push(line);
        });

        function updateFocusedRays(radius) {
            currentRadius = radius;
            const t = (radius - minRadius) / (maxRadius - minRadius);
            focusedLines.forEach((line) => {
                const { treePoint, uniqueTarget, blurTarget, holeOffset } = line.userData;
                const holePoint = new THREE.Vector3(
                    holeCenter.x,
                    holeCenter.y + holeOffset.x * radius,
                    holeCenter.z + holeOffset.y * radius
                );
                const target = uniqueTarget.clone().lerp(blurTarget, t);
                const points = [treePoint.clone(), holePoint, target];
                line.geometry.setFromPoints(points);
            });
            hole.scale.set(radius / 0.25, radius / 0.25, radius / 0.25);
            document.getElementById('apertureValue').textContent = radius.toFixed(2);
        }

        updateFocusedRays(currentRadius);

        scene.add(createLabel('Diffuse mixing', diffuseWallPoint.clone().add(new THREE.Vector3(0, 1.4, 0))));
        scene.add(createLabel('Focused image', new THREE.Vector3(3.95, 4.4, 1.1)));

        const state = {
            barrierVisible: true,
            diffuseVisible: true,
            focusedVisible: true
        };

        const message = document.getElementById('message');
        const toggleBarrierBtn = document.getElementById('toggleBarrier');
        const toggleDiffuseBtn = document.getElementById('toggleDiffuse');
        const toggleFocusedBtn = document.getElementById('toggleFocused');
        const apertureSlider = document.getElementById('aperture');
        const demoButton = document.getElementById('demoStep');
        const resetButton = document.getElementById('resetView');

        function syncUI() {
            barrierGroup.visible = state.barrierVisible;
            toggleBarrierBtn.textContent = state.barrierVisible ? 'Hide Barrier' : 'Show Barrier';

            diffuseGroup.visible = state.diffuseVisible;
            diffuseSpot.visible = state.diffuseVisible;
            toggleDiffuseBtn.textContent = state.diffuseVisible ? 'Hide Mixed Rays' : 'Show Mixed Rays';

            focusedGroup.visible = state.focusedVisible;
            toggleFocusedBtn.textContent = state.focusedVisible ? 'Hide Pinhole Rays' : 'Show Pinhole Rays';
        }

        syncUI();

        function resetView() {
            state.barrierVisible = true;
            state.diffuseVisible = true;
            state.focusedVisible = true;
            apertureSlider.value = 0.35;
            updateFocusedRays(0.35);
            camera.position.set(10, 6, 10);
            controls.target.set(1, 2, 0);
            controls.update();
            message.textContent = 'Both scenarios are visible again—compare how the rays behave.';
            syncUI();
        }

        resetButton.addEventListener('click', resetView);

        toggleBarrierBtn.addEventListener('click', () => {
            state.barrierVisible = !state.barrierVisible;
            message.textContent = state.barrierVisible
                ? 'Barrier inserted: only rays through the pinhole continue.'
                : 'Without the barrier, the wall just averages every direction.';
            syncUI();
        });

        toggleDiffuseBtn.addEventListener('click', () => {
            state.diffuseVisible = !state.diffuseVisible;
            message.textContent = state.diffuseVisible
                ? 'Mixed rays are visible again on the wall area.'
                : 'Mixed rays hidden so you can focus on the pinhole behavior.';
            syncUI();
        });

        toggleFocusedBtn.addEventListener('click', () => {
            state.focusedVisible = !state.focusedVisible;
            message.textContent = state.focusedVisible
                ? 'Focused rays illustrate how each scene point finds its own wall point.'
                : 'Focused rays hidden—observe only the diffuse mixing.';
            syncUI();
        });

        apertureSlider.addEventListener('input', (event) => {
            const radius = parseFloat(event.target.value);
            updateFocusedRays(radius);
            message.textContent = radius < 0.4
                ? 'Tiny aperture: rays barely spread, so the image stays sharp.'
                : 'Wide aperture: extra rays sneak through and smear the image.';
        });

        const demoSteps = [
            {
                text: 'Step 1: No barrier. All rays flood the wall, erasing detail.',
                action: () => {
                    state.barrierVisible = false;
                    state.diffuseVisible = true;
                    state.focusedVisible = false;
                    syncUI();
                }
            },
            {
                text: 'Step 2: Insert the pinhole barrier to block stray directions.',
                action: () => {
                    state.barrierVisible = true;
                    state.diffuseVisible = true;
                    state.focusedVisible = false;
                    syncUI();
                }
            },
            {
                text: 'Step 3: Only rays aligned with the hole reach the wall, forming an inverted image.',
                action: () => {
                    state.barrierVisible = true;
                    state.diffuseVisible = false;
                    state.focusedVisible = true;
                    syncUI();
                }
            }
        ];
        let demoIndex = 0;

        demoButton.addEventListener('click', () => {
            const step = demoSteps[demoIndex];
            step.action();
            message.textContent = step.text;
            demoIndex = (demoIndex + 1) % demoSteps.length;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>

</html>
