<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive BRDF Visualization</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }

        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }

        button {
            margin: 5px;
        }
    </style>
</head>

<body>
    <div id="info">
        <p><strong>Interactive BRDF Visualization</strong></p>
        <p>Use the controls to explore the concept of light reflection and BRDF.</p>
    </div>
    <div id="controls">
        <button id="resetView">Reset to Textbook View</button>
        <button id="toggleIncident">Toggle Incident Light</button>
        <button id="toggleOutgoing">Toggle Outgoing Light</button>
        <button id="startDemo">Start Guided Demo</button>
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // OrbitControls for interactivity
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Light setup
        const ambientLight = new THREE.AmbientLight(0x404040, 1); // Soft ambient light
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        // Plane (Surface)
        const planeGeometry = new THREE.PlaneGeometry(10, 10);
        const planeMaterial = new THREE.MeshStandardMaterial({ color: 0x00ff00, side: THREE.DoubleSide });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);

        // Normal Vector
        const normalDir = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0.01, 0), 2, 0x000000);
        scene.add(normalDir);

        // Incident Light Ray
        const incidentRay = new THREE.ArrowHelper(new THREE.Vector3(-1, -1, 0).normalize(), new THREE.Vector3(0, 2, 0), 3, 0xffa500);
        scene.add(incidentRay);

        // Outgoing Light Ray
        const outgoingRay = new THREE.ArrowHelper(new THREE.Vector3(1, 1, 0).normalize(), new THREE.Vector3(0, 2, 0), 3, 0x00ffff);
        scene.add(outgoingRay);

        // Labels
        const createLabel = (text, position) => {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            context.font = '24px Arial';
            context.fillStyle = 'white';
            context.fillText(text, 0, 24);

            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(2, 1, 1);
            sprite.position.copy(position);
            return sprite;
        };

        const labelP = createLabel('p', new THREE.Vector3(-3.5, 2.5, 0));
        const labelN = createLabel('n', new THREE.Vector3(0, 3, 0));
        const labelQ = createLabel('q', new THREE.Vector3(3.5, 2.5, 0));

        scene.add(labelP, labelN, labelQ);

        // Camera position
        camera.position.set(5, 5, 10);
        camera.lookAt(0, 0, 0);

        // Interaction logic
        const toggleVisibility = (object) => {
            object.visible = !object.visible;
        };

        document.getElementById('resetView').addEventListener('click', () => {
            camera.position.set(5, 5, 10);
            camera.lookAt(0, 0, 0);
            controls.reset();
        });

        document.getElementById('toggleIncident').addEventListener('click', () => {
            toggleVisibility(incidentRay);
        });

        document.getElementById('toggleOutgoing').addEventListener('click', () => {
            toggleVisibility(outgoingRay);
        });

        document.getElementById('startDemo').addEventListener('click', () => {
            let step = 0;
            const steps = [
                () => {
                    alert('Step 1: Observe the incident light ray (orange) hitting the surface.');
                },
                () => {
                    alert('Step 2: Notice the surface normal (black arrow) perpendicular to the surface.');
                },
                () => {
                    alert('Step 3: Observe the outgoing light ray (cyan) reflected from the surface.');
                },
                () => {
                    alert('Step 4: The angle of incidence equals the angle of reflection.');
                }
            ];

            const nextStep = () => {
                if (step < steps.length) {
                    steps[step]();
                    step++;
                } else {
                    alert('Demo complete!');
                }
            };

            nextStep();
        });

        // Animation loop
        const animate = () => {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        };

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
