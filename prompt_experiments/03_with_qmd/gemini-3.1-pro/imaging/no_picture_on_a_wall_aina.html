<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinhole Camera Interactive</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            max-width: 300px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        p {
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        button {
            display: block;
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border: none;
            border-radius: 4px;
            background: #007bff;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        button:hover {
            background: #0056b3;
        }

        button.active {
            background: #28a745;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <div id="ui-container">
        <h2>Pinhole Image Formation</h2>
        <p id="desc">Explore why an aperture is needed to form an image on a surface. Without a pinhole, light rays mix
            completely.</p>

        <button id="btn-no-pinhole">Step 1: No Pinhole (Blur)</button>
        <button id="btn-pinhole">Step 2: Pinhole Added (Image)</button>
        <button id="btn-reset" style="background: #6c757d; margin-top: 15px;">Reset View</button>
    </div>

    <div id="instructions">Left Click + Drag to Rotate • Scroll to Zoom • Right Click + Drag to Pan</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#222');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(-25, 10, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 5, 0);

        // --- Lighting ---
        const ambLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- Core Geometries ---

        // 1. The Tree (Object emitting/reflecting light)
        // Placed at z = 10
        const treeGroup = new THREE.Group();
        treeGroup.position.set(0, 0, 15);

        // Trunk
        const trunkGeo = new THREE.CylinderGeometry(0.8, 1.2, 4, 8);
        const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5c4033 });
        const trunk = new THREE.Mesh(trunkGeo, trunkMat);
        trunk.position.y = 2;
        treeGroup.add(trunk);

        // Leaves
        const leavesGeo = new THREE.SphereGeometry(3, 16, 16);
        const leavesMat = new THREE.MeshLambertMaterial({ color: 0x228b22 });
        const leaves = new THREE.Mesh(leavesGeo, leavesMat);
        leaves.position.y = 6;
        treeGroup.add(leaves);

        const leavesGeo2 = new THREE.SphereGeometry(2.5, 16, 16);
        const leaves2 = new THREE.Mesh(leavesGeo2, leavesMat);
        leaves2.position.set(-2, 5, 0);
        treeGroup.add(leaves2);

        const leavesGeo3 = new THREE.SphereGeometry(2.5, 16, 16);
        const leaves3 = new THREE.Mesh(leavesGeo3, leavesMat);
        leaves3.position.set(2, 5, 0);
        treeGroup.add(leaves3);

        scene.add(treeGroup);

        // 2. The Wall (Projection surface)
        // Placed at z = -15
        const wallGeo = new THREE.PlaneGeometry(30, 20);
        const wallMat = new THREE.MeshLambertMaterial({ color: 0xeeeeee, side: THREE.DoubleSide });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(0, 5, -15);
        scene.add(wall);

        // Add grid helper to wall for scale
        const gridHelper = new THREE.GridHelper(30, 10, 0xcccccc, 0xcccccc);
        gridHelper.rotation.x = Math.PI / 2;
        gridHelper.position.set(0, 5, -14.9);
        scene.add(gridHelper);

        // 3. The Pinhole Barrier
        // Placed at z = 0
        const barrierGroup = new THREE.Group();
        barrierGroup.position.set(0, 5, 0);

        // Create a plane with a hole
        const shape = new THREE.Shape();
        shape.moveTo(-15, -10);
        shape.lineTo(15, -10);
        shape.lineTo(15, 10);
        shape.lineTo(-15, 10);
        shape.lineTo(-15, -10);

        const hole = new THREE.Path();
        hole.absarc(0, 0, 0.5, 0, Math.PI * 2, false);
        shape.holes.push(hole);

        const barrierGeo = new THREE.ShapeGeometry(shape);
        const barrierMat = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
        const barrier = new THREE.Mesh(barrierGeo, barrierMat);
        barrierGroup.add(barrier);
        scene.add(barrierGroup);
        barrierGroup.visible = false; // Hidden initially


        // --- Ray Logic ---
        // Source points on the tree to cast rays from
        const sources = [
            { pos: new THREE.Vector3(0, 9, 15), color: 0x4ade80 }, // Top leaf
            { pos: new THREE.Vector3(-3, 6, 15), color: 0x22c55e }, // Left leaf
            { pos: new THREE.Vector3(3, 6, 15), color: 0x16a34a },  // Right leaf
            { pos: new THREE.Vector3(0, 2, 15), color: 0xa16207 }   // Trunk
        ];

        const raysGroup = new THREE.Group();
        const dotsGroup = new THREE.Group();
        scene.add(raysGroup);
        scene.add(dotsGroup);

        // Material for rays
        const lineMat = new THREE.LineBasicMaterial({ transparent: true, opacity: 0.6 });

        // Function to draw a line
        function drawRay(start, end, colorHex) {
            const mat = lineMat.clone();
            mat.color.setHex(colorHex);
            const geo = new THREE.BufferGeometry().setFromPoints([start, end]);
            const line = new THREE.Line(geo, mat);
            raysGroup.add(line);

            // Add dot on the wall
            const dotGeo = new THREE.CircleGeometry(0.3, 16);
            const dotMat = new THREE.MeshBasicMaterial({ color: colorHex, side: THREE.DoubleSide });
            const dot = new THREE.Mesh(dotGeo, dotMat);
            dot.position.copy(end);
            dot.position.z += 0.1; // slight offset to prevent Z-fighting
            dotsGroup.add(dot);
        }

        function createRaysNoPinhole() {
            raysGroup.clear();
            dotsGroup.clear();

            // In "No Pinhole" mode, light from every point hits EVERYWHERE on the wall.
            // We simulate this by casting rays from each source to random spread points on the wall.
            sources.forEach(src => {
                for (let i = 0; i < 8; i++) {
                    // Random target on the wall
                    const targetX = (Math.random() - 0.5) * 20;
                    const targetY = (Math.random() - 0.5) * 15 + 5;
                    const end = new THREE.Vector3(targetX, targetY, -15);
                    drawRay(src.pos, end, src.color);
                }
            });
        }

        function createRaysPinhole() {
            raysGroup.clear();
            dotsGroup.clear();

            // In "Pinhole" mode, light from a point ONLY reaches the wall passing through (0, 5, 0).
            // Similar triangles: source at z=15, hole at z=0, wall at z=-15.
            // Let hole be (0, 5, 0).
            // Vector from source to hole: H - S.
            // Wall is equal distance away, so target = H + (H - S).

            const holePos = new THREE.Vector3(0, 5, 0);

            sources.forEach(src => {
                const dir = new THREE.Vector3().subVectors(holePos, src.pos);
                const end = new THREE.Vector3().addVectors(holePos, dir); // Project to z=-15

                // Draw a single thick/solid ray
                const mat = new THREE.LineBasicMaterial({ color: src.color, linewidth: 3 });
                const geo = new THREE.BufferGeometry().setFromPoints([src.pos, end]);
                const line = new THREE.Line(geo, mat);
                raysGroup.add(line);

                // Draw result point (larger due to sharpness)
                const dotGeo = new THREE.CircleGeometry(0.8, 16);
                const dotMat = new THREE.MeshBasicMaterial({ color: src.color, side: THREE.DoubleSide });
                const dot = new THREE.Mesh(dotGeo, dotMat);
                dot.position.copy(end);
                dot.position.z += 0.1;
                dotsGroup.add(dot);
            });
        }

        // Initialize with State 1
        createRaysNoPinhole();


        // --- UI Interactions ---
        const btnNoPinhole = document.getElementById('btn-no-pinhole');
        const btnPinhole = document.getElementById('btn-pinhole');
        const btnReset = document.getElementById('btn-reset');
        const descText = document.getElementById('desc');

        btnNoPinhole.classList.add('active');

        btnNoPinhole.addEventListener('click', () => {
            barrierGroup.visible = false;
            createRaysNoPinhole();
            btnNoPinhole.classList.add('active');
            btnPinhole.classList.remove('active');
            descText.innerText = "Without a barrier, light rays from the top of the tree hit the entire wall, mixing with rays from the bottom. The result is a blur, not an image.";
        });

        btnPinhole.addEventListener('click', () => {
            barrierGroup.visible = true;
            createRaysPinhole();
            btnPinhole.classList.add('active');
            btnNoPinhole.classList.remove('active');
            descText.innerText = "The pinhole blocks most rays. Now, rays from the top of the tree only hit the bottom of the wall. An upside-down image is formed!";
        });

        btnReset.addEventListener('click', () => {
            camera.position.set(-25, 10, 20);
            controls.target.set(0, 5, 0);
            controls.update();
            btnNoPinhole.click();
        });


        // --- Render Loop ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>

</body>

</html>
