<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinhole Camera Geometry – Interactive 3D Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        canvas {
            display: block;
        }

        /* ── Controls Panel ───────────────────────────────────── */
        #controls {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(20, 20, 40, 0.92);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 14px 16px;
            width: 290px;
            z-index: 10;
            max-height: calc(100vh - 24px);
            overflow-y: auto;
        }

        #controls h2 {
            font-size: 15px;
            margin-bottom: 8px;
            color: #7ecaff;
        }

        #controls h3 {
            font-size: 12px;
            margin: 10px 0 4px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ctrl-row {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }

        .ctrl-row label {
            flex: 1;
            font-size: 13px;
        }

        .ctrl-row input[type=range] {
            width: 110px;
            accent-color: #7ecaff;
        }

        .ctrl-row .val {
            width: 38px;
            text-align: right;
            font-size: 12px;
            color: #7ecaff;
        }

        button.ctrl-btn {
            display: block;
            width: 100%;
            margin: 4px 0;
            padding: 7px 0;
            background: #2a3a5e;
            color: #cde;
            border: 1px solid #445;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background .15s;
        }

        button.ctrl-btn:hover {
            background: #3a5080;
        }

        button.ctrl-btn.active {
            background: #1a8060;
            border-color: #2ab88a;
        }

        .toggle-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin: 4px 0;
        }

        .toggle-row button {
            flex: 1;
            min-width: 80px;
        }

        /* ── Info box ────────────────────────────────────────── */
        #info {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 40, 0.92);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 13px;
            max-width: 620px;
            text-align: center;
            z-index: 10;
            line-height: 1.45;
        }

        #info .eq {
            color: #7ecaff;
            font-family: 'Cambria Math', 'Times New Roman', serif;
            font-style: italic;
        }

        /* ── Step indicator ──────────────────────────────────── */
        #step-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(20, 20, 40, 0.92);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 10px 14px;
            width: 260px;
            z-index: 10;
            font-size: 13px;
            line-height: 1.5;
        }

        #step-indicator h3 {
            color: #7ecaff;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .step-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #333;
            margin-right: 4px;
            vertical-align: middle;
        }

        .step-dot.done {
            background: #2ab88a;
        }

        .step-dot.current {
            background: #7ecaff;
            animation: pulse .8s infinite alternate;
        }

        @keyframes pulse {
            from {
                box-shadow: 0 0 0 0 rgba(126, 202, 255, .6);
            }

            to {
                box-shadow: 0 0 6px 3px rgba(126, 202, 255, .3);
            }
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>

    <!-- Control panel -->
    <div id="controls">
        <h2>Pinhole Camera Geometry</h2>

        <h3>Point P position</h3>
        <!-- Interactive control 1: Move the 3D point P along X -->
        <div class="ctrl-row"><label>X</label><input type="range" id="ptX" min="-4" max="4" step="0.1" value="2"><span
                class="val" id="ptX-val">2.0</span></div>
        <!-- Interactive control 2: Move the 3D point P along Y -->
        <div class="ctrl-row"><label>Y</label><input type="range" id="ptY" min="-4" max="4" step="0.1" value="3"><span
                class="val" id="ptY-val">3.0</span></div>
        <!-- Interactive control 3: Move the 3D point P along Z (depth) -->
        <div class="ctrl-row"><label>Z</label><input type="range" id="ptZ" min="2" max="12" step="0.1" value="6"><span
                class="val" id="ptZ-val">6.0</span></div>

        <h3>Camera</h3>
        <!-- Interactive control 4: Change focal length f -->
        <div class="ctrl-row"><label>Focal length f</label><input type="range" id="focal" min="0.5" max="4" step="0.1"
                value="2"><span class="val" id="focal-val">2.0</span></div>

        <h3>Visibility</h3>
        <div class="toggle-row">
            <!-- Interactive control 5: Toggle projection / virtual planes -->
            <button class="ctrl-btn active" id="toggleProj">Projection Plane</button>
            <button class="ctrl-btn active" id="toggleVirtual">Virtual Plane</button>
        </div>
        <div class="toggle-row">
            <button class="ctrl-btn active" id="toggleRays">Light Rays</button>
            <button class="ctrl-btn active" id="toggleAxes">World Axes</button>
        </div>

        <h3>Actions</h3>
        <!-- Interactive control 6: Guided step-through demo -->
        <button class="ctrl-btn" id="btnDemo">&#9654; Guided Demo</button>
        <button class="ctrl-btn" id="btnReset">Reset to Textbook View</button>
    </div>

    <!-- Step-through indicator (visible during demo) -->
    <div id="step-indicator" style="display:none;">
        <h3>Guided Demo</h3>
        <div id="step-dots"></div>
        <p id="step-text"></p>
        <button class="ctrl-btn" id="btnNext" style="margin-top:6px;">Next &rarr;</button>
    </div>

    <!-- Info bar at bottom showing projection equations -->
    <div id="info">
        Perspective projection: &nbsp;
        <span class="eq">x = f · X / Z</span> &nbsp; , &nbsp;
        <span class="eq">y = f · Y / Z</span> &nbsp; | &nbsp;
        <span id="eq-values"></span>
    </div>

    <!-- ─── Three.js (ES module) ─────────────────────────────── -->
    <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        /* ================================================================
           SCENE SETUP
           ================================================================ */
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // CSS2D label renderer (overlays HTML labels on 3D scene)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0';
        labelRenderer.domElement.style.pointerEvents = 'none';
        container.appendChild(labelRenderer.domElement);

        // OrbitControls for user camera rotation/zoom
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.12;
        controls.minDistance = 3;
        controls.maxDistance = 30;

        // Soft lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 8, 6);
        scene.add(dirLight);

        /* ================================================================
           CONSTANTS & STATE
           The textbook figure places:
             - Pinhole at origin (0,0,0)
             - Z axis forward (scene depth)
             - Projection plane at Z = -f (behind pinhole)
             - Virtual camera plane at Z = +f (in front of pinhole)
             - 3D point P somewhere at positive Z, with X,Y coords
           ================================================================ */

        const DEFAULT = { X: 2, Y: 3, Z: 6, f: 2 };
        let P = { X: DEFAULT.X, Y: DEFAULT.Y, Z: DEFAULT.Z };
        let f = DEFAULT.f;

        // Textbook camera view
        const TEXTBOOK_CAM = { x: 8, y: 6, z: 10 };

        /* ================================================================
           HELPER: make a label (CSS2DObject)
           ================================================================ */
        function makeLabel(text, color = '#ffffff', fontSize = '13px') {
            const div = document.createElement('div');
            div.style.color = color;
            div.style.fontSize = fontSize;
            div.style.fontFamily = "'Segoe UI', Arial, sans-serif";
            div.style.fontWeight = '600';
            div.style.textShadow = '0 0 4px rgba(0,0,0,.8)';
            div.textContent = text;
            const obj = new CSS2DObject(div);
            return obj;
        }

        /* ================================================================
           BUILD THE 3D SCENE
           Each section maps a 2D figure element to a 3D object.
           ================================================================ */

        // ─── 1. PINHOLE (origin sphere) ──────────────────────────
        // Maps to the small dot at the origin labeled "Pinhole" in the figure.
        const pinholeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const pinholeMesh = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), pinholeMat);
        scene.add(pinholeMesh);
        const lblPinhole = makeLabel('Pinhole (0,0,0)', '#ffffff');
        lblPinhole.position.set(0, -0.35, 0);
        scene.add(lblPinhole);

        // ─── 2. WORLD AXES (X, Y, Z) ────────────────────────────
        // Maps to the world coordinate axes shown in the figure.
        const axesGroup = new THREE.Group();

        function makeAxis(dir, color, label) {
            const len = 6;
            const points = [new THREE.Vector3(0, 0, 0), new THREE.Vector3().copy(dir).multiplyScalar(len)];
            const line = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(points),
                new THREE.LineBasicMaterial({ color, linewidth: 2 })
            );
            axesGroup.add(line);
            // Arrowhead cone
            const cone = new THREE.Mesh(
                new THREE.ConeGeometry(0.08, 0.3, 8),
                new THREE.MeshStandardMaterial({ color })
            );
            cone.position.copy(dir).multiplyScalar(len);
            cone.lookAt(new THREE.Vector3().copy(dir).multiplyScalar(len + 1));
            // Fix cone orientation so it points along the axis
            cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
            axesGroup.add(cone);
            const lbl = makeLabel(label, '#' + color.toString(16).padStart(6, '0'), '14px');
            lbl.position.copy(dir).multiplyScalar(len + 0.4);
            axesGroup.add(lbl);
        }
        makeAxis(new THREE.Vector3(1, 0, 0), 0x44cc44, 'X');  // green like figure
        makeAxis(new THREE.Vector3(0, 1, 0), 0x44cc44, 'Y');
        makeAxis(new THREE.Vector3(0, 0, 1), 0xff4444, 'Z');  // red like figure
        scene.add(axesGroup);

        // Negative Z axis (dashed, toward projection plane)
        const negZPts = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -6)];
        const negZLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(negZPts),
            new THREE.LineDashedMaterial({ color: 0xff4444, dashSize: 0.2, gapSize: 0.15 })
        );
        negZLine.computeLineDistances();
        axesGroup.add(negZLine);

        // ─── 3. PROJECTION PLANE (at Z = -f, behind pinhole) ─────
        // Maps to the grey shaded projection plane on the left of the figure.
        const projPlaneSize = 5;
        const projPlaneMat = new THREE.MeshStandardMaterial({
            color: 0x888888, transparent: true, opacity: 0.25, side: THREE.DoubleSide, depthWrite: false
        });
        const projPlaneMesh = new THREE.Mesh(new THREE.PlaneGeometry(projPlaneSize, projPlaneSize), projPlaneMat);
        const projGroup = new THREE.Group();
        projGroup.add(projPlaneMesh);

        // Border for the projection plane
        const projBorderGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-projPlaneSize / 2, -projPlaneSize / 2, 0),
            new THREE.Vector3(projPlaneSize / 2, -projPlaneSize / 2, 0),
            new THREE.Vector3(projPlaneSize / 2, projPlaneSize / 2, 0),
            new THREE.Vector3(-projPlaneSize / 2, projPlaneSize / 2, 0),
            new THREE.Vector3(-projPlaneSize / 2, -projPlaneSize / 2, 0),
        ]);
        projGroup.add(new THREE.Line(projBorderGeo, new THREE.LineBasicMaterial({ color: 0x999999 })));

        const lblProj = makeLabel('Projection Plane', '#aaaaaa', '12px');
        lblProj.position.set(0, projPlaneSize / 2 + 0.3, 0);
        projGroup.add(lblProj);

        scene.add(projGroup);

        // ─── 4. VIRTUAL CAMERA PLANE (at Z = +f, in front of pinhole) ──
        // Maps to the lighter, semitransparent plane on the right of the figure.
        const virtPlaneMat = new THREE.MeshStandardMaterial({
            color: 0x7ecaff, transparent: true, opacity: 0.18, side: THREE.DoubleSide, depthWrite: false
        });
        const virtPlaneMesh = new THREE.Mesh(new THREE.PlaneGeometry(projPlaneSize, projPlaneSize), virtPlaneMat);
        const virtGroup = new THREE.Group();
        virtGroup.add(virtPlaneMesh);

        const virtBorderGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-projPlaneSize / 2, -projPlaneSize / 2, 0),
            new THREE.Vector3(projPlaneSize / 2, -projPlaneSize / 2, 0),
            new THREE.Vector3(projPlaneSize / 2, projPlaneSize / 2, 0),
            new THREE.Vector3(-projPlaneSize / 2, projPlaneSize / 2, 0),
            new THREE.Vector3(-projPlaneSize / 2, -projPlaneSize / 2, 0),
        ]);
        virtGroup.add(new THREE.Line(virtBorderGeo, new THREE.LineBasicMaterial({ color: 0x7ecaff })));

        const lblVirt = makeLabel('Virtual Camera Plane', '#7ecaff', '12px');
        lblVirt.position.set(0, projPlaneSize / 2 + 0.3, 0);
        virtGroup.add(lblVirt);

        scene.add(virtGroup);

        // ─── 5. FOCAL LENGTH BRACKETS (f labels on Z axis) ──────
        // Maps to the red double-headed arrows labeled "f" in the figure.
        const fLabelFront = makeLabel('f', '#ff6666', '14px');
        scene.add(fLabelFront);
        const fLabelBack = makeLabel('f', '#ff6666', '14px');
        scene.add(fLabelBack);

        // Small tick marks for f
        function makeTick(y) {
            const pts = [new THREE.Vector3(0, -0.15, y), new THREE.Vector3(0, 0.15, y)];
            return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: 0xff4444 }));
        }
        const tickFront = makeTick(0);
        const tickBack = makeTick(0);
        scene.add(tickFront);
        scene.add(tickBack);

        // ─── 6. 3D POINT P ─────────────────────────────────────
        // Maps to the cyan dot labeled P in the upper-right of the figure.
        const ptPMat = new THREE.MeshStandardMaterial({ color: 0x00ddff, emissive: 0x006688 });
        const ptPMesh = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), ptPMat);
        scene.add(ptPMesh);
        const lblP = makeLabel('P', '#00ddff', '16px');
        scene.add(lblP);

        // ─── 7. PROJECTED POINT p ON VIRTUAL PLANE ──────────────
        // Maps to the small cyan dot labeled p on the virtual camera plane.
        const ptpVirtMat = new THREE.MeshStandardMaterial({ color: 0x00ddff, emissive: 0x004466 });
        const ptpVirtMesh = new THREE.Mesh(new THREE.SphereGeometry(0.1, 14, 14), ptpVirtMat);
        scene.add(ptpVirtMesh);
        const lblpVirt = makeLabel('p (virtual)', '#00ddff', '12px');
        scene.add(lblpVirt);

        // ─── 8. PROJECTED POINT p' ON PROJECTION PLANE (inverted) ──
        // Maps to the small cyan dot labeled p on the projection (rear) plane.
        const ptpProjMat = new THREE.MeshStandardMaterial({ color: 0x00ddff, emissive: 0x004466 });
        const ptpProjMesh = new THREE.Mesh(new THREE.SphereGeometry(0.1, 14, 14), ptpProjMat);
        scene.add(ptpProjMesh);
        const lblpProj = makeLabel("p' (proj)", '#aaaaaa', '12px');
        scene.add(lblpProj);

        // ─── 9. LIGHT RAYS (from P through pinhole to projection plane) ──
        // Maps to the dashed grey lines showing the ray path from P through pinhole.
        const rayMat = new THREE.LineDashedMaterial({ color: 0xaaaaaa, dashSize: 0.25, gapSize: 0.15 });
        let rayLine;  // will be rebuilt each frame

        const rayGroup = new THREE.Group();
        scene.add(rayGroup);

        // ─── 10. SIMILAR TRIANGLE helper lines ───────────────────
        // Maps to the colored similar-triangle shading in the similar_triangles figure.
        const triGroup = new THREE.Group();
        scene.add(triGroup);

        // ─── 11. coordinate readout labels on the planes ─────────
        const lblCoordVirt = makeLabel('', '#00ddff', '11px');
        scene.add(lblCoordVirt);
        const lblCoordProj = makeLabel('', '#aaaaaa', '11px');
        scene.add(lblCoordProj);

        /* ================================================================
           UPDATE FUNCTION – reposition everything when P or f changes
           Interaction teaches:  changing P shows how the projected point
           moves; changing f shows how focal length scales the image.
           ================================================================ */
        function updateScene() {
            const x_proj = f * P.X / P.Z;   // perspective projection equation
            const y_proj = f * P.Y / P.Z;

            // Move planes to ±f along Z
            projGroup.position.set(0, 0, -f);
            virtGroup.position.set(0, 0, f);

            fLabelFront.position.set(0.2, -0.3, f / 2);
            fLabelBack.position.set(0.2, -0.3, -f / 2);
            tickFront.position.set(0, 0, f);
            tickBack.position.set(0, 0, -f);

            // 3D point P
            ptPMesh.position.set(P.X, P.Y, P.Z);
            lblP.position.set(P.X, P.Y + 0.35, P.Z);

            // Projected point on virtual plane (same sign as P)
            ptpVirtMesh.position.set(x_proj, y_proj, f);
            lblpVirt.position.set(x_proj, y_proj + 0.3, f);

            // Projected point on real projection plane (inverted)
            ptpProjMesh.position.set(-x_proj, -y_proj, -f);
            lblpProj.position.set(-x_proj, -y_proj + 0.3, -f);

            // Coordinate readouts
            lblCoordVirt.element.textContent = `(${x_proj.toFixed(2)}, ${y_proj.toFixed(2)})`;
            lblCoordVirt.position.set(x_proj, y_proj - 0.3, f);
            lblCoordProj.element.textContent = `(${(-x_proj).toFixed(2)}, ${(-y_proj).toFixed(2)})`;
            lblCoordProj.position.set(-x_proj, -y_proj - 0.3, -f);

            // Light rays: P → pinhole → projection
            while (rayGroup.children.length) rayGroup.remove(rayGroup.children[0]);
            const ptsRay = [
                new THREE.Vector3(P.X, P.Y, P.Z),
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(-x_proj, -y_proj, -f)
            ];
            const rayGeo = new THREE.BufferGeometry().setFromPoints(ptsRay);
            const ray = new THREE.Line(rayGeo, rayMat.clone());
            ray.computeLineDistances();
            rayGroup.add(ray);

            // Second ray to virtual plane (solid)
            const ptsRay2 = [
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(x_proj, y_proj, f)
            ];
            const ray2 = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(ptsRay2),
                new THREE.LineBasicMaterial({ color: 0x7ecaff, linewidth: 1 })
            );
            rayGroup.add(ray2);

            // Similar triangles visualization (X-Z plane)
            while (triGroup.children.length) triGroup.remove(triGroup.children[0]);

            // Triangle 1: small triangle (pinhole-to-virtual-plane) in X-Z plane
            const triSmall = [
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(x_proj, 0, f),
                new THREE.Vector3(0, 0, f),
                new THREE.Vector3(0, 0, 0),
            ];
            const triSmallLine = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(triSmall),
                new THREE.LineBasicMaterial({ color: 0x44cc88, linewidth: 1 })
            );
            triGroup.add(triSmallLine);

            // Triangle 2: large triangle (pinhole-to-P) in X-Z plane
            const triBig = [
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(P.X, 0, P.Z),
                new THREE.Vector3(0, 0, P.Z),
                new THREE.Vector3(0, 0, 0),
            ];
            const triBigLine = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(triBig),
                new THREE.LineBasicMaterial({ color: 0xcc8844, linewidth: 1 })
            );
            triGroup.add(triBigLine);

            // Filled triangles (semi-transparent)
            const triSmallShape = new THREE.BufferGeometry();
            triSmallShape.setAttribute('position', new THREE.Float32BufferAttribute([
                0, 0, 0, x_proj, 0, f, 0, 0, f
            ], 3));
            triSmallShape.computeVertexNormals();
            triGroup.add(new THREE.Mesh(triSmallShape, new THREE.MeshBasicMaterial({
                color: 0x44cc88, transparent: true, opacity: 0.12, side: THREE.DoubleSide, depthWrite: false
            })));

            const triBigShape = new THREE.BufferGeometry();
            triBigShape.setAttribute('position', new THREE.Float32BufferAttribute([
                0, 0, 0, P.X, 0, P.Z, 0, 0, P.Z
            ], 3));
            triBigShape.computeVertexNormals();
            triGroup.add(new THREE.Mesh(triBigShape, new THREE.MeshBasicMaterial({
                color: 0xcc8844, transparent: true, opacity: 0.08, side: THREE.DoubleSide, depthWrite: false
            })));

            // X-dimension labels on triangles
            // Update the equation display
            document.getElementById('eq-values').innerHTML =
                `<span class="eq">x = ${f.toFixed(1)} · ${P.X.toFixed(1)} / ${P.Z.toFixed(1)} = ${x_proj.toFixed(2)}</span> , ` +
                `<span class="eq">y = ${f.toFixed(1)} · ${P.Y.toFixed(1)} / ${P.Z.toFixed(1)} = ${y_proj.toFixed(2)}</span>`;
        }

        /* ================================================================
           SLIDER WIRING
           ================================================================ */
        const sliders = {
            ptX: { target: () => P, key: 'X' },
            ptY: { target: () => P, key: 'Y' },
            ptZ: { target: () => P, key: 'Z' },
        };

        for (const [id, cfg] of Object.entries(sliders)) {
            const el = document.getElementById(id);
            const valEl = document.getElementById(id + '-val');
            el.addEventListener('input', () => {
                cfg.target()[cfg.key] = parseFloat(el.value);
                valEl.textContent = parseFloat(el.value).toFixed(1);
                updateScene();
            });
        }

        // Focal length slider
        const focalSlider = document.getElementById('focal');
        const focalVal = document.getElementById('focal-val');
        focalSlider.addEventListener('input', () => {
            f = parseFloat(focalSlider.value);
            focalVal.textContent = f.toFixed(1);
            updateScene();
        });

        /* ================================================================
           TOGGLE BUTTONS
           Each toggle controls visibility of a scene group to let users
           focus on specific parts of the geometry.
           ================================================================ */
        function wireToggle(btnId, ...objs) {
            const btn = document.getElementById(btnId);
            btn.addEventListener('click', () => {
                const vis = !objs[0].visible;
                objs.forEach(o => o.visible = vis);
                btn.classList.toggle('active', vis);
            });
        }
        wireToggle('toggleProj', projGroup, ptpProjMesh, lblpProj, lblCoordProj);
        wireToggle('toggleVirtual', virtGroup, ptpVirtMesh, lblpVirt, lblCoordVirt);
        wireToggle('toggleRays', rayGroup, triGroup);
        wireToggle('toggleAxes', axesGroup);

        /* ================================================================
           RESET TO TEXTBOOK VIEW
           Restores default slider values and camera position.
           ================================================================ */
        function resetToTextbook() {
            P.X = DEFAULT.X; P.Y = DEFAULT.Y; P.Z = DEFAULT.Z; f = DEFAULT.f;
            document.getElementById('ptX').value = P.X;
            document.getElementById('ptY').value = P.Y;
            document.getElementById('ptZ').value = P.Z;
            document.getElementById('focal').value = f;
            document.getElementById('ptX-val').textContent = P.X.toFixed(1);
            document.getElementById('ptY-val').textContent = P.Y.toFixed(1);
            document.getElementById('ptZ-val').textContent = P.Z.toFixed(1);
            document.getElementById('focal-val').textContent = f.toFixed(1);

            camera.position.set(TEXTBOOK_CAM.x, TEXTBOOK_CAM.y, TEXTBOOK_CAM.z);
            controls.target.set(0, 0, 1);
            controls.update();

            // Make everything visible
            [projGroup, ptpProjMesh, lblpProj, lblCoordProj,
                virtGroup, ptpVirtMesh, lblpVirt, lblCoordVirt,
                rayGroup, triGroup, axesGroup].forEach(o => o.visible = true);
            document.querySelectorAll('.toggle-row .ctrl-btn').forEach(b => b.classList.add('active'));

            updateScene();
        }
        document.getElementById('btnReset').addEventListener('click', resetToTextbook);

        /* ================================================================
           GUIDED DEMO (step-through sequence)
           Teaches the core concepts one step at a time.
           ================================================================ */
        const demoSteps = [
            {
                text: "Step 1: This is the pinhole at the origin. All light rays pass through this single point.",
                action: () => {
                    camera.position.set(3, 2, 4);
                    controls.target.set(0, 0, 0);
                    [projGroup, ptpProjMesh, lblpProj, lblCoordProj,
                        virtGroup, ptpVirtMesh, lblpVirt, lblCoordVirt,
                        rayGroup, triGroup].forEach(o => o.visible = false);
                    axesGroup.visible = true;
                }
            },
            {
                text: "Step 2: The Projection Plane sits behind the pinhole at Z = −f. This is where the inverted image forms.",
                action: () => {
                    projGroup.visible = true;
                    ptpProjMesh.visible = false;
                    lblpProj.visible = false;
                    lblCoordProj.visible = false;
                    camera.position.set(5, 3, -2);
                    controls.target.set(0, 0, -f);
                }
            },
            {
                text: "Step 3: The Virtual Camera Plane sits in front of the pinhole at Z = +f. It gives a non-inverted view.",
                action: () => {
                    virtGroup.visible = true;
                    ptpVirtMesh.visible = false;
                    lblpVirt.visible = false;
                    lblCoordVirt.visible = false;
                    camera.position.set(5, 3, 4);
                    controls.target.set(0, 0, f);
                }
            },
            {
                text: "Step 4: Point P is a 3D point in the scene. A light ray travels from P through the pinhole.",
                action: () => {
                    ptPMesh.visible = true;
                    lblP.visible = true;
                    rayGroup.visible = true;
                    triGroup.visible = false;
                    camera.position.set(TEXTBOOK_CAM.x, TEXTBOOK_CAM.y, TEXTBOOK_CAM.z);
                    controls.target.set(0, 0, 1);
                }
            },
            {
                text: "Step 5: The ray hits the projection plane at p' (inverted) and the virtual plane at p (correct orientation). x = f·X/Z, y = f·Y/Z.",
                action: () => {
                    ptpProjMesh.visible = true; lblpProj.visible = true; lblCoordProj.visible = true;
                    ptpVirtMesh.visible = true; lblpVirt.visible = true; lblCoordVirt.visible = true;
                }
            },
            {
                text: "Step 6: The similar-triangle relationship derives the equations. Green triangle: (0→x, 0→f). Orange triangle: (0→X, 0→Z). Ratio: x/f = X/Z.",
                action: () => {
                    triGroup.visible = true;
                    camera.position.set(0, 8, 5);
                    controls.target.set(1, 0, 3);
                }
            },
            {
                text: "Try it yourself! Drag the sliders to move P or change f and watch how the projection changes. Orbit to explore.",
                action: () => {
                    camera.position.set(TEXTBOOK_CAM.x, TEXTBOOK_CAM.y, TEXTBOOK_CAM.z);
                    controls.target.set(0, 0, 1);
                    [projGroup, ptpProjMesh, lblpProj, lblCoordProj,
                        virtGroup, ptpVirtMesh, lblpVirt, lblCoordVirt,
                        rayGroup, triGroup, axesGroup].forEach(o => o.visible = true);
                    document.querySelectorAll('.toggle-row .ctrl-btn').forEach(b => b.classList.add('active'));
                }
            }
        ];

        let demoActive = false;
        let demoStep = 0;

        function showStep(i) {
            demoStep = i;
            const stepText = document.getElementById('step-text');
            const stepDots = document.getElementById('step-dots');
            stepText.textContent = demoSteps[i].text;
            stepDots.innerHTML = demoSteps.map((_, j) => {
                const cls = j < i ? 'done' : j === i ? 'current' : '';
                return `<span class="step-dot ${cls}"></span>`;
            }).join('');
            demoSteps[i].action();
            controls.update();
            updateScene();
            document.getElementById('btnNext').textContent = i < demoSteps.length - 1 ? 'Next →' : 'Finish';
        }

        document.getElementById('btnDemo').addEventListener('click', () => {
            demoActive = true;
            demoStep = 0;
            document.getElementById('step-indicator').style.display = 'block';
            resetToTextbook();
            showStep(0);
        });

        document.getElementById('btnNext').addEventListener('click', () => {
            if (demoStep < demoSteps.length - 1) {
                showStep(demoStep + 1);
            } else {
                demoActive = false;
                document.getElementById('step-indicator').style.display = 'none';
            }
        });

        /* ================================================================
           GRID HELPER for ground reference
           ================================================================ */
        const grid = new THREE.GridHelper(14, 14, 0x333355, 0x222244);
        grid.position.y = -3;
        scene.add(grid);

        /* ================================================================
           ANIMATION LOOP
           ================================================================ */
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        /* ================================================================
           INIT
           ================================================================ */
        resetToTextbook();
        animate();

        // Responsive
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
