<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orthographic Projection – Interactive 3D Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* ---------- control panel ---------- */
        #panel {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 300px;
            background: rgba(20, 20, 40, .88);
            border-radius: 10px;
            padding: 14px 16px;
            backdrop-filter: blur(6px);
            z-index: 10;
            user-select: none;
            max-height: calc(100vh - 24px);
            overflow-y: auto;
        }

        #panel h2 {
            font-size: 15px;
            margin-bottom: 8px;
            color: #7ecfff;
        }

        #panel p {
            font-size: 12px;
            line-height: 1.45;
            margin-bottom: 8px;
            color: #bbb;
        }

        .ctrl-group {
            margin-bottom: 10px;
        }

        .ctrl-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 3px;
            color: #aaa;
        }

        .ctrl-group input[type=range] {
            width: 100%;
        }

        button.action {
            display: inline-block;
            padding: 5px 10px;
            margin: 3px 3px 3px 0;
            background: #2a5298;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            transition: background .15s;
        }

        button.action:hover {
            background: #3b7ddd;
        }

        button.action.active {
            background: #1db954;
        }

        #step-text {
            font-size: 12px;
            min-height: 48px;
            padding: 6px 8px;
            background: rgba(255, 255, 255, .06);
            border-radius: 6px;
            margin-top: 6px;
            line-height: 1.45;
        }

        /* ---------- info overlay ---------- */
        #info {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #777;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="panel">
        <h2>Orthographic Projection</h2>
        <p>In orthographic projection, parallel rays project the 3D scene onto the
            image plane. Object size is <em>independent</em> of distance&nbsp;Z.
            Equations:&nbsp; x&nbsp;=&nbsp;kX,&nbsp; y&nbsp;=&nbsp;kY.</p>

        <!-- distance slider -->
        <div class="ctrl-group">
            <label>Object distance (Z): <span id="val-dist">6</span></label>
            <input type="range" id="slider-dist" min="3" max="14" step="0.2" value="6" />
        </div>

        <!-- scale slider -->
        <div class="ctrl-group">
            <label>Scale factor k: <span id="val-k">1.00</span></label>
            <input type="range" id="slider-k" min="0.3" max="2.0" step="0.05" value="1.0" />
        </div>

        <!-- toggle buttons -->
        <div class="ctrl-group">
            <button class="action active" id="btn-rays">Projection Rays</button>
            <button class="action active" id="btn-proj">Projected Shape</button>
            <button class="action" id="btn-persp">Compare Perspective</button>
            <button class="action" id="btn-animate">Animate Distance</button>
        </div>

        <!-- guided step-through -->
        <div class="ctrl-group">
            <button class="action" id="btn-prev">◀ Prev</button>
            <button class="action" id="btn-next">Next ▶</button>
            <button class="action" id="btn-reset">Reset to Textbook View</button>
        </div>
        <div id="step-text">Press <b>Next</b> to start the guided demo.</div>
    </div>

    <div id="info">Drag to orbit · Scroll to zoom · Interactive controls on the left</div>

    <!-- ==================== Three.js ==================== -->
    <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        /* ============================================================
           SCENE, CAMERA, RENDERER
           ============================================================ */
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // Main camera (perspective for the viewer – NOT the projection camera)
        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
        camera.position.set(-7, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(devicePixelRatio);
        renderer.setSize(innerWidth, innerHeight);
        document.body.appendChild(renderer.domElement);

        // CSS2D label renderer
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(innerWidth, innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.target.set(3, 0, 0);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.55));
        const dLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dLight.position.set(-5, 8, 6);
        scene.add(dLight);

        /* ============================================================
           HELPERS – label factory
           ============================================================ */
        function makeLabel(text, color = '#ffffff', fontSize = '13px') {
            const div = document.createElement('div');
            div.style.color = color;
            div.style.fontSize = fontSize;
            div.style.fontFamily = 'Segoe UI, system-ui, sans-serif';
            div.style.fontWeight = '600';
            div.style.textShadow = '0 0 5px rgba(0,0,0,.8)';
            div.textContent = text;
            return new CSS2DObject(div);
        }

        /* ============================================================
           COORDINATE AXES (World: X, Y, Z)
           ============================================================ */
        // Matching the textbook: X goes left/up-left, Y goes up, Z goes right
        function addAxis(dir, color, label, length = 9) {
            const mat = new THREE.LineBasicMaterial({ color });
            const pts = [new THREE.Vector3(0, 0, 0), dir.clone().multiplyScalar(length)];
            const geom = new THREE.BufferGeometry().setFromPoints(pts);
            const line = new THREE.Line(geom, mat);
            scene.add(line);

            // Arrow-head cone
            const cone = new THREE.Mesh(
                new THREE.ConeGeometry(0.12, 0.4, 12),
                new THREE.MeshBasicMaterial({ color })
            );
            cone.position.copy(dir.clone().multiplyScalar(length));
            cone.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            scene.add(cone);

            const lbl = makeLabel(label, '#' + color.toString(16).padStart(6, '0'), '15px');
            lbl.position.copy(dir.clone().multiplyScalar(length + 0.5));
            scene.add(lbl);
        }
        addAxis(new THREE.Vector3(0, 1, 0), 0xffff55, 'Y');  // up
        addAxis(new THREE.Vector3(0, 0, 1), 0xff5555, 'Z');  // depth (right in figure)
        addAxis(new THREE.Vector3(-1, 0, 0), 0x55ff55, 'X'); // left (into-page-left in figure)

        /* ============================================================
           PROJECTION PLANE  (at Z = 0, i.e. x-y plane)
           The semi-transparent plane where the projected image appears.
           ============================================================ */
        const planeSize = 6;
        const planeMat = new THREE.MeshPhysicalMaterial({
            color: 0x8899bb, transparent: true, opacity: 0.18, side: THREE.DoubleSide,
            roughness: 0.6, depthWrite: false
        });
        const planeMesh = new THREE.Mesh(new THREE.PlaneGeometry(planeSize, planeSize), planeMat);
        // Plane is in X-Y at Z=0; PlaneGeometry faces +Z by default, which is fine
        planeMesh.position.set(-planeSize / 2 + 0.0, planeSize / 2 - 0.0, 0);
        scene.add(planeMesh);

        const planeLabel = makeLabel('Projection plane', '#aaccff', '13px');
        planeLabel.position.set(-planeSize / 2, -0.6, 0);
        scene.add(planeLabel);

        // Small camera-coord axes on plane (x, y labels)
        const xyLabelX = makeLabel('x', '#55ff55', '13px');
        xyLabelX.position.set(-2.8, planeSize / 2, 0.05);
        scene.add(xyLabelX);
        const xyLabelY = makeLabel('y', '#ffff55', '13px');
        xyLabelY.position.set(-planeSize / 2 + 0.0, 3.3, 0.05);
        scene.add(xyLabelY);

        /* ============================================================
           3D OBJECT – a colored rectangular block matching the textbook
           The block has visible red, green, and cyan faces.
           ============================================================ */
        const boxW = 3.0, boxH = 2.0, boxD = 4.5;  // width(X), height(Y), depth(Z)
        const boxGroup = new THREE.Group();

        // We build 6 faces individually for per-face colors
        // Face order: +X red, -X red, +Y green, -Y green, +Z cyan, -Z cyan
        // Matching textbook colors: top=green, front=cyan, side=red
        function coloredBox(w, h, d) {
            const geom = new THREE.BoxGeometry(w, h, d);
            // Assign per-face colors via groups (6 faces, 2 triangles each = 12 groups already set by BoxGeometry)
            const colors = [
                0xdd3333, 0xdd3333,  // +X, -X  → red
                0x33cc55, 0x33cc55,  // +Y, -Y  → green
                0x33bbdd, 0x33bbdd   // +Z, -Z  → cyan
            ];
            const mats = colors.map(c => new THREE.MeshPhongMaterial({
                color: c, transparent: false, side: THREE.FrontSide
            }));
            return new THREE.Mesh(geom, mats);
        }

        const boxMesh = coloredBox(boxW, boxH, boxD);
        boxGroup.add(boxMesh);

        // Wireframe overlay for clearer edges (like the textbook figure)
        const wireGeom = new THREE.EdgesGeometry(new THREE.BoxGeometry(boxW, boxH, boxD));
        const wireMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 1 });
        const wireframe = new THREE.LineSegments(wireGeom, wireMat);
        boxGroup.add(wireframe);
        scene.add(boxGroup);

        let objectZ = 6;  // distance along Z
        function positionBox() {
            boxGroup.position.set(-boxW / 2, boxH / 2, objectZ + boxD / 2);
        }
        positionBox();

        /* ============================================================
           PROJECTED SHAPE on the projection plane (Z = 0)
           Orthographic: x = k·X, y = k·Y  →  shape is the same as the
           object cross-section, scaled by k, regardless of Z.
           ============================================================ */
        let kScale = 1.0;
        const projGroup = new THREE.Group();
        scene.add(projGroup);

        function buildProjectedShape() {
            // Remove old children
            while (projGroup.children.length) projGroup.remove(projGroup.children[0]);

            const pw = boxW * kScale;
            const ph = boxH * kScale;

            // Colored quad on the projection plane (Z ≈ 0.01 to avoid z-fight)
            // The projected shape shows the visible cross-section colors
            // In orthographic projection looking down +Z, we see:
            //   top strip = green (+Y face top edge visible from top), front face = cyan, side = red
            // For simplicity, we show the front-face projection (cyan center, red sides, green top/bottom)

            // The projected rectangle mirrors the block's front face layout:
            // We split it into colored regions matching what you'd see
            // Main body as the "front face" → cyan
            const mainGeom = new THREE.PlaneGeometry(pw, ph);
            const mainMat = new THREE.MeshBasicMaterial({ color: 0x33bbdd, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
            const mainQuad = new THREE.Mesh(mainGeom, mainMat);
            mainQuad.position.set(-pw / 2, ph / 2, 0.02);
            projGroup.add(mainQuad);

            // For the textbook figure, the projected shape shows three horizontal bands:
            // top = green, middle = red, bottom = green (matching the block's visible layering)
            // Actually looking more carefully at the figure: the projection shows a stacked
            // pattern: green on top/bottom bands, red in middle bands, cyan visible
            // Let me match the textbook exactly: the projected shape mirrors the block faces
            // visible from the front. The block is oriented so we see:
            //   - Top face (green) as a strip
            //   - Front face (cyan) as the main rectangle
            //   - Bottom face isn't visible from the angle

            // To match the textbook figure more accurately, let's draw the projected silhouette
            // as a composite. The figure shows the block projected as stripes:
            // The 3D block has horizontal layers of color. Let's match:
            // red-green-red-green pattern top to bottom.

            // Actually, looking at the figure image description and the 3D shape more carefully:
            // The textbook shows a rectangular block with colored horizontal bands.
            // The projected shape on the plane mirrors those same bands.
            // Let me just draw the outline + fill matching the block cross-section.

            // Simpler approach: draw the outline of the projected rectangle
            const edgePts = [
                new THREE.Vector3(-pw, 0, 0.03),
                new THREE.Vector3(0, 0, 0.03),
                new THREE.Vector3(0, ph, 0.03),
                new THREE.Vector3(-pw, ph, 0.03),
                new THREE.Vector3(-pw, 0, 0.03),
            ];
            const edgeGeom = new THREE.BufferGeometry().setFromPoints(edgePts);
            const edgeLine = new THREE.Line(edgeGeom, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
            projGroup.add(edgeLine);

            // Now add colored bands matching the textbook block face pattern
            // The block's front face (facing -Z) is cyan, side (+X) is red, top (+Y) is green
            // From the textbook figure, the projected outline on the plane shows:
            // colored rectangular patches matching the 3D block face cross-sections

            // For the matching look, we subdivide the projected rectangle into 
            // horizontal colored bands similar to the figure:
            // The 3D box in the figure appears to have 4 horizontal rows with alternating red/green
            // Let's do: 2 bands each half-height
            const bandH = ph / 4;
            const bandColors = [0xdd3333, 0x33cc55, 0xdd3333, 0x33cc55];
            for (let i = 0; i < 4; i++) {
                const bGeom = new THREE.PlaneGeometry(pw, bandH);
                const bMat = new THREE.MeshBasicMaterial({
                    color: bandColors[i], side: THREE.DoubleSide, transparent: true, opacity: 0.65
                });
                const band = new THREE.Mesh(bGeom, bMat);
                band.position.set(-pw / 2, bandH / 2 + i * bandH, 0.025);
                projGroup.add(band);
            }

            // Add internal grid lines (horizontal) matching the block internal edges
            for (let i = 1; i < 4; i++) {
                const ly = i * bandH;
                const lGeom = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-pw, ly, 0.035), new THREE.Vector3(0, ly, 0.035)
                ]);
                projGroup.add(new THREE.Line(lGeom, new THREE.LineBasicMaterial({ color: 0x000000 })));
            }
        }
        buildProjectedShape();

        /* ============================================================
           PROJECTION RAYS – dashed lines from object corners to
           their projections on the plane (parallel to Z-axis)
           ============================================================ */
        const raysGroup = new THREE.Group();
        scene.add(raysGroup);

        function buildRays() {
            while (raysGroup.children.length) raysGroup.remove(raysGroup.children[0]);

            // Corners of the box in world coords (only the visible front-face corners matter)
            const hw = boxW, hh = boxH;
            const corners = [
                [-hw, 0],   // bottom-left
                [0, 0],     // bottom-right
                [-hw, hh],  // top-left
                [0, hh],    // top-right
                [-hw, hh / 4],
                [0, hh / 4],
                [-hw, hh * 2 / 4],
                [0, hh * 2 / 4],
                [-hw, hh * 3 / 4],
                [0, hh * 3 / 4],
            ];

            const zStart = objectZ + boxD; // back of box
            const zEnd = 0;                // projection plane

            corners.forEach(([cx, cy]) => {
                const px = cx * kScale;
                const py = cy * kScale;
                const pts = [
                    new THREE.Vector3(cx, cy, zStart + 1.5),
                    new THREE.Vector3(px, py, zEnd)
                ];
                const geom = new THREE.BufferGeometry().setFromPoints(pts);
                const mat = new THREE.LineDashedMaterial({ color: 0x8899aa, dashSize: 0.25, gapSize: 0.15, transparent: true, opacity: 0.6 });
                const line = new THREE.Line(geom, mat);
                line.computeLineDistances();
                raysGroup.add(line);
            });
        }
        buildRays();

        /* ============================================================
           PERSPECTIVE PROJECTION COMPARISON
           Shows a second projected shape that *does* shrink with distance,
           to contrast with the distance-invariant orthographic projection.
           ============================================================ */
        const perspGroup = new THREE.Group();
        perspGroup.visible = false;
        scene.add(perspGroup);

        const perspFocalLength = 3.0;  // focal length for comparison

        function buildPerspProjection() {
            while (perspGroup.children.length) perspGroup.remove(perspGroup.children[0]);

            // Perspective: x = f·X/Z, y = f·Y/Z
            const Z = objectZ + boxD / 2;  // center Z of box
            const pw = boxW * perspFocalLength / Z;
            const ph = boxH * perspFocalLength / Z;

            // Outline
            const edgePts = [
                new THREE.Vector3(-pw, 0, 0.04),
                new THREE.Vector3(0, 0, 0.04),
                new THREE.Vector3(0, ph, 0.04),
                new THREE.Vector3(-pw, ph, 0.04),
                new THREE.Vector3(-pw, 0, 0.04),
            ];
            const edgeGeom = new THREE.BufferGeometry().setFromPoints(edgePts);
            perspGroup.add(new THREE.Line(edgeGeom, new THREE.LineBasicMaterial({ color: 0xff8800, linewidth: 2 })));

            // Semi-transparent fill
            const fillGeom = new THREE.PlaneGeometry(pw, ph);
            const fillMat = new THREE.MeshBasicMaterial({ color: 0xff8800, side: THREE.DoubleSide, transparent: true, opacity: 0.2 });
            const fill = new THREE.Mesh(fillGeom, fillMat);
            fill.position.set(-pw / 2, ph / 2, 0.038);
            perspGroup.add(fill);

            // Label
            const lbl = makeLabel('Perspective (f·X/Z)', '#ff8800', '11px');
            lbl.position.set(-pw / 2, -0.35, 0.04);
            perspGroup.add(lbl);
        }

        /* ============================================================
           EQUATIONS LABEL
           ============================================================ */
        const eqLabel = makeLabel('x = k·X,  y = k·Y', '#7ecfff', '12px');
        eqLabel.position.set(-boxW * kScale / 2, -1.1, 0.05);
        scene.add(eqLabel);

        /* ============================================================
           STATE & UI WIRING
           ============================================================ */
        let showRays = true;
        let showProj = true;
        let showPersp = false;
        let animating = false;
        let animDir = 1;

        const sliderDist = document.getElementById('slider-dist');
        const sliderK = document.getElementById('slider-k');
        const valDist = document.getElementById('val-dist');
        const valK = document.getElementById('val-k');
        const btnRays = document.getElementById('btn-rays');
        const btnProj = document.getElementById('btn-proj');
        const btnPersp = document.getElementById('btn-persp');
        const btnAnimate = document.getElementById('btn-animate');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnReset = document.getElementById('btn-reset');
        const stepText = document.getElementById('step-text');

        function rebuild() {
            positionBox();
            buildProjectedShape();
            buildRays();
            buildPerspProjection();
            raysGroup.visible = showRays;
            projGroup.visible = showProj;
            perspGroup.visible = showPersp;
            eqLabel.position.set(-boxW * kScale / 2, -1.1, 0.05);
        }

        // Slider: object distance
        sliderDist.addEventListener('input', () => {
            objectZ = parseFloat(sliderDist.value);
            valDist.textContent = objectZ.toFixed(1);
            rebuild();
        });

        // Slider: scale factor k
        sliderK.addEventListener('input', () => {
            kScale = parseFloat(sliderK.value);
            valK.textContent = kScale.toFixed(2);
            rebuild();
        });

        // Toggle: projection rays
        btnRays.addEventListener('click', () => {
            showRays = !showRays;
            btnRays.classList.toggle('active', showRays);
            raysGroup.visible = showRays;
        });

        // Toggle: projected shape
        btnProj.addEventListener('click', () => {
            showProj = !showProj;
            btnProj.classList.toggle('active', showProj);
            projGroup.visible = showProj;
        });

        // Toggle: perspective comparison
        btnPersp.addEventListener('click', () => {
            showPersp = !showPersp;
            btnPersp.classList.toggle('active', showPersp);
            buildPerspProjection();
            perspGroup.visible = showPersp;
        });

        // Toggle: animate distance
        btnAnimate.addEventListener('click', () => {
            animating = !animating;
            btnAnimate.classList.toggle('active', animating);
        });

        /* ============================================================
           GUIDED DEMO – step-through sequence
           ============================================================ */
        const steps = [
            {
                text: '<b>Step 1:</b> This colored 3D block sits in front of the <em>projection plane</em> (at Z=0). Parallel dashed rays travel along the Z-axis from the object to the plane.',
                action: () => {
                    showRays = true; showProj = true; showPersp = false;
                    kScale = 1.0; sliderK.value = 1.0; valK.textContent = '1.00';
                    objectZ = 6; sliderDist.value = 6; valDist.textContent = '6.0';
                    camera.position.set(-7, 5, 10); controls.target.set(3, 0, 0);
                    rebuild();
                }
            },
            {
                text: '<b>Step 2 – Key insight:</b> Move the object farther away (Z&nbsp;=&nbsp;12). Notice the <em>projected shape stays the same size</em>. In orthographic projection, distance does NOT affect image size.',
                action: () => {
                    objectZ = 12; sliderDist.value = 12; valDist.textContent = '12.0';
                    rebuild();
                }
            },
            {
                text: '<b>Step 3:</b> Bring the object closer (Z&nbsp;=&nbsp;3). The projected shape is <em>still</em> the same size — confirming x&nbsp;=&nbsp;kX, y&nbsp;=&nbsp;kY with no Z dependence.',
                action: () => {
                    objectZ = 3; sliderDist.value = 3; valDist.textContent = '3.0';
                    rebuild();
                }
            },
            {
                text: '<b>Step 4 – Perspective comparison:</b> The orange outline shows where a <em>perspective</em> camera (x&nbsp;=&nbsp;fX/Z) would project the same object. It shrinks with distance — unlike orthographic.',
                action: () => {
                    showPersp = true; btnPersp.classList.add('active');
                    objectZ = 6; sliderDist.value = 6; valDist.textContent = '6.0';
                    rebuild();
                }
            },
            {
                text: '<b>Step 5:</b> Try the <b>Animate Distance</b> button to see the object move. The orthographic projection (colored) stays fixed while the perspective outline (orange) grows and shrinks.',
                action: () => {
                    animating = true; btnAnimate.classList.add('active');
                }
            },
            {
                text: '<b>Step 6 – Scale factor k:</b> The slider changes k in x=kX, y=kY. This globally scales the projected image (like zooming) but still doesn\'t depend on Z.',
                action: () => {
                    animating = false; btnAnimate.classList.remove('active');
                    objectZ = 6; sliderDist.value = 6; valDist.textContent = '6.0';
                    kScale = 1.5; sliderK.value = 1.5; valK.textContent = '1.50';
                    rebuild();
                }
            }
        ];

        let currentStep = -1;

        btnNext.addEventListener('click', () => {
            currentStep = Math.min(currentStep + 1, steps.length - 1);
            stepText.innerHTML = steps[currentStep].text;
            steps[currentStep].action();
        });

        btnPrev.addEventListener('click', () => {
            currentStep = Math.max(currentStep - 1, 0);
            stepText.innerHTML = steps[currentStep].text;
            steps[currentStep].action();
        });

        // Reset to textbook view
        btnReset.addEventListener('click', () => {
            currentStep = -1;
            stepText.innerHTML = 'Press <b>Next</b> to start the guided demo.';
            showRays = true; showProj = true; showPersp = false; animating = false;
            btnRays.classList.add('active');
            btnProj.classList.add('active');
            btnPersp.classList.remove('active');
            btnAnimate.classList.remove('active');
            kScale = 1.0; sliderK.value = 1.0; valK.textContent = '1.00';
            objectZ = 6; sliderDist.value = 6; valDist.textContent = '6.0';
            camera.position.set(-7, 5, 10);
            controls.target.set(3, 0, 0);
            rebuild();
        });

        /* ============================================================
           ANIMATION LOOP
           ============================================================ */
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            // Distance animation
            if (animating) {
                objectZ += animDir * dt * 3.0;
                if (objectZ > 14) { objectZ = 14; animDir = -1; }
                if (objectZ < 3) { objectZ = 3; animDir = 1; }
                sliderDist.value = objectZ;
                valDist.textContent = objectZ.toFixed(1);
                rebuild();
            }

            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        /* ============================================================
           RESIZE HANDLER
           ============================================================ */
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            labelRenderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>

</html>
