<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Why No Pictures on Walls? – Pinhole Camera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden
        }

        #canvas3d {
            display: block;
            width: 100vw;
            height: 100vh
        }

        /* ---------- UI overlay ---------- */
        #ui {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 10;
            user-select: none
        }

        #ui button,
        #ui label {
            background: rgba(30, 30, 60, .85);
            border: 1px solid #555;
            border-radius: 6px;
            padding: 7px 14px;
            color: #ddd;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: background .2s;
        }

        #ui button:hover {
            background: rgba(60, 60, 120, .9)
        }

        #ui button.active {
            background: rgba(80, 140, 220, .7);
            border-color: #7af
        }

        #ui label {
            display: flex;
            align-items: center;
            gap: 6px
        }

        #ui input[type=range] {
            width: 100px;
            accent-color: #7af
        }

        #info-panel {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 50, .88);
            border: 1px solid #555;
            border-radius: 8px;
            padding: 10px 20px;
            max-width: 620px;
            text-align: center;
            font-size: 13.5px;
            line-height: 1.5;
            z-index: 10;
        }

        #info-panel b {
            color: #7af
        }

        #step-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(20, 20, 50, .88);
            border: 1px solid #555;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <canvas id="canvas3d"></canvas>

    <!-- Controls -->
    <div id="ui">
        <button id="btnNoWall">1 – No barrier (wall sees everything)</button>
        <button id="btnWall">2 – Opaque wall blocks light</button>
        <button id="btnPinhole">3 – Pinhole lets select rays through</button>
        <button id="btnAnimate" title="Animate rays one by one">▶ Animate rays</button>
        <label>Pinhole size <input id="sliderHole" type="range" min="2" max="60" value="8" /></label>
        <label>Focal length <input id="sliderFocal" type="range" min="20" max="80" value="40" /></label>
        <button id="btnReset">⟲ Reset to textbook view</button>
    </div>

    <div id="step-indicator"></div>
    <div id="info-panel"></div>

    <script type="importmap">
{
  "imports":{
    "three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        /* ============================================================
           SCENE SETUP
           ============================================================ */
        const canvas = document.getElementById('canvas3d');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setSize(innerWidth, innerHeight);
        renderer.shadowMap.enabled = true;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 500);
        const defaultCamPos = new THREE.Vector3(12, 8, 18);
        const defaultCamTarget = new THREE.Vector3(0, 3, 0);
        camera.position.copy(defaultCamPos);

        const controls = new OrbitControls(camera, canvas);
        controls.target.copy(defaultCamTarget);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.update();

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.55));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(8, 14, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        /* ============================================================
           CONSTANTS / STATE
           ============================================================ */
        // The "tree" sits at positive Z; the "wall" is at negative Z.
        // An opaque barrier with a pinhole sits between them.
        const WALL_Z = -8;   // projection wall position
        let BARRIER_Z = 0;   // barrier (black wall) position
        let FOCAL_LEN = Math.abs(WALL_Z - BARRIER_Z); // distance barrier→wall
        let HOLE_RADIUS = 0.35;

        const TREE_Z = 6;   // tree position along Z
        const TREE_TOP_Y = 7;
        const TREE_MID_Y = 4.5;
        const TREE_BOT_Y = 1.5;
        const TRUNK_Y = 0.8;

        // Sample points on the tree (sources of light rays)
        // Each has a position and a colour representing foliage or trunk.
        const treeSources = [
            { pos: new THREE.Vector3(0, TREE_TOP_Y, TREE_Z), color: 0x228B22 },  // dark green top
            { pos: new THREE.Vector3(1.2, TREE_MID_Y + 1, TREE_Z), color: 0x32CD32 },  // lime mid‐right
            { pos: new THREE.Vector3(-1.2, TREE_MID_Y + 1, TREE_Z), color: 0x32CD32 },  // lime mid‐left
            { pos: new THREE.Vector3(0, TREE_MID_Y, TREE_Z), color: 0x3CB371 },  // medium green center
            { pos: new THREE.Vector3(0.8, TREE_BOT_Y + 1, TREE_Z), color: 0x66BB6A },  // light green lower
            { pos: new THREE.Vector3(-0.8, TREE_BOT_Y + 1, TREE_Z), color: 0x66BB6A },
            { pos: new THREE.Vector3(0, TRUNK_Y, TREE_Z), color: 0x8B4513 },  // trunk brown
            { pos: new THREE.Vector3(0, 0.1, TREE_Z), color: 0x6B3410 },  // trunk base
        ];

        // Sample target points on the wall (where rays land)
        const wallTargets = [];
        for (let wy = -2; wy <= 3; wy += 1) {
            for (let wx = -2; wx <= 2; wx += 1) {
                wallTargets.push(new THREE.Vector3(wx * 0.9, wy * 1.1 + 3, WALL_Z));
            }
        }

        /* ============================================================
           3D OBJECTS – TREE  (foliage = stacked spheres, trunk = cylinder)
           The tree is a stylised cartoon tree matching the figure's look.
           ============================================================ */
        const treeGroup = new THREE.Group();
        scene.add(treeGroup);

        // Trunk (maps to brown trunk in 2D figure)
        const trunkGeo = new THREE.CylinderGeometry(0.35, 0.5, 3.5, 12);
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const trunkMesh = new THREE.Mesh(trunkGeo, trunkMat);
        trunkMesh.position.set(0, 1.75, TREE_Z);
        treeGroup.add(trunkMesh);

        // Foliage spheres (maps to green blobs in 2D figure)
        function addFoliage(x, y, z, r, c) {
            const g = new THREE.SphereGeometry(r, 16, 14);
            const m = new THREE.MeshStandardMaterial({ color: c });
            const s = new THREE.Mesh(g, m);
            s.position.set(x, y, z);
            treeGroup.add(s);
        }
        addFoliage(0, 5.5, TREE_Z, 2.2, 0x2E8B57);
        addFoliage(1.4, 4.2, TREE_Z, 1.5, 0x3CB371);
        addFoliage(-1.4, 4.2, TREE_Z, 1.5, 0x3CB371);
        addFoliage(0, 7, TREE_Z, 1.4, 0x228B22);

        /* ============================================================
           3D OBJECTS – PROJECTION WALL  (the white wall where the image appears)
           Maps to the "Wall" label in the 2D figure (a) and (b).
           ============================================================ */
        const wallGeo = new THREE.BoxGeometry(8, 10, 0.15);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xd8d8d8, side: THREE.DoubleSide });
        const wallMesh = new THREE.Mesh(wallGeo, wallMat);
        wallMesh.position.set(0, 4, WALL_Z);
        scene.add(wallMesh);

        /* ============================================================
           3D OBJECTS – OPAQUE BARRIER WITH PINHOLE
           Maps to the black card with a hole in figure (b).
           Built as four quads around a central gap (the pinhole).
           ============================================================ */
        const barrierGroup = new THREE.Group();
        scene.add(barrierGroup);
        const barrierMat = new THREE.MeshStandardMaterial({ color: 0x111111, side: THREE.DoubleSide });

        // We'll rebuild the barrier planes whenever hole size changes.
        function buildBarrier() {
            while (barrierGroup.children.length) barrierGroup.remove(barrierGroup.children[0]);
            const hw = 4, hh = 5; // half‐width, half‐height of barrier
            const hr = HOLE_RADIUS;
            // four rectangles around the hole
            // top
            const topGeo = new THREE.PlaneGeometry(hw * 2, hh * 2 - (4 + hr));
            const topM = new THREE.Mesh(topGeo, barrierMat);
            topM.position.set(0, (4 + hr) + (hh * 2 - (4 + hr)) / 2, BARRIER_Z);
            barrierGroup.add(topM);
            // bottom
            const botH = 4 - hr;
            if (botH > 0) {
                const botGeo = new THREE.PlaneGeometry(hw * 2, botH);
                const botM = new THREE.Mesh(botGeo, barrierMat);
                botM.position.set(0, botH / 2, BARRIER_Z);
                barrierGroup.add(botM);
            }
            // left
            const sideH = hr * 2;
            const leftW = hw - hr;
            if (leftW > 0) {
                const leftGeo = new THREE.PlaneGeometry(leftW, sideH);
                const leftM = new THREE.Mesh(leftGeo, barrierMat);
                leftM.position.set(-(hr + leftW / 2), 4, BARRIER_Z);
                barrierGroup.add(leftM);
            }
            // right
            if (leftW > 0) {
                const rightGeo = new THREE.PlaneGeometry(leftW, sideH);
                const rightM = new THREE.Mesh(rightGeo, barrierMat);
                rightM.position.set((hr + leftW / 2), 4, BARRIER_Z);
                barrierGroup.add(rightM);
            }
            // ring around hole for visual clarity
            const ringGeo = new THREE.RingGeometry(hr * 0.95, hr * 1.15, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xcccccc, side: THREE.DoubleSide });
            const ringMesh = new THREE.Mesh(ringGeo, ringMat);
            ringMesh.position.set(0, 4, BARRIER_Z + 0.01);
            barrierGroup.add(ringMesh);
        }
        buildBarrier();

        /* ============================================================
           GROUND PLANE
           ============================================================ */
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a4a2a });
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);
        groundMesh.rotation.x = -Math.PI / 2;
        groundMesh.position.y = -0.01;
        scene.add(groundMesh);

        /* ============================================================
           LIGHT RAYS  (lines from tree sources to wall targets)
           - "No barrier" mode: every source shoots to every wall target (chaos)
           - "Wall" mode: barrier blocks everything
           - "Pinhole" mode: only rays passing through hole reach the wall
           ============================================================ */
        const rayGroup = new THREE.Group();
        scene.add(rayGroup);

        // Which rays pass through the pinhole?
        // A ray from src→tgt passes through the hole at z=BARRIER_Z.
        // Interpolate: t = (BARRIER_Z - src.z) / (tgt.z - src.z)
        // crossing point x_c = src.x + t*(tgt.x - src.x), y_c similarly.
        // It passes if sqrt(x_c² + (y_c-4)²) < HOLE_RADIUS.
        function rayPassesThroughHole(src, tgt) {
            const t = (BARRIER_Z - src.z) / (tgt.z - src.z);
            const xc = src.x + t * (tgt.x - src.x);
            const yc = src.y + t * (tgt.y - src.y);
            return Math.sqrt(xc * xc + (yc - 4) * (yc - 4)) <= HOLE_RADIUS;
        }

        let currentMode = 'none'; // 'none' | 'wall' | 'pinhole'
        let animatingRays = false;
        let animRayIndex = 0;
        let animTimer = 0;

        // Generate rays for a given mode and add to rayGroup.
        function rebuildRays(mode, visibleUpTo) {
            while (rayGroup.children.length) rayGroup.remove(rayGroup.children[0]);

            const rays = [];

            if (mode === 'none') {
                // Every source → every target: illustrates chaos on the wall
                for (const src of treeSources) {
                    for (const tgt of wallTargets) {
                        rays.push({ src, tgt, blocked: false });
                    }
                }
            } else if (mode === 'wall') {
                // Rays from source to barrier surface — blocked, shown dim
                for (const src of treeSources) {
                    for (const tgt of wallTargets) {
                        rays.push({ src, tgt, blocked: true });
                    }
                }
            } else if (mode === 'pinhole') {
                for (const src of treeSources) {
                    for (const tgt of wallTargets) {
                        const passes = rayPassesThroughHole(src, tgt);
                        rays.push({ src, tgt, blocked: !passes });
                    }
                }
            }

            const limit = (visibleUpTo !== undefined) ? visibleUpTo : rays.length;

            for (let i = 0; i < Math.min(limit, rays.length); i++) {
                const r = rays[i];
                const points = [];
                if (r.blocked && mode !== 'none') {
                    // Ray stops at barrier
                    const t = (BARRIER_Z - r.src.pos.z) / (r.tgt.z - r.src.pos.z);
                    const xc = r.src.pos.x + t * (r.tgt.x - r.src.pos.x);
                    const yc = r.src.pos.y + t * (r.tgt.y - r.src.pos.y);
                    points.push(r.src.pos.clone(), new THREE.Vector3(xc, yc, BARRIER_Z));
                } else {
                    points.push(r.src.pos.clone(), r.tgt.clone());
                }
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const col = new THREE.Color(r.src.color);
                if (r.blocked) col.multiplyScalar(0.25);
                const mat = new THREE.LineBasicMaterial({
                    color: col,
                    transparent: true,
                    opacity: r.blocked ? 0.15 : 0.65,
                    linewidth: 1
                });
                const line = new THREE.Line(geo, mat);
                rayGroup.add(line);
            }

            return rays.length;
        }

        /* ============================================================
           WALL PROJECTION DOTS  (coloured dots on wall showing the "image")
           In pinhole mode, dots appear where rays land, coloured by source.
           This teaches that the pinhole creates an inverted image.
           ============================================================ */
        const dotGroup = new THREE.Group();
        scene.add(dotGroup);

        function rebuildDots(mode) {
            while (dotGroup.children.length) dotGroup.remove(dotGroup.children[0]);
            if (mode === 'none') {
                // Chaotic mix of all colours — no clear image
                for (const src of treeSources) {
                    for (const tgt of wallTargets) {
                        const g = new THREE.SphereGeometry(0.12, 8, 6);
                        const m = new THREE.MeshBasicMaterial({ color: src.color, transparent: true, opacity: 0.25 });
                        const s = new THREE.Mesh(g, m);
                        s.position.copy(tgt);
                        s.position.z = WALL_Z + 0.1;
                        dotGroup.add(s);
                    }
                }
            } else if (mode === 'pinhole') {
                // Only rays passing through hole → clear inverted image
                for (const src of treeSources) {
                    for (const tgt of wallTargets) {
                        if (rayPassesThroughHole(src, tgt)) {
                            const g = new THREE.SphereGeometry(0.18, 8, 6);
                            const m = new THREE.MeshBasicMaterial({ color: src.color });
                            const s = new THREE.Mesh(g, m);
                            s.position.copy(tgt);
                            s.position.z = WALL_Z + 0.1;
                            dotGroup.add(s);
                        }
                    }
                }
            }
        }

        /* ============================================================
           LABELS  (sprite-based text labels matching figure terminology)
           ============================================================ */
        function makeLabel(text, pos, fontSize, color) {
            const c = document.createElement('canvas');
            c.width = 512; c.height = 128;
            const ctx = c.getContext('2d');
            ctx.font = `bold ${fontSize || 48}px "Segoe UI", Arial, sans-serif`;
            ctx.fillStyle = color || '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 256, 64);
            const tex = new THREE.CanvasTexture(c);
            const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
            const sprite = new THREE.Sprite(mat);
            sprite.position.copy(pos);
            sprite.scale.set(4, 1, 1);
            scene.add(sprite);
            return sprite;
        }

        /* Label: "Wall" on projection surface */
        makeLabel('Wall', new THREE.Vector3(0, 9.5, WALL_Z), 52, '#cccccc');
        /* Label: "Tree" above tree */
        makeLabel('Tree', new THREE.Vector3(0, 9.5, TREE_Z), 52, '#88dd88');

        /* Labels for pinhole & barrier — toggled with mode */
        const pinholeLabel = makeLabel('Pinhole', new THREE.Vector3(0, 9.5, BARRIER_Z), 44, '#aaaaff');
        const barrierLabel = makeLabel('Barrier', new THREE.Vector3(2.8, 8.5, BARRIER_Z), 38, '#888888');
        pinholeLabel.visible = false;
        barrierLabel.visible = false;

        /* ============================================================
           ARROW HELPERS  (show ray directions on select rays)
           ============================================================ */
        // We add a few arrow annotations in pinhole mode to highlight inversion.
        const arrowGroup = new THREE.Group();
        scene.add(arrowGroup);

        function rebuildArrows(mode) {
            while (arrowGroup.children.length) arrowGroup.remove(arrowGroup.children[0]);
            if (mode !== 'pinhole') return;
            // Show two arrows: one from top of tree (green) → bottom of wall, one from trunk (brown) → top of wall
            const pairs = [
                { src: treeSources[0], label: 'Top → Bottom (inverted)', color: 0x22cc22 },
                { src: treeSources[6], label: 'Bottom → Top (inverted)', color: 0xcc8833 },
            ];
            for (const p of pairs) {
                for (const tgt of wallTargets) {
                    if (rayPassesThroughHole(p.src, tgt)) {
                        const dir = new THREE.Vector3().subVectors(tgt, p.src.pos).normalize();
                        const len = p.src.pos.distanceTo(tgt);
                        const arrow = new THREE.ArrowHelper(dir, p.src.pos, len, p.color, 0.4, 0.2);
                        arrowGroup.add(arrow);
                        break; // one arrow per source
                    }
                }
            }
        }

        /* ============================================================
           INFO TEXTS for each step
           ============================================================ */
        const infoTexts = {
            none: `<b>No Barrier:</b> Light from every part of the tree reaches every point on the wall. 
         The colours mix everywhere — <b>no image forms</b>. This is why ordinary walls don't show pictures.`,
            wall: `<b>Opaque Barrier:</b> An opaque wall blocks <em>all</em> light from reaching the projection wall. 
         No light gets through, so still <b>no image</b>.`,
            pinhole: `<b>Pinhole Camera:</b> A tiny hole in the barrier lets only specific rays through. 
          Each wall point now receives light from just <b>one direction</b> — an <b>inverted image</b> appears! 
          Adjust the <em>pinhole size</em> slider to see sharpness vs brightness trade-off.`,
        };
        const infoEl = document.getElementById('info-panel');
        const stepEl = document.getElementById('step-indicator');

        function setMode(mode) {
            currentMode = mode;
            animatingRays = false;

            // Barrier visibility
            barrierGroup.visible = (mode === 'wall' || mode === 'pinhole');
            pinholeLabel.visible = (mode === 'pinhole');
            barrierLabel.visible = (mode === 'wall' || mode === 'pinhole');

            rebuildRays(mode);
            rebuildDots(mode);
            rebuildArrows(mode);

            infoEl.innerHTML = infoTexts[mode] || '';
            stepEl.textContent = mode === 'none' ? 'Step 1 / 3' : mode === 'wall' ? 'Step 2 / 3' : 'Step 3 / 3';

            document.getElementById('btnNoWall').classList.toggle('active', mode === 'none');
            document.getElementById('btnWall').classList.toggle('active', mode === 'wall');
            document.getElementById('btnPinhole').classList.toggle('active', mode === 'pinhole');
        }

        /* ============================================================
           INTERACTIVITY WIRING
           ============================================================ */
        document.getElementById('btnNoWall').addEventListener('click', () => setMode('none'));
        document.getElementById('btnWall').addEventListener('click', () => setMode('wall'));
        document.getElementById('btnPinhole').addEventListener('click', () => setMode('pinhole'));

        /* Pinhole size slider — teaches sharpness vs brightness trade-off */
        document.getElementById('sliderHole').addEventListener('input', e => {
            HOLE_RADIUS = e.target.value / 100 * 1.8 + 0.05; // range ≈ 0.05 → 1.1
            buildBarrier();
            if (currentMode === 'pinhole') {
                rebuildRays('pinhole');
                rebuildDots('pinhole');
                rebuildArrows('pinhole');
            }
        });

        /* Focal length slider — teaches effect of wall distance on image size */
        document.getElementById('sliderFocal').addEventListener('input', e => {
            const v = parseInt(e.target.value);
            const newWallZ = BARRIER_Z - (v / 40) * Math.abs(WALL_Z - BARRIER_Z);
            // Move wall
            wallMesh.position.z = newWallZ;
            // Update wall targets
            for (const t of wallTargets) t.z = newWallZ;
            if (currentMode) {
                rebuildRays(currentMode);
                rebuildDots(currentMode);
                rebuildArrows(currentMode);
            }
        });

        /* Animate rays one by one — illustrates individual ray paths */
        document.getElementById('btnAnimate').addEventListener('click', () => {
            if (!currentMode || currentMode === 'wall') setMode('pinhole');
            animatingRays = true;
            animRayIndex = 0;
            animTimer = 0;
        });

        /* Reset to textbook view */
        document.getElementById('btnReset').addEventListener('click', () => {
            camera.position.copy(defaultCamPos);
            controls.target.copy(defaultCamTarget);
            controls.update();
            HOLE_RADIUS = 0.35;
            document.getElementById('sliderHole').value = 8;
            document.getElementById('sliderFocal').value = 40;
            wallMesh.position.z = WALL_Z;
            for (const t of wallTargets) t.z = WALL_Z;
            buildBarrier();
            setMode('pinhole');
        });

        /* ============================================================
           GUIDED DEMO – auto‐step through the three modes
           ============================================================ */
        let guidedStep = 0;
        const guidedModes = ['none', 'wall', 'pinhole'];
        function startGuidedDemo() {
            guidedStep = 0;
            setMode(guidedModes[0]);
            const interval = setInterval(() => {
                guidedStep++;
                if (guidedStep >= guidedModes.length) { clearInterval(interval); return; }
                setMode(guidedModes[guidedStep]);
            }, 3500);
        }
        // Auto-start guided demo on load
        setTimeout(startGuidedDemo, 600);

        /* ============================================================
           ANIMATION LOOP
           ============================================================ */
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            controls.update();

            // Animated ray reveal
            if (animatingRays) {
                animTimer += dt;
                if (animTimer > 0.06) {
                    animTimer = 0;
                    animRayIndex++;
                    const total = rebuildRays(currentMode, animRayIndex);
                    rebuildDots(currentMode);
                    if (animRayIndex >= total) animatingRays = false;
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        /* Resize handling */
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        /* Kick off in pinhole mode after guided demo completes */
    </script>
</body>

</html>
