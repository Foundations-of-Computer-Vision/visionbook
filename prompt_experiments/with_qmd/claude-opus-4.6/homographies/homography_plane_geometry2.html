<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Homography – Planar Scene Projection</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #181c20; color: #eee; overflow: hidden; }
  #canvas3d { display: block; width: 100vw; height: 100vh; }

  /* ---------- overlay panels ---------- */
  #controls {
    position: absolute; top: 12px; left: 12px;
    background: rgba(24,28,32,.88); border-radius: 10px; padding: 14px 16px;
    max-width: 310px; z-index: 10; font-size: 13px; line-height: 1.55;
    border: 1px solid #333;
  }
  #controls h2 { font-size: 15px; margin-bottom: 6px; color: #7cf; }
  #controls p  { margin-bottom: 8px; color: #bbb; }
  .ctrl-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; flex-wrap: wrap; }
  .ctrl-row label { min-width: 120px; }
  button {
    background: #2a6; color: #fff; border: none; border-radius: 5px;
    padding: 5px 12px; cursor: pointer; font-size: 12px;
  }
  button:hover { background: #3b7; }
  button.reset { background: #555; }
  button.reset:hover { background: #777; }
  button.step  { background: #37a; }
  button.step:hover  { background: #49c; }
  input[type=range] { width: 120px; accent-color: #2a6; }
  input[type=checkbox] { accent-color: #2a6; }

  #info-box {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(24,28,32,.92); border-radius: 8px; padding: 10px 18px;
    font-size: 13px; text-align: center; z-index: 10; max-width: 600px;
    border: 1px solid #444; color: #cde; transition: opacity .3s;
  }
  #info-box b { color: #7cf; }
</style>
</head>
<body>
<canvas id="canvas3d"></canvas>

<!-- Control panel -->
<div id="controls">
  <h2>Planar Homography Geometry</h2>
  <p>A camera observing a world plane (Z=0). Points on the plane relate to image points via a <b style="color:#7cf">homography</b>.</p>

  <!-- Interactive element 1: move 3D point on plane -->
  <div class="ctrl-row">
    <label>Point X<sub>1</sub></label>
    <input type="range" id="ptX" min="-3" max="3" step="0.1" value="2.0"/>
    <span id="ptX-val">2.0</span>
  </div>
  <div class="ctrl-row">
    <label>Point Y<sub>1</sub></label>
    <input type="range" id="ptY" min="-3" max="3" step="0.1" value="1.5"/>
    <span id="ptY-val">1.5</span>
  </div>

  <!-- Interactive element 2: toggle camera frustum -->
  <div class="ctrl-row">
    <input type="checkbox" id="showFrustum" checked/>
    <label for="showFrustum">Show projection rays</label>
  </div>

  <!-- Interactive element 3: toggle axes labels -->
  <div class="ctrl-row">
    <input type="checkbox" id="showLabels" checked/>
    <label for="showLabels">Show labels</label>
  </div>

  <!-- Interactive element 4: animate point along path -->
  <div class="ctrl-row">
    <button id="btnAnimate">Animate point</button>
    <button id="btnStopAnim" class="reset">Stop</button>
  </div>

  <!-- Interactive element 5: guided step-through -->
  <div class="ctrl-row">
    <button id="btnStep" class="step">Guided demo ▶</button>
    <button id="btnResetView" class="reset">Reset to textbook view</button>
  </div>
</div>

<!-- Info text at bottom -->
<div id="info-box" style="opacity:0">...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ===================================================================
//  Scene setup
// ===================================================================
const canvas = document.getElementById('canvas3d');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x181c20);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
// "Textbook view" – looking at the scene from an elevated angle similar to the figure
const TEXTBOOK_POS   = new THREE.Vector3(-6, 5, 8);
const TEXTBOOK_TARGET = new THREE.Vector3(1, 0, 0);
camera.position.copy(TEXTBOOK_POS);

const controls = new OrbitControls(camera, canvas);
controls.target.copy(TEXTBOOK_TARGET);
controls.enableDamping = true;
controls.dampingFactor = 0.12;
controls.update();

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
dLight.position.set(-5, 8, 6);
scene.add(dLight);

// ===================================================================
//  World plane (Z = 0 in the figure's world coords)
//  In Three.js, we map the figure's (X,Y,Z) directly.
//  The "plane" lives at Z=0, so it is the XY-plane in our scene.
// ===================================================================

// -- World plane (gray quad) --
// Represents the planar scene surface at Z=0
const planeGeo = new THREE.PlaneGeometry(8, 8);
const planeMat = new THREE.MeshPhongMaterial({
  color: 0x888888, side: THREE.DoubleSide, transparent: true, opacity: 0.35,
  depthWrite: false
});
const worldPlane = new THREE.Mesh(planeGeo, planeMat);
// PlaneGeometry is XY by default – that's our world plane (Z=0)
scene.add(worldPlane);

// Plane grid helper (lies on XY)
const gridHelper = new THREE.GridHelper(8, 8, 0x555555, 0x333333);
gridHelper.rotation.x = Math.PI / 2; // rotate from XZ to XY
scene.add(gridHelper);

// ===================================================================
//  World-coordinate axes (red, like the figure)
//  X → red, Y → darker red, Z → upward red
// ===================================================================
function makeArrow(dir, origin, len, color, label) {
  const arrow = new THREE.ArrowHelper(dir.normalize(), origin, len, color, 0.18, 0.10);
  scene.add(arrow);
  return arrow;
}
// World axes originate at the world origin on the plane
const wOrigin = new THREE.Vector3(0, 0, 0);
const axX = makeArrow(new THREE.Vector3(1,0,0), wOrigin, 1.8, 0xff2222, 'X');
const axY = makeArrow(new THREE.Vector3(0,1,0), wOrigin, 1.8, 0xff5555, 'Y');
const axZ = makeArrow(new THREE.Vector3(0,0,1), wOrigin, 1.8, 0xff0000, 'Z');

// ===================================================================
//  Camera model – positioned and oriented to match figure
//  Camera center is to the upper-left in the figure.
//  We place it at a realistic position looking roughly toward the plane.
// ===================================================================
const camCenter = new THREE.Vector3(-3, 2, 4); // camera center of projection

// Camera center sphere (black dot like figure)
const ccSphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.12, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0x000000 })
);
ccSphere.position.copy(camCenter);
scene.add(ccSphere);

// Camera local axes (green, like the figure)
// We define a camera orientation: looking toward the plane
const camLookAt = new THREE.Vector3(1.5, 0.5, 0); // approximate gaze point on/near the plane
const camUp = new THREE.Vector3(0, 0, 1);

// Build camera rotation matrix
const camZ_dir = new THREE.Vector3().subVectors(camCenter, camLookAt).normalize(); // z points backward
const camX_dir = new THREE.Vector3().crossVectors(camUp, camZ_dir).normalize();
const camY_dir = new THREE.Vector3().crossVectors(camZ_dir, camX_dir).normalize();

const camAxLen = 1.0;
const caxX = makeArrow(camX_dir.clone(), camCenter, camAxLen, 0x22cc22, 'x');
const caxY = makeArrow(camY_dir.clone(), camCenter, camAxLen, 0x66ee66, 'y');

// ===================================================================
//  Image plane (camera plane) – a semi-transparent quad in front of
//  the camera center, perpendicular to the camera's optical axis.
//  This represents where image coordinates (x1, y1) live.
// ===================================================================
const focalLen = 1.6; // distance from camera center to image plane
const imgPlaneSize = 2.2;
const imgPlaneGeo = new THREE.PlaneGeometry(imgPlaneSize, imgPlaneSize);
const imgPlaneMat = new THREE.MeshPhongMaterial({
  color: 0xaaaacc, side: THREE.DoubleSide, transparent: true, opacity: 0.35,
  depthWrite: false
});
const imgPlaneMesh = new THREE.Mesh(imgPlaneGeo, imgPlaneMat);

// Position image plane along the optical axis
const opticalAxis = new THREE.Vector3().subVectors(camLookAt, camCenter).normalize();
const imgPlaneCenter = camCenter.clone().add(opticalAxis.clone().multiplyScalar(focalLen));
imgPlaneMesh.position.copy(imgPlaneCenter);

// Orient image plane to face the camera (normal = -opticalAxis)
imgPlaneMesh.lookAt(camCenter);
scene.add(imgPlaneMesh);

// Border of image plane
const imgBorderGeo = new THREE.EdgesGeometry(imgPlaneGeo);
const imgBorderMat = new THREE.LineBasicMaterial({ color: 0x222222, linewidth: 1 });
const imgBorder = new THREE.LineSegments(imgBorderGeo, imgBorderMat);
imgBorder.position.copy(imgPlaneMesh.position);
imgBorder.quaternion.copy(imgPlaneMesh.quaternion);
scene.add(imgBorder);

// ===================================================================
//  3D point on the plane and its projection
//  Point on plane: P = (X1, Y1, 0)  (cyan dot, like figure)
//  Projected point on image plane: p = (x1, y1)  (cyan dot)
//  Projection ray: dashed cyan line from camera center through p to P
// ===================================================================
let P_world = new THREE.Vector3(2.0, 1.5, 0); // initial position on the plane

// Cyan sphere on plane
const pSphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.10, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0x00ffff })
);
pSphere.position.copy(P_world);
scene.add(pSphere);

// Function to compute projected point on image plane
// Ray from camCenter toward P_world; find intersection with the image plane
function projectOntoImagePlane(worldPt) {
  const dir = new THREE.Vector3().subVectors(worldPt, camCenter).normalize();
  // Image plane defined by its center and normal
  const planeNormal = new THREE.Vector3().subVectors(camCenter, imgPlaneCenter).normalize();
  const denom = dir.dot(planeNormal);
  if (Math.abs(denom) < 1e-8) return imgPlaneCenter.clone();
  const t = new THREE.Vector3().subVectors(imgPlaneCenter, camCenter).dot(planeNormal) / denom;
  return camCenter.clone().add(dir.multiplyScalar(t));
}

let pProj = projectOntoImagePlane(P_world);

// Cyan sphere on image plane (projected point)
const projSphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.08, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0x00ffff })
);
projSphere.position.copy(pProj);
scene.add(projSphere);

// ===================================================================
//  Projection rays (dashed cyan line from camera center → projected → world point)
//  These illustrate how the 3D point projects through the center of projection
// ===================================================================
const rayMat = new THREE.LineDashedMaterial({ color: 0x00cccc, dashSize: 0.15, gapSize: 0.08 });
let rayGeom = new THREE.BufferGeometry().setFromPoints([camCenter, pProj, P_world]);
let rayLine = new THREE.Line(rayGeom, rayMat);
rayLine.computeLineDistances();
scene.add(rayLine);

// Additional frustum corner rays (dashed black, like the figure)
// Show four frustum edges from camera center to corners of image plane
const frustumRayMat = new THREE.LineDashedMaterial({ color: 0x444444, dashSize: 0.18, gapSize: 0.10 });
const frustumLines = [];

function buildFrustumRays() {
  // Corners of image plane in local coords
  const half = imgPlaneSize / 2;
  const corners = [
    new THREE.Vector3(-half, -half, 0),
    new THREE.Vector3( half, -half, 0),
    new THREE.Vector3( half,  half, 0),
    new THREE.Vector3(-half,  half, 0),
  ];
  corners.forEach(c => {
    c.applyQuaternion(imgPlaneMesh.quaternion);
    c.add(imgPlaneMesh.position);
  });
  // Lines from camera center to each corner, extended toward the plane
  for (let i = 0; i < 4; i++) {
    const dir = new THREE.Vector3().subVectors(corners[i], camCenter).normalize();
    const far = camCenter.clone().add(dir.multiplyScalar(12));
    const geom = new THREE.BufferGeometry().setFromPoints([camCenter, far]);
    const line = new THREE.Line(geom, frustumRayMat);
    line.computeLineDistances();
    scene.add(line);
    frustumLines.push(line);
  }
}
buildFrustumRays();

// ===================================================================
//  Projected quadrilateral on the image plane
//  Shows how a square on the world plane maps to a general quadrilateral
//  on the image plane, illustrating the homography distortion.
// ===================================================================
const quadWorldCorners = [
  new THREE.Vector3(0.5, 0.0, 0),
  new THREE.Vector3(3.0, 0.0, 0),
  new THREE.Vector3(3.0, 2.5, 0),
  new THREE.Vector3(0.5, 2.5, 0),
];

// World quad outline (white)
const quadWorldGeo = new THREE.BufferGeometry().setFromPoints([...quadWorldCorners, quadWorldCorners[0]]);
const quadWorldLine = new THREE.Line(quadWorldGeo, new THREE.LineBasicMaterial({ color: 0xcccccc }));
scene.add(quadWorldLine);

// Projected quad on image plane
function buildProjectedQuad() {
  const projCorners = quadWorldCorners.map(c => projectOntoImagePlane(c));
  projCorners.push(projCorners[0]);
  const geom = new THREE.BufferGeometry().setFromPoints(projCorners);
  return new THREE.Line(geom, new THREE.LineBasicMaterial({ color: 0xdddddd }));
}
let projQuadLine = buildProjectedQuad();
scene.add(projQuadLine);

// ===================================================================
//  CSS2D-style labels using sprites
//  Labels correspond to figure labels: Camera center, Camera plane,
//  (x1,y1), (X1,Y1,0), X, Y, Z, x, y, "plane"
// ===================================================================
function makeTextSprite(text, color = '#ffffff', fontSize = 42) {
  const canvas2 = document.createElement('canvas');
  canvas2.width = 512;
  canvas2.height = 128;
  const ctx = canvas2.getContext('2d');
  ctx.font = `bold ${fontSize}px 'Segoe UI', Arial, sans-serif`;
  ctx.fillStyle = color;
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 8, 64);
  const tex = new THREE.CanvasTexture(canvas2);
  tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(2.4, 0.6, 1);
  return sprite;
}

const labels = [];
function addLabel(text, pos, color = '#ffffff') {
  const s = makeTextSprite(text, color);
  s.position.copy(pos);
  scene.add(s);
  labels.push(s);
  return s;
}

// Static labels
addLabel('Camera center', new THREE.Vector3(camCenter.x - 0.7, camCenter.y + 0.4, camCenter.z + 0.3), '#ffffff');
addLabel('Camera plane', new THREE.Vector3(imgPlaneCenter.x + 1.0, imgPlaneCenter.y + 1.2, imgPlaneCenter.z + 0.4), '#ccccdd');
addLabel('plane', new THREE.Vector3(3.2, -2.5, 0), '#cccccc');
addLabel('X', new THREE.Vector3(2.1, 0, 0), '#ff4444');
addLabel('Y', new THREE.Vector3(0, 2.1, 0), '#ff6666');
addLabel('Z', new THREE.Vector3(0, 0, 2.1), '#ff2222');
addLabel('x', new THREE.Vector3(camCenter.x + camX_dir.x * 1.2, camCenter.y + camX_dir.y * 1.2, camCenter.z + camX_dir.z * 1.2), '#22ee22');
addLabel('y', new THREE.Vector3(camCenter.x + camY_dir.x * 1.2, camCenter.y + camY_dir.y * 1.2, camCenter.z + camY_dir.z * 1.2), '#66ff66');

// Dynamic labels (update with point position)
const lblWorldPt = addLabel('(X₁, Y₁, 0)', P_world.clone().add(new THREE.Vector3(0.3, 0.3, 0)), '#00ffff');
const lblProjPt  = addLabel('(x₁, y₁)', pProj.clone().add(new THREE.Vector3(0.2, 0.3, 0.1)), '#00ffff');

// ===================================================================
//  Update functions – called when sliders change
// ===================================================================
function updatePoint() {
  const x = parseFloat(document.getElementById('ptX').value);
  const y = parseFloat(document.getElementById('ptY').value);
  document.getElementById('ptX-val').textContent = x.toFixed(1);
  document.getElementById('ptY-val').textContent = y.toFixed(1);

  P_world.set(x, y, 0);
  pSphere.position.copy(P_world);

  // Recompute projection
  pProj = projectOntoImagePlane(P_world);
  projSphere.position.copy(pProj);

  // Update projection ray
  scene.remove(rayLine);
  rayGeom.dispose();
  rayGeom = new THREE.BufferGeometry().setFromPoints([camCenter, pProj, P_world]);
  rayLine = new THREE.Line(rayGeom, rayMat);
  rayLine.computeLineDistances();
  rayLine.visible = document.getElementById('showFrustum').checked;
  scene.add(rayLine);

  // Update dynamic labels
  lblWorldPt.position.copy(P_world.clone().add(new THREE.Vector3(0.3, 0.3, 0)));
  lblProjPt.position.copy(pProj.clone().add(new THREE.Vector3(0.2, 0.3, 0.1)));
}

document.getElementById('ptX').addEventListener('input', updatePoint);
document.getElementById('ptY').addEventListener('input', updatePoint);

// Toggle frustum rays
document.getElementById('showFrustum').addEventListener('change', e => {
  const vis = e.target.checked;
  rayLine.visible = vis;
  frustumLines.forEach(l => l.visible = vis);
});

// Toggle labels visibility
document.getElementById('showLabels').addEventListener('change', e => {
  labels.forEach(l => l.visible = e.target.checked);
});

// ===================================================================
//  Animation – move point in a circle on the plane to show how the
//  projected point moves on the image plane (demonstrating the
//  non-linear mapping of the homography).
// ===================================================================
let animating = false;
let animAngle = 0;
document.getElementById('btnAnimate').addEventListener('click', () => { animating = true; });
document.getElementById('btnStopAnim').addEventListener('click', () => { animating = false; });

function animatePoint(dt) {
  if (!animating) return;
  animAngle += dt * 0.8;
  const r = 1.8;
  const cx = 1.5, cy = 1.0;
  const nx = cx + r * Math.cos(animAngle);
  const ny = cy + r * Math.sin(animAngle);
  document.getElementById('ptX').value = nx.toFixed(1);
  document.getElementById('ptY').value = ny.toFixed(1);
  updatePoint();
}

// ===================================================================
//  Guided demo – step-through sequence explaining the concept
// ===================================================================
const infoBox = document.getElementById('info-box');
const steps = [
  {
    text: '<b>Step 1:</b> The gray quad is the <b>world plane</b> (Z = 0). We place the world coordinate system on this plane with the Z-axis pointing up.',
    action: () => {
      camera.position.set(0, -8, 6);
      controls.target.set(0, 0, 0);
    }
  },
  {
    text: '<b>Step 2:</b> The <b>camera center</b> (black dot) observes the plane. The semi-transparent quad is the <b>image plane</b> where the image is formed.',
    action: () => {
      camera.position.set(-5, 3, 7);
      controls.target.set(-1, 1, 2);
    }
  },
  {
    text: '<b>Step 3:</b> A point <b>(X₁, Y₁, 0)</b> on the plane projects through the camera center onto the image plane at <b>(x₁, y₁)</b>. The cyan ray shows this projection.',
    action: () => {
      camera.position.copy(TEXTBOOK_POS);
      controls.target.copy(TEXTBOOK_TARGET);
      document.getElementById('showFrustum').checked = true;
      rayLine.visible = true;
      frustumLines.forEach(l => l.visible = true);
    }
  },
  {
    text: '<b>Step 4:</b> Because every point has Z = 0, the third column of <b>[R | t]</b> drops out. The projection simplifies to a <b>3×3 matrix</b> H — a homography!',
    action: () => {
      camera.position.set(-4, 6, 5);
      controls.target.set(1, 0, 0);
    }
  },
  {
    text: '<b>Step 5:</b> Drag the sliders or press <em>Animate</em> to move the point on the plane. Notice how straight lines on the plane project as straight lines — but the spacing changes non-linearly.',
    action: () => {
      camera.position.copy(TEXTBOOK_POS);
      controls.target.copy(TEXTBOOK_TARGET);
    }
  },
  {
    text: '<b>Done!</b> Orbit the scene freely. The key insight: <b>a planar scene and its image are always related by a homography</b>, regardless of camera pose.',
    action: () => {}
  }
];
let stepIdx = -1;

document.getElementById('btnStep').addEventListener('click', () => {
  stepIdx = (stepIdx + 1) % steps.length;
  infoBox.innerHTML = steps[stepIdx].text;
  infoBox.style.opacity = 1;
  steps[stepIdx].action();
  controls.update();
});

// ===================================================================
//  Reset to textbook view
// ===================================================================
document.getElementById('btnResetView').addEventListener('click', () => {
  camera.position.copy(TEXTBOOK_POS);
  controls.target.copy(TEXTBOOK_TARGET);
  controls.update();
  stepIdx = -1;
  infoBox.style.opacity = 0;
  animating = false;
  document.getElementById('ptX').value = 2.0;
  document.getElementById('ptY').value = 1.5;
  document.getElementById('showFrustum').checked = true;
  document.getElementById('showLabels').checked = true;
  labels.forEach(l => l.visible = true);
  rayLine.visible = true;
  frustumLines.forEach(l => l.visible = true);
  updatePoint();
});

// ===================================================================
//  Render loop
// ===================================================================
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  controls.update();
  animatePoint(dt);
  renderer.render(scene, camera);
}
animate();

// Resize handling
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
