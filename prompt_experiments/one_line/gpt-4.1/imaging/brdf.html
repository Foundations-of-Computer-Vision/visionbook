<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>3D Interactive Figure - Three.js</title>
    <style>
        body {
            margin: 0;
        }

        canvas {
            display: block;
        }

        #label {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #222;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <div id="label">
        <b>Interactive 3D Figure</b><br>
        <i>Inspired by textbook diagram</i>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        // Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 5, 7);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        // Plane
        const planeGeometry = new THREE.PlaneGeometry(8, 5);
        const planeMaterial = new THREE.MeshPhongMaterial({ color: 0x99ff00, side: THREE.DoubleSide, opacity: 0.7, transparent: true });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);

        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x888888));

        // Arrow helper function
        function addArrow(start, end, color, name) {
            const dir = new THREE.Vector3().subVectors(end, start).normalize();
            const length = start.distanceTo(end);
            const arrow = new THREE.ArrowHelper(dir, start, length, color, 0.4, 0.2);
            scene.add(arrow);
            return arrow;
        }

        // Points
        const p = new THREE.Vector3(0, 0, 0); // center
        const n = new THREE.Vector3(0, 2, 0); // normal
        const q = new THREE.Vector3(1.5, 1.5, 0); // outgoing
        const lambda = new THREE.Vector3(-2, 2, 0); // incoming

        // Arrows
        addArrow(p, n, 0x000000, 'n'); // normal
        addArrow(p, q, 0x228B22, 'q'); // outgoing
        addArrow(lambda, p, 0xffa500, 'in'); // incoming

        // Multiple outgoing arrows (for illustration)
        for (let i = 0; i < 5; i++) {
            const angle = Math.PI / 4 + i * Math.PI / 8;
            const q_multi = new THREE.Vector3(Math.cos(angle) * 2, Math.sin(angle) * 2, 0);
            addArrow(p, q_multi, 0x228B22, 'q_multi');
        }

        // Labels using CSS2DRenderer
        const labelRenderer = new THREE.CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        document.body.appendChild(labelRenderer.domElement);

        function makeLabel(text, position) {
            const div = document.createElement('div');
            div.className = 'label';
            div.textContent = text;
            div.style.background = 'rgba(255,255,255,0.8)';
            div.style.padding = '2px 6px';
            div.style.borderRadius = '4px';
            div.style.fontSize = '16px';
            div.style.fontWeight = 'bold';
            div.style.color = '#222';
            return new THREE.CSS2DObject(div).setPosition(position.x, position.y, position.z);
        }

        // Add labels
        scene.add(makeLabel('p', p));
        scene.add(makeLabel('n', n));
        scene.add(makeLabel('q', q));
        scene.add(makeLabel('λ', lambda));

        // Equation label
        const eqDiv = document.createElement('div');
        eqDiv.innerHTML = '<span style="font-size:20px;">ℓ<sub>out</sub> = F(ℓ<sub>in</sub>, n, λ, p, q)</span>';
        eqDiv.style.background = 'rgba(255,255,255,0.9)';
        eqDiv.style.padding = '4px 10px';
        eqDiv.style.borderRadius = '6px';
        eqDiv.style.color = '#222';
        const eqLabel = new THREE.CSS2DObject(eqDiv);
        eqLabel.position.set(2.5, 2.5, 0);
        scene.add(eqLabel);

        // Animate
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        // Responsive
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
