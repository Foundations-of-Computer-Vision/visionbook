<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Homography: Planar Scene Projection Geometry</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute; top: 12px; left: 12px;
            color: #e0e0e0; background: rgba(0,0,0,0.65);
            padding: 14px 18px; border-radius: 8px; max-width: 360px;
            font-size: 13px; line-height: 1.55; pointer-events: none;
        }
        #info h2 { margin-bottom: 6px; font-size: 15px; color: #fff; }
        #info .key { color: #7ecfff; font-weight: 600; }
        #controls {
            position: absolute; bottom: 14px; left: 14px;
            color: #ccc; background: rgba(0,0,0,0.6);
            padding: 12px 16px; border-radius: 8px; font-size: 12.5px;
        }
        #controls label { display: block; margin: 4px 0; }
        #controls input[type=range] { width: 160px; vertical-align: middle; }
        #controls input[type=checkbox] { vertical-align: middle; margin-right: 4px; }
    </style>
</head>
<body>

<div id="info">
    <h2>Homography &mdash; Planar Scene Projection</h2>
    The world-coordinate origin <span class="key">O<sub>w</sub></span> lies in the plane (Z&hairsp;=&hairsp;0).
    A point <span class="key">P</span> on the plane projects through the
    camera center <span class="key">O<sub>c</sub></span> onto image point
    <span class="key">p</span>.<br>
    <em style="font-size:11.5px; color:#aaa;">Drag to orbit &middot; Scroll to zoom &middot; Right-drag to pan</em>
</div>

<div id="controls">
    <label>Point X: <input id="pxSlider" type="range" min="-3" max="3" step="0.05" value="1.8"> <span id="pxVal">1.80</span></label>
    <label>Point Y: <input id="pySlider" type="range" min="-3" max="3" step="0.05" value="1.2"> <span id="pyVal">1.20</span></label>
    <label>Camera height: <input id="chSlider" type="range" min="2" max="8" step="0.1" value="4.5"> <span id="chVal">4.50</span></label>
    <label>Focal length: <input id="flSlider" type="range" min="0.6" max="3" step="0.05" value="1.4"> <span id="flVal">1.40</span></label>
    <label><input id="showRay" type="checkbox" checked> Show projection ray</label>
    <label><input id="showAxes" type="checkbox" checked> Show world axes</label>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ── Scene setup ──────────────────────────────────────────────
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
camera.position.set(7, 6, 9);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.enableDamping = true;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
dLight.position.set(5, 10, 7);
scene.add(dLight);

// ── Helpers ──────────────────────────────────────────────────
function makeLabel(text, color = '#ffffff', fontSize = '13px') {
    const div = document.createElement('div');
    div.textContent = text;
    div.style.cssText = `color:${color};font-family:'Segoe UI',sans-serif;font-size:${fontSize};font-weight:700;
        text-shadow:0 0 4px rgba(0,0,0,0.85);pointer-events:none;`;
    const obj = new CSS2DObject(div);
    scene.add(obj);
    return obj;
}

function makeArrow(dir, origin, len, color, headLen = 0.18, headW = 0.09) {
    const a = new THREE.ArrowHelper(dir.clone().normalize(), origin, len, color, headLen, headW);
    scene.add(a);
    return a;
}

function makeLine(pts, color, dashed = false) {
    const geom = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = dashed
        ? new THREE.LineDashedMaterial({ color, dashSize: 0.15, gapSize: 0.1, transparent: true, opacity: 0.7 })
        : new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.85 });
    const line = new THREE.Line(geom, mat);
    if (dashed) line.computeLineDistances();
    scene.add(line);
    return line;
}

function updateLine(lineObj, pts) {
    lineObj.geometry.dispose();
    lineObj.geometry = new THREE.BufferGeometry().setFromPoints(pts);
    if (lineObj.material.isLineDashedMaterial) lineObj.computeLineDistances();
}

// ── World plane (Z=0 → shown as Y=0 in Three.js, but we keep textbook convention) ──
// We'll use Y-up in Three.js. Map textbook (X,Y,Z) → Three.js (X, Z_textbook, -Y_textbook... )
// Actually, let's keep it simple: textbook X→X, textbook Y→Z, textbook Z→Y in Three.js.
// So the plane Z=0 in textbook → Y=0 in Three.js (the ground).

// Ground grid
const gridSize = 7;
const gridDiv  = 14;
const grid = new THREE.GridHelper(gridSize * 2, gridDiv * 2, 0x444466, 0x2a2a44);
grid.material.transparent = true;
grid.material.opacity = 0.6;
scene.add(grid);

// Semi-transparent plane
const planeGeo  = new THREE.PlaneGeometry(gridSize * 2, gridSize * 2);
const planeMat  = new THREE.MeshStandardMaterial({
    color: 0x3355aa, transparent: true, opacity: 0.12,
    side: THREE.DoubleSide, depthWrite: false
});
const planeMesh = new THREE.Mesh(planeGeo, planeMat);
planeMesh.rotation.x = -Math.PI / 2;
planeMesh.position.y = 0.001;
scene.add(planeMesh);

// ── World axes (X, Y textbook = X, Z three.js; Z textbook = Y three.js) ──
const axLen = 4.5;
const xAxisArrow = makeArrow(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 0), axLen, 0xff4444);
const yAxisArrow = makeArrow(new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, 0), axLen, 0x44cc44);
const zAxisArrow = makeArrow(new THREE.Vector3(0, 1, 0), new THREE.Vector3(0, 0, 0), axLen * 0.7, 0x4488ff);

const worldAxesGroup = new THREE.Group();
// (arrows are already in scene; we track visibility manually)

const lblX  = makeLabel('X', '#ff6666');   lblX.position.set(axLen + 0.3, 0, 0);
const lblY  = makeLabel('Y', '#66dd66');   lblY.position.set(0, 0, axLen + 0.3);
const lblZ  = makeLabel('Z', '#66aaff');   lblZ.position.set(0, axLen * 0.7 + 0.3, 0);
const lblOw = makeLabel('Oᵤ (Z=0 plane)', '#ccccff', '12px'); lblOw.position.set(0.4, -0.3, 0.4);

// ── Camera body ─────────────────────────────────────────────
// Camera parameters (mutable)
let camTx = 2.5, camTz = -1.0;    // camera lateral offset in Three.js XZ
let camHeight  = 4.5;             // camera height (Three.js Y)
let focalLen   = 1.4;

// Camera frustum visual
const camGroup = new THREE.Group();
scene.add(camGroup);

// Small box for camera body
const camBodyGeo = new THREE.BoxGeometry(0.35, 0.35, 0.5);
const camBodyMat = new THREE.MeshStandardMaterial({ color: 0xddaa33 });
const camBody    = new THREE.Mesh(camBodyGeo, camBodyMat);
camGroup.add(camBody);

// Camera local axes
const camAxLen = 1.0;
const camXArr = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), camAxLen, 0xff6666, 0.12, 0.06);
const camYArr = new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,0), camAxLen, 0x66dd66, 0.12, 0.06);
const camZArr = new THREE.ArrowHelper(new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,0), camAxLen, 0x6699ff, 0.12, 0.06);
camGroup.add(camXArr, camYArr, camZArr);

const lblOc = makeLabel('Oꞓ', '#ffcc44', '14px');
const lblCamX = makeLabel('xc', '#ff8888', '11px');
const lblCamY = makeLabel('yc', '#88ee88', '11px');
const lblCamZ = makeLabel('zc', '#88bbff', '11px');

// ── Image plane ─────────────────────────────────────────────
const imgPlaneGeo = new THREE.PlaneGeometry(2.2, 1.6);
const imgPlaneMat = new THREE.MeshStandardMaterial({
    color: 0x88ccff, transparent: true, opacity: 0.22,
    side: THREE.DoubleSide, depthWrite: false
});
const imgPlaneMesh = new THREE.Mesh(imgPlaneGeo, imgPlaneMat);
camGroup.add(imgPlaneMesh);

// Border for image plane
const imgBorderPts = [
    new THREE.Vector3(-1.1, -0.8, 0),
    new THREE.Vector3( 1.1, -0.8, 0),
    new THREE.Vector3( 1.1,  0.8, 0),
    new THREE.Vector3(-1.1,  0.8, 0),
    new THREE.Vector3(-1.1, -0.8, 0),
];
const imgBorderGeo = new THREE.BufferGeometry().setFromPoints(imgBorderPts);
const imgBorderLine = new THREE.Line(imgBorderGeo, new THREE.LineBasicMaterial({ color: 0x88ccff }));
camGroup.add(imgBorderLine);

const lblImgPlane = makeLabel('Image plane', '#aaddff', '11px');

// ── Point P on the world plane ──────────────────────────────
let Px = 1.8, Py = 1.2;   // textbook X, Y  → Three.js x, z

const pointPGeo = new THREE.SphereGeometry(0.12, 24, 24);
const pointPMat = new THREE.MeshStandardMaterial({ color: 0xff4466, emissive: 0x661122 });
const pointP    = new THREE.Mesh(pointPGeo, pointPMat);
scene.add(pointP);
const lblP = makeLabel('P = (X, Y, 0)', '#ff7799', '13px');

// Projected point p on image plane (will be computed)
const pointpGeo = new THREE.SphereGeometry(0.07, 20, 20);
const pointpMat = new THREE.MeshStandardMaterial({ color: 0x44ffaa, emissive: 0x116644 });
const pointp    = new THREE.Mesh(pointpGeo, pointpMat);
camGroup.add(pointp);
const lblp = makeLabel('p = (x, y)', '#66ffbb', '12px');

// Projection ray
const rayLine   = makeLine([new THREE.Vector3(), new THREE.Vector3()], 0xffaa44, true);
// Dashed line from P straight up to show the height = 0
const vertLine  = makeLine([new THREE.Vector3(), new THREE.Vector3()], 0x666688, true);

// Frustum edges (four lines from camera center to image plane corners)
const frustumLines = [];
for (let i = 0; i < 4; i++) {
    frustumLines.push(makeLine([new THREE.Vector3(), new THREE.Vector3()], 0x887744, true));
}

// ── Update geometry ─────────────────────────────────────────
function updateScene() {
    // Camera position in Three.js world
    const camPos = new THREE.Vector3(camTx, camHeight, camTz);
    camGroup.position.copy(camPos);

    // Camera looks toward world origin-ish (toward the plane)
    const lookTarget = new THREE.Vector3(0, 0, 0);
    const camDir = new THREE.Vector3().subVectors(lookTarget, camPos).normalize();

    // Build camera orientation: Z_cam points toward the scene (into the scene)
    const zCam = camDir.clone();
    const up   = new THREE.Vector3(0, 1, 0);
    const xCam = new THREE.Vector3().crossVectors(up, zCam).normalize();
    const yCam = new THREE.Vector3().crossVectors(zCam, xCam).normalize();

    const rotMat = new THREE.Matrix4().makeBasis(xCam, yCam, zCam);
    camGroup.setRotationFromMatrix(rotMat);

    // Image plane sits at focal length along local Z
    imgPlaneMesh.position.set(0, 0, focalLen);
    imgBorderLine.position.set(0, 0, focalLen);

    // Frustum corner lines
    const corners = [
        new THREE.Vector3(-1.1, -0.8, focalLen),
        new THREE.Vector3( 1.1, -0.8, focalLen),
        new THREE.Vector3( 1.1,  0.8, focalLen),
        new THREE.Vector3(-1.1,  0.8, focalLen),
    ];
    for (let i = 0; i < 4; i++) {
        const worldCorner = corners[i].clone().applyMatrix4(camGroup.matrixWorld);
        updateLine(frustumLines[i], [camPos, worldCorner]);
    }

    // Point P in Three.js coords (textbook X→x, Y→z, Z=0→y=0)
    pointP.position.set(Px, 0, Py);
    lblP.position.set(Px, 0.35, Py);

    // ── Compute projection of P onto image plane ────────────
    // Vector from camera center to P in world
    const camToP = new THREE.Vector3(Px - camPos.x, -camPos.y, Py - camPos.z);

    // Express in camera local frame
    const localP = new THREE.Vector3(
        camToP.dot(xCam),
        camToP.dot(yCam),
        camToP.dot(zCam)
    );

    // Project onto image plane at z = focalLen
    if (localP.z > 0.01) {
        const scale = focalLen / localP.z;
        const imgX  = localP.x * scale;
        const imgY  = localP.y * scale;

        pointp.position.set(imgX, imgY, focalLen);
        pointp.visible = true;

        // Label p in world coords
        const pWorld = new THREE.Vector3(imgX, imgY, focalLen).applyMatrix4(camGroup.matrixWorld);
        lblp.position.copy(pWorld).add(new THREE.Vector3(0.15, 0.15, 0));
        lblp.element.style.display = '';
    } else {
        pointp.visible = false;
        lblp.element.style.display = 'none';
    }

    // Projection ray (camera center → P on plane)
    const showRayChecked = document.getElementById('showRay').checked;
    rayLine.visible = showRayChecked;
    if (showRayChecked) {
        updateLine(rayLine, [camPos, new THREE.Vector3(Px, 0, Py)]);
    }

    // Labels
    lblOc.position.copy(camPos).add(new THREE.Vector3(0, 0.4, 0));
    lblCamX.position.set(camAxLen + 0.15, 0, 0);
    // Convert to world for label renderer
    const cxW = new THREE.Vector3(camAxLen + 0.15, 0, 0).applyMatrix4(camGroup.matrixWorld);
    const cyW = new THREE.Vector3(0, camAxLen + 0.15, 0).applyMatrix4(camGroup.matrixWorld);
    const czW = new THREE.Vector3(0, 0, camAxLen + 0.15).applyMatrix4(camGroup.matrixWorld);
    lblCamX.position.copy(cxW);
    lblCamY.position.copy(cyW);
    lblCamZ.position.copy(czW);

    const ipW = new THREE.Vector3(0, 0.95, focalLen).applyMatrix4(camGroup.matrixWorld);
    lblImgPlane.position.copy(ipW);

    // World axes visibility
    const showAx = document.getElementById('showAxes').checked;
    [xAxisArrow, yAxisArrow, zAxisArrow].forEach(a => a.visible = showAx);
    [lblX, lblY, lblZ, lblOw].forEach(l => l.element.style.display = showAx ? '' : 'none');
}

// ── UI bindings ─────────────────────────────────────────────
const pxS = document.getElementById('pxSlider');
const pyS = document.getElementById('pySlider');
const chS = document.getElementById('chSlider');
const flS = document.getElementById('flSlider');

pxS.addEventListener('input', () => { Px = +pxS.value; document.getElementById('pxVal').textContent = Px.toFixed(2); });
pyS.addEventListener('input', () => { Py = +pyS.value; document.getElementById('pyVal').textContent = Py.toFixed(2); });
chS.addEventListener('input', () => { camHeight = +chS.value; document.getElementById('chVal').textContent = camHeight.toFixed(2); });
flS.addEventListener('input', () => { focalLen = +flS.value; document.getElementById('flVal').textContent = focalLen.toFixed(2); });

// ── Animation loop ──────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    updateScene();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
}
animate();

// ── Resize handling ─────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    labelRenderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
