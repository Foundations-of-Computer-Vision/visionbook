<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perspective Projection – Similar Triangles (Interactive 3D)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
  #info {
    position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.92);
    padding: 14px 18px; border-radius: 10px; font-size: 13px; line-height: 1.55;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12); max-width: 310px; z-index: 10;
    pointer-events: auto;
  }
  #info h3 { margin-bottom: 6px; font-size: 15px; }
  #info .eq { font-style: italic; color: #333; }
  #controls {
    position: absolute; bottom: 14px; left: 12px; background: rgba(255,255,255,0.92);
    padding: 12px 16px; border-radius: 10px; font-size: 13px; z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12); pointer-events: auto;
  }
  #controls label { display: block; margin: 4px 0; }
  #controls input[type=range] { width: 160px; vertical-align: middle; }
  #controls .val { display: inline-block; width: 42px; text-align: right; font-variant-numeric: tabular-nums; }
  canvas { display: block; }
  .legend-color { display: inline-block; width: 12px; height: 12px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
</style>
</head>
<body>

<div id="info">
  <h3>Perspective Projection &amp; Similar Triangles</h3>
  From similar triangles:<br>
  <span class="eq">x / f = X / Z</span> &nbsp;and&nbsp; <span class="eq">y / f = Y / Z</span><br><br>
  <span class="legend-color" style="background:#e07040;"></span> Triangle 1 (X–Z plane)<br>
  <span class="legend-color" style="background:#4090d0;"></span> Triangle 2 (Y–Z plane)<br><br>
  <b>Drag</b> to orbit &nbsp;|&nbsp; <b>Scroll</b> to zoom<br>
  <b>Drag the yellow sphere</b> to move point <i>P</i>
</div>

<div id="controls">
  <label>Focal length <i>f</i>:
    <input id="fSlider" type="range" min="0.5" max="3" step="0.05" value="1.5">
    <span class="val" id="fVal">1.50</span>
  </label>
  <label>
    <input id="showLabels" type="checkbox" checked> Show labels
  </label>
</div>

<!-- Three.js r160 (ESM import‑map) -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { DragControls } from 'three/addons/controls/DragControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

/* ------------------------------------------------------------------ */
/*  Scene / Camera / Renderers                                        */
/* ------------------------------------------------------------------ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f5);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(6, 4, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

/* ------------------------------------------------------------------ */
/*  Orbit controls                                                     */
/* ------------------------------------------------------------------ */
const orbit = new OrbitControls(camera, renderer.domElement);
orbit.enableDamping = true;
orbit.dampingFactor = 0.1;
orbit.target.set(2, 0.5, 0);

/* ------------------------------------------------------------------ */
/*  Lighting                                                           */
/* ------------------------------------------------------------------ */
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 8, 6);
scene.add(dirLight);

/* ------------------------------------------------------------------ */
/*  Colours                                                            */
/* ------------------------------------------------------------------ */
const COL_TRI_XZ  = 0xe07040;   // orange-red — triangle in X–Z plane
const COL_TRI_YZ  = 0x4090d0;   // blue       — triangle in Y–Z plane
const COL_AXIS    = 0x888888;
const COL_IMG     = 0xcccccc;
const COL_RAY     = 0x444444;
const COL_PT      = 0xf0c020;   // yellow for the draggable point

/* ------------------------------------------------------------------ */
/*  Helper builders                                                    */
/* ------------------------------------------------------------------ */
function makeLine(pts, color, linewidth = 1.5, dashed = false) {
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = dashed
    ? new THREE.LineDashedMaterial({ color, linewidth, dashSize: 0.15, gapSize: 0.1 })
    : new THREE.LineBasicMaterial({ color, linewidth });
  const line = new THREE.Line(geo, mat);
  if (dashed) line.computeLineDistances();
  return line;
}

function makeLabel(text, pos, color = '#333', fontSize = '13px', bold = false) {
  const div = document.createElement('div');
  div.style.color = color;
  div.style.fontSize = fontSize;
  div.style.fontFamily = "'Segoe UI', Arial, sans-serif";
  if (bold) div.style.fontWeight = '600';
  div.textContent = text;
  const obj = new CSS2DObject(div);
  obj.position.copy(pos);
  obj.userData.labelDiv = div;
  return obj;
}

function makeTriangleMesh(a, b, c, color, opacity = 0.22) {
  const geo = new THREE.BufferGeometry();
  const verts = new Float32Array([a.x,a.y,a.z, b.x,b.y,b.z, c.x,c.y,c.z]);
  geo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  geo.computeVertexNormals();
  const mat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity, side: THREE.DoubleSide, depthWrite: false
  });
  return new THREE.Mesh(geo, mat);
}

function updateTriangleMesh(mesh, a, b, c) {
  const pos = mesh.geometry.attributes.position;
  pos.setXYZ(0, a.x, a.y, a.z);
  pos.setXYZ(1, b.x, b.y, b.z);
  pos.setXYZ(2, c.x, c.y, c.z);
  pos.needsUpdate = true;
}

function makeArrow(from, to, color, headLen = 0.15, headW = 0.06) {
  const dir = new THREE.Vector3().subVectors(to, from);
  const len = dir.length();
  dir.normalize();
  return new THREE.ArrowHelper(dir, from, len, color, headLen, headW);
}

/* ------------------------------------------------------------------ */
/*  State                                                              */
/* ------------------------------------------------------------------ */
let f = 1.5;           // focal length
let P = new THREE.Vector3(5, 2, 1.5);   // 3‑D point (X, Y, Z) – Z is lateral here

// In this coordinate system (matching the textbook):
//   Z-axis: optical axis (depth, pointing right in the 2-D figure)
//   X-axis: horizontal
//   Y-axis: vertical (up)
// But Three.js Y is up, so we map: textbook-Z → Three-X, textbook-X → Three-Z, textbook-Y → Three-Y

// For simplicity in 3-D we'll use Three's axes literally:
//   Optical axis = +X   (depth into scene)
//   Horizontal   = +Z
//   Vertical     = +Y

/* ------------------------------------------------------------------ */
/*  Build static elements                                              */
/* ------------------------------------------------------------------ */

// ----- Pinhole (origin) -----
const pinholeSph = new THREE.Mesh(
  new THREE.SphereGeometry(0.08, 24, 24),
  new THREE.MeshStandardMaterial({ color: 0x222222 })
);
scene.add(pinholeSph);
const labelO = makeLabel('O (pinhole)', new THREE.Vector3(0, -0.3, 0), '#222', '13px', true);
scene.add(labelO);

// ----- Axes (subtle) -----
const axLen = 7;
const axisX = makeArrow(new THREE.Vector3(0,0,0), new THREE.Vector3(axLen,0,0), 0x999999, 0.2, 0.07);
const axisY = makeArrow(new THREE.Vector3(0,0,0), new THREE.Vector3(0, 3.5,0), 0x999999, 0.2, 0.07);
const axisZ = makeArrow(new THREE.Vector3(0,0,0), new THREE.Vector3(0,0, 3.5), 0x999999, 0.2, 0.07);
scene.add(axisX, axisY, axisZ);

const labelZ = makeLabel('Z (depth)', new THREE.Vector3(axLen + 0.3, 0, 0), '#666');
const labelY = makeLabel('Y', new THREE.Vector3(0, 3.8, 0), '#666');
const labelX = makeLabel('X', new THREE.Vector3(0, 0, 3.8), '#666');
scene.add(labelZ, labelY, labelX);

// ----- 3‑D point P (draggable) -----
const pointSph = new THREE.Mesh(
  new THREE.SphereGeometry(0.12, 24, 24),
  new THREE.MeshStandardMaterial({ color: COL_PT, emissive: 0x806010, emissiveIntensity: 0.3 })
);
pointSph.position.copy(P);
scene.add(pointSph);

// ----- Dynamic objects (created once, updated in rebuild()) -----
let dynGroup = new THREE.Group();
scene.add(dynGroup);

// Container for labels that toggle
let labelsGroup = new THREE.Group();
scene.add(labelsGroup);

/* ------------------------------------------------------------------ */
/*  Image plane mesh                                                   */
/* ------------------------------------------------------------------ */
function makeImagePlane(focalLen) {
  const w = 4, h = 3;
  const geo = new THREE.PlaneGeometry(h, w);
  const mat = new THREE.MeshBasicMaterial({
    color: 0xddeeff, transparent: true, opacity: 0.28, side: THREE.DoubleSide, depthWrite: false
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.y = Math.PI / 2;   // face along X
  mesh.position.set(focalLen, 0, 0);
  return mesh;
}

let imgPlaneMesh = makeImagePlane(f);
scene.add(imgPlaneMesh);

// Border of image plane
function makeImagePlaneBorder(focalLen) {
  const hw = 2, hh = 1.5;
  const pts = [
    new THREE.Vector3(focalLen, -hh, -hw),
    new THREE.Vector3(focalLen, -hh,  hw),
    new THREE.Vector3(focalLen,  hh,  hw),
    new THREE.Vector3(focalLen,  hh, -hw),
    new THREE.Vector3(focalLen, -hh, -hw),
  ];
  return makeLine(pts, 0x6688aa, 1);
}
let imgBorder = makeImagePlaneBorder(f);
scene.add(imgBorder);

/* ------------------------------------------------------------------ */
/*  Rebuild dynamic geometry                                           */
/* ------------------------------------------------------------------ */
function rebuild() {
  // Clear previous
  dynGroup.clear();
  labelsGroup.clear();

  const Px = P.x;  // Z in textbook (depth)
  const Py = P.y;  // Y in textbook (vertical)
  const Pz = P.z;  // X in textbook (horizontal)

  // Projected coordinates on image plane at depth = f
  const imgY = f * Py / Px;   // y = f * Y / Z
  const imgZ = f * Pz / Px;   // x = f * X / Z

  const O = new THREE.Vector3(0, 0, 0);
  const Ppos = new THREE.Vector3(Px, Py, Pz);
  const imgPt = new THREE.Vector3(f, imgY, imgZ);

  // ── Ray from O through P ──
  const rayDir = Ppos.clone().normalize();
  const farPt = rayDir.clone().multiplyScalar(Px * 1.15);
  dynGroup.add(makeLine([O, farPt], COL_RAY, 1.5));

  // ── Projection dot on image plane ──
  const projDot = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xdd3333 })
  );
  projDot.position.copy(imgPt);
  dynGroup.add(projDot);

  // ── Dashed line from P down to optical axis (vertical guide) ──
  dynGroup.add(makeLine([Ppos, new THREE.Vector3(Px, 0, 0)], 0xaaaaaa, 1, true));
  // Dashed line from P sideways to optical axis (horizontal guide)
  dynGroup.add(makeLine([Ppos, new THREE.Vector3(Px, 0, Pz)], 0xaaaaaa, 1, true));
  dynGroup.add(makeLine([new THREE.Vector3(Px, 0, Pz), new THREE.Vector3(Px, 0, 0)], 0xaaaaaa, 1, true));

  // ── Similar Triangle 1: in Y–depth plane (blue) ──
  // Big triangle:  O → (Px, 0, 0) → (Px, Py, 0) → O
  const A1 = O;
  const B1 = new THREE.Vector3(Px, 0, 0);
  const C1 = new THREE.Vector3(Px, Py, 0);
  dynGroup.add(makeTriangleMesh(A1, B1, C1, COL_TRI_YZ, 0.18));
  dynGroup.add(makeLine([A1, B1, C1, A1], COL_TRI_YZ, 2));

  // Small triangle: O → (f, 0, 0) → (f, imgY, 0) → O
  const A1s = O;
  const B1s = new THREE.Vector3(f, 0, 0);
  const C1s = new THREE.Vector3(f, imgY, 0);
  dynGroup.add(makeTriangleMesh(A1s, B1s, C1s, COL_TRI_YZ, 0.35));
  dynGroup.add(makeLine([A1s, B1s, C1s, A1s], COL_TRI_YZ, 2.5));

  // ── Similar Triangle 2: in X–depth plane (orange) ──
  // Big triangle:  O → (Px, 0, 0) → (Px, 0, Pz) → O
  const A2 = O;
  const B2 = new THREE.Vector3(Px, 0, 0);
  const C2 = new THREE.Vector3(Px, 0, Pz);
  dynGroup.add(makeTriangleMesh(A2, B2, C2, COL_TRI_XZ, 0.18));
  dynGroup.add(makeLine([A2, B2, C2, A2], COL_TRI_XZ, 2));

  // Small triangle: O → (f, 0, 0) → (f, 0, imgZ) → O
  const A2s = O;
  const B2s = new THREE.Vector3(f, 0, 0);
  const C2s = new THREE.Vector3(f, 0, imgZ);
  dynGroup.add(makeTriangleMesh(A2s, B2s, C2s, COL_TRI_XZ, 0.35));
  dynGroup.add(makeLine([A2s, B2s, C2s, A2s], COL_TRI_XZ, 2.5));

  // ── Dashed projection lines on image plane ──
  dynGroup.add(makeLine([imgPt, new THREE.Vector3(f, 0, imgZ)], 0xaaaaaa, 1, true));
  dynGroup.add(makeLine([imgPt, new THREE.Vector3(f, imgY, 0)], 0xaaaaaa, 1, true));

  // ── Labels ──
  labelsGroup.add(makeLabel(
    `P = (${Pz.toFixed(1)}, ${Py.toFixed(1)}, ${Px.toFixed(1)})`,
    new THREE.Vector3(Px + 0.15, Py + 0.25, Pz), '#b08010', '13px', true
  ));

  labelsGroup.add(makeLabel(
    `p = (${imgZ.toFixed(2)}, ${imgY.toFixed(2)})`,
    new THREE.Vector3(f + 0.05, imgY + 0.2, imgZ + 0.15), '#cc2222', '12px', true
  ));

  labelsGroup.add(makeLabel('f', new THREE.Vector3(f / 2, -0.25, 0), '#336', '14px', true));
  labelsGroup.add(makeLabel('Z', new THREE.Vector3((Px + f) / 2, -0.25, 0), '#336', '13px'));

  labelsGroup.add(makeLabel('Y', new THREE.Vector3(Px + 0.2, Py / 2, 0), COL_TRI_YZ.toString().replace('0x','#') , '13px'));
  labelsGroup.add(makeLabel('y', new THREE.Vector3(f + 0.15, imgY / 2, 0), '#4090d0', '13px'));

  labelsGroup.add(makeLabel('X', new THREE.Vector3(Px + 0.15, -0.2, Pz / 2), '#e07040', '13px'));
  labelsGroup.add(makeLabel('x', new THREE.Vector3(f + 0.1, -0.2, imgZ / 2), '#e07040', '13px'));

  labelsGroup.add(makeLabel('Image plane', new THREE.Vector3(f, -1.8, 0), '#446688', '12px'));

  // Update image plane position
  imgPlaneMesh.position.x = f;
  scene.remove(imgBorder);
  imgBorder = makeImagePlaneBorder(f);
  scene.add(imgBorder);

  // Label visibility
  labelsGroup.visible = document.getElementById('showLabels').checked;
}

rebuild();

/* ------------------------------------------------------------------ */
/*  Drag controls for the point P                                     */
/* ------------------------------------------------------------------ */
const drag = new DragControls([pointSph], camera, renderer.domElement);
drag.addEventListener('dragstart', () => { orbit.enabled = false; });
drag.addEventListener('drag', () => {
  // Clamp point to reasonable range
  pointSph.position.x = Math.max(1.0, Math.min(8, pointSph.position.x));
  pointSph.position.y = Math.max(-2.5, Math.min(3, pointSph.position.y));
  pointSph.position.z = Math.max(-2.5, Math.min(3, pointSph.position.z));
  P.copy(pointSph.position);
  rebuild();
});
drag.addEventListener('dragend', () => { orbit.enabled = true; });

/* ------------------------------------------------------------------ */
/*  UI events                                                          */
/* ------------------------------------------------------------------ */
const fSlider = document.getElementById('fSlider');
const fVal = document.getElementById('fVal');
fSlider.addEventListener('input', () => {
  f = parseFloat(fSlider.value);
  fVal.textContent = f.toFixed(2);
  // Keep f < P depth
  if (f >= P.x) {
    P.x = f + 0.3;
    pointSph.position.x = P.x;
  }
  rebuild();
});

document.getElementById('showLabels').addEventListener('change', () => {
  labelsGroup.visible = document.getElementById('showLabels').checked;
});

/* ------------------------------------------------------------------ */
/*  Grid (subtle)                                                      */
/* ------------------------------------------------------------------ */
const gridHelper = new THREE.GridHelper(14, 28, 0xcccccc, 0xe0e0e0);
gridHelper.position.y = -0.01;
scene.add(gridHelper);

/* ------------------------------------------------------------------ */
/*  Animate                                                            */
/* ------------------------------------------------------------------ */
function animate() {
  requestAnimationFrame(animate);
  orbit.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();

/* ------------------------------------------------------------------ */
/*  Resize                                                             */
/* ------------------------------------------------------------------ */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
