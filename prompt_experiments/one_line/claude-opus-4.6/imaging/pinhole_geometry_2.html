<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pinhole Camera Geometry — Interactive 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  /* ── info panel ── */
  #info {
    position: absolute; top: 16px; left: 16px;
    background: rgba(10,10,30,.85); color: #e0e0e0;
    padding: 16px 20px; border-radius: 10px;
    max-width: 340px; font-size: 13px; line-height: 1.55;
    pointer-events: none; backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.08);
  }
  #info h2 { font-size: 16px; margin-bottom: 8px; color: #fff; }
  #info .eq { font-family: 'Times New Roman', serif; font-style: italic; color: #90caf9; }

  /* ── controls panel ── */
  #controls {
    position: absolute; bottom: 16px; left: 16px;
    background: rgba(10,10,30,.85); color: #ccc;
    padding: 14px 18px; border-radius: 10px;
    font-size: 13px; line-height: 1.7;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.08);
    min-width: 280px;
  }
  #controls label { display: block; margin-bottom: 2px; }
  #controls input[type=range] { width: 100%; accent-color: #64b5f6; }
  .slider-row { margin-bottom: 6px; }
  .val { color: #90caf9; font-family: monospace; float: right; }

  /* ── equations readout ── */
  #equations {
    position: absolute; top: 16px; right: 16px;
    background: rgba(10,10,30,.85); color: #e0e0e0;
    padding: 14px 18px; border-radius: 10px;
    font-size: 14px; line-height: 1.7;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.08);
    font-family: 'Times New Roman', serif;
    pointer-events: none;
  }
  #equations .label { color: #aaa; font-family: sans-serif; font-size: 12px; }
  #equations .math { color: #90caf9; }

  /* ── checkbox row ── */
  .cb-row { margin-top: 8px; display: flex; align-items: center; gap: 8px; }
  .cb-row input { accent-color: #64b5f6; }
</style>
</head>
<body>

<!-- Info panel -->
<div id="info">
  <h2>Pinhole Camera Geometry</h2>
  A 3D point <b>P</b> = (<span class="eq">X, Y, Z</span>) is projected
  through the pinhole (origin) onto the <em>projection plane</em> at
  distance <span class="eq">−f</span> and onto the <em>virtual image
  plane</em> at <span class="eq">+f</span>.<br><br>
  From similar triangles:
  <span class="eq">x = f · X / Z</span>, &nbsp;
  <span class="eq">y = f · Y / Z</span>
</div>

<!-- Live equations readout -->
<div id="equations">
  <div class="label">Perspective Projection</div>
  <div id="eq-readout"></div>
</div>

<!-- Control sliders -->
<div id="controls">
  <div class="slider-row">
    <label>P<sub>X</sub> <span class="val" id="vPx"></span></label>
    <input type="range" id="sPx" min="-3" max="3" step="0.05" value="1.8">
  </div>
  <div class="slider-row">
    <label>P<sub>Y</sub> <span class="val" id="vPy"></span></label>
    <input type="range" id="sPy" min="-3" max="3" step="0.05" value="1.2">
  </div>
  <div class="slider-row">
    <label>P<sub>Z</sub> <span class="val" id="vPz"></span></label>
    <input type="range" id="sPz" min="0.5" max="8" step="0.05" value="4.0">
  </div>
  <div class="slider-row">
    <label>Focal length <i>f</i> <span class="val" id="vF"></span></label>
    <input type="range" id="sF" min="0.3" max="3" step="0.05" value="1.0">
  </div>
  <div class="cb-row">
    <input type="checkbox" id="cbTriangles" checked>
    <label for="cbTriangles">Show similar triangles</label>
  </div>
  <div class="cb-row">
    <input type="checkbox" id="cbRealPlane" checked>
    <label for="cbRealPlane">Show real projection plane (behind pinhole)</label>
  </div>
</div>

<!-- Three.js + OrbitControls from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
/* ══════════════════════════════════════════════════════════════
   SCENE SETUP
   ══════════════════════════════════════════════════════════════ */
const scene    = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
camera.position.set(6, 4, 8);
camera.lookAt(0, 0, 2);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 2);

/* ── lighting ── */
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dir = new THREE.DirectionalLight(0xffffff, 0.6);
dir.position.set(5, 10, 7);
scene.add(dir);

/* ── subtle grid ── */
const gridHelper = new THREE.GridHelper(14, 28, 0x333355, 0x222244);
gridHelper.rotation.x = Math.PI / 2;           // lie in XY plane at Z=0
scene.add(gridHelper);

/* ══════════════════════════════════════════════════════════════
   MATERIALS
   ══════════════════════════════════════════════════════════════ */
const matRay        = new THREE.LineBasicMaterial({ color: 0xff5555, linewidth: 2 });
const matRayBehind  = new THREE.LineDashedMaterial({ color: 0xff5555, linewidth: 1, dashSize: 0.12, gapSize: 0.08 });
const matAxisX      = new THREE.LineBasicMaterial({ color: 0xff4444, linewidth: 2 });
const matAxisY      = new THREE.LineBasicMaterial({ color: 0x44cc44, linewidth: 2 });
const matAxisZ      = new THREE.LineBasicMaterial({ color: 0x4488ff, linewidth: 2 });
const matDash       = new THREE.LineDashedMaterial({ color: 0xaaaaaa, dashSize: 0.1, gapSize: 0.06, linewidth: 1 });

const matTriX = new THREE.MeshBasicMaterial({ color: 0xff9800, transparent: true, opacity: 0.18, side: THREE.DoubleSide, depthWrite: false });
const matTriY = new THREE.MeshBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.18, side: THREE.DoubleSide, depthWrite: false });

/* ══════════════════════════════════════════════════════════════
   HELPERS — reusable geometry builders
   ══════════════════════════════════════════════════════════════ */
function makeLine(a, b, mat) {
  const g = new THREE.BufferGeometry().setFromPoints([a, b]);
  const l = new THREE.Line(g, mat);
  if (mat.isLineDashedMaterial) l.computeLineDistances();
  return l;
}

function makeArrow(dir, origin, length, color, headLen, headW) {
  return new THREE.ArrowHelper(dir.normalize(), origin, length, color, headLen || 0.2, headW || 0.1);
}

function makePlane(w, h, color, opacity) {
  const g = new THREE.PlaneGeometry(w, h);
  const m = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.DoubleSide, depthWrite: false });
  return new THREE.Mesh(g, m);
}

function makeSphere(r, color) {
  const g = new THREE.SphereGeometry(r, 16, 16);
  const m = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.5 });
  return new THREE.Mesh(g, m);
}

function makeTriangleMesh(a, b, c, mat) {
  const g = new THREE.BufferGeometry();
  const verts = new Float32Array([a.x,a.y,a.z, b.x,b.y,b.z, c.x,c.y,c.z]);
  g.setAttribute('position', new THREE.BufferAttribute(verts, 3));
  g.computeVertexNormals();
  return new THREE.Mesh(g, mat);
}

/* ── Text sprite ── */
function makeTextSprite(text, opts = {}) {
  const fontSize = opts.fontSize || 48;
  const color    = opts.color    || '#ffffff';
  const canvas   = document.createElement('canvas');
  const ctx      = canvas.getContext('2d');
  ctx.font = `bold ${fontSize}px 'Segoe UI', sans-serif`;
  const tw = ctx.measureText(text).width;
  canvas.width  = tw + 20;
  canvas.height = fontSize * 1.4;
  ctx.font = `bold ${fontSize}px 'Segoe UI', sans-serif`;
  ctx.fillStyle = color;
  ctx.fillText(text, 10, fontSize);
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(canvas.width / canvas.height * (opts.size || 0.5), (opts.size || 0.5), 1);
  return sprite;
}

/* ══════════════════════════════════════════════════════════════
   BUILD SCENE — static elements
   ══════════════════════════════════════════════════════════════ */
// Coordinate axes
const axisLen = 4;
scene.add(makeArrow(new THREE.Vector3(1,0,0), new THREE.Vector3(0,0,0), axisLen, 0xff4444, 0.18, 0.09));
scene.add(makeArrow(new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,0), axisLen, 0x44cc44, 0.18, 0.09));
scene.add(makeArrow(new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,0), axisLen + 4, 0x4488ff, 0.18, 0.09));

// Negative Z axis (dashed)
const negZLine = makeLine(new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-2.5), matDash);
scene.add(negZLine);

// Axis labels
const lblX = makeTextSprite('X', { color: '#ff6666', size: 0.4 });
lblX.position.set(axisLen + 0.3, 0, 0);
scene.add(lblX);
const lblY = makeTextSprite('Y', { color: '#66dd66', size: 0.4 });
lblY.position.set(0, axisLen + 0.3, 0);
scene.add(lblY);
const lblZ = makeTextSprite('Z', { color: '#66aaff', size: 0.4 });
lblZ.position.set(0, 0, axisLen + 4.4);
scene.add(lblZ);

// Pinhole (origin) marker
const pinhole = makeSphere(0.08, 0xffffff);
scene.add(pinhole);
const pinLabel = makeTextSprite('Pinhole', { color: '#ffffff', size: 0.35 });
pinLabel.position.set(0.5, -0.35, 0);
scene.add(pinLabel);

/* ══════════════════════════════════════════════════════════════
   DYNAMIC ELEMENTS — recreated every frame
   ══════════════════════════════════════════════════════════════ */
const dynGroup = new THREE.Group();
scene.add(dynGroup);

/* ── DOM references ── */
const sPx = document.getElementById('sPx');
const sPy = document.getElementById('sPy');
const sPz = document.getElementById('sPz');
const sF  = document.getElementById('sF');
const cbTriangles = document.getElementById('cbTriangles');
const cbRealPlane = document.getElementById('cbRealPlane');

function rebuild() {
  // clear previous
  while (dynGroup.children.length) dynGroup.remove(dynGroup.children[0]);

  const PX = parseFloat(sPx.value);
  const PY = parseFloat(sPy.value);
  const PZ = parseFloat(sPz.value);
  const f  = parseFloat(sF.value);

  // update readouts
  document.getElementById('vPx').textContent = PX.toFixed(2);
  document.getElementById('vPy').textContent = PY.toFixed(2);
  document.getElementById('vPz').textContent = PZ.toFixed(2);
  document.getElementById('vF').textContent  = f.toFixed(2);

  // derived projected coordinates
  const px = f * PX / PZ;
  const py = f * PY / PZ;

  // update equations readout
  document.getElementById('eq-readout').innerHTML =
    `<span class="math">x = f · X / Z = ${f.toFixed(2)} · ${PX.toFixed(2)} / ${PZ.toFixed(2)} = ${px.toFixed(3)}</span><br>` +
    `<span class="math">y = f · Y / Z = ${f.toFixed(2)} · ${PY.toFixed(2)} / ${PZ.toFixed(2)} = ${py.toFixed(3)}</span>`;

  /* ── Virtual image plane (in front, at z = f) ── */
  const planeSize = 3.0;
  const vPlane = makePlane(planeSize, planeSize, 0x4488ff, 0.12);
  vPlane.position.set(0, 0, f);
  dynGroup.add(vPlane);
  // border
  const vBorder = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.PlaneGeometry(planeSize, planeSize)),
    new THREE.LineBasicMaterial({ color: 0x4488ff })
  );
  vBorder.position.copy(vPlane.position);
  dynGroup.add(vBorder);
  // label
  const vpLabel = makeTextSprite('Virtual Image Plane (z = f)', { color: '#66aaff', size: 0.3 });
  vpLabel.position.set(0, planeSize / 2 + 0.25, f);
  dynGroup.add(vpLabel);

  /* ── Real projection plane (behind, at z = −f) ── */
  if (cbRealPlane.checked) {
    const rPlane = makePlane(planeSize, planeSize, 0xff8844, 0.10);
    rPlane.position.set(0, 0, -f);
    dynGroup.add(rPlane);
    const rBorder = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.PlaneGeometry(planeSize, planeSize)),
      new THREE.LineBasicMaterial({ color: 0xff8844 })
    );
    rBorder.position.copy(rPlane.position);
    dynGroup.add(rBorder);
    const rpLabel = makeTextSprite('Projection Plane (z = −f)', { color: '#ffaa66', size: 0.3 });
    rpLabel.position.set(0, planeSize / 2 + 0.25, -f);
    dynGroup.add(rpLabel);

    // Projected point on real plane (inverted)
    const pReal = makeSphere(0.06, 0xff8844);
    pReal.position.set(-px, -py, -f);
    dynGroup.add(pReal);
    const pRealLabel = makeTextSprite('p\' (inverted)', { color: '#ffaa66', size: 0.28 });
    pRealLabel.position.set(-px + 0.25, -py + 0.2, -f);
    dynGroup.add(pRealLabel);

    // dashed ray continuation behind pinhole
    const rayBehind = makeLine(
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(-px, -py, -f),
      matRayBehind
    );
    dynGroup.add(rayBehind);
  }

  /* ── 3D Point P ── */
  const sphereP = makeSphere(0.10, 0xffdd44);
  sphereP.position.set(PX, PY, PZ);
  dynGroup.add(sphereP);
  const labelP = makeTextSprite(`P (${PX.toFixed(1)}, ${PY.toFixed(1)}, ${PZ.toFixed(1)})`, { color: '#ffee66', size: 0.35 });
  labelP.position.set(PX + 0.3, PY + 0.3, PZ);
  dynGroup.add(labelP);

  /* ── Projected point p on virtual plane ── */
  const sphereP2 = makeSphere(0.07, 0x44ddff);
  sphereP2.position.set(px, py, f);
  dynGroup.add(sphereP2);
  const labelp = makeTextSprite(`p (${px.toFixed(2)}, ${py.toFixed(2)})`, { color: '#44ddff', size: 0.30 });
  labelp.position.set(px + 0.2, py + 0.2, f);
  dynGroup.add(labelp);

  /* ── Ray from P through pinhole ── */
  const ray = makeLine(new THREE.Vector3(PX, PY, PZ), new THREE.Vector3(0, 0, 0), matRay);
  dynGroup.add(ray);
  // continuation to virtual plane
  const ray2 = makeLine(new THREE.Vector3(0, 0, 0), new THREE.Vector3(px, py, f),
    new THREE.LineBasicMaterial({ color: 0xff5555, linewidth: 2 }));
  dynGroup.add(ray2);

  /* ── Dashed drop-lines for P ── */
  // P to XY-plane at Z=PZ  →  show X, Y
  dynGroup.add(makeLine(new THREE.Vector3(PX, PY, PZ), new THREE.Vector3(PX, 0, PZ), matDash));
  dynGroup.add(makeLine(new THREE.Vector3(PX, PY, PZ), new THREE.Vector3(0, PY, PZ), matDash));
  // P to Z-axis
  dynGroup.add(makeLine(new THREE.Vector3(PX, 0, PZ), new THREE.Vector3(0, 0, PZ), matDash));
  dynGroup.add(makeLine(new THREE.Vector3(0, PY, PZ), new THREE.Vector3(0, 0, PZ), matDash));

  /* ── Dashed drop-lines for p ── */
  dynGroup.add(makeLine(new THREE.Vector3(px, py, f), new THREE.Vector3(px, 0, f), matDash));
  dynGroup.add(makeLine(new THREE.Vector3(px, py, f), new THREE.Vector3(0, py, f), matDash));

  /* ── f-distance indicator ── */
  const fInd = makeLine(new THREE.Vector3(-planeSize/2 - 0.3, -planeSize/2 - 0.15, 0),
                         new THREE.Vector3(-planeSize/2 - 0.3, -planeSize/2 - 0.15, f),
    new THREE.LineBasicMaterial({ color: 0xcccccc }));
  dynGroup.add(fInd);
  const fLabel = makeTextSprite('f', { color: '#cccccc', size: 0.32 });
  fLabel.position.set(-planeSize/2 - 0.3, -planeSize/2 - 0.15, f / 2);
  dynGroup.add(fLabel);

  /* ── Similar triangles (XZ and YZ planes) ── */
  if (cbTriangles.checked) {
    // XZ-plane triangle (orange): O → (PX, 0, PZ) → (px, 0, f) → O
    const triXZ = makeTriangleMesh(
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(PX, 0, PZ),
      new THREE.Vector3(px, 0, f),
      matTriX
    );
    dynGroup.add(triXZ);
    // outline
    const triXZoutline = makeLine(new THREE.Vector3(0,0,0), new THREE.Vector3(PX,0,PZ),
      new THREE.LineBasicMaterial({ color: 0xff9800 }));
    dynGroup.add(triXZoutline);
    dynGroup.add(makeLine(new THREE.Vector3(PX,0,PZ), new THREE.Vector3(px,0,f),
      new THREE.LineBasicMaterial({ color: 0xff9800 })));
    dynGroup.add(makeLine(new THREE.Vector3(px,0,f), new THREE.Vector3(0,0,0),
      new THREE.LineBasicMaterial({ color: 0xff9800 })));

    // XZ triangle annotation
    const triXLabel = makeTextSprite('x/f = X/Z', { color: '#ffb74d', size: 0.28 });
    triXLabel.position.set((PX + px) / 3, -0.35, (PZ + f) / 3);
    dynGroup.add(triXLabel);

    // YZ-plane triangle (cyan): O → (0, PY, PZ) → (0, py, f) → O
    const triYZ = makeTriangleMesh(
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(0, PY, PZ),
      new THREE.Vector3(0, py, f),
      matTriY
    );
    dynGroup.add(triYZ);
    dynGroup.add(makeLine(new THREE.Vector3(0,0,0), new THREE.Vector3(0,PY,PZ),
      new THREE.LineBasicMaterial({ color: 0x4fc3f7 })));
    dynGroup.add(makeLine(new THREE.Vector3(0,PY,PZ), new THREE.Vector3(0,py,f),
      new THREE.LineBasicMaterial({ color: 0x4fc3f7 })));
    dynGroup.add(makeLine(new THREE.Vector3(0,py,f), new THREE.Vector3(0,0,0),
      new THREE.LineBasicMaterial({ color: 0x4fc3f7 })));

    const triYLabel = makeTextSprite('y/f = Y/Z', { color: '#4fc3f7', size: 0.28 });
    triYLabel.position.set(-0.35, (PY + py) / 3, (PZ + f) / 3);
    dynGroup.add(triYLabel);
  }
}

/* ══════════════════════════════════════════════════════════════
   EVENT WIRING
   ══════════════════════════════════════════════════════════════ */
[sPx, sPy, sPz, sF].forEach(s => s.addEventListener('input', rebuild));
cbTriangles.addEventListener('change', rebuild);
cbRealPlane.addEventListener('change', rebuild);

rebuild();   // initial build

/* ── render loop ── */
(function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();

/* ── resize ── */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
