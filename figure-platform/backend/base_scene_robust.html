<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Figure</title>
  <style>
    /* ── Reset & canvas fill ─────────────────────────────────────────────── */
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #c { width: 100%; height: 100%; display: block; }

    /* ── Floating HTML labels ────────────────────────────────────────────── */
    .lbl {
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      font-family: sans-serif;
      font-size: 13px;
      color: #111;
    }

    /* ── Control panel ───────────────────────────────────────────────────── */
    #ui {
      position: absolute;
      top: 10px; left: 10px;
      display: flex; flex-direction: column; gap: 6px;
      font-family: sans-serif; font-size: 13px;
    }
    #ui button {
      padding: 4px 10px; cursor: pointer; border: 1px solid #aaa;
      background: #f5f5f5; border-radius: 4px;
    }
    #ui button:hover { background: #e0e0e0; }
    #ui button.active { background: #c8e6ff; border-color: #5aabf0; }
    #ui label { display: flex; flex-direction: column; gap: 2px; }
    #ui input[type=range] { width: 140px; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ui">
    <button id="btnReset">Reset View</button>
    <!-- ADD YOUR CONTROLS HERE -->
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.171.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.171.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    /* ── Renderer ────────────────────────────────────────────────────────── */
    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });

    /* ── Scene ───────────────────────────────────────────────────────────── */
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    /* ── Orthographic camera ─────────────────────────────────────────────── */
    const d = 3;                              // half-height in world units
    let aspect = canvas.clientWidth / canvas.clientHeight;
    const camera = new THREE.OrthographicCamera(
      -d * aspect, d * aspect, d, -d, 0.1, 100
    );
    camera.position.set(4, 4, 4);
    camera.lookAt(0, 0, 0);
    camera.zoom = 1.2;
    camera.updateProjectionMatrix();

    /* ── Controls ────────────────────────────────────────────────────────── */
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const HOME_POS = camera.position.clone();
    const HOME_TARGET = new THREE.Vector3(0, 0, 0);
    document.getElementById('btnReset').addEventListener('click', () => {
      camera.position.copy(HOME_POS);
      controls.target.copy(HOME_TARGET);
      controls.update();
    });

    /* ── Label system ────────────────────────────────────────────────────── */
    const _labels = [];

    /**
     * addLabel(text, position3D, options?) → entry
     *   text     : HTML string  ('x<sub>1</sub>', '&lambda;', '<b>bold</b>', …)
     *   position : THREE.Vector3 (world space)
     *   options  : {
     *       color     : css color string  (default '#111')
     *       fontSize  : css string        (default '13px')
     *       bold      : boolean           (default false)
     *       offset    : [dx, dy] pixels   (default [0, 0])
     *       background: css string        (default 'none')
     *     }
     *   Returns an entry object; update entry.pos.set(x,y,z) to reposition.
     */
    function addLabel(text, position, options = {}) {
      const div = document.createElement('div');
      div.className = 'lbl';
      div.innerHTML = text;
      if (options.color)      div.style.color      = options.color;
      if (options.fontSize)   div.style.fontSize   = options.fontSize;
      if (options.bold)       div.style.fontWeight = 'bold';
      if (options.background) {
        div.style.background   = options.background;
        div.style.padding      = '1px 4px';
        div.style.borderRadius = '3px';
      }
      document.body.appendChild(div);
      const entry = { div, pos: position.clone(), offset: options.offset || [0, 0] };
      _labels.push(entry);
      return entry;
    }

    /* project labels each frame */
    const _v = new THREE.Vector3();
    function _syncLabels() {
      for (const { div, pos, offset } of _labels) {
        _v.copy(pos).project(camera);
        const x = ( _v.x * 0.5 + 0.5) * canvas.clientWidth  + offset[0];
        const y = (-_v.y * 0.5 + 0.5) * canvas.clientHeight + offset[1];
        div.style.left = x + 'px';
        div.style.top  = y + 'px';
      }
    }

    /* ── Render loop ─────────────────────────────────────────────────────── */
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
      _syncLabels();
    }
    animate();

    /* ── Resize (ResizeObserver on canvas) ───────────────────────────────── */
    new ResizeObserver(() => {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      aspect = w / h;
      camera.left   = -d * aspect;
      camera.right  =  d * aspect;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    }).observe(canvas);

    // ADD YOUR SCENE OBJECTS, GEOMETRY, LABELS, AND INTERACTION LOGIC BELOW HERE

  </script>
</body>
</html>
