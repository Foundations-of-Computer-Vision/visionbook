name: Quarto Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 4

      - name: Trigger deploy
        # POST to a token-guarded webhook on the site's 443 vhost that runs
        # `git pull && quarto render` on the host.
        # -f makes curl exit non-zero on the webhook's HTTP 500 (render failed).
        run: |
          curl -fsS --max-time 600 -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            https://${{ secrets.DEPLOY_HOST }}/deploy
