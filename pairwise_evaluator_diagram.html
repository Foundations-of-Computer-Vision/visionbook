<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Pairwise Evaluator — System Design</title>
  <style>
    :root {
      --muted: #6b7280;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f8f9fb;
      padding: 40px;
      color: #1a1a2e;
    }

    .slide {
      position: relative;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 28px 32px 18px;
      max-width: 1500px;
      margin: 0 auto 36px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
    }

    .slide-num {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 11px;
      color: #9ca3af;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    h2 {
      font-size: 19px;
      font-weight: 700;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 14px;
      letter-spacing: -0.2px;
    }
  </style>
</head>

<body>

  <!-- SLIDE A — AGENT PIPELINE -->
  <div class="slide">
    <div class="slide-num">Slide 5</div>
    <h2>Pairwise Evaluator — Agent Pipeline &amp; Global Ranking</h2>

    <svg viewBox="0 0 1520 420" style="width:100%;" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="7.5" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="#374151" />
        </marker>
        <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7.5" refY="3" orient="auto">
          <polygon points="0 0,8 3,0 6" fill="#15803d" />
        </marker>
      </defs>

      <!-- ── Stage 0: Inputs, cy=210 ── -->
      <rect x="20" y="155" width="170" height="110" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
      <text x="105" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f"
        font-family="Segoe UI,system-ui,sans-serif">Inputs</text>
      <text x="105" y="198" text-anchor="middle" font-size="10.5" fill="#4b6a9b"
        font-family="Segoe UI,system-ui,sans-serif">Figure A vs Figure B</text>
      <text x="105" y="213" text-anchor="middle" font-size="10.5" fill="#4b6a9b"
        font-family="Segoe UI,system-ui,sans-serif">+ original figure</text>
      <text x="105" y="228" text-anchor="middle" font-size="10.5" fill="#4b6a9b"
        font-family="Segoe UI,system-ui,sans-serif">+ numbered QMD lines</text>
      <text x="105" y="248" text-anchor="middle" font-size="11" fill="#4b6a9b"
        font-family="Segoe UI,system-ui,sans-serif" font-style="italic">Stage 0</text>

      <!-- ── Stage 1: 5 agent boxes, column centers at 62,136,210,284,358 ── -->
      <rect x="230" y="32" width="200" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
      <text x="330" y="54" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f"
        font-family="Segoe UI,system-ui,sans-serif">Geometry</text>
      <text x="330" y="70" text-anchor="middle" font-size="10" fill="#4b6a9b"
        font-family="Segoe UI,system-ui,sans-serif" font-style="italic">3D shape accuracy vs. textbook</text>
      <text x="330" y="83" text-anchor="middle" font-size="9" fill="#9ca3af"
        font-family="Segoe UI,system-ui,sans-serif">sees: html</text>

      <rect x="230" y="106" width="200" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
      <text x="330" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f"
        font-family="Segoe UI,system-ui,sans-serif">Interactivity</text>
      <text x="330" y="144" text-anchor="middle" font-size="10" fill="#4b6a9b"
        font-family="Segoe UI,system-ui,sans-serif" font-style="italic">controls work as intended</text>
      <text x="330" y="157" text-anchor="middle" font-size="9" fill="#9ca3af"
        font-family="Segoe UI,system-ui,sans-serif">sees: html</text>

      <rect x="230" y="180" width="200" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
      <text x="330" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f"
        font-family="Segoe UI,system-ui,sans-serif">Faithfulness</text>
      <text x="330" y="218" text-anchor="middle" font-size="10" fill="#4b6a9b"
        font-family="Segoe UI,system-ui,sans-serif" font-style="italic">match to source material</text>
      <text x="330" y="231" text-anchor="middle" font-size="9" fill="#9ca3af"
        font-family="Segoe UI,system-ui,sans-serif">sees: original figure + screenshots</text>

      <rect x="230" y="254" width="200" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
      <text x="330" y="276" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f"
        font-family="Segoe UI,system-ui,sans-serif">Labels</text>
      <text x="330" y="292" text-anchor="middle" font-size="10" fill="#4b6a9b"
        font-family="Segoe UI,system-ui,sans-serif" font-style="italic">text labels correct + readable</text>
      <text x="330" y="305" text-anchor="middle" font-size="9" fill="#9ca3af"
        font-family="Segoe UI,system-ui,sans-serif">sees: original figure + screenshots</text>

      <rect x="230" y="328" width="200" height="60" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
      <text x="330" y="350" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f"
        font-family="Segoe UI,system-ui,sans-serif">Concept</text>
      <text x="330" y="366" text-anchor="middle" font-size="10" fill="#4b6a9b"
        font-family="Segoe UI,system-ui,sans-serif" font-style="italic">textbook grounding + clarity</text>
      <text x="330" y="379" text-anchor="middle" font-size="9" fill="#9ca3af"
        font-family="Segoe UI,system-ui,sans-serif">sees: html + numbered lines</text>

      <!-- Fan: inputs -> 5 agents -->
      <line x1="190" y1="210" x2="212" y2="210" stroke="#374151" stroke-width="2" />
      <line x1="212" y1="62" x2="212" y2="358" stroke="#374151" stroke-width="2" />
      <line x1="212" y1="62" x2="228" y2="62" stroke="#374151" stroke-width="2" marker-end="url(#arr)" />
      <line x1="212" y1="136" x2="228" y2="136" stroke="#374151" stroke-width="2" marker-end="url(#arr)" />
      <line x1="212" y1="210" x2="228" y2="210" stroke="#374151" stroke-width="2" marker-end="url(#arr)" />
      <line x1="212" y1="284" x2="228" y2="284" stroke="#374151" stroke-width="2" marker-end="url(#arr)" />
      <line x1="212" y1="358" x2="228" y2="358" stroke="#374151" stroke-width="2" marker-end="url(#arr)" />

      <!-- Merge: 5 agents -> aggregator -->
      <line x1="430" y1="62" x2="450" y2="62" stroke="#374151" stroke-width="2" />
      <line x1="430" y1="136" x2="450" y2="136" stroke="#374151" stroke-width="2" />
      <line x1="430" y1="210" x2="450" y2="210" stroke="#374151" stroke-width="2" />
      <line x1="430" y1="284" x2="450" y2="284" stroke="#374151" stroke-width="2" />
      <line x1="430" y1="358" x2="450" y2="358" stroke="#374151" stroke-width="2" />
      <line x1="450" y1="62" x2="450" y2="358" stroke="#374151" stroke-width="2" />
      <line x1="450" y1="210" x2="468" y2="210" stroke="#374151" stroke-width="2" marker-end="url(#arr)" />

      <!-- ── Stage 2: Aggregator, cy=210 ── -->
      <rect x="470" y="160" width="160" height="100" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2.5" />
      <text x="550" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e"
        font-family="Segoe UI,system-ui,sans-serif">Aggregate</text>
      <text x="550" y="203" text-anchor="middle" font-size="11" fill="#b45309"
        font-family="Segoe UI,system-ui,sans-serif" font-style="italic">LLM Aggregator</text>
      <line x1="486" y1="213" x2="614" y2="213" stroke="#d97706" stroke-width="0.8" opacity="0.5" />
      <text x="550" y="229" text-anchor="middle" font-size="9.5" fill="#d97706"
        font-family="Segoe UI,system-ui,sans-serif" font-style="italic">weights by confidence</text>
      <text x="550" y="243" text-anchor="middle" font-size="9.5" fill="#d97706"
        font-family="Segoe UI,system-ui,sans-serif" font-style="italic">across all 5 agents</text>

      <!-- Aggregator -> Judgment -->
      <line x1="630" y1="210" x2="668" y2="210" stroke="#374151" stroke-width="2" marker-end="url(#arr)" />

      <!-- ── Stage 3: Judgment, cy=210 ── -->
      <rect x="670" y="155" width="110" height="110" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2" />
      <text x="725" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d"
        font-family="Segoe UI,system-ui,sans-serif">Judgment</text>
      <text x="725" y="198" text-anchor="middle" font-size="10" fill="#15803d"
        font-family="Segoe UI,system-ui,sans-serif">Winner</text>
      <text x="725" y="215" text-anchor="middle" font-size="10" fill="#15803d"
        font-family="Segoe UI,system-ui,sans-serif">Confidence</text>
      <text x="725" y="232" text-anchor="middle" font-size="10" fill="#15803d"
        font-family="Segoe UI,system-ui,sans-serif">Explanation</text>
      <text x="725" y="250" text-anchor="middle" font-size="13" fill="#15803d"
        font-family="Segoe UI,system-ui,sans-serif">&#x2713;</text>

      <!-- Judgment -> Bradley-Terry -->
      <line x1="780" y1="210" x2="818" y2="210" stroke="#374151" stroke-width="2" marker-end="url(#arr)" />

      <!-- ── Stage 4: Bradley-Terry, cy=210 ── -->
      <rect x="820" y="115" width="330" height="190" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
      <text x="985" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f"
        font-family="Segoe UI,system-ui,sans-serif">Bradley-Terry Model</text>
      <text x="985" y="156" text-anchor="middle" font-size="11" fill="#4b6a9b"
        font-family="Segoe UI,system-ui,sans-serif" font-style="italic">Stage 4 — Global Ranking</text>
      <rect x="840" y="166" width="290" height="30" rx="6" fill="#fff" stroke="#bfdbfe" stroke-width="1" />
      <text x="985" y="186" text-anchor="middle" font-size="11.5" fill="#1e1b4b"
        font-family="Courier New,monospace">&#946;i = Wi / &#931;j&#8800;i [ nij / (&#946;i+&#946;j) ]</text>
      <text font-size="9.5" fill="#4b6a9b" font-family="Segoe UI,system-ui,sans-serif">
        <tspan x="840" y="214">&#946;i — latent strength of setup i</tspan>
        <tspan x="840" dy="15">Wi — total wins by setup i</tspan>
        <tspan x="840" dy="15">nij — # comparisons between i, j</tspan>
        <tspan x="840" dy="18" fill="#6b7280" font-style="italic">Iterate MM update until convergence → ranked list of
          setups by &#946; score.</tspan>
      </text>

      <!-- Bradley-Terry -> Output -->
      <line x1="1150" y1="210" x2="1188" y2="210" stroke="#15803d" stroke-width="2.5" marker-end="url(#arr-g)" />

      <!-- ── Stage 5: Ranked Output, cy=210 ── -->
      <rect x="1190" y="115" width="280" height="190" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2" />
      <text x="1330" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d"
        font-family="Segoe UI,system-ui,sans-serif">Ranked Output</text>
      <text x="1330" y="156" text-anchor="middle" font-size="11" fill="#15803d"
        font-family="Segoe UI,system-ui,sans-serif" font-style="italic">across many comparisons</text>
      <rect x="1208" y="166" width="244" height="78" rx="6" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" />
      <text font-size="10.5" fill="#1e1b4b" font-family="Courier New,monospace">
        <tspan x="1218" y="183">#1 &#946;=1.84 gpt-5.5/full_pipeline</tspan>
        <tspan x="1218" y="199">#2 &#946;=1.21 gpt-5.5/iteration</tspan>
        <tspan x="1218" y="215">#3 &#946;=0.71 gpt-5.5/chatbot</tspan>
        <tspan x="1218" y="231">#4 &#946;=0.43 gpt-5.5/no_planner</tspan>
      </text>
      <text font-size="9.5" fill="#6b7280" font-family="Segoe UI,system-ui,sans-serif">
        <tspan x="1330" y="262" text-anchor="middle">~5–10 comparisons per pair for stable estimates.</tspan>
        <tspan x="1330" y="276" text-anchor="middle">Sparse pairs are fine — BT handles missing matchups.</tspan>
      </text>
    </svg>

    <p style="font-size:0.65em; color:var(--muted); text-align:center; margin-top:0.4em;">
      Five dimension agents judge every A/B pair; aggregated pairwise judgments roll up into a global ranking via
      Bradley-Terry.
    </p>
  </div>

</body>

</html>
